<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas Radio - Premium Player</title>
    <style>
        :root {
            --primary: #4c8bf5;
            --bg-dark: #0f1115;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a8;
        }

        body {
            font-family: 'Lexend', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, #1a1c24, var(--bg-dark));
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Top Bar */
        .top-nav {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .search-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .search-wrapper input {
            background: transparent; border: none; color: white; outline: none; padding: 5px; font-size: 1rem;
        }

        .live-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(76, 139, 245, 0.15);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid var(--primary);
        }

        .pulse-dot {
            width: 10px; height: 10px; background: var(--primary); border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Main Player Grid */
        .player-grid {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        @media (max-width: 950px) {
            .player-grid { grid-template-columns: 1fr; }
        }

        /* Left Side: Art & Player */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .cover-art {
            width: 250px; height: 250px; border-radius: 40px;
            object-fit: cover;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid var(--glass-border);
        }

        .now-playing-info h1 { font-size: 2.2rem; margin: 0; font-weight: 800; }
        .now-playing-info p { font-size: 1.3rem; color: var(--text-dim); margin: 10px 0 30px 0; }

        .playback-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .play-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            font-size: 1.8rem; cursor: pointer; transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(76,139,245,0.4); }

        /* Right Side: Interactive List */
        .side-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tab-nav {
            display: flex;
            background: rgba(0,0,0,0.2);
            padding: 10px;
        }

        .tab-btn {
            flex: 1; padding: 15px; border: none; background: transparent;
            color: var(--text-dim); font-weight: bold; cursor: pointer; border-radius: 20px;
        }

        .tab-btn.active {
            background: var(--primary); color: white;
        }

        .content-scroll {
            flex: 1; overflow-y: auto; height: 500px; padding: 20px;
        }

        .list-item {
            display: flex; align-items: center; gap: 15px;
            padding: 15px; margin-bottom: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            transition: 0.3s;
        }

        .list-item:hover { background: rgba(255,255,255,0.07); }
        .item-time { color: var(--primary); font-weight: bold; font-size: 0.9rem; }
        .item-info b { display: block; font-size: 1rem; }
        .item-info span { font-size: 0.85rem; color: var(--text-dim); }

        /* Custom Scrollbar */
        .content-scroll::-webkit-scrollbar { width: 6px; }
        .content-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="search-wrapper">
            <input type="text" id="slugInput" placeholder="Sendername...">
            <button onclick="launch()" style="background:var(--primary); border:none; color:white; border-radius:20px; padding:5px 15px; cursor:pointer; margin-left:10px;">Laden</button>
        </div>
        <div class="live-status">
            <div class="pulse-dot"></div>
            <span id="listenerText">Hörer: 0</span>
        </div>
    </div>

    <div id="app" class="player-grid" style="display:none;">
        <!-- Links -->
        <div class="main-card">
            <img id="stationImg" class="cover-art" src="">
            <div class="now-playing-info">
                <h1 id="artistName">Interpret</h1>
                <p id="songName">Titel des Liedes</p>
            </div>
            <div class="playback-controls">
                <button class="play-btn" id="playTrigger" onclick="toggle()">▶</button>
                <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="setVol(this.value)" style="width: 200px; accent-color: var(--primary);">
            </div>
        </div>

        <!-- Rechts -->
        <div class="side-panel">
            <div class="tab-nav">
                <button id="t-songs" class="tab-btn active" onclick="switchView('songs')">Letzte Songs</button>
                <button id="t-plan" class="tab-btn" onclick="switchView('plan')">Sendeplan</button>
            </div>
            <div id="listView" class="content-scroll"></div>
        </div>
    </div>

    <audio id="player"></audio>

<script>
    let station = "";
    let view = "songs";
    const audio = document.getElementById('player');

    function switchView(v) {
        view = v;
        document.getElementById('t-songs').classList.toggle('active', v === 'songs');
        document.getElementById('t-plan').classList.toggle('active', v === 'plan');
        updateData();
    }

    async function launch() {
        station = document.getElementById('slugInput').value.toLowerCase().trim();
        if(!station) return;
        document.getElementById('app').style.display = "grid";
        audio.src = `https://stream.laut.fm/${station}`;
        audio.play();
        document.getElementById('playTrigger').innerText = "⏸";
        updateData();
        setInterval(updateData, 10000);
    }

    async function updateData() {
        if(!station) return;
        try {
            // Hörerzahl (Echtzeit API wie im Bild)
            const lRes = await fetch(`https://api.laut.fm/station/${station}/listeners`);
            const lCount = await lRes.text();
            document.getElementById('listenerText').innerText = `Hörer: ${lCount.trim() || 0}`;

            // Station & Aktuell
            const sRes = await fetch(`https://api.laut.fm/station/${station}`);
            const sData = await sRes.json();
            const cRes = await fetch(`https://api.laut.fm/station/${station}/current_song`);
            const cData = await cRes.json();

            document.getElementById('stationImg').src = sData.images.station_640x640;
            document.getElementById('artistName').innerText = cData.artist.name;
            document.getElementById('songName').innerText = cData.title;

            // Liste laden
            const container = document.getElementById('listView');
            container.innerHTML = "";

            if(view === 'songs') {
                const hRes = await fetch(`https://api.laut.fm/station/${station}/last_songs`);
                const hData = await hRes.json();
                hData.forEach(item => {
                    const time = new Date(item.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    container.innerHTML += `<div class="list-item"><div class="item-time">${time}</div><div class="item-info"><b>${item.artist.name}</b><span>${item.title}</span></div></div>`;
                });
            } else {
                const pRes = await fetch(`https://api.laut.fm/station/${station}/schedule`);
                const pData = await pRes.json();
                pData.forEach(plan => {
                    const time = plan.start_time ? plan.start_time.substring(0,5) : "00:00";
                    container.innerHTML += `<div class="list-item"><div class="item-time">${time}</div><div class="item-info"><b>${plan.name}</b><span>Sondersendung</span></div></div>`;
                });
            }
        } catch(e) {}
    }

    function toggle() { if(audio.paused) { audio.play(); document.getElementById('playTrigger').innerText="⏸"; } else { audio.pause(); document.getElementById('playTrigger').innerText="▶"; } }
    function setVol(v) { audio.volume = v; }
</script>
</body>
</html>
