<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v37.0 - Master Unlock</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --surface: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px; background: #000; border-bottom: 1px solid #222; }
        .search-bar { display: flex; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }
        .uhr { text-align: center; font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding: 10px 15px 230px 15px; }
        .hero { background: var(--surface); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; margin-bottom: 15px; }
        #mainImg { width: 110px; height: 110px; border-radius: 15px; object-fit: cover; margin-bottom: 8px; border: 1px solid #333; }
        #stName { font-size: 18px; font-weight: bold; }
        #hoerer { font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .now-card { background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; border-left: 4px solid var(--accent); margin-bottom: 15px; }
        .tag { background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 4px; }
        #curT { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .history { display: flex; flex-direction: column; gap: 6px; }
        .h-item { background: #080808; padding: 10px; border-radius: 10px; display: flex; gap: 12px; font-size: 12px; }
        .h-time { color: var(--accent); font-weight: bold; width: 40px; }
        .player { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #222; padding: 15px 20px 30px 20px; border-radius: 25px 25px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 5px; border-radius: 5px; margin-bottom: 12px; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 11px; animation: tScroll 15s linear infinite; }
        @keyframes tScroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .controls { display: flex; align-items: center; gap: 15px; }
        .pBtn { width: 65px; height: 65px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .pBtn.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .vol-box { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); }
        #status { font-size: 9px; color: #666; text-align: center; margin-top: 5px; letter-spacing: 1px; }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header>
        <div class="search-bar">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') startSync()">
            <span onclick="startSync()" style="cursor:pointer; font-size: 20px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="scroll">
        <div class="hero">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="stName">RADIO START</div>
            <div id="hoerer">BEREIT</div>
        </div>
        <div class="now-card">
            <div class="tag">JETZT</div>
            <div id="curT">Suche einen Sender...</div>
        </div>
        <div class="history" id="hList"></div>
    </div>

    <div class="player">
        <div class="ticker"><div id="tText">+++ BITTE SENDER WÄHLEN +++</div></div>
        <div class="controls">
            <button id="pBtn" class="pBtn" onclick="handlePlay()">▶</button>
            <div class="vol-box">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="status">Warte auf Aktion...</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let currentSlug = "";
    let dataTimer = null;

    function init() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { if(audio) audio.volume = e.target.value; };
        // Audio-Objekt einmalig erstellen
        audio = new Audio();
        audio.crossOrigin = "anonymous";
    }

    async function startSync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        currentSlug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // UNLOCK TRICK: Kurzer stummer Ton bei Suche
        audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
        audio.play().catch(() => {});

        document.getElementById('status').innerText = "SENDER BEREIT";
        await updateInfo();
        if(dataTimer) clearInterval(dataTimer);
        dataTimer = setInterval(updateInfo, 15000);
    }

    function handlePlay() {
        if(!currentSlug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(audio.paused || audio.src.includes("data:")) {
            st.innerText = "VERBINDE...";
            audio.src = `https://stream.laut.fm/${currentSlug}?nocache=${Date.now()}`;
            audio.volume = document.getElementById('vRange').value;
            
            const forcePlay = () => {
                audio.play().then(() => {
                    btn.innerHTML = "⏸";
                    btn.classList.add('active');
                    st.innerText = "STREAM AKTIV";
                    st.style.color = "var(--accent)";
                }).catch(() => {
                    st.innerText = "BLOCKIERT - VERSUCHE AUTOMATISCH...";
                    setTimeout(forcePlay, 250); // Automatische Wiederholung
                });
            };
            forcePlay();
        } else {
            audio.pause();
            audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
            btn.innerHTML = "▶";
            btn.classList.remove('active');
            st.innerText = "GESTOPPT";
            st.style.color = "#666";
        }
    }

    async function updateInfo() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name.toUpperCase();
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " HÖRER AKTUELL";
            const cur = l[0];
            document.getElementById('curT').innerText = cur.artist.name + " - " + cur.title;
            document.getElementById('tText').innerText = `+++ ${s.display_name.toUpperCase()} spielt: ${cur.artist.name} - ${cur.title} +++`;
            let hHtml = "";
            l.slice(1, 10).forEach(song => {
                const t = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                hHtml += `<div class="h-item"><span class="h-time">${t}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = hHtml;
        } catch(e) {}
    }
</script>
</body>
</html>
