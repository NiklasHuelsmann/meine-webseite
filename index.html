<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein laut.fm Radio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Suche oben */
        .search-area { width: 100%; max-width: 450px; position: relative; margin-bottom: 25px; }
        input#sender-suche { 
            width: 100%; padding: 15px; border-radius: 25px; border: 2px solid #333; 
            background: #222; color: white; font-size: 1em; outline: none;
        }
        input#sender-suche:focus { border-color: #ff5500; }
        
        #ergebnisse { 
            position: absolute; background: #222; width: 100%; border-radius: 15px; 
            z-index: 100; margin-top: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            max-height: 300px; overflow-y: auto;
        }
        .sender-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; }
        .sender-item:hover { background: #333; }
        .sender-item img { width: 40px; height: 40px; border-radius: 5px; }

        /* Player Karte */
        .player-card { 
            background: #1e1e1e; width: 100%; max-width: 450px; border-radius: 30px; 
            padding: 25px; text-align: center; border: 1px solid #333;
        }
        .header-info { display: flex; justify-content: space-between; font-size: 0.85em; color: #00ccff; margin-bottom: 15px; }
        
        #station-logo { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #ff5500; margin-bottom: 15px; object-fit: cover; }
        
        /* Der Player-Bereich (unveränderte Audiospur) */
        .player-container { background: #000; border-radius: 20px; padding: 5px; margin: 20px 0; }
        iframe { border: none; width: 100%; height: 150px; border-radius: 15px; }

        .song-title { color: #00ff00; font-weight: bold; margin: 10px 0; }
        .history { text-align: left; background: #252525; padding: 15px; border-radius: 20px; font-size: 0.8em; color: #bbb; }
    </style>
</head>
<body>

<div class="search-area">
    <input type="text" id="sender-suche" placeholder="🔍 Alle Sender suchen..." autocomplete="off">
    <div id="ergebnisse"></div>
</div>

<div class="player-card">
    <div class="header-info">
        <span id="uhrzeit">00:00:00</span>
        <span id="hoerer-anzahl">● 0 Hörer</span>
    </div>

    <img id="station-logo" src="" alt="Logo">
    <h2 id="station-name" style="margin:0;">Wähle einen Sender</h2>
    <div id="aktuelle-musik" class="song-title">Warte auf Suche...</div>

    <div class="player-container" id="player-platzhalter">
        </div>

    <div class="history">
        <div style="margin-bottom: 5px; color: #777;">ZULETZT GESPIELT:</div>
        <div id="history-liste"></div>
    </div>
</div>

<script>
    const suche = document.getElementById('sender-suche');
    const ergebnisse = document.getElementById('ergebnisse');
    let aktuellerSender = "";

    // 1. Suche über alle laut.fm Sender
    suche.addEventListener('input', () => {
        if (suche.value.length < 2) { ergebnisse.innerHTML = ""; return; }

        fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(suche.value)}`)
            .then(r => r.json())
            .then(data => {
                ergebnisse.innerHTML = "";
                data.items.slice(0, 6).forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'sender-item';
                    div.innerHTML = `<img src="${s.images.station_80x80}"> <strong>${s.display_name}</strong>`;
                    div.onclick = () => starteSender(s.name);
                    ergebnisse.appendChild(div);
                });
            });
    });

    // 2. Sender starten & Player laden
    function starteSender(name) {
        aktuellerSender = name;
        ergebnisse.innerHTML = "";
        suche.value = "";

        // Das Player-Widget wird mit Autoplay-Befehl geladen
        // 'allow="autoplay"' ist wichtig, damit der Browser den Ton erlaubt
        document.getElementById('player-platzhalter').innerHTML = `
            <iframe src="https://laut.fm/widgets/player/${name}?autoplay=1" allow="autoplay" scrolling="no"></iframe>
        `;

        updateDaten();
    }

    // 3. Infos aktualisieren (Logo, Hörer, Song)
    function updateDaten() {
        if (!aktuellerSender) return;

        // Station Details
        fetch(`https://api.laut.fm/station/${aktuellerSender}`)
            .then(r => r.json())
            .then(d => {
                document.getElementById('station-name').innerText = d.display_name;
                document.getElementById('station-logo').src = d.images.station_160x160;
                document.getElementById('hoerer-anzahl').innerText = `● ${d.current_listeners || 0} Hörer`;
            });

        // Songs & History
        fetch(`https://api.laut.fm/station/${aktuellerSender}/last_songs`)
            .then(r => r.json())
            .then(songs => {
                if (songs.length > 0) {
                    document.getElementById('aktuelle-musik').innerText = `🎶 ${songs[0].artist.name} - ${songs[0].title}`;
                    
                    let hHTML = "";
                    songs.slice(1, 4).forEach(s => {
                        hHTML += `<div style="padding: 3px 0; border-bottom: 1px solid #333;">${s.artist.name} - ${s.title}</div>`;
                    });
                    document.getElementById('history-liste').innerHTML = hHTML;
                }
            });
    }

    // Uhrzeit Ticker
    setInterval(() => {
        document.getElementById('uhrzeit').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);

    // Alle 15 Sekunden Song-Info auffrischen
    setInterval(updateDaten, 15000);

    // Starte mit einem Standardsender
    starteSender("eins");
</script>

</body>
</html>
