<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Studio v116.0</title>
    <style>
        :root { --accent: #007aff; --bg: #0d1117; --white: #ffffff; --text-dim: #8b949e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* SUCHE OBEN */
        .header { 
            height: 70px; background: #000; border-bottom: 3px solid var(--accent); 
            display: flex; align-items: center; padding: 0 15px; z-index: 1000;
        }
        .search-box { position: relative; flex: 1; max-width: 500px; margin: 0 auto; }
        #query { 
            width: 100%; padding: 12px 15px; border-radius: 8px; border: none; 
            font-size: 16px; background: #fff; color: #000; font-weight: bold;
        }
        #results { 
            position: absolute; top: 50px; left: 0; width: 100%; background: #fff; 
            border-radius: 8px; color: #333; display: none; z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 300px; overflow-y: auto;
        }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .res-item img { width: 40px; height: 40px; border-radius: 4px; }

        /* CONTENT AREA */
        .main { flex: 1; display: flex; overflow-y: auto; flex-wrap: wrap; }

        /* LINKS: PLAYER */
        .player-section { 
            flex: 1; min-width: 320px; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; text-align: center; border-right: 1px solid #333;
        }
        .cover-container { 
            width: 260px; height: 260px; border: 4px solid var(--accent); border-radius: 40px; 
            padding: 5px; background: #000; position: relative; margin-bottom: 15px;
        }
        #mainImg { width: 100%; height: 100%; border-radius: 34px; object-fit: cover; }
        #studioOverlay { 
            position: absolute; inset: 5px; border-radius: 34px; background: rgba(0,122,255,0.5); 
            display: none; align-items: center; justify-content: center; font-size: 100px; backdrop-filter: blur(4px);
        }

        .btn-play { 
            width: 70px; height: 70px; border-radius: 50%; background: var(--accent); 
            border: none; color: white; font-size: 30px; cursor: pointer; margin-bottom: 15px;
        }
        .info-badge { background: #000; border: 2px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; margin-bottom: 10px; }
        #stBio { font-size: 12px; color: var(--text-dim); max-width: 300px; }

        /* RECHTS: PLAYLIST */
        .history-section { flex: 1; min-width: 320px; padding: 20px; }
        .song-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px; 
            background: #1c2128; border-radius: 12px; margin-bottom: 8px; border: 1px solid #333;
        }
        .song-item.active { border-color: var(--accent); background: rgba(0,122,255,0.1); }
        .song-time { font-size: 11px; color: var(--accent); font-weight: bold; width: 40px; }
        .song-meta { flex: 1; overflow: hidden; }
        .song-meta b { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-meta span { font-size: 12px; color: var(--text-dim); }
        .song-cover-mini { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }

        @media (max-width: 700px) {
            .player-section { border-right: none; border-bottom: 1px solid #333; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body onload="init()">

<header class="header">
    <div class="search-box">
        <input type="text" id="query" placeholder="Sender suchen..." autocomplete="off">
        <div id="results"></div>
    </div>
</header>

<main class="main">
    <section class="player-section">
        <div class="cover-container">
            <img id="mainImg" src="https://api.laut.fm/station/default/images/station_640x640.png">
            <div id="studioOverlay"></div>
        </div>
        <button class="btn-play" id="playBtn" onclick="togglePlay()" disabled>▶</button>
        <div id="listeners" class="info-badge">STUDIO BEREIT</div>
        <h2 id="stName" style="margin:5px 0;">SENDERWAHL</h2>
        <div id="stBio">Bitte einen Sendernamen eingeben.</div>
    </section>

    <section class="history-section">
        <h4 style="color:var(--accent); margin-top:0;">ZULETZT GELAUFEN</h4>
        <div id="playlist"></div>
    </section>
</main>

<script>
    const audio = new Audio();
    let currentStation = "";
    const input = document.getElementById('query');
    const resBox = document.getElementById('results');

    function init() {
        input.addEventListener('input', async () => {
            const v = input.value.trim();
            if(v.length < 2) { resBox.style.display = 'none'; return; }
            const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(v)}`);
            const d = await r.json();
            if(d.items) {
                resBox.innerHTML = d.items.map(s => `
                    <div class="res-item" onclick="play('${s.name}')">
                        <img src="${s.images.station_80x80}">
                        <b>${s.display_name}</b>
                    </div>`).join('');
                resBox.style.display = 'block';
            }
        });
        document.addEventListener('click', e => { if(!e.target.closest('.search-box')) resBox.style.display = 'none'; });
    }

    async function play(id) {
        currentStation = id;
        resBox.style.display = 'none';
        input.value = "";
        document.getElementById('playBtn').disabled = false;
        audio.src = `https://stream.laut.fm/${currentStation}`;
        audio.play();
        document.getElementById('playBtn').innerHTML = "⏸";
        update();
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(update, 10000);
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function update() {
        if(!currentStation) return;
        try {
            const [info, songs, lsn] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stName').innerText = info.display_name;
            document.getElementById('stBio').innerText = info.description || "";
            document.getElementById('listeners').innerText = (lsn.includes('<') ? '0' : lsn) + " HÖRER LIVE";

            const overlay = document.getElementById('studioOverlay');
            overlay.style.display = "none";

            let html = '';
            songs.forEach((s, i) => {
                const isNow = i === 0;
                const cover = s.image_640x640 || info.images.station_640x640;
                let ico = "";
                const check = (s.artist.name + s.title).toLowerCase();

                if(check.includes("nachrichten") || check.includes("news")) {
                    ico = "📰"; if(isNow) { overlay.innerText = "📰"; overlay.style.display = "flex"; }
                } else if(check.includes("moderation") || check.includes("ident")) {
                    ico = "🎙️"; if(isNow) { overlay.innerText = "🎙️"; overlay.style.display = "flex"; }
                }

                if(isNow) document.getElementById('mainImg').src = cover;

                html += `
                    <div class="song-item ${isNow ? 'active' : ''}">
                        <div class="song-time">${s.started_at.split(' ')[1].substring(0,5)}</div>
                        <div style="font-size:20px; width:30px;">${ico}</div>
                        <div class="song-meta"><b>${s.artist.name}</b><span>${s.title}</span></div>
                        <img class="song-cover-mini" src="${cover}">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch(e){}
    }
</script>
</body>
</html>
