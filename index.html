<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.27</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #cbd5e0;
            --status-yellow: #ffcc00; --status-blue: #007bff; --status-red: #ff3b3b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #0d111a; margin: 0; height: 100vh; 
            color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; 
            overflow: hidden; display: flex; justify-content: center; 
        }
        
        .app { 
            width: 100%; max-width: 600px; height: 100vh; 
            background-color: var(--bg-app); display: flex; flex-direction: column; 
        }
        
        .header-fixed { flex-shrink: 0; padding-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .top-nav { height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        #sysTime { font-size: 14px; font-weight: 800; }
        
        .hero { padding: 10px 0; text-align: center; }
        /* Nur noch der Display-Name, schön groß */
        #stNameHeader { font-size: 24px; font-weight: 900; margin: 5px 0 10px; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        #mainImg { width: 140px; height: 140px; border-radius: 18px; object-fit: cover; box-shadow: 0 5px 20px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        
        .controls { margin: 10px 0; display: flex; justify-content: center; }
        #pBtn { width: 55px; height: 55px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 24px; cursor: pointer; color: #1e2538; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 250, 217, 0.3); }

        .scroll-content { 
            flex: 1; overflow-y: auto; padding: 0 12px; 
            scrollbar-width: none; -webkit-overflow-scrolling: touch; 
        }
        .scroll-content::-webkit-scrollbar { display: none; }
        
        .track-entry { 
            display: flex; align-items: center; gap: 12px; padding: 10px; 
            border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.02);
        }
        .track-entry.current { border-left: 5px solid var(--accent-main); background: rgba(255,255,255,0.1); }
        
        .left-meta { width: 50px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; gap: 4px; }
        .track-time { font-size: 10px; font-weight: 800; background: rgba(0,0,0,0.4); padding: 2px 5px; border-radius: 4px; }
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 14px; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .track-tit { font-size: 11px; color: var(--text-dim); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-cover { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #000; flex-shrink: 0; }
        
        .fixed-footer { 
            flex-shrink: 0; 
            padding: 12px 15px calc(20px + env(safe-area-inset-bottom)); 
            background: #111622; border-top: 2px solid rgba(255,255,255,0.05);
        }
        .footer-row { display: flex; justify-content: center; margin-bottom: 8px; }
        .hoerer-badge { background: var(--accent-main); color: #1e2538; padding: 5px 18px; border-radius: 15px; font-size: 13px; font-weight: 900; }
        
        #footerDesc { font-size: 11px; text-align: center; color: var(--text-dim); max-height: 45px; overflow-y: auto; line-height: 1.3; margin-bottom: 8px; }
        
        .version-tag { text-align: center; font-size: 12px; color: #ffffff; font-weight: 900; letter-spacing: 2px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); }

        #searchOverlay { display: none; position: absolute; top: 10px; left: 5%; width: 90%; height: 50px; background: var(--bg-card); z-index: 100; align-items: center; padding: 0 15px; border-radius: 25px; border: 2px solid var(--accent-main); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <div class="header-fixed">
        <div class="top-nav">
            <div id="sysTime">00:00</div>
            <div style="cursor:pointer; font-size: 20px;" onclick="toggleSearch()">🔍</div>
        </div>
        <div class="hero">
            <h1 id="stNameHeader">SENDER WÄHLEN</h1>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <button id="pBtn" onclick="togglePlay()">▶</button>
            </div>
        </div>
    </div>

    <div class="scroll-content">
        <div id="trackList"></div>
    </div>

    <div class="fixed-footer">
        <div class="footer-row">
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
        <div id="footerDesc">Suche benutzen, um Radio zu hören...</div>
        <div class="version-tag">V115.27</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sendername..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none;border:none;color:#fff;font-size:20px;">✕</button>
    </div>
</div>

<script>
    const au = new Audio(); 
    let currentSlug = ""; 

    function initApp() { 
        setInterval(() => { 
            document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
        }, 1000); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        if(s.style.display === 'flex') document.getElementById('sInput').focus();
    }
    
    function execSearch() { 
        const val = document.getElementById('sInput').value.trim();
        if(val) { startStation(val, true); toggleSearch(); } 
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { 
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json())
            ]);
            const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/listeners`);
            const hCount = await hRes.text();

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('footerDesc').innerText = s.description || "Live Radio";
            document.getElementById('hoerer').innerText = (hCount.includes("<") ? "0" : hCount) + " HÖRER";

            let html = "";
            l.forEach((song, i) => {
                if(i >= 5) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const fullText = (art + " " + tit).toLowerCase();
                let albumImg = song.image_640x640 || song.image_170x170 || s.images.station_640x640;
                
                if(isCurrent) document.getElementById('mainImg').src = albumImg;
                const startTime = new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
                let icon = isCurrent ? `🔊` : "";
                
                if(fullText.includes("start_ad_break") || fullText.includes("ad-trigger") || fullText.includes("reklame") || song.type === "ads") {
                    icon = `📢`; art = "REKLAME";
                } else if(fullText.includes("nachrichten") || fullText.includes("news")) {
                    icon = `📰`; art = "NEWS";
                } else if(art.toLowerCase() === "moderation" || art.toLowerCase() === "station ident") {
                    icon = `🎙️`; art = "MODERATION";
                }

                html += `<div class="track-entry ${isCurrent ? 'current' : ''}">
                    <div class="left-meta"><div style="font-size:18px;">${icon}</div><span class="track-time">${startTime}</span></div>
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <img class="track-cover" src="${albumImg}">
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
