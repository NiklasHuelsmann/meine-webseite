<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Ultimate v29.0 - Hardcore Fix</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --card: #121212; --text: #fff; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-shell { width: 100%; max-width: 500px; background: #000; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; position: relative; }
        header { padding: 15px; border-bottom: 1px solid #222; }
        .search-row { display: flex; background: #1a1a1a; border-radius: 12px; padding: 8px 15px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }
        .uhr { text-align: center; font-size: 14px; color: var(--accent); margin-top: 8px; font-weight: bold; font-family: monospace; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 260px; }
        .station-display { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; margin-bottom: 20px; }
        #sideLogo { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #222; }
        #mainImg { width: 100%; aspect-ratio: 1/1; border-radius: 25px; object-fit: cover; border: 1px solid #333; margin-bottom: 20px; }
        .track-info { text-align: center; margin-bottom: 20px; }
        #curT { font-size: 1.1rem; font-weight: bold; display: block; margin-top: 5px; }
        .player-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); border-top: 1px solid #222; padding: 15px 20px 40px 20px; }
        .ticker-wrap { overflow: hidden; background: #080808; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        #ticker { display: inline-block; white-space: nowrap; color: var(--accent); font-weight: bold; font-size: 12px; animation: swing 15s ease-in-out infinite; }
        @keyframes swing { 0%, 20% { transform: translateX(0); } 45%, 55% { transform: translateX(calc(-100% + 200px)); } 80%, 100% { transform: translateX(0); } }
        .controls { display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 35px; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
        .play-btn:active { transform: scale(0.9); background: var(--accent); }
        .vol-wrap { flex: 1; }
        input[type=range] { width: 100%; accent-color: var(--accent); }
        .history-card { display: flex; align-items: center; gap: 12px; background: #0a0a0a; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #1a1a1a; font-size: 13px; }
        #status-msg { font-size: 10px; color: #ff4444; text-align: center; margin-top: 5px; height: 12px; }
    </style>
</head>
<body onload="initApp()">

<div class="app-shell">
    <header>
        <div class="search-row">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') sync()">
            <button onclick="sync()" style="background:none; border:none; font-size:20px; cursor:pointer;">🔍</button>
        </div>
        <div id="uhr" class="uhr">--:--:--</div>
    </header>

    <div class="scroll-content">
        <div class="station-display">
            <img id="sideLogo" src="">
            <div>
                <div id="stName" style="font-weight:bold;">STANDBY</div>
                <div id="hoerer" style="font-size:11px; color:var(--accent);">SENDER SUCHEN</div>
            </div>
        </div>
        <img id="mainImg" src="">
        <div class="track-info">
            <small style="color:#666">AKTUELLER SONG</small>
            <span id="curT">Warte auf Eingabe...</span>
        </div>
        <div id="hList"></div>
    </div>

    <div class="player-bar">
        <div class="ticker-wrap"><div id="ticker">BEREIT...</div></div>
        <div class="controls">
            <button id="pBtn" class="play-btn" onclick="togglePlay()">▶</button>
            <div class="vol-wrap">
                <input type="range" id="vControl" min="0" max="1" step="0.01" value="0.8">
                <div id="status-msg"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let slug = "";
    let intv = null;
    const pBtn = document.getElementById('pBtn');
    const msg = document.getElementById('status-msg');

    function initApp() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vControl').oninput = (e) => { if(audio) audio.volume = e.target.value; };
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        msg.innerText = "Lade Daten...";
        
        if(audio) { audio.pause(); audio = null; }
        pBtn.innerHTML = "▶";
        pBtn.style.background = "#fff";
        
        await loadData();
        if(intv) clearInterval(intv);
        intv = setInterval(loadData, 15000);
    }

    function togglePlay() {
        if(!slug) { msg.innerText = "Bitte erst Sender suchen!"; return; }

        if(!audio || audio.paused) {
            msg.innerText = "Verbinde zum Stream...";
            // Browser-Safe Initialisierung
            audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
            audio.volume = document.getElementById('vControl').value;
            
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    pBtn.innerHTML = "⏸";
                    pBtn.style.background = "#00d2ff";
                    msg.innerText = "";
                }).catch(e => {
                    msg.innerText = "Blockiert! Klick nochmal auf Play.";
                    pBtn.style.background = "#ff4444";
                });
            }
        } else {
            audio.pause();
            audio = null;
            pBtn.innerHTML = "▶";
            pBtn.style.background = "#fff";
            msg.innerText = "Gestoppt.";
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const rS = await fetch(`https://api.laut.fm/station/${slug}`);
            const data = await rS.json();
            const rL = await fetch(`https://api.laut.fm/station/${slug}/last_songs`);
            const songs = await rL.json();
            const rH = await fetch(`https://api.laut.fm/station/${slug}/listeners`);
            const listeners = await rH.text();

            const sName = data.display_name;
            const cur = songs[0];
            const track = cur.artist.name + " - " + cur.title;
            const album = cur.album ? cur.album : "SINGLE";

            document.getElementById('stName').innerText = sName;
            document.getElementById('sideLogo').src = data.images.station_80x80;
            document.getElementById('mainImg').src = data.images.station_640x640;
            document.getElementById('hoerer').innerText = listeners + " HÖRER";
            document.getElementById('curT').innerText = track;
            
            // TICKER: spielt (klein)
            document.getElementById('ticker').innerText = 
                `${sName.toUpperCase()} spielt | ALBUM: ${album.toUpperCase()} | AKTUELL: ${track.toUpperCase()}`;

            let h = "";
            songs.slice(1, 6).forEach(s => {
                const t = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                h += `<div class="history-card"><b>${t}</b> <span>${s.artist.name} - ${s.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = h;
            msg.innerText = "";
        } catch(e) {
            msg.innerText = "Sender nicht gefunden!";
        }
    }
</script>
</body>
</html>
