<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas Radio-Dashboard</title>
    <!-- Dark-Mode Support & Hintergrund -->
    <style>
        :root {
            --bg-color: #f4f6f9;
            --text-color: #333;
            --card-bg: white;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1a2e;
                --text-color: #f0f0f0;
                --card-bg: #16213e;
            }
        }
        body { 
            font-family: sans-serif; 
            background-color: var(--bg-color); 
            background-image: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0; 
        }
        #status-container { position: fixed; top: 10px; left: 10px; z-index: 1000; background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header { background: var(--card-bg); padding: 15px 40px; border-bottom: 2px solid #333; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 3px solid transparent; cursor: grab; }
        .active-card { border: 3px solid #ef4444 !important; }
        .btn-play { background: #00a67c; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div id="status-container">
    <div style="display: flex; align-items: center; gap: 10px;"><div id="status-dot" style="width: 12px; height: 12px; border-radius: 50%; background-color: gray;"></div>
    <span id="status-text" style="font-weight: bold;">Prüfe...</span></div>
    <button onclick="window.open('https://radioadmin.laut.fm', '_blank', 'noopener')" style="width: 100%; margin-top:10px; background:#00a67c; color:white; border:none; padding:5px;">Login</button>
</div>

<header class="header">
    <input type="text" id="searchInput" placeholder="Sender-Slug...">
    <button onclick="addStation()">Hinzufügen</button>
</header>

<div class="grid" id="grid"></div>
<audio id="player"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    const grid = document.getElementById('grid');
    const player = document.getElementById('player');

    // Drag & Drop Sortierung aktivieren
    new Sortable(grid, { animation: 150, onEnd: saveOrder });

    function saveOrder() {
        const newOrder = Array.from(document.querySelectorAll('.card')).map(c => c.dataset.id);
        localStorage.setItem('my_stations', JSON.stringify(newOrder));
    }

    function render() {
        grid.innerHTML = '';
        stations.forEach(s => {
            const isPlaying = !player.paused && player.src.includes(s);
            const card = document.createElement('div');
            card.className = `card ${isPlaying ? 'active-card' : ''}`;
            card.dataset.id = s;
            card.innerHTML = `
                <div style="text-transform:uppercase; font-weight:bold;">${s}</div>
                <div id="art-${s}">Lade...</div>
                <button class="btn-play" onclick="toggle('${s}')">
                    ${isPlaying ? '⏹ Stopp' : '▶ Start'}
                </button>
            `;
            grid.appendChild(card);
            updateData(s);
        });
    }

    function toggle(s) {
        if (!player.paused && player.src.includes(s)) {
            player.pause();
        } else {
            player.src = `https://stream.laut.fm/${s}`;
            player.play();
        }
        render();
    }

    async function updateData(s) {
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
        });
    }

    function addStation() {
        const val = document.getElementById('searchInput').value.toLowerCase().trim();
        if(val && !stations.includes(val)) {
            stations.push(val);
            localStorage.setItem('my_stations', JSON.stringify(stations));
            render();
        }
    }

    window.onload = render;
</script>
</body>
</html>
