<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App FINALE v88.6</title>
    <style>
        :root { 
            --bg-dark: #0c0e14; 
            --accent-green: #00e699;
            --accent-pink: #ff00ff;
            --accent-yellow: #ffd700; /* Werbung */
            --accent-blue: #00d9ff;   /* Nachrichten */
            --text-main: #ffffff;
            --text-dim: #717b8a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background-color: var(--bg-dark); position: relative; }
        
        .app-bar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1001; }
        #sysTime { font-family: monospace; color: var(--accent-green); font-weight: bold; }
        .search-trigger { font-size: 22px; color: var(--accent-green); cursor: pointer; padding: 10px; }

        #searchBox { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 65px; 
            background: #161a24; 
            z-index: 2000; 
            align-items: center; 
            padding: 0 15px;
            border-bottom: 2px solid var(--accent-green);
        }
        #sIn { flex: 1; height: 40px; background: #232a37; border: none; border-radius: 8px; color: #fff; padding: 0 15px; font-size: 16px; outline: none; }
        .close-btn { margin-left: 10px; color: var(--accent-green); font-weight: bold; cursor: pointer; padding: 10px; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .hero { padding: 10px 20px 20px; text-align: center; }
        #stNameDisplay { font-size: 20px; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; color: #fff; letter-spacing: 1px; min-height: 24px; }
        #modBadge { display: none; background: var(--accent-pink); color: white; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; width: fit-content; margin: 0 auto 15px; }

        #mainImg { width: 280px; height: 280px; border-radius: 8px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 20px; background: #1a202c; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 10px; }
        .btn-side { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 10px; }
        #pBtn { width: 75px; height: 75px; border-radius: 50%; background: var(--accent-green); border: none; font-size: 30px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0, 230, 153, 0.2); }

        .section-content { padding: 0 25px; }
        .track-now-container { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; min-height: 80px; }
        .speaker-icon { font-size: 22px; margin-top: 4px; }
        .artist-main { font-size: 24px; font-weight: 800; display: block; margin-bottom: 5px; }
        .title-main { font-size: 18px; color: #fff; display: block; font-weight: 400; opacity: 0.95; }

        .history-item { display: flex; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; align-items: center; }
        .h-time { width: 55px; color: var(--text-dim); font-family: monospace; font-size: 12px; }
        .h-info { display: flex; flex-direction: column; }
        .h-art { color: var(--accent-green); font-weight: 600; font-size: 15px; }
        .h-tit { color: var(--text-dim); font-size: 14px; }

        .footer { padding: 40px 25px; background: #080a0e; margin-top: 20px; }
        .vol-container { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; }
        #volSlider { flex: 1; -webkit-appearance: none; background: #232a37; height: 5px; border-radius: 3px; outline: none; }
        #volSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent-green); border-radius: 50%; cursor: pointer; border: 2px solid var(--bg-dark); }
        
        #stSlogan { font-size: 18px; font-weight: 800; margin-bottom: 6px; color: #fff; }
        .location { color: var(--accent-green); font-size: 13px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; min-height: 15px; }
        #stDesc { color: var(--text-dim); line-height: 1.6; font-size: 14px; margin-bottom: 25px; min-height: 20px; }
        .hoerer { display: none; padding: 6px 14px; background: rgba(0,230,153,0.1); color: var(--accent-green); border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app">
    <div class="app-bar">
        <div id="sysTime">00:00</div>
        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <div id="searchBox">
        <input type="text" id="sIn" placeholder="Sendername..." onkeydown="if(event.key==='Enter') startSearch()">
        <div class="close-btn" onclick="closeSearch()">✕</div>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <div id="stNameDisplay"></div>
            <div id="modBadge">LIVE MODERATION</div>
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div class="controls">
                <button class="btn-side" onclick="shareStation()">🔗</button>
                <button id="pBtn" onclick="toggle()">▶</button>
                <div style="width: 44px;"></div>
            </div>
        </div>

        <div class="section-content">
            <div class="track-now-container">
                <div class="speaker-icon">🔊</div>
                <div id="currentSongArea">
                    <span class="artist-main" style="color: var(--accent-green)">BEREIT</span>
                    <span class="title-main">Wähle einen Sender</span>
                </div>
            </div>
            <div id="songHistory"></div>
        </div>

        <div class="footer">
            <div class="vol-container">
                <span style="font-size: 16px;">🔈</span>
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVol(this.value)">
                <span style="font-size: 16px;">🔊</span>
            </div>
            <div id="stSlogan"></div>
            <div class="location" id="stLocArea"></div>
            <div id="stDesc"></div>
            <div class="hoerer" id="hoerer">0 HÖRER</div>
            <div style="text-align: center; font-size: 8px; margin-top: 40px; opacity: 0.2; letter-spacing: 2px;">V88.6 ADS & NEWS FIX</div>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    au.volume = 0.8;
    let currentSlug = "", currentStationName = "", updateTimer = null;

    function updateClock() {
        document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000); updateClock();

    function setVol(val) { au.volume = val; }
    function openSearch() { document.getElementById('sIn').value = ""; document.getElementById('searchBox').style.display = 'flex'; document.getElementById('sIn').focus(); }
    function closeSearch() { document.getElementById('searchBox').style.display = 'none'; }

    async function shareStation() {
        if(!currentSlug) return;
        const text = `Hör dir mal ${currentStationName} auf laut.fm an: https://laut.fm/${currentSlug}`;
        if (navigator.share) { await navigator.share({ title: currentStationName, url: `https://laut.fm/${currentSlug}` }); }
        else { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`); }
    }

    async function startSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play().then(() => { document.getElementById('pBtn').innerHTML = "⏸"; });
        closeSearch();
        updateUI();
        if(updateTimer) clearInterval(updateTimer);
        updateTimer = setInterval(updateUI, 5000);
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stSlogan').innerText = s.page_title || s.display_name;
            document.getElementById('stLocArea').innerHTML = "📍 " + (s.city ? s.city.toUpperCase() : "RADIO-NETZWERK");
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('hoerer').style.display = "inline-block";

            const cur = l[0];
            let artistColor = "var(--accent-green)";
            
            // Typ-Erkennung für Farbe
            if(cur.type === "gold") artistColor = "var(--accent-yellow)"; // Werbung
            if(cur.type === "news") artistColor = "var(--accent-blue)";   // News
            
            // Mod-Check
            if(cur.type === "pink" || cur.type === "moderation") {
                document.getElementById('modBadge').style.display = "block";
                artistColor = "var(--accent-pink)";
            } else {
                document.getElementById('modBadge').style.display = "none";
            }

            document.getElementById('currentSongArea').innerHTML = `
                <span class="artist-main" style="color: ${artistColor}">${cur.artist.name}</span>
                <span class="title-main">${cur.title}</span>`;

            let hHtml = "";
            l.slice(1, 8).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                hHtml += `<div class="history-item"><div class="h-time">${time}</div><div class="h-info"><span class="h-art">${song.artist.name}</span><span class="h-tit">${song.title}</span></div></div>`;
            });
            document.getElementById('songHistory').innerHTML = hHtml;
        } catch(e) {}
    }
</script>
</body>
</html>
