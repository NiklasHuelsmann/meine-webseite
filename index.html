<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub V15</title>
    <style>
        :root { --sidebar-bg: #1a2634; --accent: #00d26a; --bg: #f5f7f9; --text-dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-dark); }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.15); }
        .fav-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        /* Main View */
        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 380px; gap: 20px; padding: 25px; padding-bottom: 110px; overflow-y: auto; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        /* Display wie auf Screenshot */
        .display-unit { text-align: center; margin-top: 20px; }
        .main-art { width: 260px; height: 260px; border-radius: 12px; object-fit: cover; box-shadow: 0 12px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        .now-box { background: #fcfcfc; border-radius: 10px; padding: 20px; border: 1px solid #eee; display: flex; align-items: flex-start; gap: 20px; text-align: left; }
        .start-time { font-size: 1.1rem; font-weight: 800; color: #000; min-width: 60px; }
        
        /* Historie & Sendeplan-Switch */
        .tab-nav { display: flex; border-bottom: 2px solid #eee; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: bold; color: #95a5a6; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        .list-entry { display: flex; padding: 15px 0; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .list-time { width: 65px; font-weight: 800; color: #000; font-size: 0.95rem; }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: white; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 40px; z-index: 1000; }
        .btn-play { background: var(--accent); color: white; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);">Radio Hub</h2>
    <div style="display:flex; gap:8px; margin-bottom:25px;">
        <input type="text" id="slugIn" placeholder="Sender..." style="flex:1; padding:10px; border-radius:5px; border:none; background:#2c3e50; color:white;">
        <button onclick="loadStation()" style="background:var(--accent); border:none; border-radius:5px; color:white; padding:0 15px; cursor:pointer;">OK</button>
    </div>
    <div id="favList"></div>
</div>

<div class="main-layout">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <img id="miniStationLogo" src="" style="width:50px; height:50px; border-radius:5px; vertical-align:middle; margin-right:15px;">
                <h1 id="stationTitle" style="display:inline; font-size:1.5rem; margin:0;">Lade Sender...</h1>
            </div>
            <span id="heartBtn" onclick="toggleFav()" style="font-size:2.2rem; cursor:pointer; color:#eee;">❤</span>
        </div>

        <div class="display-unit">
            <img id="displayCover" class="main-art" src="">
            <div class="now-box">
                <div id="startTime" class="start-time">--:--</div>
                <div>
                    <small style="color:var(--accent); font-weight:bold; text-transform:uppercase;">Jetzt läuft</small>
                    <b id="liveArtist" style="display:block; font-size:1.3rem; margin:5px 0;">Interpret</b>
                    <span id="liveTitle" style="color:#555;">Songtitel</span>
                </div>
            </div>
        </div>

        <div id="statusInfo" style="margin-top:20px; font-size:0.85rem; color:#7f8c8d; border-top:1px solid #eee; padding-top:15px;">
            <span>👥 Hörer: <b id="listeners" style="color:#2c3e50;">0</b></span>
            <span style="margin-left:20px;">🌐 Status: <b style="color:var(--accent);">Online</b></span>
        </div>
    </div>

    <div class="card">
        <div class="tab-nav">
            <div id="tab1" class="tab-btn active" onclick="setTab('songs')">Letzte Songs</div>
            <div id="tab2" class="tab-btn" onclick="setTab('plan')">Sendeplan</div>
        </div>
        <div id="listView" style="height:500px; overflow-y:auto;"></div>
    </div>
</div>

<div class="player-bar">
    <div style="width:350px; display:flex; align-items:center;">
        <img id="barCover" src="" style="width:55px; height:55px; border-radius:8px; margin-right:15px;">
        <div>
            <b id="barArtist" style="display:block;">Sender</b>
            <span id="barTitle" style="color:#7f8c8d; font-size:0.85rem;">Wähle Stream</span>
        </div>
    </div>
    <div style="flex:1; text-align:center;">
        <button id="pToggle" class="btn-play" onclick="handlePlay()">Sender starten</button>
    </div>
    <div style="width:200px; display:flex; align-items:center; gap:10px;">
        <span>🔈</span>
        <input type="range" style="flex:1; accent-color:var(--accent);" min="0" max="1" step="0.01" value="0.5" oninput="audio.volume=this.value">
        <span>🔊</span>
    </div>
</div>

<audio id="radioAudio"></audio>

<script>
    const STATIONS = { "brian-radio": "Brian-Radio", "simulator4": "Simulator4", "niklasheulsmann": "Niklas Hülsmann" };
    let current = "";
    let activeTab = "songs";
    let favorites = JSON.parse(localStorage.getItem('it_hub_favs')) || Object.keys(STATIONS);
    const audio = document.getElementById('radioAudio');

    window.onload = () => {
        renderFavs();
        loadStation(localStorage.getItem('it_hub_last') || "brian-radio");
    };

    async function loadStation(slug) {
        current = slug || document.getElementById('slugIn').value.toLowerCase().trim();
        localStorage.setItem('it_hub_last', current);
        update();
    }

    async function update() {
        try {
            const [c, s, l, p] = await Promise.all([
                fetch(`https://api.laut.fm/station/${current}/current_song`),
                fetch(`https://api.laut.fm/station/${current}`),
                fetch(`https://api.laut.fm/station/${current}/last_songs`),
                fetch(`https://api.laut.fm/station/${current}/playlists`)
            ]);
            const song = await c.json();
            const info = await s.json();
            const history = await l.json();
            const playlists = await p.json();

            const name = STATIONS[current] || info.display_name;
            document.getElementById('stationTitle').innerText = name;
            document.getElementById('miniStationLogo').src = info.images.station_120x120;
            document.getElementById('displayCover').src = info.images.station_640x640;
            document.getElementById('barCover').src = info.images.station_120x120;

            // Die statische Zeit von laut.fm (Startzeit des Songs)
            const startTime = song.started_at ? new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "--:--";
            document.getElementById('startTime').innerText = startTime;
            
            document.getElementById('liveArtist').innerText = song.artist ? song.artist.name : name;
            document.getElementById('liveTitle').innerText = song.title || "Live Stream";
            document.getElementById('barArtist').innerText = song.artist ? song.artist.name : name;
            document.getElementById('barTitle').innerText = song.title || "Online";
            document.getElementById('listeners').innerText = info.current_listeners || "0";

            renderList(activeTab === "songs" ? history : playlists);
            document.getElementById('heartBtn').style.color = favorites.includes(current) ? "#e74c3c" : "#eee";
        } catch(e) {}
    }

    function renderList(data) {
        const view = document.getElementById('listView');
        if(activeTab === "songs") {
            view.innerHTML = data.map(i => `
                <div class="list-entry">
                    <div class="list-time">${new Date(i.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div><b>${i.artist.name}</b><br><span style="color:#7f8c8d; font-size:0.85rem;">${i.title}</span></div>
                </div>
            `).join('');
        } else {
            view.innerHTML = data.map(p => `
                <div class="list-entry">
                    <div class="list-time">PLAN</div>
                    <div><b>${p.name}</b><br><span style="color:#7f8c8d; font-size:0.85rem;">Wochentags-Sendeplan</span></div>
                </div>
            `).join('');
        }
    }

    function setTab(type) {
        activeTab = type;
        document.getElementById('tab1').classList.toggle('active', type === 'songs');
        document.getElementById('tab2').classList.toggle('active', type === 'plan');
        update();
    }

    function renderFavs() {
        document.getElementById('favList').innerHTML = favorites.map(f => `
            <div class="fav-item" onclick="loadStation('${f}')">
                <img src="https://api.laut.fm/station/${f}/images/station_120x120" style="width:40px; border-radius:4px;">
                <span>${STATIONS[f] || f}</span>
            </div>
        `).join('');
    }

    function toggleFav() {
        const i = favorites.indexOf(current);
        if(i === -1) favorites.push(current); else favorites.splice(i, 1);
        localStorage.setItem('it_hub_favs', JSON.stringify(favorites));
        renderFavs(); update();
    }

    function handlePlay() {
        if(audio.paused) { 
            audio.src = `https://stream.laut.fm/${current}`; audio.play(); 
            document.getElementById('pToggle').innerText="Stoppen";
            document.getElementById('pToggle').style.background="#e74c3c";
        } else { 
            audio.pause(); 
            document.getElementById('pToggle').innerText="Starten";
            document.getElementById('pToggle').style.background="var(--accent)";
        }
    }

    setInterval(() => { if(current) update(); }, 20000);
</script>
</body>
</html>
