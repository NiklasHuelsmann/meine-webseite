<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player - Professional Edition</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #212529;
            --muted: #6c757d;
            --accent: #e8f5e9;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Suche & Header */
        .search-container {
            background: var(--white);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        .search-container input { border: none; outline: none; flex: 1; font-size: 1rem; }
        .search-container button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.2s;
        }
        .search-container button:hover { opacity: 0.9; transform: scale(1.05); }

        #player-app {
            display: none;
            width: 100%;
            max-width: 950px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Hörer-Balken (Dein Merkmal) */
        .listener-bar {
            background: var(--accent);
            color: #2e7d32;
            padding: 14px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            border: 1px solid #c8e6c9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .pulse-dot {
            height: 10px;
            width: 10px;
            background: #ff5252;
            border-radius: 50%;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(255, 82, 82, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 82, 82, 0); } }

        /* Layout-Struktur wie laut.fm */
        .content-grid {
            display: grid;
            grid-template-columns: 1.3fr 0.7fr;
            gap: 30px;
        }

        .main-card {
            background: var(--white);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .section-header {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 25px;
            font-style: italic;
            display: block;
        }

        /* Jetzt läuft: Zeit | Künstler | Titel */
        .song-info-row {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 25px;
        }

        .now-time {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--muted);
            min-width: 60px;
        }

        .now-details b {
            display: block;
            font-size: 1.8rem;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .now-details span {
            font-size: 1.4rem;
            color: var(--muted);
            display: block;
        }

        .album-cover {
            width: 100%;
            max-width: 450px;
            height: auto;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            margin: 10px 0 25px 0;
        }

        /* Verlauf-Sektion */
        .history-card {
            background: rgba(255,255,255,0.6);
            padding: 25px;
            border-radius: 20px;
            border-left: 5px solid var(--primary);
        }

        .history-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .h-time { font-weight: bold; color: var(--muted); min-width: 45px; }
        .h-text b { display: block; font-size: 1rem; }
        .h-text span { font-size: 0.9rem; color: var(--muted); }

        .play-control {
            text-align: center;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(29, 185, 84, 0.3);
            transition: 0.3s;
        }
        .btn-main:hover { transform: scale(1.1); box-shadow: 0 8px 20px rgba(29, 185, 84, 0.4); }

        @media (max-width: 850px) { .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="stationInput" placeholder="Sendername..." onkeypress="if(event.key === 'Enter') launch()">
        <button onclick="launch()">OK</button>
    </div>

    <div id="player-app">
        <!-- Hörer-Balken mit Live-Punkt -->
        <div class="listener-bar">
            <div class="pulse-dot"></div>
            <span id="listenerStats">Verbinde zum Sender...</span>
        </div>

        <div class="content-grid">
            <!-- AKTUELL LÄUFT -->
            <div class="main-card">
                <span class="section-header" id="stationName">Jetzt läuft</span>
                
                <div class="song-info-row">
                    <div class="now-time" id="currentTime">00:00</div>
                    <div class="now-details">
                        <b id="artistDisplay">Interpret</b>
                        <span id="titleDisplay">Titel wird geladen...</span>
                    </div>
                </div>

                <center>
                    <img id="coverImg" class="album-cover" src="" alt="Album">
                    <div class="play-control">
                        <button class="btn-main" id="playBtn" onclick="toggleAudio()">▶</button>
                    </div>
                </center>
            </div>

            <!-- ZULETZT GELAUFEN -->
            <div class="history-card">
                <span style="font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 20px;">Zuletzt gelaufen</span>
                <div id="historyContainer"></div>
            </div>
        </div>
    </div>

    <audio id="radioStream"></audio>

    <script>
        let stationSlug = "";
        let isPlaying = false;
        let updateTimer;

        async function launch() {
            const input = document.getElementById('stationInput').value.trim().toLowerCase();
            if(!input) return;
            stationSlug = input;

            document.getElementById('player-app').style.display = 'block';
            const audio = document.getElementById('radioStream');
            audio.src = `https://stream.laut.fm/${stationSlug}`;
            
            fetchUpdate();
            if(updateTimer) clearInterval(updateTimer);
            updateTimer = setInterval(fetchUpdate, 15000);

            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "⏸";
        }

        function toggleAudio() {
            const audio = document.getElementById('radioStream');
            if(isPlaying) { audio.pause(); document.getElementById('playBtn').innerText = "▶"; }
            else { audio.play(); document.getElementById('playBtn').innerText = "⏸"; }
            isPlaying = !isPlaying;
        }

        async function fetchUpdate() {
            try {
                // Sender Info & Hörer
                const sReq = await fetch(`https://api.laut.fm/station/${stationSlug}`);
                const sData = await sReq.json();
                const listeners = sData.current_listeners || 0;
                document.getElementById('listenerStats').innerText = `${listeners} ${listeners === 1 ? 'Hörer ist' : 'Hörer sind'} gerade live`;
                document.getElementById('coverImg').src = sData.images.station_640x640;
                document.getElementById('stationName').innerText = `Jetzt läuft auf ${sData.display_name}`;

                // Aktueller Song
                const cReq = await fetch(`https://api.laut.fm/station/${stationSlug}/current_song`);
                const cData = await cReq.json();
                
                const now = new Date();
                document.getElementById('currentTime').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                
                // Exakte Zuweisung gegen [object Object]
                document.getElementById('artistDisplay').innerText = String(cData.artist || "Unbekannt");
                document.getElementById('titleDisplay').innerText = String(cData.title || "Kein Titel");

                // Verlauf
                const hReq = await fetch(`https://api.laut.fm/station/${stationSlug}/last_songs`);
                const hData = await hReq.json();
                const container = document.getElementById('historyContainer');
                container.innerHTML = "";

                hData.slice(1, 7).forEach(song => {
                    const sTime = new Date(song.started_at);
                    const tStr = sTime.getHours().toString().padStart(2, '0') + ":" + sTime.getMinutes().toString().padStart(2, '0');
                    container.innerHTML += `
                        <div class="history-item">
                            <div class="h-time">${tStr}</div>
                            <div class="h-text">
                                <b>${String(song.artist)}</b>
                                <span>${String(song.title)}</span>
                            </div>
                        </div>`;
                });
            } catch (err) { console.error("Update fehlgeschlagen"); }
        }
    </script>
</body>
</html>
