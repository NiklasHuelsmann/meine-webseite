<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Player - Sendeplan Edition</title>
    <style>
        :root { --primary: #1db954; --bg: #2c2f33; --card: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .search-area { background: #40444b; padding: 10px 20px; border-radius: 30px; display: flex; gap: 10px; margin-bottom: 25px; }
        .search-area input { border: none; outline: none; width: 180px; background: transparent; color: white; }
        .search-area button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        #player-ui { display: none; width: 100%; max-width: 1100px; }

        .header { text-align: center; margin-bottom: 20px; }
        .live-tag { background: #40444b; padding: 8px 18px; border-radius: 12px; display: inline-flex; align-items: center; gap: 8px; font-weight: bold; }
        .dot { height: 10px; width: 10px; background: #ff4747; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .card { background: var(--card); color: #333; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .logo { width: 100%; max-width: 280px; border-radius: 15px; margin-bottom: 20px; }

        /* Sendeplan Tab-Design */
        .tab-header { background: #e0e0e0; display: inline-block; padding: 5px 15px; border-radius: 10px 10px 0 0; font-weight: bold; font-size: 0.9rem; color: #555; }
        .schedule-container { background: #f9f9f9; border-radius: 0 10px 10px 10px; padding: 15px; margin-top: -1px; border: 1px solid #ddd; max-height: 250px; overflow-y: auto; text-align: left; }
        .schedule-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .schedule-time { font-weight: bold; color: var(--primary); min-width: 90px; }

        .playing { border-top: 2px solid #eee; padding-top: 20px; display: flex; gap: 15px; text-align: left; }
        .time { color: var(--primary); font-weight: bold; }

        .history-card { background: var(--card); color: #333; padding: 20px; border-radius: 20px; text-align: left; }
        .h-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .h-time { color: #bbb; font-weight: bold; }

        .volume-box { margin-top: 15px; display: flex; align-items: center; gap: 10px; justify-content: center; }
        input[type=range] { accent-color: var(--primary); cursor: pointer; }
        .btn-play { background: var(--primary); color: white; border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 1.6rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="search-area">
        <input type="text" id="slugInput" placeholder="Sendername...">
        <button onclick="launch()">START</button>
    </div>

    <div id="player-ui">
        <div class="header">
            <h1 id="stName" style="margin:0; font-size: 2.2rem;">RADIO</h1>
            <div class="live-tag"><div class="dot"></div>Hörer: <span id="lCount">0</span></div>
        </div>

        <div class="grid">
            <div class="card">
                <center>
                    <img id="stLogo" class="logo" src="">
                    
                    <!-- Sendeplan Bereich -->
                    <div id="schedule-section" style="display:none; margin-bottom: 20px;">
                        <div class="tab-header">Sendeplan</div>
                        <div class="schedule-container" id="scheduleList"></div>
                    </div>

                    <div class="playing">
                        <div class="time" id="cTime">--:--</div>
                        <div><b id="cArtist" style="display:block; font-size: 1.2rem;">Interpret</b><span id="cTitle">Titel</span></div>
                    </div>

                    <button class="btn-play" id="pBtn" onclick="toggle()">▶</button>

                    <div class="volume-box">
                        <span>🔈</span>
                        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.5" oninput="changeVol(this.value)">
                        <span>🔊</span>
                    </div>
                </center>
            </div>

            <div class="history-card">
                <strong style="color:#999; font-size: 0.8rem; display: block; margin-bottom: 10px; text-transform: uppercase;">Zuletzt gelaufen</strong>
                <div id="hList"></div>
            </div>
        </div>
    </div>

    <audio id="radio"></audio>

    <script>
        let slug = "";
        let isPlaying = false;
        const audio = document.getElementById('radio');
        const volSlider = document.getElementById('vol');

        const savedVol = localStorage.getItem('radioVol');
        if (savedVol !== null) { audio.volume = savedVol; volSlider.value = savedVol; } 
        else { audio.volume = 0.5; volSlider.value = 0.5; }

        async function launch() {
            slug = document.getElementById('slugInput').value.trim().toLowerCase();
            if(!slug) return;
            document.getElementById('player-ui').style.display = 'block';
            audio.src = `https://stream.laut.fm/${slug}`;
            
            refresh();
            setInterval(refresh, 10000);

            audio.play();
            isPlaying = true;
            document.getElementById('pBtn').innerText = "⏸";
        }

        function toggle() {
            if(isPlaying) { audio.pause(); document.getElementById('pBtn').innerText = "▶"; }
            else { audio.play(); document.getElementById('pBtn').innerText = "⏸"; }
            isPlaying = !isPlaying;
        }

        function changeVol(v) { audio.volume = v; localStorage.setItem('radioVol', v); }

        function clean(t) { return (typeof t === 'object') ? t.name : (t || "---"); }

        async function refresh() {
            try {
                // Sender Info
                const r1 = await fetch(`https://api.laut.fm/station/${slug}`);
                const d1 = await r1.json();
                document.getElementById('stName').innerText = d1.display_name;
                document.getElementById('lCount').innerText = d1.current_listeners;
                document.getElementById('stLogo').src = d1.images.station_640x640;

                // Sendeplan laden
                const rPlan = await fetch(`https://api.laut.fm/station/${slug}/schedule`);
                const dPlan = await rPlan.json();
                const sSection = document.getElementById('schedule-section');
                const sList = document.getElementById('scheduleList');
                
                if (dPlan && dPlan.length > 0) {
                    sSection.style.display = "block";
                    sList.innerHTML = "";
                    dPlan.forEach(item => {
                        sList.innerHTML += `
                            <div class="schedule-item">
                                <span class="schedule-time">${item.start_time} - ${item.end_time}</span>
                                <span class="schedule-name">${item.name}</span>
                            </div>`;
                    });
                } else {
                    sSection.style.display = "none";
                }

                // Aktueller Song
                const r2 = await fetch(`https://api.laut.fm/station/${slug}/current_song`);
                const d2 = await r2.json();
                const t = new Date(d2.started_at);
                document.getElementById('cTime').innerText = t.getHours().toString().padStart(2,'0')+":"+t.getMinutes().toString().padStart(2,'0');
                document.getElementById('cArtist').innerText = clean(d2.artist);
                document.getElementById('cTitle').innerText = clean(d2.title);

                // Verlauf
                const r3 = await fetch(`https://api.laut.fm/station/${slug}/last_songs`);
                const d3 = await r3.json();
                const list = document.getElementById('hList');
                list.innerHTML = "";
                d3.slice(1, 10).forEach(s => {
                    const st = new Date(s.started_at);
                    list.innerHTML += `<div class="h-item"><span class="h-time">${st.getHours()}:${st.getMinutes().toString().padStart(2,'0')}</span><div><b>${clean(s.artist)}</b><br><span style="font-size:0.85rem; color:#666;">${clean(s.title)}</span></div></div>`;
                });
            } catch(e) { console.log("Fehler"); }
        }
    </script>
</body>
</html>
