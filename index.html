<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Player Final Pro v91.95</title>
    <style>
        :root { 
            --bg-app: #1e2538; 
            --bg-card: #283044;
            --accent-main: #00fad9; 
            --status-yellow: #ffb300; 
            --status-blue: #00aaff;
            --status-pink: #ff00ff;
            --text-main: #ffffff;
            --text-dim: #949fb1;
            --line: rgba(255,255,255,0.08);
        }
        
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-app); display: flex; flex-direction: column; }
        
        .top-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #sysTime { font-size: 16px; font-weight: bold; }
        .search-btn { font-size: 20px; color: var(--accent-main); cursor: pointer; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* ZENTRIERTES LOGO */
        .hero { padding: 10px 0; text-align: center; }
        #stNameHeader { font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; opacity: 0.8; }
        #mainImg { width: 80%; max-width: 300px; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 20px 0; }
        #pBtn { width: 70px; height: 70px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 28px; color: #1e2538; cursor: pointer; }

        /* AUTOMATIK BOX */
        #nowPlayingBox { margin: 0 15px 15px; padding: 15px; border-radius: 12px; background: var(--bg-card); transition: background 0.5s; }
        .label { font-style: italic; font-size: 22px; font-weight: 900; margin-bottom: 12px; display: block; }
        
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-top: 1px solid var(--line); }
        .track-details { flex: 1; }
        .track-art { font-size: 16px; font-weight: bold; display: block; }
        .track-tit { font-size: 14px; color: var(--text-dim); display: block; }
        #speaker { width: 30px; color: var(--accent-main); text-align: center; }

        /* FOOTER INFO */
        .footer-info { padding: 20px; background: rgba(0,0,0,0.2); }
        .footer-title { font-style: italic; font-size: 22px; font-weight: 900; margin-bottom: 10px; }
        .footer-row { display: flex; justify-content: space-between; align-items: center; }
        .loc-row { display: flex; align-items: center; gap: 6px; color: var(--accent-main); font-weight: bold; font-size: 14px; }
        .hoerer-badge { background: rgba(0,250,217,0.15); color: var(--accent-main); padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; }

        /* REGLER IN DER MITTE (50%) */
        .vol-area { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        #volSlider { flex: 1; accent-color: var(--accent-main); height: 4px; cursor: pointer; }
        #volLabel { color: var(--accent-main); font-size: 13px; font-weight: bold; min-width: 40px; }

        #searchOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: #283044; z-index: 100; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--accent-main); }
        #sInput { flex: 1; background: #1e2538; border: none; height: 35px; border-radius: 6px; color: #fff; padding: 0 10px; }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="search-btn" onclick="toggleSearch()">🔍</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sendername..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff; margin-left:10px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameHeader">RADIO</span>
            <img id="mainImg" src="">
            <div class="controls">
                <button style="background:none; border:none; color:var(--accent-main); font-size:22px;" onclick="share()">🔗</button>
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div style="width:22px"></div>
            </div>
        </div>

        <div id="nowPlayingBox">
            <span class="label">Jetzt läuft</span>
            <div id="trackList"></div>
            <div id="moreBtn" style="color:var(--accent-main); text-align:center; padding-top:10px; font-size:12px; cursor:pointer;" onclick="toggleHist()">mehr anzeigen</div>
        </div>

        <div class="footer-info">
            <div id="footerSlogan" class="footer-title">...</div>
            <div class="footer-row">
                <div class="loc-row">📍 <span id="stLoc">...</span></div>
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
            
            <div class="vol-area">
                <span style="font-size:10px; font-weight:bold; color:var(--accent-main)">VOL</span>
                <input type="range" id="volSlider" min="0" max="100" step="1" value="50" oninput="changeVol(this.value)">
                <span id="volLabel">50%</span>
            </div>
        </div>
    </div>
</div>

<script>
    const DEFAULT_STATION = "gold-oldies"; // HIER DEINEN SENDER EINTRAGEN
    const au = new Audio(); 
    au.volume = 0.5; 

    let currentSlug = ""; let histFull = false;

    function initApp() { 
        startStation(DEFAULT_STATION, false);
        setInterval(() => {
            document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    }

    function changeVol(v) { 
        au.volume = v / 100; 
        document.getElementById('volLabel').innerText = v + "%";
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay');
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        if(s.style.display === 'flex') document.getElementById('sInput').focus();
    }
    function execSearch() { const v = document.getElementById('sInput').value.trim(); if(v) { startStation(v, true); toggleSearch(); } }

    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        updateUI();
        setInterval(updateUI, 8000);
    }

    function togglePlay() {
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleHist() { histFull = !histFull; updateUI(); }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stLoc').innerText = s.city || "Radio";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('footerSlogan').innerText = s.page_title || "Dein Sound.";

            let html = "";
            let bgColor = "var(--bg-card)";
            let accent = "var(--accent-main)";

            l.forEach((song, i) => {
                if(!histFull && i > 3) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();

                if(isCurrent) {
                    if(tit.includes("START_AD_BREAK") || song.type === "gold") {
                        bgColor = "rgba(255, 179, 0, 0.2)"; accent = "var(--status-yellow)";
                        art = "REKLAME / WERBUNG"; tit = "Gleich geht's weiter...";
                    } else if(check.includes("news") || check.includes("nachrichten")) {
                        bgColor = "rgba(0, 170, 255, 0.2)"; accent = "var(--status-blue)";
                        art = "NACHRICHTEN";
                    } else if(check.includes("moderation")) {
                        bgColor = "rgba(255, 0, 255, 0.2)"; accent = "var(--status-pink)";
                        art = s.display_name + " MODERATION";
                    }
                }

                html += `<div class="track-entry">
                    <div id="speaker">${isCurrent ? '🔊' : ''}</div>
                    <div class="track-details">
                        <span class="track-art" style="color:${isCurrent ? accent : '#fff'}">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                </div>`;
            });
            document.getElementById('nowPlayingBox').style.backgroundColor = bgColor;
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }

    function share() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
