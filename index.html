<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>laut.fm Player - Original Style</title>
    <style>
        :root { --laut-blue: #00d2ff; --bg: #0d1117; --panel: #161b22; --white: #ffffff; }
        body { background: var(--bg); color: var(--white); font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* SUCHE OBEN - WIE BEI LAUT.FM */
        .header { background: #000; padding: 15px; display: flex; align-items: center; border-bottom: 3px solid var(--laut-blue); gap: 20px; }
        .search-box { position: relative; flex: 1; max-width: 600px; }
        #query { width: 100%; padding: 12px; border-radius: 5px; border: none; font-size: 16px; font-weight: bold; }
        
        #results { position: absolute; top: 45px; width: 100%; background: white; color: black; border-radius: 0 0 5px 5px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .res-item { padding: 10px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; }
        .res-item:hover { background: #eee; }
        .res-item img { width: 40px; height: 40px; border-radius: 4px; }

        /* PLAYER LAYOUT */
        .main { flex: 1; display: flex; overflow: hidden; }
        .station-side { width: 400px; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; text-align: center; overflow-y: auto; }
        .playlist-side { flex: 1; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }

        /* SENDER LOGO / COVER */
        .logo-frame { width: 300px; height: 300px; border: 4px solid var(--laut-blue); border-radius: 20px; background: #000; overflow: hidden; margin-bottom: 20px; position: relative; }
        #mainImg { width: 100%; height: 100%; object-fit: cover; }
        
        #playBtn { width: 80px; height: 80px; border-radius: 50%; background: var(--laut-blue); border: none; color: white; font-size: 40px; cursor: pointer; margin-bottom: 15px; }
        
        /* BESCHREIBUNG */
        .station-meta { text-align: left; width: 100%; background: var(--panel); padding: 15px; border-radius: 10px; border: 1px solid #333; }
        #stTitle { font-size: 24px; color: var(--laut-blue); margin: 0 0 10px 0; font-weight: bold; }
        #stDesc { font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 10px; }
        .listeners { font-weight: bold; color: var(--laut-blue); font-size: 12px; text-transform: uppercase; }

        /* PLAYLIST */
        .song-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--panel); border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .song-row.active { border-color: var(--laut-blue); background: rgba(0,210,255,0.05); }
        .song-row img { width: 50px; height: 50px; border-radius: 5px; }
        .song-info b { display: block; font-size: 15px; }
        .song-info span { font-size: 13px; color: #888; }

        @media (max-width: 850px) { .main { flex-direction: column; overflow-y: auto; } .station-side { width: 100%; border: none; } }
    </style>
</head>
<body>

<header class="header">
    <div style="color: var(--laut-blue); font-weight: 900; font-size: 20px;">STUDIO</div>
    <div class="search-box">
        <input type="text" id="query" placeholder="Sender suchen..." oninput="doSearch()">
        <div id="results"></div>
    </div>
</header>

<main class="main">
    <section class="station-side">
        <div class="logo-frame">
            <img id="mainImg" src="https://api.laut.fm/station/default/images/station_640x640.png">
        </div>
        <button id="playBtn" onclick="togglePlay()" disabled>▶</button>
        
        <div class="station-meta">
            <div class="listeners" id="lsn">STANDBY</div>
            <h1 id="stTitle">SENDER WÄHLEN</h1>
            <div id="stDesc">Nutze die Suche oben, um dein Programm zu starten.</div>
            <div style="margin-top:10px; border-top: 1px solid #444; padding-top:10px;">
                <small style="color:var(--laut-blue)">AKTUELL:</small>
                <div id="curSong" style="font-weight:bold;">-</div>
            </div>
        </div>
    </section>

    <section class="playlist-side">
        <h3 style="margin-top:0;">PLAYLIST / VERLAUF</h3>
        <div id="playlist"></div>
    </section>
</main>

<script>
    const player = new Audio();
    let currentID = "";
    let stationLogo = "";

    // Diese Funktion wird aufgerufen, wenn du tippst
    function doSearch() {
        const q = document.getElementById('query').value;
        if(q.length < 2) { document.getElementById('results').style.display = 'none'; return; }

        // Wir nutzen JSONP (script tag), das wird vom Browser NIE blockiert
        const script = document.createElement('script');
        script.src = `https://api.laut.fm/search/stations?query=${encodeURIComponent(q)}&callback=showResults`;
        document.body.appendChild(script);
        document.body.removeChild(script);
    }

    // Das hier verarbeitet die Suchergebnisse
    window.showResults = function(data) {
        const resBox = document.getElementById('results');
        if(data.items && data.items.length > 0) {
            resBox.innerHTML = data.items.slice(0, 8).map(s => `
                <div class="res-item" onclick="selectStation('${s.name}')">
                    <img src="${s.images.station_80x80}">
                    <span>${s.display_name}</span>
                </div>`).join('');
            resBox.style.display = 'block';
        }
    }

    function selectStation(name) {
        currentID = name;
        document.getElementById('results').style.display = 'none';
        document.getElementById('query').value = "";
        
        player.src = `https://stream.laut.fm/${name}`;
        player.play();
        document.getElementById('playBtn').disabled = false;
        document.getElementById('playBtn').innerHTML = "⏸";
        
        update();
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(update, 10000);
    }

    function togglePlay() {
        if(player.paused) { player.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { player.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function update() {
        if(!currentID) return;
        try {
            // Wir holen die Sender-Infos, Songs und Hörer direkt
            const [st, so, li] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/listeners`).then(r => r.json())
            ]);

            stationLogo = st.images.station_640x640;
            document.getElementById('stTitle').innerText = st.display_name;
            document.getElementById('stDesc').innerText = st.description;
            document.getElementById('lsn').innerText = li + " HÖRER LIVE";

            let html = "";
            so.forEach((s, i) => {
                const isNow = i === 0;
                const cover = s.image_640x640 ? s.image_640x640 : stationLogo;

                if(isNow) {
                    document.getElementById('mainImg').src = cover;
                    document.getElementById('curSong').innerText = s.artist.name + " - " + s.title;
                }

                html += `
                    <div class="song-row ${isNow ? 'active' : ''}">
                        <img src="${cover}">
                        <div class="song-info">
                            <b>${s.artist.name}</b>
                            <span>${s.title}</span>
                        </div>
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch(e) { console.error("Update fehlgeschlagen"); }
    }
</script>
</body>
</html>
