<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RadioApp</title>
    <style>
        :root { 
            --bg-global: #050505; 
            --bg-app: #0d1117;    
            --accent: #00d2ff; 
            --highlight: #00f2c3; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-global); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .app { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column; 
            background-color: var(--bg-app);
            position: relative;
        }
        
        header { padding: 20px 20px 10px; text-align: center; flex-shrink: 0; }
        .uhr { font-family: monospace; font-size: 14px; color: var(--accent); margin-bottom: 10px; }
        
        .search-area { 
            background: rgba(255,255,255,0.07); 
            border-radius: 15px; 
            display: flex; 
            padding: 10px 15px; 
            border: 1px solid #333; 
            margin-bottom: 10px; 
            align-items: center;
        }
        .search-area input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; }
        .search-btn { cursor: pointer; font-size: 18px; padding-left: 10px; }
        
        #stNameDisplay { 
            font-size: 24px; font-weight: 900; text-transform: uppercase; 
            margin: 5px 0; overflow: hidden; text-overflow: ellipsis;
        }

        .scroll-content { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: 0 20px 40px; scrollbar-width: none; 
        }
        .scroll-content::-webkit-scrollbar { display: none; }

        .hero-area { display: flex; flex-direction: column; align-items: center; padding: 20px 0 40px; }
        
        .img-container { 
            width: 280px; height: 280px; margin-bottom: 25px; 
            background: #1a1d23; border-radius: 40px; /* Platzhalter-Farbe */
        }

        #mainImg { 
            width: 100%; height: 100%; border-radius: 40px; 
            object-fit: cover; box-shadow: 0 15px 40px rgba(0,0,0,0.6); 
        }
        
        #pBtn { 
            width: 85px; height: 85px; border-radius: 50%; border: none; 
            background: #fff; color: #000; font-size: 38px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .list-section { margin-top: 10px; }
        .headline { font-size: 18px; font-weight: bold; margin-bottom: 20px; display: block; }
        
        .song-entry { 
            display: flex; gap: 15px; margin-bottom: 15px; padding: 12px;
            background: rgba(255,255,255,0.03); border-radius: 15px;
        }
        .time-cell { min-width: 45px; font-size: 12px; color: var(--accent); font-weight: bold; }
        .song-info { flex: 1; overflow: hidden; }
        .artist { font-weight: bold; font-size: 15px; display: block; color: #fff; }
        .title { color: #999; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .viz { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
        .bar { width: 3px; background: var(--highlight); height: 4px; }
        .playing .bar { animation: bounce 0.8s ease infinite alternate; }
        @keyframes bounce { from { height: 4px; } to { height: 16px; } }

        #moreBtn { 
            background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; 
            font-weight: bold; padding: 15px; width: 100%; border-radius: 12px;
            cursor: pointer; margin: 10px 0 30px;
        }

        .footer-info { 
            padding: 20px; background: rgba(0,0,0,0.2); 
            border-radius: 20px; border: 1px solid #222; text-align: center;
        }
        #stDesc { font-size: 14px; color: #aaa; line-height: 1.6; margin-bottom: 15px; text-align: left; }
        .hoerer-info { font-size: 12px; font-weight: bold; color: var(--highlight); display: block; margin-bottom: 10px; }
        .version-tag { font-size: 10px; color: #444; letter-spacing: 1px; font-family: monospace; text-transform: uppercase; }

        .dock { padding: 20px 30px 35px; background: #000; border-top: 1px solid #222; flex-shrink: 0; }
        .vol-row { display: flex; align-items: center; gap: 15px; }
        input[type=range] { flex: 1; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="uhr" class="uhr">00:00:00</div>
        <div class="search-area">
            <input type="text" id="sIn" placeholder="Sender suchen..." autocomplete="off" onkeydown="if(event.key==='Enter') startManualSearch()">
            <span class="search-btn" onclick="startManualSearch()">🔍</span>
        </div>
        <div id="stNameDisplay">BEREIT</div>
    </header>

    <div class="scroll-content">
        <div class="hero-area">
            <div class="img-container">
                <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            </div>
            <button id="pBtn" onclick="toggle()">▶</button>
        </div>

        <div class="list-section">
            <span class="headline">Zuletzt gespielt</span>
            <div id="songList"></div>
            <button id="moreBtn" onclick="toggleMore()">Mehr anzeigen</button>
        </div>

        <div class="footer-info">
            <div id="stDesc">Suche nach deinem Sender.</div>
            <span id="hoerer" class="hoerer-info">0 HÖRER LIVE</span>
            <div class="version-tag">Version 77.1 Image Fix</div>
        </div>
    </div>

    <div class="dock">
        <div class="vol-row">
            <span>🔈</span>
            <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
            <span id="volPerc" style="font-family: monospace; width: 40px; color: var(--accent);">99%</span>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    let currentSlug = "";
    let lastImg = "";
    let dataJob = null;
    let showAll = false;

    window.onload = () => { document.getElementById('sIn').value = ""; };

    setInterval(() => { 
        document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); 
    }, 1000);

    document.getElementById('vol').oninput = (e) => { 
        au.volume = e.target.value; 
        document.getElementById('volPerc').innerText = Math.round(e.target.value * 100) + "%";
    };

    function startManualSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play().then(() => { document.getElementById('pBtn').innerHTML = "⏸"; }).catch(e => {});
        updateUI();
        if(dataJob) clearInterval(dataJob);
        dataJob = setInterval(updateUI, 15000);
        document.activeElement.blur();
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
        updateUI();
    }

    function toggleMore() {
        showAll = !showAll;
        document.getElementById('moreBtn').innerText = showAll ? "Weniger anzeigen" : "Mehr anzeigen";
        updateUI();
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);
            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " PERSONEN LIVE";
            
            // Wichtig: Wir nutzen assets.laut.fm statt der API-Bilder, falls vorhanden
            let imgUrl = s.images.station_640x640.replace('http://', 'https://');
            
            if(imgUrl !== lastImg) {
                document.getElementById('mainImg').src = imgUrl;
                lastImg = imgUrl;
            }

            let html = "";
            const limit = showAll ? 10 : 3;
            l.slice(0, limit).forEach((song, i) => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="song-entry">
                    <div class="time-cell">${i === 0 ? '<div class="viz '+(au.paused?'':'playing')+'"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>' : time}</div>
                    <div class="song-info"><span class="artist">${song.artist.name}</span><span class="title">${song.title}</span></div>
                </div>`;
            });
            document.getElementById('songList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
