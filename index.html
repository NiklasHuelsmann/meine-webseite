<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App FINAL PRO v90.4</title>
    <style>
        :root { 
            --bg-outer: #05070a; --bg-app: #0c0e14; --bg-card: #161a24;
            --accent-green: #00e699; --accent-pink: #ff00ff;
            --accent-yellow: #ffd700; --accent-blue: #00d9ff;
            --text-main: #ffffff; --text-dim: #717b8a;
        }
        body { background-color: var(--bg-outer); margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-app); position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.9); }
        
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #sysTime { color: #fff; font-size: 19px; font-weight: bold; }
        .search-trigger { font-size: 24px; color: var(--accent-green); cursor: pointer; }
        #searchBox { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); z-index: 2000; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--accent-green); }
        #sIn { flex: 1; height: 40px; background: #232a37; border: none; border-radius: 8px; color: #fff; padding: 0 15px; outline: none; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .hero { padding: 10px 20px; text-align: center; }
        #stNameDisplay { font-size: 22px; font-weight: bold; margin-bottom: 15px; color: #fff; display: block; text-transform: uppercase; }
        #mainImg { width: 100%; border-radius: 18px; aspect-ratio: 1/1; object-fit: cover; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 20px 0 5px; }
        #pBtn { width: 75px; height: 75px; border-radius: 50%; background: var(--accent-green); border: none; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-side { background: none; border: none; color: var(--accent-green); font-size: 26px; cursor: pointer; }

        .volume-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 40px 25px; }
        #volSlider { flex: 1; accent-color: var(--accent-green); cursor: pointer; height: 5px; }

        .box { background: var(--bg-card); border-radius: 14px; padding: 18px; margin: 0 15px 15px; }
        .label { font-style: italic; font-size: 24px; font-weight: bold; margin-bottom: 12px; display: block; }
        .track-info { display: flex; align-items: flex-start; gap: 15px; }
        #speakerIcon { font-size: 22px; }
        .artist { font-size: 19px; font-weight: bold; display: block; }
        .title { font-size: 16px; opacity: 0.8; display: block; margin-top: 4px; }

        .list-item { display: flex; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
        .l-time { width: 55px; color: var(--text-dim); }
        .l-art { color: var(--accent-green); font-weight: 600; }
        #moreBtn { color: var(--accent-green); text-align: center; padding: 12px; cursor: pointer; font-weight: bold; font-size: 13px; }

        .footer-info { padding: 20px; display: flex; flex-direction: column; gap: 10px; position: relative; }
        .footer-main { font-style: italic; font-size: 22px; font-weight: bold; line-height: 1.2; max-width: 80%; }
        .loc-row { display: flex; align-items: center; gap: 8px; color: var(--text-dim); margin-top: 5px; }
        .st-desc { font-size: 14px; line-height: 1.5; opacity: 0.7; margin-top: 10px; }
        .hoerer-pos { position: absolute; right: 20px; top: 25px; }
        .hoerer-badge { background: rgba(0,230,153,0.1); color: var(--accent-green); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <div id="searchBox">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') startSearch()">
        <button onclick="closeSearch()" style="background:none; border:none; color:white; font-size:20px; margin-left:10px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameDisplay">RADIO</span>
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div class="controls">
                <button class="btn-side" onclick="shareStation()">🔗</button>
                <button id="pBtn" onclick="toggle()">▶</button>
                <div style="width:30px"></div>
            </div>
            <div class="volume-container">
                <span>🔈</span>
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="changeVol(this.value)">
                <span>🔊</span>
            </div>
        </div>

        <div class="box">
            <span class="label">Jetzt läuft</span>
            <div class="track-info">
                <span id="speakerIcon">🔊</span>
                <div>
                    <span id="curArt" class="artist">BEREIT</span>
                    <span id="curTit" class="title">Wähle einen Sender</span>
                </div>
            </div>
            <div id="historyList" style="margin-top:10px;"></div>
            <div id="moreBtn" onclick="toggleHistory()">mehr Songs anzeigen</div>
        </div>

        <div class="footer-info">
            <div id="footerSlogan" class="footer-main">Dein Tag, Dein Sound.</div>
            <div class="hoerer-pos">
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
            <div class="loc-row">
                <span style="color:var(--accent-green); font-size:20px;">📍</span>
                <span id="stLoc">...</span>
            </div>
            <div id="stDesc" class="st-desc"></div>
        </div>
    </div>
</div>

<script>
    const au = new Audio(); au.volume = 0.8; 
    let slug = ""; 
    let histFull = false;
    let uiInterval;

    function updateClock() { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }); }
    setInterval(updateClock, 1000); updateClock();
    
    function changeVol(val) { au.volume = val; }
    function openSearch() { document.getElementById('sIn').value = ""; document.getElementById('searchBox').style.display = 'flex'; document.getElementById('sIn').focus(); }
    function closeSearch() { document.getElementById('searchBox').style.display = 'none'; document.getElementById('sIn').value = ""; }

    async function startSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        slug = val.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + slug;
        au.play(); document.getElementById('pBtn').innerHTML = "⏸"; 
        closeSearch(); updateUI(); 
        if(uiInterval) clearInterval(uiInterval);
        uiInterval = setInterval(updateUI, 8000);
    }

    function toggle() {
        if(!slug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleHistory() { histFull = !histFull; updateUI(); }

    async function updateUI() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stLoc').innerText = s.city || "Radio-Station";
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('footerSlogan').innerText = s.page_title || "Dein Tag, Dein Sound.";

            const cur = l[0]; 
            let color = "var(--accent-green)";
            let artistName = cur.artist.name;
            let songTitle = cur.title;
            const checkText = (artistName + " " + songTitle).toLowerCase();

            if(songTitle.includes("START_AD_BREAK") || cur.type === "gold") {
                color = "var(--accent-yellow)"; artistName = "REKLAME / WERBUNG"; songTitle = "Gleich geht es weiter...";
            } else if(checkText.includes("news")) {
                color = "var(--accent-blue)"; artistName = "NACHRICHTEN";
            } else if(checkText.includes("moderation") || checkText.includes("ansage") || checkText.includes("talk")) {
                color = "var(--accent-pink)"; artistName = s.display_name + " - MODERATION";
            }

            const artEl = document.getElementById('curArt');
            artEl.innerText = artistName; artEl.style.color = color;
            document.getElementById('speakerIcon').style.color = color;
            document.getElementById('curTit').innerText = songTitle;

            let hHtml = ""; 
            const limit = histFull ? 10 : 3;
            l.slice(1, limit + 1).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                hHtml += `<div class="list-item"><span class="l-time">${time}</span><div><span class="l-art">${song.artist.name}</span><br>${song.title}</div></div>`;
            });
            document.getElementById('historyList').innerHTML = hHtml;
            document.getElementById('moreBtn').innerText = histFull ? "weniger anzeigen" : "mehr Songs anzeigen";
        } catch(e) {}
    }

    async function shareStation() { if(slug) navigator.share({ url: `https://laut.fm/${slug}` }); }
</script>
</body>
</html>
