<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Pro v17.0 - Final Edition</title>
    <style>
        :root { --bg: #050505; --accent: #00d2ff; --panel: #111; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        header { padding: 10px 20px; display: flex; align-items: center; background: #000; border-bottom: 2px solid var(--accent); gap: 10px; }
        .search-box { display: flex; background: #1a1a1a; border-radius: 20px; padding: 5px 12px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: white; outline: none; width: 140px; font-size: 14px; }
        
        .head-display { margin-left: auto; display: flex; align-items: center; background: #0a0a0a; padding: 4px 10px; border-radius: 8px; border: 1px solid #222; gap: 10px; }
        #headLogo { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; display: none; border: 1px solid var(--accent); }
        #headStationName { font-family: 'Courier New', monospace; color: var(--accent); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        #uhr { font-family: monospace; color: var(--accent); font-size: 20px; font-weight: bold; padding-left: 10px; border-left: 1px solid #333; }

        /* MAIN */
        .main { flex: 1; display: grid; grid-template-columns: 380px 1fr; overflow: hidden; }
        @media (max-width: 850px) { .main { grid-template-columns: 1fr; overflow-y: auto; } body { overflow: auto; } }

        .left { background: var(--panel); padding: 25px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 15px; }
        #stName { font-size: 28px; font-weight: bold; color: var(--accent); }
        #stGenre { font-size: 16px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-top: -10px; }
        #stDesc { font-size: 14px; color: #bbb; line-height: 1.5; border-top: 1px solid #222; padding-top: 10px; height: 80px; overflow-y: auto; }
        #mainImg { width: 100%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; border: 2px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        
        .play-btn { background: #1db954; color: white; border: none; padding: 20px; border-radius: 40px; font-weight: bold; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .play-btn.playing { background: #ff3333; }
        
        .vol-container { background: #000; padding: 15px; border-radius: 12px; border: 1px solid #222; margin-top: 10px; }
        .vol-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-family: monospace; font-size: 14px; color: var(--accent); }
        .vol { width: 100%; cursor: pointer; accent-color: var(--accent); }

        .right { padding: 30px; overflow-y: auto; background: linear-gradient(180deg, #080808 0%, #050505 100%); }
        .current-box { background: rgba(0, 210, 255, 0.05); padding: 25px; border-radius: 15px; border: 1px solid rgba(0, 210, 255, 0.2); margin-bottom: 30px; }
        .history-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #222; transition: 0.3s; }
        .history-card:hover { border-color: var(--accent); background: #161616; }

        /* FOOTER */
        footer { height: 90px; background: #000; border-top: 2px solid var(--accent); display: flex; align-items: center; padding: 0 25px; gap: 20px; }
        .vis-circle { width: 55px; height: 55px; border: 2px solid #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .vis-circle.active { border-color: var(--accent); animation: glow 2s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent); } }
        .bar { width: 4px; height: 12px; background: var(--accent); border-radius: 2px; }
        .vis-circle.active .bar { animation: barAnim 0.8s infinite ease-in-out; }
        @keyframes barAnim { 0%, 100% { height: 10px; } 50% { height: 30px; } }

        .scroll-wrap { flex: 1; overflow: hidden; white-space: nowrap; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #1a1a1a; }
        #fTrack { display: inline-block; animation: scroll 30s linear infinite; color: var(--accent); font-weight: bold; font-size: 18px; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body onload="initApp()">

<header>
    <div class="search-box">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') sync(this.value)">
        <button onclick="sync(document.getElementById('sIn').value)" style="background:none; border:none; color:white; cursor:pointer; font-size:18px;">🔍</button>
    </div>
    <div class="head-display">
        <img id="headLogo" src="">
        <div id="headStationName">OFFLINE</div>
        <div id="uhr">00:00:00</div>
    </div>
</header>

<div class="main">
    <div class="left">
        <div id="stName">RADIO SYSTEM</div>
        <div id="stGenre">PLAYLIST BEREIT</div>
        <div id="stDesc">Geben Sie oben einen Sendernamen ein und drücken Sie Enter.</div>
        <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        
        <button id="pBtn" class="play-btn" onclick="togglePlay()">START RADIO</button>
        
        <div class="vol-container">
            <div class="vol-header">
                <span>LAUTSTÄRKE</span>
                <span id="volP">80%</span>
            </div>
            <input type="range" id="vControl" class="vol" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>
    <div class="right">
        <div class="current-box">
            <div id="curSongTime" style="color:var(--accent); font-family: monospace; font-size: 14px; font-weight: bold;">--:-- UHR</div>
            <div id="curT" style="font-size: 26px; font-weight: bold; margin-top: 8px; color:#fff;">Warte auf Sender...</div>
        </div>
        <div id="hList"></div>
    </div>
</div>

<footer>
    <div id="vC" class="vis-circle">
        <div class="bar" style="animation-delay:0.0s"></div>
        <div class="bar" style="animation-delay:0.2s"></div>
        <div class="bar" style="animation-delay:0.4s"></div>
    </div>
    <div class="scroll-wrap">
        <div id="fTrack">+++ Radio v17.0 - Willkommen +++</div>
    </div>
    <div style="min-width: 100px; text-align: right;">
        <div id="hoerer" style="color:var(--accent); font-weight:bold; font-family:monospace;">0 HÖRER</div>
        <div style="color:#444; font-size:10px; font-family:monospace;">VER. 17.0 FINAL</div>
    </div>
</footer>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const player = document.getElementById('player');
    const vControl = document.getElementById('vControl');
    const volP = document.getElementById('volP');
    let slug = "";
    let isPlaying = false;
    let dataInterval;

    function initApp() {
        setInterval(() => { 
            document.getElementById('uhr').innerText = new Date().toLocaleTimeString(); 
        }, 1000);
        
        vControl.oninput = () => {
            player.volume = vControl.value;
            volP.innerText = Math.round(vControl.value * 100) + "%";
        };
    }

    function sync(v) {
        if(!v) return;
        slug = v.toLowerCase().trim().replace(/\s+/g, '-');
        if(dataInterval) clearInterval(dataInterval);
        loadData();
        dataInterval = setInterval(loadData, 15000);
        
        // Reset Player bei neuem Sender
        player.src = "https://stream.laut.fm/" + slug;
        if(isPlaying) player.play();
    }

    function togglePlay() {
        if(!slug) { alert("Bitte zuerst einen Sender suchen!"); return; }
        
        if(player.paused) {
            player.src = "https://stream.laut.fm/" + slug + "?t=" + Date.now();
            player.play().then(() => {
                isPlaying = true;
                updateUI(true);
            }).catch(e => {
                alert("Browser blockiert Audio. Bitte oben links beim Schloss 'Audio erlauben'!");
            });
        } else {
            player.pause();
            isPlaying = false;
            updateUI(false);
        }
    }

    function updateUI(playState) {
        const btn = document.getElementById('pBtn');
        const vis = document.getElementById('vC');
        if(playState) {
            btn.innerText = "STOPP";
            btn.classList.add('playing');
            vis.classList.add('active');
        } else {
            btn.innerText = "START RADIO";
            btn.classList.remove('playing');
            vis.classList.remove('active');
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const res = await fetch(`https://api.laut.fm/station/${slug}`);
            const data = await res.json();
            const songs = await fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json());
            const listen = await fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text());

            document.getElementById('stName').innerText = data.display_name;
            document.getElementById('stGenre').innerText = data.format || "RADIO";
            document.getElementById('headStationName').innerText = data.display_name;
            document.getElementById('stDesc').innerText = data.description || "Keine Beschreibung verfügbar.";
            document.getElementById('mainImg').src = data.images.station_640x640;
            document.getElementById('headLogo').src = data.images.station_80x80;
            document.getElementById('headLogo').style.display = "block";
            document.getElementById('hoerer').innerText = listen + " HÖRER";

            const trackStr = songs[0].artist.name + " - " + songs[0].title;
            document.getElementById('curSongTime').innerText = new Date(songs[0].started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + " UHR";
            document.getElementById('curT').innerText = trackStr;
            document.getElementById('fTrack').innerText = " +++ " + data.display_name.toUpperCase() + " SPIELT GERADE: " + trackStr + " +++ ";

            let html = "";
            songs.slice(1, 10).forEach(s => {
                const sTime = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="history-card">
                    <b style="color:var(--accent); min-width:60px;">${sTime}</b>
                    <div style="margin-left:15px;">
                        <span style="font-weight:bold; color:#fff;">${s.artist.name}</span><br>
                        <span style="color:#888; font-size:13px;">${s.title}</span>
                    </div>
                </div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
