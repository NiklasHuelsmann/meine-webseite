<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate - Universal Player</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --surface: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; display: flex; justify-content: center; 
            height: 100vh; overflow: hidden;
        }
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 15px 20px; background: #000; border-bottom: 1px solid #222; display: flex; flex-direction: column; gap: 8px; }
        .uhrzeit { text-align: center; font-size: 16px; color: var(--accent); font-weight: bold; font-family: 'Courier New', monospace; letter-spacing: 2px; }
        .search-box { 
            display: flex; background: #1c1c1e; border-radius: 12px; 
            padding: 5px 15px; border: 2px solid #333; align-items: center; 
        }
        input { 
            background: transparent; border: none; color: #fff; 
            flex: 1; font-size: 16px; height: 45px; 
        }
        
        .main { flex: 1; overflow-y: auto; padding: 20px; text-align: center; scrollbar-width: none; }
        .main::-webkit-scrollbar { display: none; }

        #mainImg { 
            width: 170px; height: 170px; border-radius: 22px; 
            object-fit: cover; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            background: #111; border: 1px solid #333; margin-top: 10px;
        }
        #stName { font-size: 26px; font-weight: 800; margin: 15px 0 5px; text-transform: uppercase; }
        #hoerer { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }
        
        .track-box { 
            background: #1c1c1e; border-radius: 15px; padding: 15px; 
            margin-bottom: 20px; border-left: 5px solid var(--accent); text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .track-label { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 900; margin-bottom: 4px; display: block; }
        #curT { font-weight: bold; font-size: 16px; color: #fff; display: block; line-height: 1.4; }

        .history-label { text-align: left; font-size: 12px; color: #555; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .h-item { 
            background: #0d0d0d; padding: 12px; border-radius: 12px; 
            display: flex; gap: 15px; margin-bottom: 8px; 
            font-size: 13px; text-align: left; border: 1px solid #1a1a1a; 
        }
        .h-time { color: var(--accent); font-weight: bold; min-width: 45px; }

        .dock { 
            background: rgba(15,15,15,0.98); backdrop-filter: blur(25px); 
            border-top: 1px solid #333; padding: 20px 25px 45px; 
            border-radius: 30px 30px 0 0; 
        }
        .player-row { display: flex; align-items: center; gap: 20px; }
        #pBtn { 
            width: 75px; height: 75px; border-radius: 50%; border: none; 
            background: #fff; color: #000; font-size: 32px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        #status { font-size: 10px; color: #666; text-align: center; margin-top: 12px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="liveClock" class="uhrzeit">00:00:00</div>
        <div class="search-box">
            <input type="text" id="sIn" placeholder="Sender suchen..." autocomplete="off" onkeydown="if(event.key==='Enter') launch()">
            <button onclick="launch()" style="background:none; border:none; color:var(--accent); font-size:24px; cursor:pointer;">🔍</button>
        </div>
    </header>

    <div class="main">
        <img id="mainImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
        <div id="stName">RADIO ONLINE</div>
        <div id="hoerer">BEREIT ZUM START</div>
        
        <div class="track-box">
            <span class="track-label">Aktueller Titel</span>
            <span id="curT">Wähle einen Sender</span>
        </div>

        <div class="history-label">Zuletzt gelaufen:</div>
        <div id="hList"></div>
    </div>

    <div class="dock">
        <div class="player-row">
            <button id="pBtn" onclick="ctrl()">▶</button>
            <div style="flex: 1;">
                <input type="range" id="vVol" min="0" max="1" step="0.01" value="0.8" style="width: 100%; accent-color: var(--accent);">
                <div id="status">Standby</div>
            </div>
        </div>
    </div>
</div>

<script>
    const player = new Audio();
    player.crossOrigin = "anonymous";
    let stationSlug = "";
    let monitor = null;

    // Echtzeit Uhr
    setInterval(() => {
        document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);

    // Volume
    document.getElementById('vVol').oninput = (e) => { player.volume = e.target.value; };

    // Start-Funktion
    async function launch() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        
        document.activeElement.blur();
        stationSlug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        player.pause();
        player.src = `https://stream.laut.fm/${stationSlug}?t=${Date.now()}`;
        
        document.getElementById('status').innerText = "VERBINDET...";
        
        player.play().then(() => {
            document.getElementById('pBtn').innerHTML = "⏸";
            document.getElementById('status').innerText = "LIVE AKTIV";
        }).catch(() => {
            document.getElementById('status').innerText = "PLAY DRÜCKEN";
        });

        syncData();
        if(monitor) clearInterval(monitor);
        monitor = setInterval(syncData, 15000);
    }

    // Play/Pause Steuerung
    function ctrl() {
        if(!stationSlug) return;
        if(player.paused) {
            player.src = `https://stream.laut.fm/${stationSlug}?t=${Date.now()}`;
            player.play();
            document.getElementById('pBtn').innerHTML = "⏸";
            document.getElementById('status').innerText = "LIVE AKTIV";
        } else {
            player.pause();
            player.src = ""; // Verhindert Flattern
            document.getElementById('pBtn').innerHTML = "▶";
            document.getElementById('status').innerText = "GESTOPPT";
        }
    }

    // Daten-Update
    async function syncData() {
        if(!stationSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${stationSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${stationSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${stationSlug}/listeners`).then(r => r.text())
            ]);
            
            document.getElementById('stName').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " PERSONEN HÖREN GERADE ZU";
            document.getElementById('curT').innerText = l[0].artist.name + " - " + l[0].title;
            
            let html = "";
            l.slice(1, 10).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${time}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) {
            console.log("Daten-Sync hakt, Stream läuft weiter.");
        }
    }

    // Automatischer Reconnect bei Fehlern
    player.onerror = () => {
        if(stationSlug && !player.paused && player.src !== "") {
            setTimeout(() => {
                player.src = `https://stream.laut.fm/${stationSlug}?t=${Date.now()}`;
                player.play().catch(() => {});
            }, 3000);
        }
    };
</script>
</body>
</html>
