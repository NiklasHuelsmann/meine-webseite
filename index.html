<script>
    // Korrigierte Standard-Liste ohne das noch nicht existierende Feierabend Radio
    // Test-Station-FM ist jetzt als Haupt-Test-Sender dabei
    const MY_DEFAULT_FAVORITES = ["test-station-fm", "brian", "niklasheulsmann", "simulator-4"]; 
    const DEFAULT_START_STATION = "test-station-fm"; // Startet direkt zum Testen der Funktionen

    let currentStation = "";
    // Favoriten laden; wenn leer, wird die korrigierte Liste genutzt
    let favorites = JSON.parse(localStorage.getItem('radioFavs_v2'));
    
    if (!favorites || favorites.length === 0) {
        favorites = MY_DEFAULT_FAVORITES;
    }

    const audio = document.getElementById('audio');

    window.onload = () => {
        renderFavs();
        
        // Lädt beim Start entweder den letzten Sender oder die neue Test-Station
        const last = localStorage.getItem('lastStation') || DEFAULT_START_STATION;
        loadStation(last); 
    };

    async function loadStation(name) {
        currentStation = (name || document.getElementById('slug').value).toLowerCase().trim();
        if(!currentStation) return;
        
        localStorage.setItem('lastStation', currentStation);
        document.getElementById('player').style.display = "block";
        document.getElementById('history-ui').style.display = "block";
        
        update();
        checkHeart();
    }
    
    // ... Rest der Logik für Hörerinfos, Logo und Verlauf ...
</script>
