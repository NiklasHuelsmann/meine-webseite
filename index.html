<script>
    let audio = new Audio(); 
    let slug = "";
    let updateTask = null;

    function init() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { audio.volume = e.target.value; };
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // Den Player "aufwecken"
        audio.src = "about:blank"; 
        audio.play().catch(()=>{});
        
        document.getElementById('status').innerText = "Sender geladen";
        await load();
        if(updateTask) clearInterval(updateTask);
        updateTask = setInterval(load, 15000);
    }

    function toggle() {
        if(!slug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(audio.paused || audio.src.includes("about:blank")) {
            st.innerText = "Puffere Ton...";
            
            // WICHTIG: Die offizielle HTTPS-Stream-Adresse nutzen
            audio.src = `https://stream.laut.fm/${slug}?ref=webapp&t=${Date.now()}`;
            audio.setAttribute("type", "audio/mpeg");
            audio.crossOrigin = "anonymous";
            audio.volume = document.getElementById('vRange').value;
            
            // Direkter Startbefehl
            const playAttempt = () => {
                audio.play().then(() => {
                    btn.innerHTML = "⏸";
                    btn.classList.add('playing');
                    st.innerText = "Live On Air";
                    st.style.color = "var(--accent)";
                }).catch((e) => {
                    console.error("Start-Fehler:", e);
                    st.innerText = "Klick zum Starten";
                    // Kein automatischer Loop hier, um den Browser nicht zu verwirren
                });
            };
            playAttempt();
        } else {
            audio.pause();
            audio.src = "about:blank"; // Stream hart stoppen
            btn.innerHTML = "▶";
            btn.classList.remove('playing');
            st.innerText = "Gestoppt";
            st.style.color = "#666";
        }
    }

    async function load() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name.toUpperCase();
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " Hörer online";
            const track = l[0].artist.name + " - " + l[0].title;
            document.getElementById('curT').innerText = track;
            document.getElementById('tText').innerText = `+++ ${s.display_name.toUpperCase()}: ${track.toUpperCase()} +++`;
            
            let list = "";
            l.slice(1, 12).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                list += `<div class="h-item"><span class="h-time">${time}</span> <span><b>${song.artist.name}</b> ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = list;
        } catch(e) { document.getElementById('status').innerText = "Verbindungsfehler"; }
    }
</script>
