<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Universal v9.0</title>
    <style>
        :root { --primary: #00ffaa; --bg: #0d0d0f; --card: #1a1a1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; }
        
        .app-shell { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

        /* HEADER & SEARCH */
        .header { padding: 25px 20px; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .search-wrap { display: flex; background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #q { flex: 1; padding: 16px; border: none; background: transparent; color: white; font-size: 16px; outline: none; }
        .s-btn { background: var(--primary); border: none; padding: 0 25px; cursor: pointer; color: #000; font-weight: bold; }

        /* EINHEITLICHE ERGEBNISLISTE */
        #res-box {
            margin: 0 20px 20px; background: #1c1c20; border-radius: 12px;
            max-height: 400px; overflow-y: auto; display: none;
            border: 1px solid #444; box-shadow: 0 10px 40px #000;
        }
        .station-row {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            border-bottom: 1px solid #2a2a2e; cursor: pointer; transition: background 0.2s;
        }
        .station-row:hover { background: #2a2a32; }
        .station-row img { width: 50px; height: 50px; border-radius: 8px; background: #000; object-fit: cover; }
        .station-info { flex: 1; }
        .station-info b { display: block; font-size: 16px; margin-bottom: 3px; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; }
        .badge-laut { background: #ffaa00; color: #000; }
        .badge-world { background: #0088ff; color: #fff; }

        /* PLAYER VIEW */
        .player { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .status-row { width: 100%; display: flex; justify-content: space-between; font-family: monospace; color: var(--primary); margin-bottom: 20px; }
        
        #display-name { font-size: 28px; font-weight: bold; margin: 10px 0; }
        #main-art { width: 100%; max-width: 320px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 25px; border: 1px solid #333; }
        
        #track-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        #artist-name { font-size: 16px; color: #888; margin-bottom: 30px; }

        .play-trigger { width: 80px; height: 80px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .play-trigger svg { width: 35px; height: 35px; fill: #000; }

        /* HISTORY */
        .history { width: 100%; margin-top: 30px; text-align: left; }
        .h-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: #121214; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; }
        .h-card img { width: 40px; height: 40px; border-radius: 6px; }

        .footer { padding: 20px; text-align: center; color: #333; font-size: 10px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="search-wrap">
            <input type="text" id="q" placeholder="Sender suchen (WDR, laut.fm...)" autocomplete="off">
            <button class="s-btn" id="go">LOS</button>
        </div>
    </div>

    <div id="res-box"></div>

    <div class="player">
        <div class="status-row">
            <div id="clock">00:00:00</div>
            <div id="listener-count">● STANDBY</div>
        </div>

        <h1 id="display-name">Radio Universal</h1>
        <img id="main-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">

        <div id="track-title">Bereit</div>
        <div id="artist-name">Tippe einen Namen oben ein</div>

        <button class="play-trigger" id="playBtn">
            <svg id="icon-p" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-s" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="history" id="history-list"></div>
    </div>
    <div class="footer">ULTIMATE ENGINE V9.0</div>
</div>

<audio id="engine" playsinline crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('engine');
    const playBtn = document.getElementById('playBtn');
    const input = document.getElementById('q');
    const resBox = document.getElementById('res-box');
    let currentStation = null;
    let currentType = "";

    async function performSearch() {
        const val = input.value.trim();
        if(val.length < 2) return;

        resBox.innerHTML = "<div style='padding:20px;text-align:center;'>Suche läuft...</div>";
        resBox.style.display = "block";

        try {
            const [rL, rW] = await Promise.all([
                fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`),
                fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(val)}`)
            ]);
            const dL = await rL.json();
            const dW = await rW.json();
            
            resBox.innerHTML = "";

            // LAUT.FM Ergebnisse hinzufügen
            if(dL.items) {
                dL.items.forEach(s => {
                    createRow(s.display_name, s.images.station_80x80, s.name, 'badge-laut', 'LAUT.FM');
                });
            }

            // WORLD Ergebnisse hinzufügen
            if(dW) {
                dW.slice(0, 15).forEach(s => {
                    createRow(s.name, s.favicon, s.url, 'badge-world', 'WORLD');
                });
            }
        } catch(e) { resBox.innerHTML = "<div style='padding:20px;'>Verbindungsfehler</div>"; }
    }

    function createRow(name, img, streamUrl, cls, typeText) {
        const div = document.createElement('div');
        div.className = "station-row";
        // Die entscheidende Klick-Funktion
        div.onclick = () => { selectStation(name, img, streamUrl, typeText); };
        
        const icon = img || 'https://via.placeholder.com/50/222/fff?text=R';
        div.innerHTML = `
            <img src="${icon}">
            <div class="station-info">
                <b>${name}</b>
                <span class="badge ${cls}">${typeText}</span>
            </div>
        `;
        resBox.appendChild(div);
    }

    function selectStation(name, img, url, type) {
        currentStation = url;
        currentType = type;
        resBox.style.display = "none";
        input.value = "";
        
        audio.pause();
        audio.src = (type === 'LAUT.FM') ? `https://stream.laut.fm/${url}` : url;
        audio.play().catch(e => console.log("Start erforderlich"));

        document.getElementById('display-name').innerText = name;
        document.getElementById('main-art').src = img || 'https://via.placeholder.com/320/111/fff?text=RADIO';
        document.getElementById('icon-p').style.display = "none";
        document.getElementById('icon-s').style.display = "block";

        if(type === 'LAUT.FM') {
            updateLautData(url);
        } else {
            document.getElementById('track-title').innerText = "Live Stream";
            document.getElementById('artist-name').innerText = "Öffentlicher Sender";
            document.getElementById('history-list').innerHTML = "";
            document.getElementById('listener-count').innerText = "● LIVE";
        }
    }

    async function updateLautData(slug) {
        try {
            const r = await fetch(`https://api.laut.fm/station/${slug}/last_songs`);
            const songs = await r.json();
            const sInfo = await fetch(`https://api.laut.fm/station/${slug}`).then(res => res.json());
            
            document.getElementById('listener-count').innerText = `● ${sInfo.current_listeners || 0} HÖRER`;
            
            if(songs.length > 0) {
                document.getElementById('track-title').innerText = songs[0].title;
                document.getElementById('artist-name').innerText = songs[0].artist.name;
                document.getElementById('main-art').src = songs[0].image_640x640 || sInfo.images.station_640x640;
                
                let hHtml = "";
                songs.slice(1, 5).forEach(s => {
                    hHtml += `<div class="h-card"><img src="${s.image_120x120 || sInfo.images.station_80x80}"><div><b>${s.title}</b><br><small>${s.artist.name}</small></div></div>`;
                });
                document.getElementById('history-list').innerHTML = hHtml;
            }
        } catch(e) {}
    }

    // Controls
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });
    document.getElementById('go').onclick = performSearch;

    playBtn.onclick = () => {
        if(!currentStation) return;
        if(audio.paused) {
            audio.play();
            document.getElementById('icon-p').style.display = "none";
            document.getElementById('icon-s').style.display = "block";
        } else {
            audio.pause();
            document.getElementById('icon-p').style.display = "block";
            document.getElementById('icon-s').style.display = "none";
        }
    };

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(() => { if(currentType === 'LAUT.FM') updateLautData(currentStation); }, 30000);
    
    // Schließen beim Klick außerhalb
    document.addEventListener('click', (e) => {
        if(!resBox.contains(e.target) && e.target !== input) resBox.style.display = "none";
    });
</script>
</body>
</html>
