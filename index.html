<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Dashboard</title>
    <style>
        :root { 
            --bg: #05080f; 
            --karte: rgba(30, 41, 59, 0.5); 
            --akzent: #0088ff; 
            --text: #f8fafc; 
            --rand: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(0, 136, 255, 0.3);
            --glass: blur(25px);
        }

        .light-mode {
            --bg: #f1f5f9;
            --karte: rgba(255, 255, 255, 0.9);
            --akzent: #0055ff;
            --text: #0f172a;
            --rand: rgba(0, 0, 0, 0.1);
            --glow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }
        
        html, body { overscroll-behavior: none; margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); transition: background 0.4s; }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { color: var(--text); display: flex; flex-direction: column; }

        header { padding: 12px 5%; display: flex; align-items: center; justify-content: space-between; background: var(--karte); backdrop-filter: var(--glass); border-bottom: 1px solid var(--rand); position: sticky; top: 0; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        #miniLogo { width: 35px; height: 35px; border-radius: 8px; border: 1.5px solid var(--akzent); display: none; object-fit: cover; }
        #senderOben { font-weight: 800; text-transform: uppercase; font-size: 1rem; letter-spacing: 0.5px; }

        .container { flex-grow: 1; padding: 20px 5%; max-width: 1300px; margin: 0 auto; width: 100%; }

        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 25px; }
        .suche-container { display: flex; background: var(--karte); border: 1px solid var(--rand); border-radius: 12px; padding: 5px 15px; align-items: center; width: 260px; box-shadow: var(--glow); }
        #sIn { flex-grow: 1; background: transparent; border: none; color: var(--text); padding: 8px; outline: none; font-size: 14px; }
        .mode-toggle { background: var(--akzent); color: white; border: none; border-radius: 10px; padding: 8px 15px; cursor: pointer; font-size: 11px; font-weight: 700; }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }

        .box { background: var(--karte); border: 1px solid var(--rand); border-radius: 24px; padding: 25px; box-shadow: var(--glow); backdrop-filter: var(--glass); }

        .player-ansicht { text-align: center; }
        #hauptLogo { width: 100%; max-width: 250px; aspect-ratio: 1/1; border-radius: 20px; border: 3px solid var(--akzent); box-shadow: var(--glow); margin-bottom: 15px; }
        #aktuelleHoerer { font-weight: 900; color: var(--akzent); font-size: 11px; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
        
        .control-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        .visualizer { display: flex; align-items: flex-end; gap: 4px; height: 32px; }
        .bar { width: 8px; background: var(--akzent); height: 5px; border-radius: 4px; }
        .aktiv-bar { animation: bounce 0.7s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { height: 5px; } 50% { height: 28px; } }

        .play-btn { width: 70px; height: 70px; border-radius: 22px; border: none; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        .vol-box { background: rgba(0,0,0,0.15); padding: 12px; border-radius: 14px; text-align: left; }
        #volLabel { font-size: 10px; font-weight: 900; color: var(--akzent); margin-bottom: 6px; display: block; }
        input[type=range] { width: 100%; accent-color: var(--akzent); cursor: pointer; }

        .label { font-size: 10px; color: var(--akzent); font-weight: 900; margin-bottom: 8px; text-transform: uppercase; }
        .aktuell-box { font-size: 1.3rem; font-weight: 800; padding: 22px; background: var(--karte); border-radius: 18px; border-left: 5px solid var(--akzent); margin-bottom: 25px; box-shadow: var(--glow); }
        .neu-flash { animation: flash 0.8s ease-out; }
        @keyframes flash { 0% { background: var(--akzent); color: white; } 100% { background: var(--karte); } }

        .liste-zeile { padding: 12px 0; border-bottom: 1px solid var(--rand); display: flex; gap: 15px; font-size: 14px; align-items: center; }
        .zeit-stempel { color: var(--akzent); font-weight: 800; min-width: 50px; }

        footer { padding: 15px 5%; border-top: 1px solid var(--rand); display: flex; justify-content: space-between; align-items: center; font-size: 11px; opacity: 0.7; }
        .tv-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--rand); color: var(--text); padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: bold; }

        .tv-mode-active header, .tv-mode-active .top-bar, .tv-mode-active .label:last-of-type, .tv-mode-active #verlaufListe { display: none; }
        .tv-mode-active .layout { grid-template-columns: 1fr; }
        .tv-mode-active #hauptLogo { max-width: 400px; }
        .tv-mode-active .aktuell-box { font-size: 2.8rem; border: none; text-align: center; background: transparent; box-shadow: none; }
    </style>
</head>
<body onload="uhrStarten()">

<header>
    <div class="header-left">
        <img id="miniLogo" src="">
        <span id="senderOben">RADIO DASHBOARD</span>
    </div>
</header>

<div class="container">
    <div class="top-bar">
        <button class="mode-toggle" onclick="document.body.classList.toggle('light-mode')">DESIGN WECHSELN</button>
        <div class="suche-container">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') waehleSender(this.value)">
            <button style="background:none; border:none; color:var(--akzent); cursor:pointer;" onclick="waehleSender(document.getElementById('sIn').value)">🔍</button>
        </div>
    </div>

    <div class="layout">
        <div class="box player-ansicht">
            <img id="hauptLogo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <div id="aktuelleHoerer">STATUS BEREIT</div>
            <div id="desc" style="font-size: 12px; opacity: 0.6; line-height: 1.4; margin-bottom: 15px;">Wähle einen Sender.</div>

            <div class="control-row">
                <div class="visualizer">
                    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                </div>
                <button class="play-btn" onclick="umschalten()" id="pBtn">
                    <svg width="28" height="28" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>
                </button>
            </div>

            <div class="vol-box">
                <span id="volLabel">LAUTSTÄRKE: 90%</span>
                <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="setzeLautstaerke(this.value)">
            </div>
        </div>

        <div class="box">
            <div class="label">Aktueller Titel</div>
            <div id="songTitel" class="aktuell-box">...</div>
            
            <div class="label">Letzte 9 Songs</div>
            <div id="verlaufListe"></div>
        </div>
    </div>
</div>

<footer>
    <div>V 3.7.2</div>
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="uhrzeit">00:00:00</div>
        <button class="tv-btn" onclick="document.body.classList.toggle('tv-mode-active')">TV-MODUS</button>
    </div>
</footer>

<audio id="radioPlayer" preload="none"></audio>

<script>
    const player = document.getElementById('radioPlayer');
    let spielt = false, senderID = "", updateIntervall = null, letzterSong = "";

    function uhrStarten() { setInterval(() => { document.getElementById('uhrzeit').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000); }
    function setzeLautstaerke(v) { player.volume = v; document.getElementById('volLabel').innerText = "LAUTSTÄRKE: " + Math.round(v * 100) + "%"; }

    function waehleSender(v) {
        if(!v) return;
        senderID = v.toLowerCase().trim().replace(/\s+/g, '-');
        aktualisiereDaten();
        if(updateIntervall) clearInterval(updateIntervall);
        updateIntervall = setInterval(aktualisiereDaten, 15000);
        if(spielt) { stopStream(); startStream(); }
    }

    function umschalten() { if(!senderID) return; spielt ? stopStream() : startStream(); }

    function startStream() {
        player.src = "https://stream.laut.fm/" + senderID;
        player.play().then(() => {
            spielt = true;
            document.querySelectorAll('.bar').forEach(b => b.classList.add('aktiv-bar'));
            document.getElementById('pBtn').innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" fill="#000"/></svg>';
        });
    }

    function stopStream() { 
        player.pause(); player.src = ""; spielt = false; 
        document.querySelectorAll('.bar').forEach(b => b.classList.remove('aktiv-bar'));
        document.getElementById('pBtn').innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>'; 
    }

    async function aktualisiereDaten() {
        if(!senderID) return;
        try {
            const [info, lieder, hoerer] = await Promise.all([
                fetch(`https://api.laut.fm/station/${senderID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${senderID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${senderID}/listeners`).then(r => r.text())
            ]);
            
            const bild = info.images.station_120x120;
            document.getElementById('senderOben').innerText = info.display_name;
            document.getElementById('miniLogo').src = bild;
            document.getElementById('miniLogo').style.display = "block";
            document.getElementById('hauptLogo').src = bild;
            document.getElementById('aktuelleHoerer').innerText = hoerer + " HÖRER AKTUELL";
            document.getElementById('desc').innerText = info.description;
            
            const aktuellerTitel = lieder[0].artist.name + " - " + lieder[0].title;
            if(letzterSong !== aktuellerTitel) {
                letzterSong = aktuellerTitel;
                const box = document.getElementById('songTitel');
                box.innerText = aktuellerTitel;
                box.classList.remove('neu-flash');
                void box.offsetWidth; 
                box.classList.add('neu-flash');
            }
            
            let html = "";
            lieder.slice(1, 10).forEach(s => {
                const zeit = new Date(s.started_at).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                html += `<div class="liste-zeile"><span class="zeit-stempel">${zeit}</span><span>${s.artist.name} - ${s.title}</span></div>`;
            });
            document.getElementById('verlaufListe').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
