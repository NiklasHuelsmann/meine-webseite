<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brian-Radio Live</title>
    <style>
        :root { --bg: #0d0d0d; --accent: #00d2ff; --surface: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; display: flex; justify-content: center; 
            height: 100vh; overflow: hidden;
        }
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        
        header { padding: 10px 20px; background: #000; text-align: center; border-bottom: 1px solid #222; }
        .top-clock { font-family: monospace; color: var(--accent); font-size: 18px; letter-spacing: 2px; margin-bottom: 10px; }
        
        .search-area { display: flex; background: #1c1c1e; border-radius: 12px; padding: 5px 15px; border: 1px solid #333; align-items: center; }
        input { background: transparent; border: none; color: #fff; flex: 1; height: 40px; font-size: 16px; outline: none; }
        
        .main { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        #mainImg { width: 140px; height: 140px; border-radius: 20px; object-fit: cover; margin-top: 10px; border: 1px solid #333; }
        
        h1 { font-size: 28px; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 1px; }
        #hoerer { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 20px; }
        
        .now-playing-box { 
            background: var(--surface); border-radius: 15px; padding: 15px; 
            margin-bottom: 25px; border-left: 5px solid var(--accent); text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .time-badge { font-size: 11px; color: var(--accent); font-weight: bold; margin-bottom: 5px; display: block; }
        #curT { font-weight: bold; font-size: 17px; color: #fff; }

        .history-label { text-align: left; font-size: 11px; color: #666; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .h-item { 
            background: #161618; padding: 12px; border-radius: 12px; 
            display: flex; gap: 15px; margin-bottom: 8px; 
            font-size: 13px; text-align: left; border: 1px solid #222; 
        }
        .h-time { color: var(--accent); font-weight: bold; min-width: 45px; }

        .dock { 
            background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); 
            border-top: 1px solid #333; padding: 20px 25px 40px; 
            border-radius: 25px 25px 0 0; 
        }
        .player-row { display: flex; align-items: center; gap: 20px; }
        #pBtn { 
            width: 70px; height: 70px; border-radius: 50%; border: none; 
            background: #fff; color: #000; font-size: 30px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        #status { font-size: 10px; color: #555; text-align: center; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="topClock" class="top-clock">00:00:00</div>
        <div class="search-area">
            <input type="text" id="sIn" placeholder="Sendername..." onkeydown="if(event.key==='Enter') run()">
            <button onclick="run()" style="background:none; border:none; cursor:pointer; font-size:20px;">🔍</button>
        </div>
    </header>

    <div class="main">
        <img id="mainImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
        <h1 id="stName">BRIAN-RADIO</h1>
        <div id="hoerer">BEREIT</div>
        
        <div class="now-playing-box">
            <span id="curTime" class="time-badge">JETZT</span>
            <span id="curT">Wähle einen Sender</span>
        </div>

        <div class="history-label">Zuletzt gelaufen:</div>
        <div id="hList"></div>
    </div>

    <div class="dock">
        <div class="player-row">
            <button id="pBtn" onclick="toggle()">▶</button>
            <div style="flex: 1;">
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" style="width: 100%; accent-color: var(--accent);">
                <div id="status">Bereit</div>
            </div>
        </div>
    </div>
</div>

<script>
    const audio = new Audio();
    audio.crossOrigin = "anonymous";
    let slug = "";
    let timer = null;

    // Uhrzeit ganz oben
    setInterval(() => {
        document.getElementById('topClock').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);

    document.getElementById('vol').oninput = (e) => { audio.volume = e.target.value; };

    async function run() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        document.activeElement.blur();
        slug = val.toLowerCase().trim().replace(/[^a-z0-9-]/g, '');
        
        // Audio-Kanal freischalten
        audio.pause();
        audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
        audio.load();
        
        document.getElementById('status').innerText = "VERBINDE...";
        
        audio.play().then(() => {
            document.getElementById('pBtn').innerHTML = "⏸";
            document.getElementById('status').innerText = "LIVE AKTIV";
        }).catch(() => {
            document.getElementById('status').innerText = "BITTE PLAY DRÜCKEN";
        });

        update();
        if(timer) clearInterval(timer);
        timer = setInterval(update, 15000);
    }

    function toggle() {
        if(!slug) return;
        if(audio.paused) {
            audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
            audio.play();
            document.getElementById('pBtn').innerHTML = "⏸";
            document.getElementById('status').innerText = "LIVE AKTIV";
        } else {
            audio.pause();
            audio.src = ""; 
            document.getElementById('pBtn').innerHTML = "▶";
            document.getElementById('status').innerText = "GESTOPPT";
        }
    }

    async function update() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            
            document.getElementById('stName').innerText = s.display_name.toUpperCase();
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " PERSONEN HÖREN GERADE ZU";
            
            // Uhrzeit für den aktuellen Song
            const nowTime = new Date(l[0].started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('curTime').innerText = "GESTARTET UM " + nowTime + " UHR";
            document.getElementById('curT').innerText = l[0].artist.name + " - " + l[0].title;
            
            let html = "";
            l.slice(1, 8).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${time}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
