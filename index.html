<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Radio Player</title>
    <style>
        /* Eigenes Design-System */
        :root {
            --primary-color: #1db954; /* Ein frisches Grün für den Button */
            --bg-body: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Suchbereich */
        .search-box {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 1rem;
            width: 200px;
        }

        .search-box button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Das Player-Interface (ploppt auf) */
        #player-interface {
            display: none; /* Erst unsichtbar */
            width: 100%;
            max-width: 850px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-header {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        /* Linke Seite: Aktuell */
        .current-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .station-logo {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .play-toggle {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.2s;
        }

        .play-toggle:hover { transform: scale(1.1); }

        /* Rechte Seite: Historie */
        .history-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 25px;
            border-radius: 20px;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
        }

        .song-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .song-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            min-width: 50px;
        }

        .song-info strong {
            display: block;
            font-size: 0.95rem;
        }

        .song-info span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Mobil-Optimierung */
        @media (max-width: 700px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="stationSearch" placeholder="Sender suchen..." onkeypress="if(event.key === 'Enter') startPlayer()">
        <button onclick="startPlayer()">Laden</button>
    </div>

    <div id="player-interface">
        <div class="stats-header" id="listenerInfo">HÖRER: 0</div>
        
        <div class="main-layout">
            <!-- Aktueller Bereich -->
            <div class="current-box">
                <img id="logo" class="station-logo" src="" alt="Logo">
                <h2 id="title" style="margin: 0;">Titel</h2>
                <p id="artist" style="color: var(--text-muted); margin: 5px 0;">Künstler</p>
                
                <button class="play-toggle" id="playBtn" onclick="toggleAudio()">▶</button>
                
                <div id="stationName" style="font-weight: bold; margin-top: 10px; color: var(--primary-color);"></div>
            </div>

            <!-- Letzte Songs Bereich -->
            <div class="history-box">
                <div class="history-title">Verlauf</div>
                <div id="historyContainer"></div>
            </div>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        let currentStation = "";
        let isPlaying = false;
        let refreshTask;

        async function startPlayer() {
            const val = document.getElementById('stationSearch').value.trim().toLowerCase();
            if(!val) return;
            currentStation = val;

            const audio = document.getElementById('player');
            audio.src = `https://stream.laut.fm/${currentStation}`;
            
            // UI aufploppen lassen
            document.getElementById('player-interface').style.display = 'block';
            
            updateContent();
            if(refreshTask) clearInterval(refreshTask);
            refreshTask = setInterval(updateContent, 20000);

            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "⏸";
        }

        function toggleAudio() {
            const audio = document.getElementById('player');
            if(isPlaying) {
                audio.pause();
                document.getElementById('playBtn').innerText = "▶";
            } else {
                audio.play();
                document.getElementById('playBtn').innerText = "⏸";
            }
            isPlaying = !isPlaying;
        }

        async function updateContent() {
            try {
                // Sender Info
                const sRes = await fetch(`https://api.laut.fm/station/${currentStation}`);
                const sData = await sRes.json();
                document.getElementById('listenerInfo').innerText = `AKTUELL ${sData.current_listeners || 0} PERSONEN SCHALTEN EIN`;
                document.getElementById('logo').src = sData.images.station_640x640 || sData.images.station;
                document.getElementById('stationName').innerText = sData.display_name;

                // Song Info
                const cRes = await fetch(`https://api.laut.fm/station/${currentStation}/current_song`);
                const cData = await cRes.json();
                document.getElementById('title').innerText = cData.title;
                document.getElementById('artist').innerText = cData.artist;

                // Verlauf
                const hRes = await fetch(`https://api.laut.fm/station/${currentStation}/last_songs`);
                const hData = await hRes.json();
                const container = document.getElementById('historyContainer');
                container.innerHTML = "";

                // Wir überspringen das erste Lied (da es aktuell läuft)
                hData.slice(1, 7).forEach(song => {
                    const time = new Date(song.started_at);
                    const timeStr = time.getHours().toString().padStart(2, '0') + ":" + time.getMinutes().toString().padStart(2, '0');
                    
                    container.innerHTML += `
                        <div class="song-row">
                            <div class="song-time">${timeStr}</div>
                            <div class="song-info">
                                <strong>${song.title}</strong>
                                <span>${song.artist}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.log("Fehler beim Abrufen der Daten.");
            }
        }
    </script>
</body>
</html>
