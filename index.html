<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro App v33.0 - Compact</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --accent: #00d2ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(20, 20, 20, 0.97);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 0; 
            display: flex; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        .app-shell {
            width: 100%;
            max-width: 420px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 15px 15px 5px 15px;
            z-index: 100;
        }
        .search-bar {
            display: flex;
            background: var(--surface);
            border-radius: 12px;
            padding: 10px 15px;
            align-items: center;
            border: 1px solid #252525;
        }
        #sIn {
            background: transparent;
            border: none;
            color: #fff;
            flex: 1;
            outline: none;
            font-size: 15px;
        }
        .uhr {
            text-align: center;
            font-size: 11px;
            color: var(--accent);
            margin-top: 8px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 240px 15px;
        }

        /* KOMPAKTER HERO BEREICH */
        .hero-card {
            background: var(--surface);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            margin: 10px 0 20px 0;
            border: 1px solid #222;
        }
        #mainImg {
            width: 140px; /* Deutlich kleiner gemacht */
            height: 140px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            margin-bottom: 12px;
            background: #111;
        }
        #stName { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
        #hoerer { font-size: 11px; color: var(--accent); font-weight: bold; }

        /* Aktueller Song Card */
        .now-playing-card {
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        .time-tag {
            background: var(--accent);
            color: #000;
            font-size: 9px;
            font-weight: 900;
            padding: 3px 6px;
            border-radius: 4px;
        }
        #curT { font-size: 14px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .section-title { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; padding-left: 5px; font-weight: bold; text-transform: uppercase; }
        
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .h-item {
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .h-time { color: var(--accent); font-size: 11px; font-family: monospace; font-weight: bold; width: 45px; }
        .h-info { font-size: 12px; overflow: hidden; }
        .h-info b { display: block; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .h-info span { color: var(--text-dim); }

        /* Player Bedienung */
        .player-dock {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid #333;
            padding: 15px 20px 30px 20px;
            border-radius: 25px 25px 0 0;
        }
        .ticker-row { overflow: hidden; margin-bottom: 15px; background: #000; padding: 5px; border-radius: 5px; }
        #ticker { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 11px; animation: moveTicker 12s linear infinite; }
        @keyframes moveTicker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .main-controls { display: flex; align-items: center; gap: 15px; }
        .pBtn {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: none;
            background: #fff;
            color: #000;
            font-size: 25px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .pBtn.active { background: var(--accent); }
        .vol-slider-wrap { flex: 1; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .status-pill { font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 8px; }
    </style>
</head>
<body onload="initApp()">

<div class="app-shell">
    <header>
        <div class="search-bar">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') sync()">
            <span onclick="sync()" style="cursor:pointer;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="main-scroll">
        <div class="hero-card">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="stName">RADIO READY</div>
            <div id="hoerer">BITTE SENDER SUCHEN</div>
        </div>

        <div class="section-title">Aktueller Titel</div>
        <div class="now-playing-card">
            <div class="time-tag">JETZT</div>
            <div id="curT">Kein Stream aktiv</div>
        </div>

        <div class="section-title">Verlauf</div>
        <div id="hList" class="history-list"></div>
    </div>

    <div class="player-dock">
        <div class="ticker-row"><div id="ticker">BEREIT FÜR MUSIK...</div></div>
        <div class="main-controls">
            <button id="pBtn" class="pBtn" onclick="togglePlay()">▶</button>
            <div class="vol-slider-wrap">
                <input type="range" id="vControl" min="0" max="1" step="0.01" value="0.8">
                <div id="status" class="status-pill">Warte auf Eingabe</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let slug = "";
    let timer = null;
    const btn = document.getElementById('pBtn');
    const status = document.getElementById('status');

    function initApp() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vControl').oninput = (e) => { if(audio) audio.volume = e.target.value; };
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        if(audio) { audio.pause(); audio = null; }
        btn.innerHTML = "▶";
        btn.classList.remove('active');
        await loadData();
        if(timer) clearInterval(timer);
        timer = setInterval(loadData, 15000);
    }

    function togglePlay() {
        if(!slug) return;
        if(!audio || audio.paused) {
            audio = new Audio(`https://stream.laut.fm/${slug}?t=${Date.now()}`);
            audio.crossOrigin = "anonymous";
            audio.volume = document.getElementById('vControl').value;
            audio.play().then(() => {
                btn.innerHTML = "⏸";
                btn.classList.add('active');
                status.innerText = "LIVE STREAM";
            }).catch(() => {
                status.innerText = "BLOCKIERT - ERNEUT KLICKEN";
            });
        } else {
            audio.pause(); audio = null;
            btn.innerHTML = "▶";
            btn.classList.remove('active');
            status.innerText = "STOPP";
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const [rS, rL, rH] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = rS.display_name;
            document.getElementById('mainImg').src = rS.images.station_640x640;
            document.getElementById('hoerer').innerText = rH + " HÖRER ONLINE";
            const cur = rL[0];
            document.getElementById('curT').innerText = cur.artist.name + " - " + cur.title;
            document.getElementById('ticker').innerText = `+++ JETZT: ${cur.artist.name} - ${cur.title} +++ ALBUM: ${cur.album || 'Single'} +++`;
            let hHtml = "";
            rL.slice(1, 10).forEach(s => {
                const zeit = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                hHtml += `<div class="h-item"><div class="h-time">${zeit}</div><div class="h-info"><b>${s.artist.name}</b><span>${s.title}</span></div></div>`;
            });
            document.getElementById('hList').innerHTML = hHtml;
        } catch(e) { status.innerText = "FEHLER"; }
    }
</script>
</body>
</html>
