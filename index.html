<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Live Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; }
        .nav { background: #fff; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
        .search-wrapper { display: flex; gap: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 250px; }
        .btn-main { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 30px; max-width: 1200px; margin: auto; }
        
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .logo { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        
        .song-info { background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; border-left: 4px solid #00a67c; }
        
        .actions { display: flex; gap: 10px; }
        .btn-play { flex: 2; background: #00a67c; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-link { flex: 1; background: #6c757d; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; text-decoration: none; text-align: center; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="nav">
    <div style="font-size: 1.4rem; font-weight: bold;">Radio Hub</div>
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Sender-Slug (z.B. niklas-fm)">
        <button class="btn-main" onclick="addStation()">Hinzufügen</button>
    </div>
</nav>

<div class="grid" id="grid"></div>

<footer style="text-align:center; padding:20px; color:#999;">Partner: <b>laut.fm</b></footer>

<audio id="player"></audio>

<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    const player = document.getElementById('player');

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        stations.forEach(s => {
            grid.innerHTML += `
                <div class="card">
                    <div class="card-top">
                        <img id="img-${s}" src="https://api.laut.fm/favicon.ico" class="logo">
                        <div>
                            <div style="font-weight:bold; text-transform:uppercase;">${s}</div>
                            <div style="font-size:0.8rem; color:#666;">Hörer: <span id="list-${s}">0</span></div>
                        </div>
                    </div>
                    <div class="song-info">
                        <div id="art-${s}" style="font-weight:bold;">Lade...</div>
                        <div id="tit-${s}">...</div>
                    </div>
                    <div class="actions">
                        <button class="btn-play" onclick="toggle('${s}')" id="btn-${s}">Starten</button>
                        <a href="https://laut.fm/${s}" target="_blank" class="btn-link">Zu Laut.fm</a>
                    </div>
                </div>
            `;
            updateData(s);
        });
    }

    async function updateData(s) {
        fetch(`https://api.laut.fm/station/${s}`).then(r => r.json()).then(d => {
            if(d.images) document.getElementById(`img-${s}`).src = d.images.station_120x120;
        });
        fetch(`https://api.laut.fm/station/${s}/listeners`).then(r => r.text()).then(t => document.getElementById(`list-${s}`).innerText = t);
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
            document.getElementById(`tit-${s}`).innerText = d.title || "-";
        });
    }

    function addStation() {
        const val = document.getElementById('searchInput').value.toLowerCase().trim();
        if(val && !stations.includes(val)) {
            stations.push(val);
            localStorage.setItem('my_stations', JSON.stringify(stations));
            render();
        }
    }

    function toggle(s) {
        const btn = document.getElementById(`btn-${s}`);
        if(!player.paused && player.src.includes(s)) {
            player.pause();
            btn.innerText = "Starten";
        } else {
            player.src = `https://stream.laut.fm/${s}`;
            player.play();
            btn.innerText = "Stoppen";
        }
    }

    window.onload = render;
    setInterval(() => stations.forEach(updateData), 15000);
</script>
</body>
</html>
