<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App v84.5</title>
    <style>
        :root { 
            --bg-global: #0b0e14; --bg-card: #161b22; --accent: #00d2ff; 
            --highlight: #00f2c3; --ad-color: #ffcc00; --news-color: #ffffff; --live-color: #ff00ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-global); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background-color: var(--bg-global); }
        
        header { padding: 30px 20px 10px; text-align: center; }
        .uhr { font-family: monospace; font-size: 14px; color: var(--accent); margin-bottom: 15px; letter-spacing: 2px; }
        
        .search-container { padding: 0 20px 20px; }
        .search-area { background: rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; padding: 12px 15px; border: 1px solid #30363d; cursor: pointer; }
        .search-area input { background: transparent; border: none; color: #fff; width: 100%; font-size: 15px; outline: none; margin-left: 10px; }
        .lupe { font-size: 18px; color: #8b949e; }

        .scroll-content { flex: 1; overflow-y: auto; padding: 10px 20px 120px; scrollbar-width: none; }
        .scroll-content::-webkit-scrollbar { display: none; }

        .main-card { background: var(--bg-card); border-radius: 24px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px; border: 1px solid #30363d; }
        #mainImg { width: 220px; height: 220px; border-radius: 20px; object-fit: cover; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        #stNameDisplay { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        #hoerer { font-size: 13px; color: var(--highlight); font-weight: bold; }

        .current-track { margin-top: 25px; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        #currentSongArea .artist { font-size: 19px; font-weight: 800; display: block; color: var(--accent); }
        #currentSongArea .title { font-size: 16px; color: #8b949e; margin-top: 6px; display: block; }

        .history-list { margin-top: 10px; }
        .song-entry { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #21262d; }
        .time-cell { font-size: 12px; color: #484f58; min-width: 55px; font-family: monospace; }
        .song-info { flex: 1; margin-left: 10px; }
        .song-info .artist { font-size: 14px; font-weight: 600; display: block; color: #c9d1d9; }
        .song-info .title { font-size: 13px; color: #8b949e; }

        .controls { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: rgba(11, 14, 20, 0.98); border-top: 1px solid #30363d; padding: 20px 25px 35px; }
        .play-row { display: flex; align-items: center; gap: 20px; }
        #pBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .vol-container { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: default; }
        .vol-label { font-size: 11px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; }

        .is-ad { color: var(--ad-color) !important; }
        .is-news { color: var(--news-color) !important; }
        .is-live { color: var(--live-color) !important; }
    </style>
</head>
<body>
<div class="app">
    <header><div id="uhr" class="uhr">00:00:00</div></header>
    
    <div class="search-container">
        <div class="search-area" onclick="document.getElementById('sIn').focus()">
            <span class="lupe">🔍</span>
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') startManualSearch()">
        </div>
    </div>

    <div class="scroll-content">
        <div class="main-card">
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div id="stNameDisplay">BEREIT</div>
            <div id="hoerer">0 Hörer online</div>
            
            <div class="current-track" id="currentSongArea">
                <span class="artist">Warten auf Eingabe</span>
                <span class="title">Tippe einen Sendernamen ein</span>
            </div>
        </div>
        <div id="songHistory" class="history-list"></div>
    </div>

    <div class="controls">
        <div class="play-row">
            <button id="pBtn" onclick="toggle()">▶</button>
            <div class="vol-container">
                <div class="vol-label">Volume 80%</div>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" disabled>
            </div>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    au.volume = 0.8;
    let currentSlug = "", updateTimer = null, lastHash = "";
    
    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    async function startManualSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play().then(() => { document.getElementById('pBtn').innerHTML = "⏸"; });
        lastHash = "";
        updateUI(); 
        if(updateTimer) clearInterval(updateTimer);
        updateTimer = setInterval(updateUI, 4000); 
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            const cur = l[0];
            const art = (cur.artist.name || "").toLowerCase();
            const tit = (cur.title || "").toLowerCase();
            const currentHash = art + tit + h;
            if (currentHash === lastHash) return;
            lastHash = currentHash;

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " Hörer online";

            const startTime = new Date(cur.started_at.replace(' ', 'T')).getTime();
            const hasEnded = (new Date().getTime() - startTime) > ((cur.length || 0) * 1000 + 2000);

            const isReklame = art.includes("reklame") || tit.includes("reklame") || art.includes("audio") || tit.includes("spot") || art.includes("werbung");
            const isNews = !isReklame && (art.includes("nachrichten") || tit.includes("news") || tit.includes("zeitfunk") || art.includes("wetter"));
            const isLive = !isReklame && !isNews && (art.includes("moderation") || art.includes("live") || art.includes("beratung") || tit.includes("beratung"));
            const isAd = !isReklame && !isNews && !isLive && (cur.type === "ad" || hasEnded);

            let aD = cur.artist.name, tD = cur.title, cls = "";
            if (isReklame || isAd) { aD = "REKLAME"; tD = "Gleich geht es weiter..."; cls = "is-ad"; }
            else if (isNews) { aD = "NACHRICHTEN"; tD = "Aktuelle Informationen"; cls = "is-news"; }
            else if (isLive) { aD = art.includes("beratung") ? "BERATUNG" : "MODERATION"; tD = "Live am Mikrofon"; cls = "is-live"; }

            document.getElementById('currentSongArea').innerHTML = `<span class="artist ${cls}">${aD}</span><span class="title">${tD}</span>`;
            
            let hist = "";
            l.slice(1, 7).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                hist += `<div class="song-entry"><div class="time-cell">${time}</div><div class="song-info"><span class="artist">${song.artist.name}</span><span class="title">${song.title}</span></div></div>`;
            });
            document.getElementById('songHistory').innerHTML = hist;
        } catch(e) {}
    }
</script>
</body>
</html>
