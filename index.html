<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Master v7.5</title>
    <style>
        :root { --primary: #00ffaa; --bg: #0a0a0a; --card: #161618; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; }
        .app-shell { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; }

        /* SUCHE */
        .search-area { padding: 25px 20px; position: sticky; top: 0; background: var(--bg); z-index: 2000; }
        .search-container { display: flex; background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        #q { flex: 1; padding: 15px; border: none; background: transparent; color: white; font-size: 16px; outline: none; }
        .s-btn { background: var(--primary); border: none; padding: 0 20px; cursor: pointer; color: #000; font-weight: bold; }

        /* ERGEBNISSE */
        #res {
            position: absolute; top: 85px; left: 20px; right: 20px;
            background: #1c1c1e; border-radius: 12px; max-height: 60vh;
            overflow-y: auto; display: none; border: 1px solid var(--primary); z-index: 3000;
        }
        .item { padding: 12px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .item img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: #000; }
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; margin-top: 4px; display: inline-block; font-weight: bold; }
        .b-laut { background: #ffaa00; color: #000; }
        .b-world { background: #0088ff; color: #fff; }

        /* PLAYER */
        .player { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .top-info { width: 100%; display: flex; justify-content: space-between; font-family: monospace; color: var(--primary); margin-bottom: 20px; }
        #st-name { font-size: 24px; font-weight: bold; margin: 0 0 15px 0; }
        #main-img { width: 100%; max-width: 300px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 40px #000; margin-bottom: 20px; border: 1px solid #333; }
        #t-track { font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 5px; }
        #t-artist { font-size: 15px; color: #888; margin-bottom: 25px; }
        .p-btn { width: 75px; height: 75px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .p-btn svg { width: 30px; height: 30px; fill: #000; }

        /* PLAYLIST */
        .history { width: 100%; margin-top: 30px; text-align: left; }
        .h-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #111; border-radius: 10px; margin-bottom: 8px; }
        .h-item img { width: 35px; height: 35px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="search-area">
        <div class="search-container">
            <input type="text" id="q" placeholder="Sender suchen (WDR 2, laut.fm...)" autocomplete="off">
            <button class="s-btn" id="go">LOS</button>
        </div>
        <div id="res"></div>
    </div>

    <div class="player">
        <div class="top-info"><div id="clk">00:00:00</div><div id="lis">● STANDBY</div></div>
        <h1 id="st-name">Radio Station</h1>
        <img id="main-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <div id="t-track">Bereit</div>
        <div id="t-artist">Wähle einen Sender</div>
        <button class="p-btn" id="play">
            <svg id="svg-p" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="svg-s" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="history" id="hist"></div>
    </div>
</div>

<audio id="core" playsinline crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('core');
    const playBtn = document.getElementById('play');
    const input = document.getElementById('q');
    const resBox = document.getElementById('res');
    let curId = null; let curType = "";

    async function search() {
        const val = input.value.trim();
        if(val.length < 2) return;
        resBox.innerHTML = "<div style='padding:20px;text-align:center;'>Suche...</div>";
        resBox.style.display = "block";

        try {
            // Holt Daten von beiden Quellen
            const [rL, rW] = await Promise.all([
                fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`),
                fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(val)}`)
            ]);
            const [dL, dW] = await Promise.all([rL.json(), rW.json()]);
            resBox.innerHTML = "";

            // laut.fm Ergebnisse
            if(dL.items) dL.items.forEach(s => addRes(s.display_name, s.images.station_80x80, s.name, 'b-laut', 'LAUT.FM'));
            // Weltweite Ergebnisse (WDR etc.)
            if(dW) dW.slice(0, 15).forEach(s => addRes(s.name, s.favicon, s.url, 'b-world', 'WORLD'));
        } catch(e) { resBox.innerHTML = "<div style='padding:15px;'>Fehler bei der Suche</div>"; }
    }

    function addRes(name, img, url, cls, txt) {
        const d = document.createElement('div');
        d.className = "item";
        d.onclick = () => launch(name, img, url, txt);
        const icon = img || 'https://via.placeholder.com/40/222/fff?text=R';
        d.innerHTML = `<img src="${icon}"> <div><b>${name}</b><br><span class="badge ${cls}">${txt}</span></div>`;
        resBox.appendChild(d);
    }

    function launch(name, img, url, type) {
        curId = url; curType = type;
        resBox.style.display = "none"; input.value = "";
        audio.pause();
        audio.src = type === 'LAUT.FM' ? `https://stream.laut.fm/${url}` : url;
        audio.play().catch(() => {});

        document.getElementById('st-name').innerText = name;
        document.getElementById('main-img').src = img || 'https://via.placeholder.com/300/111/fff?text=RADIO';
        document.getElementById('svg-p').style.display = "none";
        document.getElementById('svg-s').style.display = "block";
        document.getElementById('lis').innerText = "● LIVE";

        if(type === 'LAUT.FM') updateLaut(url);
        else {
            document.getElementById('t-track').innerText = "Live Stream";
            document.getElementById('t-artist').innerText = name;
            document.getElementById('hist').innerHTML = "";
        }
    }

    async function updateLaut(slug) {
        try {
            const r = await fetch(`https://api.laut.fm/station/${slug}/last_songs`);
            const d = await r.json();
            const sInfo = await fetch(`https://api.laut.fm/station/${slug}`).then(res => res.json());
            
            document.getElementById('lis').innerText = `● ${sInfo.current_listeners || 0} HÖRER`;
            
            if(d.length > 0) {
                document.getElementById('t-track').innerText = d[0].title;
                document.getElementById('t-artist').innerText = d[0].artist.name;
                document.getElementById('main-img').src = d[0].image_640x640 || sInfo.images.station_640x640;
                let h = "";
                d.slice(1, 4).forEach(s => {
                    h += `<div class="h-item"><img src="${s.image_120x120 || sInfo.images.station_80x80}"><div><b>${s.title}</b><br><small>${s.artist.name}</small></div></div>`;
                });
                document.getElementById('hist').innerHTML = h;
            }
        } catch(e) {}
    }

    input.onkeypress = (e) => { if(e.key === 'Enter') search(); };
    document.getElementById('go').onclick = search;
    playBtn.onclick = () => {
        if(!curId) return;
        if(audio.paused) { audio.play(); document.getElementById('svg-p').style.display = "none"; document.getElementById('svg-s').style.display = "block"; }
        else { audio.pause(); document.getElementById('svg-p').style.display = "block"; document.getElementById('svg-s').style.display = "none"; }
    };

    setInterval(() => { document.getElementById('clk').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(() => { if(curType === 'LAUT.FM') updateLaut(curId); }, 30000);
    document.addEventListener('click', (e) => { if(!resBox.contains(e.target) && e.target !== input) resBox.style.display = "none"; });
</script>
</body>
</html>
