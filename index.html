<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v115.05 - laut.fm Style</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #949fb1;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        
        .app { width: 100%; max-width: 800px; height: 100vh; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        
        /* Header */
        .top-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; }
        #sysTime { font-size: 14px; font-weight: bold; }
        .icon-btn-large { font-size: 24px; color: var(--accent-main); cursor: pointer; }
        
        /* Suche */
        #searchOverlay { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; height: 50px; background: var(--bg-card); z-index: 100; align-items: center; padding: 0 15px; border-radius: 25px; border: 2px solid var(--accent-main); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }

        .main-content { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .main-content::-webkit-scrollbar { display: none; }
        
        .hero { padding: 10px 0; text-align: center; }
        #stNameHeader { font-size: 26px; font-weight: 900; color: #fff; text-transform: uppercase; margin: 0; }
        #stPageTitle { font-size: 13px; color: var(--accent-main); margin-bottom: 10px; display: block; font-weight: bold; }
        #mainImg { width: 160px; height: 160px; border-radius: 20px; object-fit: cover; background: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        #pBtn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 24px; color: #1e2538; cursor: pointer; }
        
        /* Song Liste Header */
        .list-header { font-size: 22px; font-weight: 900; color: #ffffff; margin: 15px 15px 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        #nowPlayingBox { margin: 0 12px; }
        
        /* Song Eintrag Layout */
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.05); }
        .track-entry.current { border-left: 5px solid var(--accent-main); background: rgba(255,255,255,0.1); }
        
        /* Links: Icon / Lautsprecher */
        .left-meta { width: 40px; text-align: center; flex-shrink: 0; font-size: 20px; }
        .track-time { font-size: 10px; color: var(--accent-main); font-weight: bold; }

        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 15px; font-weight: bold; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-tit { font-size: 13px; color: #949fb1; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Rechts: Cover */
        .track-cover { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; background: #111; flex-shrink: 0; }
        
        .more-songs-area { text-align: center; padding: 10px 0; }
        #btnToggleList { background: transparent; border: 1px solid var(--accent-main); color: var(--accent-main); padding: 8px 18px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: none; }

        /* Footer - Fix für Smartphone Navigation */
        .fixed-footer { 
            padding: 15px 15px calc(20px + env(safe-area-inset-bottom)); 
            background: #111622; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            flex-shrink: 0; 
        }
        .footer-row { display: flex; justify-content: center; margin-bottom: 12px; }
        .hoerer-badge { background: #00fad9; color: #1e2538; padding: 6px 20px; border-radius: 25px; font-size: 16px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        #footerDesc { 
            font-size: 14px; line-height: 1.5; text-align: center; color: #ffffff; 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;
            max-height: 80px; overflow-y: auto; 
        }
        .version-tag { text-align: center; font-size: 10px; color: var(--text-dim); margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onload="initApp()">
<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="icon-btn-large" onclick="toggleSearch()">🔍</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff; font-size: 20px;">✕</button>
    </div>

    <div class="main-content">
        <div class="hero">
            <h1 id="stNameHeader">RADIO PLAYER</h1>
            <span id="stPageTitle">Bereit zum Start</span>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <div style="font-size: 22px; color: var(--accent-main); cursor:pointer" onclick="share()">🔗</div>
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div style="width:22px"></div>
            </div>
        </div>

        <div class="list-header">WAS JETZT LÄUFT</div>
        <div id="nowPlayingBox">
            <div id="trackList" style="text-align:center; padding: 20px; opacity:0.5;">Suche einen Sender...</div>
        </div>

        <div class="more-songs-area">
            <button id="btnToggleList" onclick="toggleListSize()">MEHR SONGS ANZEIGEN</button>
        </div>
    </div>

    <div class="fixed-footer">
        <div class="footer-row">
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
        <div id="footerDesc">Wähle einen laut.fm Sender über die Suche aus.</div>
        <div class="version-tag">Version v115.05 • laut.fm Edition</div>
    </div>
</div>

<script>
    const au = new Audio(); 
    let currentSlug = ""; 
    let showFullList = false;

    function initApp() { 
        setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000); 
    }

    function toggleListSize() { 
        showFullList = !showFullList; 
        document.getElementById('btnToggleList').innerText = showFullList ? "WENIGER ANZEIGEN" : "MEHR SONGS ANZEIGEN";
        updateUI(); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; 
    }
    
    function execSearch() { 
        const input = document.getElementById('sInput'); 
        if(input.value.trim()) { startStation(input.value.trim(), true); toggleSearch(); } 
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnToggleList').style.display = 'inline-block';
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 10000);
    }

    function togglePlay() { 
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json())
            ]);
            
            const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/listeners`);
            const hText = await hRes.text();
            const hCount = hText.includes("<") ? "0" : hText;

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('stPageTitle').innerText = s.page_title || "";
            document.getElementById('footerDesc').innerText = s.description || "Keine Beschreibung verfügbar.";
            document.getElementById('hoerer').innerText = hCount + " HÖRER";
            document.getElementById('mainImg').src = s.images.station_640x640;

            let html = "";
            const listLimit = showFullList ? 9 : 3;

            l.forEach((song, i) => {
                if(i >= listLimit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();
                
                let img = song.image_640x640 || (song.artist && song.artist.image) || s.images.station_120x120;
                let leftIcon = isCurrent ? "🔊" : "";
                
                if(check.includes("reklame") || check.includes("werbung")) {
                    leftIcon = "📢"; art = "WERBUNG";
                } else if(check.includes("news") || check.includes("nachrichten")) {
                    leftIcon = "📰"; art = "NACHRICHTEN";
                } else if(check.includes("moderation") || check.includes("live") || check.includes("spricht")) {
                    leftIcon = "🎙️"; art = "MODERATION";
                }

                html += `<div class="track-entry ${isCurrent ? 'current' : ''}">
                    <div class="left-meta">
                        ${leftIcon ? leftIcon : `<div class="track-time">${new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div>`}
                    </div>
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <img class="track-cover" src="${img}">
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
    function share() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
