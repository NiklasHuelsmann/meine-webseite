<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v112.00 - Final Master</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #949fb1;
            --status-yellow: #ffb300; --status-blue: #00aaff; --status-pink: #ff00ff; 
        }
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 800px; height: 100%; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        
        /* Header Bereich */
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #sysTime { font-size: 16px; font-weight: bold; }
        .icon-btn-large { font-size: 28px; color: var(--accent-main); cursor: pointer; }
        
        /* Suchfeld Overlay */
        #searchOverlay { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 50px; background: var(--bg-card); z-index: 100; align-items: center; padding: 0 15px; border-radius: 25px; border: 2px solid var(--accent-main); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 18px; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .scroll-area::-webkit-scrollbar { display: none; }
        
        /* Sender Logo & Info */
        .hero { padding: 10px 0; text-align: center; }
        #stNameHeader { font-size: clamp(20px, 5vw, 28px); font-weight: 900; margin-bottom: 5px; display: block; color: #fff; text-transform: uppercase; }
        #stPageTitle { font-size: 14px; color: var(--accent-main); margin-bottom: 12px; display: block; font-weight: bold; }
        #mainImg { width: 55%; max-width: 300px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; background: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.05); }
        
        /* Play Button */
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 15px 0; }
        #pBtn { width: 70px; height: 70px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 30px; color: #1e2538; cursor: pointer; }
        
        /* Song Liste Design */
        #nowPlayingBox { margin: 0 15px 5px; padding: 12px; border-radius: 15px; background: var(--bg-card); transition: all 0.5s ease; border-left: 6px solid transparent; }
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 10px; margin-bottom: 8px; background: rgba(0,0,0,0.2); }
        .icon-box { width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .track-cover { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: #111; flex-shrink: 0; }
        
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 14px; font-weight: bold; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-tit { font-size: 12px; color: #bbb; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .track-status { display: flex; flex-direction: column; align-items: flex-end; min-width: 55px; }
        .track-time { font-size: 10px; color: var(--accent-main); font-weight: bold; }
        .speaker-icon { font-size: 18px; color: var(--accent-main); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .more-songs-area { text-align: center; padding: 10px 0; }
        #btnToggleList { background: rgba(255,255,255,0.1); border: 1px solid var(--accent-main); color: var(--accent-main); padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; display: none; }

        /* Footer: Hörer & Lautstärke */
        .footer-info { padding: 15px 20px; background: rgba(0,0,0,0.6); border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .footer-row { display: flex; justify-content: center; margin-bottom: 8px; }
        .hoerer-badge { background: var(--accent-main); color: #1e2538; padding: 6px 15px; border-radius: 8px; font-size: 18px; font-weight: 900; }
        #footerDesc { font-size: 12px; text-align: center; margin-bottom: 12px; color: #ccc; max-height: 34px; overflow: hidden; }
        
        .vol-area { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 20px; max-width: 400px; margin: 0 auto; }
        #volSlider { flex: 1; height: 4px; accent-color: var(--accent-main); cursor: pointer; }
        #volLabel { color: var(--accent-main); font-size: 14px; font-weight: bold; min-width: 35px; text-align: right; }
    </style>
</head>
<body onload="initApp()">
<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="icon-btn-large" onclick="toggleSearch()">🔍</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff; font-size: 20px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameHeader">RADIO PLAYER</span>
            <span id="stPageTitle">Suche einen Sender</span>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <div style="font-size: 24px; color: var(--accent-main); cursor:pointer" onclick="share()">🔗</div>
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div style="width:24px"></div>
            </div>
        </div>

        <div id="nowPlayingBox">
            <div id="trackList" style="text-align:center; padding: 10px; opacity:0.6;">Klicke auf die Lupe 🔍</div>
        </div>

        <div class="more-songs-area">
            <button id="btnToggleList" onclick="toggleListSize()">mehr Songs anzeigen</button>
        </div>
    </div>

    <div class="footer-info">
        <div class="footer-row">
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
        <div id="footerDesc">Kein Sender gewählt.</div>
        
        <div class="vol-area">
            <span style="font-size:10px; font-weight:bold; color:var(--text-dim)">VOL</span>
            <input type="range" id="volSlider" min="0" max="100" step="1" value="50" oninput="changeVol(this.value)">
            <span id="volLabel">50%</span>
        </div>
    </div>
</div>

<script>
    const au = new Audio(); au.volume = 0.5;
    let currentSlug = ""; 
    let showFullList = false;

    function initApp() { 
        setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000); 
    }

    function changeVol(v) { au.volume = v / 100; document.getElementById('volLabel').innerText = v + "%"; }
    
    function toggleListSize() { 
        showFullList = !showFullList; 
        document.getElementById('btnToggleList').innerText = showFullList ? "weniger anzeigen" : "mehr Songs anzeigen";
        updateUI(); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; 
        if(s.style.display==='flex') {
            const input = document.getElementById('sInput');
            input.value = ""; 
            input.focus();
        }
    }
    
    function execSearch() { 
        const input = document.getElementById('sInput'); 
        const val = input.value.trim();
        if(val) { 
            startStation(val, true); 
            input.value = ""; 
            toggleSearch(); 
        } 
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnToggleList').style.display = 'inline-block';
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { 
        if(!currentSlug) { toggleSearch(); return; }
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('stPageTitle').innerText = s.page_title || "";
            document.getElementById('footerDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('mainImg').src = s.images.station_640x640;

            let html = "";
            let currentStatusColor = "var(--bg-card)";
            let statusBorder = "transparent";
            const listLimit = showFullList ? 9 : 3;

            l.forEach((song, i) => {
                if(i >= listLimit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();
                
                // Smart Cover Logik
                let imageToDisplay = song.image_640x640 || (song.artist && song.artist.image) || s.images.station_120x120;
                let mediaElement = `<img class="track-cover" src="${imageToDisplay}">`;

                if(check.includes("reklame") || check.includes("werbung") || song.type === "gold" || tit.includes("ad_break")) {
                    mediaElement = `<div class="icon-box" style="background:var(--status-yellow)">📢</div>`;
                    if(isCurrent) { art = "REKLAME"; tit = "Gleich geht's weiter..."; currentStatusColor = "var(--status-yellow)"; statusBorder = "#ffb300"; }
                } else if(check.includes("news") || check.includes("nachrichten")) {
                    mediaElement = `<div class="icon-box" style="background:var(--status-blue)">📰</div>`;
                    if(isCurrent) { art = "NACHRICHTEN"; tit = "Aktuelle Infos..."; currentStatusColor = "var(--status-blue)"; statusBorder = "#00aaff"; }
                } else if(check.includes("moderation") || check.includes("talk") || check.includes("live") || check.includes("beratung")) {
                    mediaElement = `<div class="icon-box" style="background:var(--status-pink)">🎙️</div>`;
                    if(isCurrent) { art = "MODERATION"; tit = "Es wird gesprochen..."; currentStatusColor = "var(--status-pink)"; statusBorder = "#ff00ff"; }
                }

                if(isCurrent) {
                    document.getElementById('nowPlayingBox').style.backgroundColor = currentStatusColor;
                    document.getElementById('nowPlayingBox').style.borderLeftColor = statusBorder;
                }

                html += `<div class="track-entry">
                    ${mediaElement}
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <div class="track-status">
                        <div class="track-time">${isCurrent ? 'JETZT' : new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div>
                        ${isCurrent ? '<div class="speaker-icon">🔊</div>' : ''}
                    </div>
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
    function share() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
