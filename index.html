<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Engine v2.05</title>
    <style>
        :root { 
            --main-bg: #0f172a; 
            --panel-bg: #1e293b;
            --accent: #00fbff; 
            --text-main: #f8fafc;
            --border: #334155;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; background: var(--main-bg); 
            color: var(--text-main); min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Das große, schöne Login-Viereck */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--panel-bg); padding: 40px; border-radius: 20px;
            border: 2px solid var(--accent); width: 90%; max-width: 440px; text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
        }

        #mainContent { display: none; }

        header { 
            padding: 12px 20px; background: #1e293b; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--accent); 
            position: sticky; top: 0; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-right { font-weight: 800; color: var(--accent); font-size: 14px; text-transform: uppercase; }
        #headerStImage { width: 32px; height: 32px; border-radius: 6px; display: none; border: 1px solid var(--accent); object-fit: cover; }

        .app-container { width: 92%; max-width: 1200px; margin: 0 auto; padding: 20px 0; }

        .search-container { margin-bottom: 20px; display: flex; gap: 10px; }
        #sIn { 
            flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--border); 
            background: #0f172a; color: white; font-weight: bold; font-size: 16px; outline: none;
        }

        .content-grid { display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px; }
        @media (max-width: 1000px) { .content-grid { grid-template-columns: 1fr; } }

        .panel { 
            background: var(--panel-bg); border-radius: 20px; padding: 25px; 
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid var(--border);
        }

        .now-playing-box { 
            width: 100%; background: var(--accent); border-radius: 12px; 
            padding: 15px; text-align: center; margin: 20px 0; color: #000;
            box-sizing: border-box;
        }
        #trackDisplay { font-size: 18px; font-weight: 900; }

        .play-btn { 
            width: 80px; height: 80px; border-radius: 50%; background: #fff; 
            border: none; cursor: pointer; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 0 25px var(--accent);
        }

        /* Mittige Eingabefelder */
        input[type="email"], input[type="password"] { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid var(--border); background: #0f172a; color: #fff; 
            font-size: 16px; box-sizing: border-box; outline: none;
        }
        
        .login-btn { 
            background: var(--accent); color: #000; border: none; padding: 16px; 
            width: 100%; font-weight: 900; border-radius: 12px; cursor: pointer; 
            text-transform: uppercase; margin-top: 15px;
        }

        #mainClock { font-size: 36px; font-weight: 900; color: var(--accent); font-family: monospace; margin-bottom: 5px; }
        #stLogo { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; border: 2px solid var(--border); background: #000; }
        
        .info-box { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; 
            margin-top: 25px; text-align: left; font-size: 12px; line-height: 1.5; 
            border-left: 3px solid var(--accent); color: #cbd5e0;
        }
    </style>
</head>
<body onload="init()">

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color:var(--accent); margin:0; font-size: 26px;">RADIO ENGINE</h1>
        <p style="font-size: 12px; opacity: 0.7; margin-bottom: 25px;">STABLE BUILD v2.05</p>
        
        <input type="email" id="userEmail" placeholder="E-Mail Adresse">
        <input type="password" id="userPass" placeholder="Passwort">
        
        <button class="login-btn" onclick="validateLogin()">STARTEN</button>
        
        <div class="info-box">
            <b style="color:white;">HILFE & INFO:</b><br>
            Hier kannst du alle laut.fm Sender suchen. Einfach E-Mail und Passwort eingeben und auf Starten drücken.
        </div>
    </div>
</div>

<div id="mainContent">
    <header>
        <div class="header-left">
            <img id="headerStImage" src="">
            <span style="font-weight:900; font-size: 16px;">v2.05</span>
        </div>
        <div class="header-right">NIKLAS STABLE</div>
    </header>

    <div class="app-container">
        <div class="search-container">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') changeSt(this.value)">
            <button onclick="changeSt(document.getElementById('sIn').value)" style="background:var(--accent); border:none; border-radius:12px; padding:0 20px; cursor:pointer;">🔍</button>
        </div>

        <div class="content-grid">
            <div class="panel">
                <div id="mainClock">00:00:00</div>
                <div style="font-size:10px; opacity:0.6; letter-spacing: 2px; font-weight: 800; margin-bottom: 10px;">AKTUELL HÖRER</div>
                <div id="listenerCount" style="font-size:28px; font-weight:bold; color:var(--accent);">0</div>
                <input type="range" style="width:100%; margin-top:25px; accent-color:var(--accent);" min="0" max="1" step="0.01" value="0.9" oninput="setV(this.value)">
            </div>

            <div class="panel">
                <img id="stLogo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
                <h2 id="stName" style="margin:15px 0 5px 0; font-size: 20px; text-transform: uppercase;">BEREIT</h2>
                <div class="now-playing-box">
                    <div id="trackDisplay">WÄHLE EINEN SENDER</div>
                </div>
                <button class="play-btn" onclick="togglePlay()" id="pBtn">
                    <svg width="35" height="35" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>
                </button>
            </div>

            <div class="panel">
                <h3 style="font-size:12px; align-self: flex-start; margin-bottom: 15px; color: var(--accent); font-weight: 800; text-transform: uppercase;">VERLAUF</h3>
                <div id="hist" style="width:100%;"></div>
            </div>
        </div>
        
        <button onclick="location.reload()" style="width:100%; background: #ef4444; border:none; color:white; padding:15px; border-radius:12px; margin-top:30px; font-weight:bold; cursor:pointer;">LOGOUT</button>
    </div>
</div>

<audio id="audio"></audio>

<script>
    const audio = document.getElementById('audio');
    let playing = false;
    let station = "";
    let dataTimer = null;

    function validateLogin() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        if(email.includes('@') && pass.length > 0) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            setInterval(() => {
                document.getElementById('mainClock').innerText = new Date().toLocaleTimeString('de-DE');
            }, 1000);
        } else {
            alert("Bitte E-Mail und Passwort eingeben!");
        }
    }

    function changeSt(v) {
        if(!v) return;
        station = v.toLowerCase().trim().replace(/\s+/g, '-');
        if(dataTimer) clearInterval(dataTimer);
        updateData();
        dataTimer = setInterval(updateData, 10000);
        if(playing) { stop(); start(); }
    }

    function setV(v) { audio.volume = v; }
    function togglePlay() { if(!station) return; playing ? stop() : start(); }

    function start() {
        audio.src = "https://stream.laut.fm/" + station + "?nocache=" + Date.now();
        audio.play().then(() => {
            playing = true;
            document.getElementById('pBtn').innerHTML = '<svg width="35" height="35" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#000"/></svg>';
        });
    }

    function stop() { 
        audio.pause(); audio.src = ""; playing = false; 
        document.getElementById('pBtn').innerHTML = '<svg width="35" height="35" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>'; 
    }

    async function updateData() {
        if(!station) return;
        try {
            const [rStat, rInfo, rHist] = await Promise.all([
                fetch(`https://api.laut.fm/station/${station}/listeners`).then(r => r.text()),
                fetch(`https://api.laut.fm/station/${station}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${station}/last_songs`).then(r => r.json())
            ]);
            document.getElementById('listenerCount').innerText = rStat;
            const imgUrl = rInfo.images.station_120x120;
            document.getElementById('stLogo').src = imgUrl;
            document.getElementById('headerStImage').src = imgUrl;
            document.getElementById('headerStImage').style.display = "block";
            document.getElementById('stName').innerText = rInfo.display_name;
            document.getElementById('trackDisplay').innerText = rHist[0].artist.name + " - " + rHist[0].title;
            let html = "";
            rHist.slice(1, 8).forEach(x => {
                const time = new Date(x.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="song-item"><b>${time}</b><span>${x.artist.name} - ${x.title}</span></div>`;
            });
            document.getElementById('hist').innerHTML = html;
        } catch(e) {}
    }

    function init() { audio.volume = 0.9; }
</script>
</body>
</html>
