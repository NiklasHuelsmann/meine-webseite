<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meine Radio App</title>
    <style>
        :root { 
            --bg: #070b14; 
            --karte: rgba(30, 41, 59, 0.7); 
            --akzent: #00fbff; 
            --text: #f8fafc; 
            --rand: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            margin: 0; background: radial-gradient(circle at top right, #1e293b, #070b14);
            color: var(--text); min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
        }

        /* Kopfzeile */
        header { 
            padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--rand);
            position: sticky; top: 0; z-index: 100;
        }
        .header-links { display: flex; align-items: center; gap: 12px; }
        #miniLogo { width: 35px; height: 35px; border-radius: 8px; display: none; object-fit: cover; border: 1px solid var(--akzent); }
        #senderOben { font-weight: 800; color: #fff; font-size: 16px; text-transform: uppercase; }

        .container { flex-grow: 1; padding: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }

        /* Suche */
        .suche-container { 
            display: flex; background: var(--karte); border: 1px solid var(--rand); 
            border-radius: 15px; padding: 5px 15px; margin-bottom: 25px; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #sIn { flex-grow: 1; background: transparent; border: none; color: white; padding: 12px; font-size: 16px; outline: none; }
        .lupe-btn { background: transparent; border: none; cursor: pointer; color: var(--akzent); }

        /* Raster-Layout für Computer/Tablet/Handy */
        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 25px; }
        @media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }

        .box { 
            background: var(--karte); backdrop-filter: blur(15px); border: 1px solid var(--rand); 
            border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Player Animation */
        .player-ansicht { text-align: center; }
        #hauptLogo { 
            width: 100%; max-width: 250px; aspect-ratio: 1/1; border-radius: 20px; 
            object-fit: cover; margin: 20px 0; border: 2px solid var(--rand);
            transition: transform 0.5s ease-in-out;
        }

        /* Auf- und Ab-Bewegung wenn es läuft */
        .bewegen { animation: schweben 3s ease-in-out infinite; border-color: var(--akzent) !important; box-shadow: 0 15px 35px rgba(0,251,255,0.2); }
        @keyframes schweben {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .play-knopf { 
            width: 75px; height: 75px; border-radius: 50%; border: none; 
            background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin: 15px auto; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .play-knopf:hover { transform: scale(1.1); }

        .lautstaerke-regler { margin-top: 25px; width: 100%; }
        #volLabel { font-size: 11px; font-weight: 900; color: var(--akzent); margin-bottom: 8px; text-transform: uppercase; }
        input[type=range] { width: 100%; accent-color: var(--akzent); cursor: pointer; }

        /* Song Liste */
        .info-label { font-size: 12px; font-weight: 900; color: var(--akzent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .aktuell-box { 
            font-size: 18px; font-weight: 800; color: #fff; padding: 20px; 
            background: rgba(0,251,255,0.05); border-radius: 15px; border-left: 4px solid var(--akzent);
            margin-bottom: 25px; text-align: left;
        }

        .liste { display: flex; flex-direction: column; gap: 10px; }
        .liste-zeile { 
            padding: 12px; border-bottom: 1px solid var(--rand); display: flex; 
            align-items: center; gap: 15px; font-size: 15px;
        }
        .zeit-stempel { 
            background: rgba(0,251,255,0.1); color: var(--akzent); 
            padding: 3px 8px; border-radius: 5px; font-weight: bold; font-size: 12px;
        }

        /* Footer */
        footer { 
            padding: 20px 30px; border-top: 1px solid var(--rand); 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(15, 23, 42, 0.9); font-size: 14px; font-weight: bold; color: #64748b;
        }
    </style>
</head>
<body onload="uhrStarten()">

<header>
    <div class="header-links">
        <img id="miniLogo" src="">
        <span id="senderOben">RADIO PLAYER</span>
    </div>
</header>

<div class="container">
    <div class="suche-container">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') waehleSender(this.value)">
        <button class="lupe-btn" onclick="waehleSender(document.getElementById('sIn').value)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
    </div>

    <div class="layout">
        <div class="box player-ansicht">
            <div id="hoererZahl" style="font-weight: 900; color: var(--akzent); font-size: 13px;">0 HÖRER LIVE</div>
            <img id="hauptLogo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            
            <div class="lautstaerke-regler">
                <div id="volLabel">LAUTSTÄRKE: 90%</div>
                <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="setzeLautstaerke(this.value)">
            </div>

            <button class="play-knopf" onclick="umschalten()" id="pBtn">
                <svg width="30" height="30" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>
            </button>
        </div>

        <div class="box">
            <div class="info-label">Aktueller Song</div>
            <div id="songTitel" class="aktuell-box">Warte auf Sender...</div>

            <div class="info-label">Zuletzt gelaufen</div>
            <div id="verlaufListe" class="liste"></div>
        </div>
    </div>
</div>

<footer>
    <div id="version">3.4.3</div>
    <div id="uhrzeit">00:00:00</div>
</footer>

<audio id="radioPlayer"></audio>

<script>
    const player = document.getElementById('radioPlayer');
    let spielt = false;
    let senderID = "";
    let updateIntervall = null;

    function uhrStarten() {
        setInterval(() => {
            document.getElementById('uhrzeit').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);
    }

    function setzeLautstaerke(v) {
        player.volume = v;
        document.getElementById('volLabel').innerText = "LAUTSTÄRKE: " + Math.round(v * 100) + "%";
    }

    function waehleSender(v) {
        if(!v) return;
        senderID = v.toLowerCase().trim().replace(/\s+/g, '-');
        aktualisiereDaten();
        if(updateIntervall) clearInterval(updateIntervall);
        updateIntervall = setInterval(aktualisiereDaten, 20000);
        if(spielt) { stopStream(); startStream(); }
    }

    function umschalten() { if(!senderID) return; spielt ? stopStream() : startStream(); }

    function startStream() {
        player.src = "https://stream.laut.fm/" + senderID;
        player.play().then(() => {
            spielt = true;
            document.getElementById('hauptLogo').classList.add('bewegen');
            document.getElementById('pBtn').innerHTML = '<svg width="30" height="30" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#000"/></svg>';
        });
    }

    function stopStream() { 
        player.pause(); player.src = ""; spielt = false; 
        document.getElementById('hauptLogo').classList.remove('bewegen');
        document.getElementById('pBtn').innerHTML = '<svg width="30" height="30" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>'; 
    }

    async function aktualisiereDaten() {
        if(!senderID) return;
        try {
            const [info, lieder, hoerer] = await Promise.all([
                fetch(`https://api.laut.fm/station/${senderID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${senderID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${senderID}/listeners`).then(r => r.text())
            ]);

            const bildUrl = info.images.station_120x120 || info.images.station_80x80;
            document.getElementById('senderOben').innerText = info.display_name;
            document.getElementById('miniLogo').src = bildUrl;
            document.getElementById('miniLogo').style.display = "block";
            document.getElementById('hauptLogo').src = bildUrl;
            document.getElementById('hoererZahl').innerText = hoerer + " HÖRER LIVE";

            if (lieder && lieder.length > 0) {
                const aktuell = lieder[0];
                const zeitAktuell = new Date(aktuell.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                document.getElementById('songTitel').innerText = zeitAktuell + " | " + aktuell.artist.name + " - " + aktuell.title;
                
                let listeHtml = "";
                lieder.slice(1, 10).forEach(s => {
                    const sZeit = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    listeHtml += `<div class="liste-zeile"><span class="zeit-stempel">${sZeit}</span><span>${s.artist.name} - ${s.title}</span></div>`;
                });
                document.getElementById('verlaufListe').innerHTML = listeHtml;
            }
        } catch(fehler) { console.log("Fehler beim Laden"); }
    }
</script>
</body>
</html>
