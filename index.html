<script>
    // Audio-Objekt global und sofort bereitstellen
    const audio = new Audio();
    audio.crossOrigin = "anonymous";
    let slug = "";

    // Such- und Startfunktion kombiniert
    async function search() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/[^a-z0-9-]/g, '');
        
        // Den Stream direkt vorbereiten
        audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
        document.getElementById('status').innerText = "BEREIT - PLAY DRÜCKEN";
        
        // Daten im Hintergrund laden
        loadData();
    }

    // Der Button-Klick muss absolut direkt sein
    function toggle() {
        if(!slug) {
            alert("Bitte erst einen Sendernamen suchen!");
            return;
        }
        
        const btn = document.getElementById('pBtn');
        if(audio.paused) {
            // Absolut direkter Startbefehl ohne setTimeout oder Promises
            audio.play();
            btn.innerHTML = "⏸";
            document.getElementById('status').innerText = "LIVE";
        } else {
            audio.pause();
            btn.innerHTML = "▶";
            document.getElementById('status').innerText = "GESTOPPT";
        }
    }

    // Daten separat laden, um den Audio-Thread nicht zu stören
    async function loadData() {
        try {
            const r = await fetch(`https://api.laut.fm/station/${slug}`);
            const s = await r.json();
            document.getElementById('stName').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
        } catch(e) {}
    }
</script>
