<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v35.0 - Force Play</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --surface: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 15px; background: #000; z-index: 10; }
        .search-wrap { display: flex; background: #1a1a1a; border-radius: 12px; padding: 8px 12px; border: 1px solid #333; align-items: center; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; height: 30px; }
        .uhr { text-align: center; font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }

        .content { flex: 1; overflow-y: auto; padding: 10px 15px 230px 15px; }
        .hero { background: var(--surface); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; margin-bottom: 15px; }
        #mainImg { width: 110px; height: 110px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; background: #000; border: 1px solid #333; }
        #stName { font-size: 18px; font-weight: bold; margin-bottom: 3px; }
        #hoerer { font-size: 10px; color: var(--accent); font-weight: bold; }

        .now-box { background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-left: 3px solid var(--accent); }
        .now-tag { background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 4px; }
        #curT { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .h-list { display: flex; flex-direction: column; gap: 5px; }
        .h-item { background: #080808; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-size: 12px; }
        .h-time { color: var(--accent); font-weight: bold; min-width: 40px; }

        .player { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(15px); border-top: 1px solid #222; padding: 15px 20px 30px 20px; border-radius: 20px 20px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 5px; border-radius: 5px; margin-bottom: 15px; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 11px; animation: tScroll 15s linear infinite; }
        @keyframes tScroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .controls { display: flex; align-items: center; gap: 15px; }
        .pBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pBtn.playing { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .vol-wrap { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); }
        #status { font-size: 9px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header>
        <div class="search-wrap">
            <input type="text" id="sIn" placeholder="Sender eingeben..." onkeydown="if(event.key==='Enter') search()">
            <button onclick="search()" style="background:none; border:none; color:var(--accent); font-size:20px;">🔍</button>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="content">
        <div class="hero">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="stName">BEREIT</div>
            <div id="hoerer">WÄHLE EINEN SENDER</div>
        </div>
        <div class="now-box">
            <div class="now-tag">JETZT</div>
            <div id="curT">Warte auf Musik...</div>
        </div>
        <div class="h-list" id="hList"></div>
    </div>

    <div class="player">
        <div class="ticker"><div id="tText">+++ RADIO ULTIMATE STARTEN +++</div></div>
        <div class="controls">
            <button id="pBtn" class="pBtn" onclick="togglePlay()">▶</button>
            <div class="vol-wrap">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="status">KLICK PLAY</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let slug = "";
    let dataTask = null;

    function init() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { if(audio) audio.volume = e.target.value; };
    }

    async function search() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // Audio-Objekt vorbereiten (Wichtig für Browser-Unlock)
        if(!audio) audio = new Audio();
        
        document.getElementById('status').innerText = "Lade Daten...";
        await load();
        if(dataTask) clearInterval(dataTask);
        dataTask = setInterval(load, 15000);
    }

    function togglePlay() {
        if(!slug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(!audio || audio.paused || audio.src === "") {
            st.innerText = "Verbinde...";
            
            // Radikaler Reset für Sofort-Start
            if(!audio) audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
            audio.volume = document.getElementById('vRange').value;
            
            // Der "Force-Play" Loop
            const attemptPlay = () => {
                audio.play().then(() => {
                    btn.innerHTML = "⏸";
                    btn.classList.add('playing');
                    st.innerText = "LIVE AKTIV";
                    st.style.color = "var(--accent)";
                }).catch(e => {
                    st.innerText = "Browser blockiert! Versuche es erneut...";
                    // Automatischer Re-Try nach 200ms
                    setTimeout(attemptPlay, 200);
                });
            };
            attemptPlay();
        } else {
            audio.pause();
            audio.src = ""; 
            btn.innerHTML = "▶";
            btn.classList.remove('playing');
            st.innerText = "GESTOPPT";
            st.style.color = "#666";
        }
    }

    async function load() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " PERSONEN HÖREN ZU";
            const cur = l[0];
            document.getElementById('curT').innerText = cur.artist.name + " - " + cur.title;
            document.getElementById('tText').innerText = `+++ SENDER: ${s.display_name.toUpperCase()} +++ SONG: ${cur.artist.name.toUpperCase()} - ${cur.title.toUpperCase()} +++`;
            
            let list = "";
            l.slice(1, 10).forEach(song => {
                const t = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                list += `<div class="h-item"><span class="h-time">${t}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = list;
        } catch(e) { document.getElementById('status').innerText = "Sender-Fehler"; }
    }
</script>
</body>
</html>
