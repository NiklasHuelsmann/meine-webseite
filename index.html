<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brian-Radio Pro-Fokus</title>
    <style>
        :root { 
            --bg-global: #050505; 
            --bg-app: #0d1117;    
            --accent: #00d2ff; 
            --highlight: #00f2c3; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-global); 
            color: #fff; 
            font-family: -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden;
        }

        /* PC-Ansicht: Dunkler Rahmen um die App */
        .app { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background-color: var(--bg-app);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }
        
        header { padding: 25px 20px 10px; text-align: center; }
        .uhr { font-family: monospace; font-size: 14px; color: var(--accent); margin-bottom: 15px; opacity: 0.8; }
        
        .search-area { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            display: flex; 
            padding: 8px 15px; 
            border: 1px solid #333; 
            margin-bottom: 15px; 
        }
        .search-area input { background: transparent; border: none; color: #fff; width: 100%; font-size: 15px; outline: none; }
        
        #stNameDisplay { 
            font-size: 26px; 
            font-weight: 900; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            margin: 5px 0;
            color: #fff;
        }

        .scroll-content { flex: 1; overflow-y: auto; padding: 0 20px 100px; scrollbar-width: none; }
        .scroll-content::-webkit-scrollbar { display: none; }

        /* ZENTRALES LOGO */
        .hero-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 30px 0 60px; /* Mehr Platz nach unten für den Button */
        }
        
        .img-container { 
            position: relative; 
            width: 280px; 
            height: 280px; 
            margin-bottom: 20px; /* Platz zwischen Bild und Play-Button */
        }

        #mainImg { 
            width: 100%; 
            height: 100%; 
            border-radius: 40px; 
            object-fit: cover; 
            border: 2px solid #333; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7); 
        }
        
        /* Play-Button direkt unter dem Bild */
        #pBtn { 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            border: none; 
            background: var(--highlight); 
            color: #000; 
            font-size: 35px; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* PLAYLIST BEREICH */
        .list-section { margin-top: 20px; }
        .headline { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #fff; }
        
        .song-entry { display: flex; gap: 15px; margin-bottom: 18px; align-items: flex-start; }
        .time-cell { min-width: 50px; font-size: 12px; color: #666; font-weight: bold; }
        .song-info { flex: 1; }
        .artist { font-weight: bold; font-size: 16px; display: block; color: #fff; }
        .title { color: #888; font-size: 13px; }

        /* Visualizer Balken (Lautsprecher-Bewegung) */
        .viz { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
        .bar { width: 3px; background: var(--highlight); height: 4px; }
        .playing .bar { animation: bounce 0.8s ease infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { height: 4px; } to { height: 16px; } }

        /* Mehr anzeigen Button */
        #moreBtn { 
            background: transparent; 
            border: none; 
            color: var(--highlight); 
            font-weight: bold; 
            padding: 10px; 
            width: 100%; 
            cursor: pointer; 
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* BESCHREIBUNG & HÖRER (Ganz unten) */
        .footer-info { 
            padding: 20px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 20px; 
            border: 1px solid #222; 
            margin-top: 10px;
        }
        #stDesc { font-size: 14px; color: #999; line-height: 1.5; margin-bottom: 15px; }
        .hoerer-info { font-size: 12px; font-weight: bold; color: var(--accent); text-transform: uppercase; }

        /* VOLUME DOCK */
        .dock { padding: 20px 30px; background: #000; border-top: 1px solid #222; }
        .vol-row { display: flex; align-items: center; gap: 15px; }
        input[type=range] { flex: 1; -webkit-appearance: none; background: #333; height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border-radius: 50%; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="uhr" class="uhr">00:00:00</div>
        <div class="search-area">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') switchStation()">
            <span onclick="switchStation()" style="cursor:pointer">🔍</span>
        </div>
        <div id="stNameDisplay">SENDERNAME</div>
    </header>

    <div class="scroll-content">
        <div class="hero-area">
            <div class="img-container">
                <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            </div>
            <button id="pBtn" onclick="toggle()">▶</button>
        </div>

        <div class="list-section">
            <span class="headline">Jetzt läuft</span>
            <div id="songList"></div>
            <button id="moreBtn" onclick="toggleMore()">mehr Songs anzeigen</button>
        </div>

        <div class="footer-info">
            <div id="stDesc">Lade Beschreibung...</div>
            <div id="hoerer" class="hoerer-info">0 PERSONEN LIVE</div>
        </div>
    </div>

    <div class="dock">
        <div class="vol-row">
            <span>🔈</span>
            <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
            <span id="volPerc" style="font-family: monospace; width: 40px;">80%</span>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    let currentSlug = "";
    let lastImg = "";
    let dataJob = null;
    let showAll = false;

    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    document.getElementById('vol').oninput = (e) => { 
        au.volume = e.target.value; 
        document.getElementById('volPerc').innerText = Math.round(e.target.value * 100) + "%";
    };

    function switchStation() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play();
        document.getElementById('pBtn').innerHTML = "⏸";
        updateUI();
        if(dataJob) clearInterval(dataJob);
        dataJob = setInterval(updateUI, 15000);
        document.activeElement.blur();
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
        updateUI();
    }

    function toggleMore() {
        showAll = !showAll;
        document.getElementById('moreBtn').innerText = showAll ? "weniger anzeigen" : "mehr Songs anzeigen";
        updateUI();
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('stDesc').innerText = s.description || "Willkommen beim Radio.";
            document.getElementById('hoerer').innerText = h + " PERSONEN LIVE";

            let newImg = s.images.station_640x640.replace('http://', 'https://');
            if(newImg !== lastImg) {
                document.getElementById('mainImg').src = newImg;
                lastImg = newImg;
            }

            let html = "";
            const limit = showAll ? 10 : 3;
            l.slice(0, limit).forEach((song, i) => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const isNow = i === 0;
                html += `
                    <div class="song-entry">
                        <div class="time-cell">${isNow ? '<div class="viz '+(au.paused?'':'playing')+'"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>' : time}</div>
                        <div class="song-info">
                            <span class="artist">${song.artist.name}</span>
                            <span class="title">${song.title}</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('songList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
