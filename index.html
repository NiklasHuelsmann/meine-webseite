<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Master v12.0</title>
    <style>
        :root { --primary: #00ffaa; --bg: #050505; --surface: #121214; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; }
        .app-shell { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); }

        /* SUCHE */
        .search-section { padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 2000; }
        .search-bar { display: flex; background: var(--surface); border-radius: 12px; border: 1px solid #333; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #q { flex: 1; padding: 16px; border: none; background: transparent; color: white; font-size: 16px; outline: none; }
        .s-btn { background: var(--primary); border: none; padding: 0 20px; cursor: pointer; color: #000; font-weight: bold; }

        /* RESULTATE */
        #results {
            margin: 0 20px 20px; background: #1a1a1c; border-radius: 12px;
            max-height: 350px; overflow-y: auto; display: none; border: 1px solid #444;
        }
        .row { padding: 12px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; cursor: pointer; }
        .row:hover { background: #252528; }
        .row img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; background: #000; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .tag-l { background: #ffaa00; color: #000; }
        .tag-w { background: #0088ff; color: #fff; }

        /* PLAYER */
        .player { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .status-row { width: 100%; display: flex; justify-content: space-between; font-family: monospace; color: var(--primary); margin-bottom: 15px; font-weight: bold; }
        #st-name { font-size: 24px; margin: 0 0 15px; }
        #main-art { width: 100%; max-width: 300px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 40px #000; margin-bottom: 20px; border: 1px solid #333; background: #111; }
        #track { font-size: 19px; font-weight: bold; margin-bottom: 5px; color: #fff; }
        #artist { font-size: 16px; color: #888; margin-bottom: 25px; }

        .play-btn { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .play-btn svg { width: 30px; height: 30px; fill: #000; }

        /* PLAYLIST & HISTORY */
        .playlist { width: 100%; margin-top: 30px; text-align: left; }
        .p-title { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }
        .h-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #0f0f11; border-radius: 10px; margin-bottom: 8px; border: 1px solid #1a1a1c; }
        .h-item img { width: 38px; height: 38px; border-radius: 5px; background: #000; }
        .h-info b { display: block; font-size: 14px; color: #ddd; }
        .h-info span { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="q" placeholder="Sender Name + ENTER..." autocomplete="off">
            <button class="s-btn" onclick="doSearch()">LOS</button>
        </div>
    </div>
    <div id="results"></div>

    <div class="player">
        <div class="status-row">
            <div id="clock">00:00:00</div>
            <div id="listeners">● BEREIT</div>
        </div>
        <h1 id="st-name">Radio Station</h1>
        <img id="main-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <div id="track">Sender wählen</div>
        <div id="artist">Suche oben starten</div>
        
        <button class="play-btn" onclick="togglePlay()">
            <svg id="svg-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="svg-stop" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="playlist">
            <div class="p-title" id="p-title-text">Zuletzt gelaufen</div>
            <div id="hist-list"></div>
        </div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio');
    const input = document.getElementById('q');
    const resBox = document.getElementById('results');
    let currentId = "";
    let currentType = "";
    let refreshTimer = null;

    async function doSearch() {
        const val = input.value.trim();
        if(val.length < 2) return;
        resBox.innerHTML = "<div style='padding:15px;text-align:center;'>Suche...</div>";
        resBox.style.display = "block";
        try {
            const [rL, rW] = await Promise.all([
                fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`),
                fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(val)}`)
            ]);
            const dL = await rL.json();
            const dW = await rW.json();
            resBox.innerHTML = "";
            if(dL.items) dL.items.forEach(s => addRow(s.display_name, s.images.station_80x80, s.name, 'tag-l', 'LAUT.FM'));
            if(dW) dW.slice(0, 15).forEach(s => addRow(s.name, s.favicon, s.url, 'tag-w', 'WORLD'));
        } catch(e) { resBox.innerHTML = "<div style='padding:15px;'>Fehler</div>"; }
    }

    function addRow(name, img, url, cls, type) {
        const d = document.createElement('div');
        d.className = "row";
        d.onclick = () => launch(name, img, url, type);
        const icon = img || 'https://via.placeholder.com/45/222/fff?text=R';
        d.innerHTML = `<img src="${icon}"> <div><b>${name}</b><br><span class="tag ${cls}">${type}</span></div>`;
        resBox.appendChild(d);
    }

    function launch(name, img, url, type) {
        resBox.style.display = "none";
        input.value = "";
        currentType = type;
        currentId = url;
        
        audio.pause();
        audio.src = (type === 'LAUT.FM') ? `https://stream.laut.fm/${url}` : url;
        audio.play().catch(() => {});

        document.getElementById('st-name').innerText = name;
        document.getElementById('main-art').src = img || 'https://via.placeholder.com/300/111/fff?text=RADIO';
        
        updateUI(true);
        if(refreshTimer) clearInterval(refreshTimer);
        fetchData();
        refreshTimer = setInterval(fetchData, 30000);
    }

    async function fetchData() {
        if(!currentId) return;
        const histBox = document.getElementById('hist-list');
        const listenerBox = document.getElementById('listeners');

        if(currentType === 'LAUT.FM') {
            try {
                const [rS, rL] = await Promise.all([
                    fetch(`https://api.laut.fm/station/${currentId}`),
                    fetch(`https://api.laut.fm/station/${currentId}/last_songs`)
                ]);
                const sInfo = await rS.json();
                const songs = await rL.json();
                listenerBox.innerText = `● ${sInfo.current_listeners} HÖRER`;
                if(songs.length > 0) {
                    document.getElementById('track').innerText = songs[0].title;
                    document.getElementById('artist').innerText = songs[0].artist.name;
                    document.getElementById('main-art').src = songs[0].image_640x640 || sInfo.images.station_640x640;
                    renderHistory(songs.slice(1, 6));
                }
            } catch(e) {}
        } else {
            // UNIVERSAL LOGIK für WORLD Sender (WDR etc.)
            listenerBox.innerText = "● LIVE";
            // Wir versuchen Metadaten über einen Proxy zu bekommen (Simuliert hier)
            document.getElementById('track').innerText = "Live Stream läuft";
            document.getElementById('artist').innerText = document.getElementById('st-name').innerText;
            histBox.innerHTML = "<div style='color:#333;font-size:12px;'>Playlist-Daten werden geladen...</div>";
        }
    }

    function renderHistory(songs) {
        let h = "";
        songs.forEach(s => {
            const img = s.image_120x120 || 'https://via.placeholder.com/38/111/fff?text=?';
            h += `<div class="h-item"><img src="${img}"><div class="h-info"><b>${s.title}</b><span>${s.artist.name}</span></div></div>`;
        });
        document.getElementById('hist-list').innerHTML = h;
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); updateUI(true); }
        else { audio.pause(); updateUI(false); }
    }

    function updateUI(playing) {
        document.getElementById('svg-play').style.display = playing ? "none" : "block";
        document.getElementById('svg-stop').style.display = playing ? "block" : "none";
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    input.onkeypress = (e) => { if(e.key === 'Enter') doSearch(); };
</script>
</body>
</html>
