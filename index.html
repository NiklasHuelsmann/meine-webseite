<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laut.fm Live-Explorer</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Start-Overlay gegen Autoplay-Blockade */
        #autoplay-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .start-btn {
            background: #ff5500; color: white; padding: 20px 40px;
            border-radius: 50px; font-size: 1.5em; font-weight: bold;
            box-shadow: 0 0 20px #ff5500; animation: pulse 2s infinite;
        }

        /* Suche-Styling */
        .search-area { width: 100%; max-width: 500px; margin-bottom: 20px; }
        input#search-input { 
            width: 100%; padding: 15px; border-radius: 30px; border: 2px solid #444; 
            background: #222; color: white; font-size: 1em; outline: none;
        }
        #results { position: absolute; background: #222; width: 100%; max-width: 500px; border-radius: 10px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 15px; }
        .result-item img { width: 40px; height: 40px; border-radius: 5px; }

        /* Player-Card */
        .player-card { 
            background: #1a1a1a; width: 100%; max-width: 450px; border-radius: 30px; 
            padding: 30px; text-align: center; border: 1px solid #333;
        }
        .status-header { display: flex; justify-content: space-between; color: #00ccff; margin-bottom: 15px; font-family: monospace; }
        #station-logo { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #ff5500; margin-bottom: 15px; }
        
        #player-container { background: #000; border-radius: 20px; padding: 5px; margin: 20px 0; min-height: 150px; }
        iframe { border: none; width: 100%; height: 150px; border-radius: 15px; }

        .history { text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; font-size: 0.85em; }
        .history-item { padding: 5px 0; border-bottom: 1px solid #222; color: #bbb; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="autoplay-overlay" onclick="unlockAudio()">
    <div class="start-btn">KLICKEN ZUM STARTEN 🎵</div>
</div>

<div class="search-area">
    <input type="text" id="search-input" placeholder="🔍 Sender suchen..." autocomplete="off">
    <div id="results"></div>
</div>

<div class="player-card">
    <div class="status-header">
        <div id="clock">00:00:00</div>
        <div id="listeners">● 0 Hörer</div>
    </div>

    <img id="station-logo" src="">
    <h2 id="station-name" style="margin:0;">Wähle Sender</h2>
    <div id="current-song" style="color:#00ff00; margin:10px 0; font-weight:bold;">Suche oben deinen Lieblingsradio</div>

    <div id="player-container">
        </div>

    <div class="history">
        <div style="color:#888; font-size:0.8em; margin-bottom:5px;">ZULETZT GESPIELT:</div>
        <div id="history-list"></div>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const resultsDiv = document.getElementById('results');
    let currentStation = "eins"; // Start-Sender

    // Funktion um Autoplay zu erlauben
    function unlockAudio() {
        document.getElementById('autoplay-overlay').style.display = 'none';
        playStation(currentStation);
    }

    // Suche
    searchInput.addEventListener('input', () => {
        const val = searchInput.value;
        if (val.length < 2) { resultsDiv.innerHTML = ''; return; }
        fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`)
            .then(r => r.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                data.items.slice(0, 5).forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `<img src="${s.images.station_80x80}"> <strong>${s.display_name}</strong>`;
                    item.onclick = () => playStation(s.name);
                    resultsDiv.appendChild(item);
                });
            });
    });

    function playStation(shortname) {
        resultsDiv.innerHTML = '';
        searchInput.value = '';
        
        // Trick für Chrome/Firefox: Wir hängen "?autoplay=1" an das Widget an
        document.getElementById('player-container').innerHTML = `
            <iframe src="https://laut.fm/widgets/player/${shortname}?autoplay=1" scrolling="no" allow="autoplay"></iframe>
        `;

        updateAll(shortname);
    }

    function updateAll(name) {
        fetch(`https://api.laut.fm/station/${name}`)
            .then(r => r.json())
            .then(d => {
                document.getElementById('station-name').innerText = d.display_name;
                document.getElementById('station-logo').src = d.images.station_160x160;
                document.getElementById('listeners').innerText = `● ${d.current_listeners} Hörer`;
            });

        fetch(`https://api.laut.fm/station/${name}/last_songs`)
            .then(r => r.json())
            .then(songs => {
                if(songs && songs.length > 0) {
                    document.getElementById('current-song').innerText = `🎶 ${songs[0].artist.name} - ${songs[0].title}`;
                    let hHTML = '';
                    songs.slice(1, 4).forEach(s => {
                        hHTML += `<div class="history-item">🕒 ${s.artist.name} - ${s.title}</div>`;
                    });
                    document.getElementById('history-list').innerHTML = hHTML;
                }
            });
    }

    // Uhrzeit
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);
</script>

</body>
</html>
