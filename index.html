<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Unsere Radio Stationen</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .header { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        .search-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        /* Die Karte im Stil deines Screenshots */
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .logo { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        .info-box { background: #f9f9f9; padding: 10px; border-left: 4px solid #00a67c; font-size: 0.9rem; margin: 10px 0; }
        .artist { font-weight: bold; }
        
        /* Der grüne Button */
        .btn-play { 
            background: #00a67c; color: white; border: none; 
            padding: 10px 20px; border-radius: 20px; 
            cursor: pointer; font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin-top:0;">Unsere Radio Stationen</h2>
    <div class="search-area">
        <input type="text" id="bulkInput" placeholder="Sender-Liste (mit Komma getrennt)...">
        <button onclick="addStations()" style="background:#00a67c; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">Überprüfen</button>
    </div>
</div>

<div class="grid" id="grid"></div>

<audio id="player"></audio>

<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    const player = document.getElementById('player');

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        stations.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="head">
                    <img id="img-${s}" src="https://api.laut.fm/favicon.ico" class="logo">
                    <div><b>${s.toUpperCase()}</b><br><small>Hörer online: <span id="list-${s}">0</span></small></div>
                </div>
                <div class="info-box">
                    <div id="art-${s}" class="artist">Lade...</div>
                    <div id="tit-${s}">...</div>
                </div>
                <button class="btn-play" onclick="toggle('${s}')" id="btn-${s}">▶ Sender starten</button>
            `;
            grid.appendChild(card);
            updateData(s);
        });
    }

    async function updateData(s) {
        fetch(`https://api.laut.fm/station/${s}`).then(r => r.json()).then(d => {
            if(d.images) document.getElementById(`img-${s}`).src = d.images.station_120x120;
        });
        fetch(`https://api.laut.fm/station/${s}/listeners`).then(r => r.text()).then(t => document.getElementById(`list-${s}`).innerText = t);
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
            document.getElementById(`tit-${s}`).innerText = d.title || "-";
        });
    }

    function addStations() {
        const input = document.getElementById('bulkInput').value;
        const newStations = input.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
        newStations.forEach(s => { if (!stations.includes(s)) stations.push(s); });
        localStorage.setItem('my_stations', JSON.stringify(stations));
        render();
    }

    function toggle(s) {
        const btn = document.getElementById(`btn-${s}`);
        if(!player.paused && player.src.includes(s)) {
            player.pause();
            btn.innerText = "▶ Sender starten";
        } else {
            player.src = `https://stream.laut.fm/${s}`;
            player.play();
            btn.innerText = "⏹ Sender stoppen";
        }
    }

    window.onload = render;
    setInterval(() => stations.forEach(updateData), 15000);
</script>
</body>
</html>
