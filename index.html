<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RadioApps</title>
    <style>
        :root { 
            --bg-global: #050505; 
            --bg-app: #0d1117;    
            --accent: #00d2ff; 
            --highlight: #00f2c3; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-global); 
            color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .app { 
            width: 100%; 
            max-width: 900px; 
            display: flex; 
            flex-direction: row; 
            background-color: var(--bg-app);
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        @media (max-width: 700px) {
            .app { flex-direction: column; max-width: 500px; }
            .side-history { display: none; }
        }
        
        .main-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
            overflow: hidden;
        }

        header { padding: 20px; text-align: center; flex-shrink: 0; }
        .uhr { font-family: monospace; font-size: 14px; color: var(--accent); margin-bottom: 10px; }
        
        .search-area { 
            background: rgba(255,255,255,0.07); 
            border-radius: 12px; display: flex; padding: 10px; border: 1px solid #333; margin-bottom: 10px; 
        }
        .search-area input { background: transparent; border: none; color: #fff; width: 100%; outline: none; }

        .scroll-content { 
            flex: 1; overflow-y: auto; padding: 0 20px 40px; scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .scroll-content::-webkit-scrollbar { display: none; }

        .hero-area { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .img-container { width: 240px; height: 240px; margin-bottom: 20px; }
        #mainImg { width: 100%; height: 100%; border-radius: 30px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #pBtn { 
            width: 70px; height: 70px; border-radius: 50%; border: none; background: #fff; 
            font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .song-entry { 
            display: flex; gap: 12px; margin-bottom: 10px; padding: 10px;
            background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 14px;
        }
        .artist { font-weight: bold; color: #fff; display: block; }
        .title { color: #999; }

        .side-history {
            width: 300px;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        .side-history h3 { font-size: 16px; color: var(--accent); border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Dock mit Lautsprecher und Prozentzahl */
        .dock { padding: 15px 25px; background: #000; border-top: 1px solid #222; }
        .vol-row { display: flex; align-items: center; gap: 15px; }
        input[type=range] { flex: 1; cursor: pointer; }
        #volPerc { 
            font-family: monospace; 
            width: 45px; 
            text-align: right; 
            font-weight: bold; 
            color: var(--accent); 
        }
        
        .footer-info { padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; margin-top: 20px; font-size: 13px; }
    </style>
</head>
<body>

<div class="app">
    <div class="main-player">
        <header>
            <div id="uhr" class="uhr">00:00:00</div>
            <div class="search-area">
                <input type="text" id="sIn" placeholder="Sender suchen..." autocomplete="off" onkeydown="if(event.key==='Enter') startManualSearch()">
                <span onclick="startManualSearch()" style="cursor:pointer">🔍</span>
            </div>
            <div id="stNameDisplay" style="font-weight: 900;">RADIO READY</div>
        </header>

        <div class="scroll-content">
            <div class="hero-area">
                <div class="img-container">
                    <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
                </div>
                <button id="pBtn" onclick="toggle()">▶</button>
            </div>

            <div id="songList"></div>
            
            <div class="footer-info">
                <div id="stDesc">Wähle einen Sender.</div>
                <span id="hoerer" style="color:var(--highlight); font-weight:bold; font-size:11px;">0 HÖRER LIVE</span><br>
                <small style="color:#444;">Version 78.1</small>
            </div>
        </div>

        <div class="dock">
            <div class="vol-row">
                <span>🔈</span>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
                <span id="volPerc">80%</span> </div>
        </div>
    </div>

    <div class="side-history">
        <h3>Song Verlauf</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const au = new Audio();
    let currentSlug = "";
    let historyArr = [];

    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    // Lautstärke Update inklusive Prozentzahl-Ziffern
    document.getElementById('vol').oninput = (e) => { 
        const val = e.target.value;
        au.volume = val; 
        document.getElementById('volPerc').innerText = Math.round(val * 100) + "%";
    };

    function startManualSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play();
        document.getElementById('pBtn').innerHTML = "⏸";
        updateUI();
        setInterval(updateUI, 15000);
        document.activeElement.blur();
    }

    function toggle() {
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " PERSONEN LIVE";
            document.getElementById('mainImg').src = s.images.station_640x640.replace('http://', 'https://');

            let html = "";
            l.slice(0, 3).forEach((song, i) => {
                html += `<div class="song-entry">
                    <div>${i === 0 ? '🎵' : '•'}</div>
                    <div><span class="artist">${song.artist.name}</span><span class="title">${song.title}</span></div>
                </div>`;
                
                const songId = song.artist.name + " - " + song.title;
                if(!historyArr.includes(songId)) {
                    historyArr.unshift(songId);
                    const div = document.createElement('div');
                    div.className = 'song-entry';
                    div.style.fontSize = '12px';
                    div.innerHTML = `<div><span class="artist">${song.artist.name}</span><span class="title">${song.title}</span></div>`;
                    const list = document.getElementById('historyList');
                    list.insertBefore(div, list.firstChild);
                }
            });
            document.getElementById('songList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
