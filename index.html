<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v38.0</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --card: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 15px; border-bottom: 1px solid #222; }
        .search-row { display: flex; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }
        .uhr { text-align: center; font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }

        .scroll { flex: 1; overflow-y: auto; padding: 10px 15px 220px 15px; }
        .hero { background: var(--card); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #222; margin-bottom: 15px; }
        #mainImg { width: 100px; height: 100px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; background: #111; }
        #stName { font-size: 17px; font-weight: bold; }
        #hoerer { font-size: 10px; color: var(--accent); font-weight: bold; }

        .now-playing { background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; border-left: 3px solid var(--accent); margin-bottom: 15px; }
        .badge { background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 3px; }
        #curT { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .h-item { background: #080808; padding: 8px 12px; border-radius: 10px; display: flex; gap: 12px; font-size: 12px; margin-bottom: 6px; border: 1px solid #111; }
        .h-time { color: var(--accent); font-weight: bold; min-width: 38px; }

        .player-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 15px 20px 35px 20px; border-top: 1px solid #222; border-radius: 25px 25px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 4px; border-radius: 4px; margin-bottom: 12px; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 10px; animation: tScroll 15s linear infinite; }
        @keyframes tScroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .controls { display: flex; align-items: center; gap: 15px; }
        .pBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 26px; cursor: pointer; flex-shrink: 0; }
        .pBtn.active { background: var(--accent); }
        .vol-wrap { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); }
        #status { font-size: 9px; color: #666; text-align: center; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <header>
        <div class="search-row">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') sync()">
            <span onclick="sync()" style="cursor:pointer; font-size: 20px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">--:--:--</div>
    </header>

    <div class="scroll">
        <div class="hero">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="stName">RADIO PRO</div>
            <div id="hoerer">BEREIT</div>
        </div>
        <div class="now-playing">
            <div class="badge">JETZT</div>
            <div id="curT">Wähle einen Sender</div>
        </div>
        <div id="hList"></div>
    </div>

    <div class="player-bar">
        <div class="ticker"><div id="tText">WILLKOMMEN +++ WÄHLE EINEN SENDER +++</div></div>
        <div class="controls">
            <button id="pBtn" class="pBtn" onmousedown="togglePlay()">▶</button>
            <div class="vol-wrap">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="status">Bereit</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let currentSlug = "";
    let dataTimer = null;

    function initApp() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { if(audio) audio.volume = e.target.value; };
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        currentSlug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // Audio vorbereiten (komplett neu)
        if(audio) { audio.pause(); audio = null; }
        
        document.getElementById('status').innerText = "Sender geladen";
        await updateData();
        if(dataTimer) clearInterval(dataTimer);
        dataTimer = setInterval(updateData, 15000);
    }

    function togglePlay() {
        if(!currentSlug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(!audio || audio.paused) {
            // Jedes Mal ein frisches Audio-Objekt direkt beim Klick erzeugen
            audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.src = `https://stream.laut.fm/${currentSlug}?nocache=${Date.now()}`;
            audio.volume = document.getElementById('vRange').value;
            
            st.innerText = "Verbinde...";
            
            audio.play().then(() => {
                btn.innerHTML = "⏸";
                btn.classList.add('active');
                st.innerText = "LIVE AN";
            }).catch(e => {
                st.innerText = "BLOCKIERT - NOCHMAL KLICKEN!";
                // Hier stoppen wir sofort und lassen den User manuell nochmal drücken
                // Das ist die einzige Chance bei strengen Browsern
            });
        } else {
            audio.pause();
            audio = null;
            btn.innerHTML = "▶";
            btn.classList.remove('active');
            st.innerText = "STOPP";
        }
    }

    async function updateData() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name.toUpperCase();
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " HÖRER LIVE";
            const cur = l[0];
            const track = cur.artist.name + " - " + cur.title;
            document.getElementById('curT').innerText = track;
            document.getElementById('tText').innerText = `+++ ${s.display_name.toUpperCase()} spielt: ${track.toUpperCase()} +++`;
            
            let html = "";
            l.slice(1, 10).forEach(song => {
                const t = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${t}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
