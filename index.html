<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App v86.0 Sync</title>
    <style>
        :root { 
            --bg-dark: #0e121a; 
            --bg-card: #1d2331; 
            --accent-green: #00e699;
            --text-main: #ffffff;
            --text-dim: #a0a8b9;
            --ad-gold: #ffcc00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background-color: var(--bg-dark); position: relative; }
        
        /* App Bar mit System-Uhr */
        .app-bar { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sys-time { font-family: monospace; font-size: 14px; color: var(--accent-green); font-weight: bold; }
        #stNameHeader { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .search-trigger { font-size: 22px; color: var(--accent-green); cursor: pointer; }

        /* Suchfeld */
        .search-box { padding: 15px 20px; display: none; background: var(--bg-card); position: absolute; top: 70px; width: 100%; z-index: 100; border-bottom: 2px solid var(--accent-green); }
        .search-box.active { display: block; }
        .search-box input { width: 100%; background: #2a3142; border: none; padding: 12px; color: #fff; border-radius: 8px; outline: none; font-size: 16px; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* Hero Bereich */
        .hero { padding: 20px; text-align: center; }
        #mainImg { width: 280px; height: 280px; border-radius: 15px; object-fit: cover; box-shadow: 0 15px 45px rgba(0,0,0,0.5); margin-bottom: 25px; border: 1px solid #222; }
        
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 35px; margin-bottom: 20px; }
        .icon-btn { font-size: 24px; color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .icon-btn:active { color: var(--accent-green); }
        #pBtn { width: 75px; height: 75px; border-radius: 50%; background: var(--accent-green); border: none; color: #000; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 230, 153, 0.3); }

        /* Player Info */
        .section-now { padding: 20px; }
        .track-display { display: flex; align-items: flex-start; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .speaker-icon { font-size: 24px; color: var(--accent-green); }
        .track-info .artist { font-size: 19px; font-weight: bold; display: block; margin-bottom: 3px; }
        .track-info .title { font-size: 16px; color: var(--text-dim); display: block; }

        /* Dynamische Sender-Infos */
        .station-footer { padding: 30px 20px; background: #161b26; border-radius: 20px 20px 0 0; }
        #stSlogan { font-size: 22px; font-style: italic; font-weight: bold; margin-bottom: 15px; line-height: 1.2; color: #fff; }
        .location { color: var(--text-dim); display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-size: 14px; }
        #stDesc { font-size: 14px; color: #8a94a7; line-height: 1.6; margin-bottom: 25px; }
        .hoerer-box { display: inline-block; padding: 6px 12px; background: rgba(0,230,153,0.1); color: var(--accent-green); border-radius: 20px; font-weight: bold; font-size: 13px; }
        
        .ver-tag { font-size: 9px; color: #333; text-align: center; margin-top: 30px; letter-spacing: 2px; }

        /* Logik-Farben */
        .is-ad { color: var(--ad-gold) !important; }
        .is-live { color: #ff00ff !important; }
        .is-news { color: #ffffff !important; text-decoration: underline; }
    </style>
</head>
<body>

<div class="app">
    <div class="app-bar">
        <div id="sysTime" class="sys-time">00:00</div>
        <div id="stNameHeader">SENDER WÄHLEN</div>
        <div class="search-trigger" onclick="toggleSearch()">🔍</div>
    </div>

    <div class="search-box" id="searchBox">
        <input type="text" id="sIn" placeholder="Sendername (z.B. brian-radio)..." onkeydown="if(event.key==='Enter') startManualSearch()">
    </div>

    <div class="scroll-area">
        <div class="hero">
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div class="controls-row">
                <div class="icon-btn" onclick="share()">🔗</div>
                <button id="pBtn" onclick="toggle()">▶</button>
                <div class="icon-btn" onclick="alert('Favorit gespeichert!')">❤</div>
            </div>
        </div>

        <div class="section-now">
            <div class="track-display">
                <div class="speaker-icon" id="speakIco">🔊</div>
                <div class="track-info" id="currentSongArea">
                    <span class="artist">BEREIT</span>
                    <span class="title">Suche starten...</span>
                </div>
            </div>
            <div id="songHistory"></div>
        </div>

        <div class="station-footer">
            <div id="stSlogan">Willkommen bei deiner Radio App</div>
            <div class="location">
                <span>📍</span> <span id="stLoc">Automatische Ortung...</span>
            </div>
            <div id="stDesc">Hier erscheint die Senderbeschreibung, sobald ein Stream geladen wurde.</div>
            <div class="hoerer-box" id="hoerer">0 Hörer online</div>
            <div class="ver-tag">VERSION 86.0 | SYSTEM SYNC ACTIVE</div>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    au.volume = 0.8;
    let currentSlug = "", updateTimer = null, lastHash = "";

    // Echtzeit-Uhr (Sommer/Winterzeit automatisch)
    function updateClock() {
        const now = new Date();
        document.getElementById('sysTime').innerText = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    function toggleSearch() { 
        const sb = document.getElementById('searchBox');
        sb.classList.toggle('active');
        if(sb.classList.contains('active')) document.getElementById('sIn').focus();
    }

    async function startManualSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play().then(() => { document.getElementById('pBtn').innerHTML = "⏸"; });
        toggleSearch();
        updateUI();
        if(updateTimer) clearInterval(updateTimer);
        updateTimer = setInterval(updateUI, 4000);
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function share() {
        if(currentSlug) {
            navigator.clipboard.writeText("https://laut.fm/" + currentSlug);
            alert("Sender-Link kopiert!");
        }
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            const cur = l[0];
            const currentHash = cur.artist.name + cur.title + h;
            if(currentHash === lastHash) return;
            lastHash = currentHash;

            // Sender Daten syncen
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stNameHeader').innerText = s.display_name.toUpperCase();
            document.getElementById('stSlogan').innerText = s.page_title || "Dein Sound, dein Radio.";
            document.getElementById('stLoc').innerText = (s.city && s.city !== "null") ? s.city : "Internet";
            document.getElementById('stDesc').innerText = s.description || "Keine Beschreibung verfügbar.";
            document.getElementById('hoerer').innerText = h + " Hörer online";

            const art = (cur.artist.name || "").toLowerCase();
            const tit = (cur.title || "").toLowerCase();
            
            // Logik-Filter (Werbung, News, Moderation)
            const isReklame = art.includes("reklame") || tit.includes("reklame") || art.includes("audio") || art.includes("werbung") || cur.type === "ad";
            const isNews = !isReklame && (art.includes("nachrichten") || tit.includes("news") || tit.includes("zeitfunk"));
            const isLive = !isReklame && !isNews && (art.includes("moderation") || art.includes("live") || art.includes("beratung"));

            let aD = cur.artist.name, tD = cur.title, cls = "";
            if(isReklame) { aD = "WERBUNG"; tD = "Gleich geht's weiter..."; cls = "is-ad"; }
            else if(isNews) { aD = "NACHRICHTEN"; tD = "Aktueller Service"; cls = "is-news"; }
            else if(isLive) { aD = "MODERATION"; tD = "Live im Studio"; cls = "is-live"; }

            document.getElementById('currentSongArea').innerHTML = `<span class="artist ${cls}">${aD}</span><span class="title">${tD}</span>`;

            // Historie (die letzten 3)
            let hHtml = "";
            l.slice(1, 4).forEach(song => {
                hHtml += `<div style="font-size:13px; color:#555; margin-bottom:5px;">• ${song.artist.name} - ${song.title}</div>`;
            });
            document.getElementById('songHistory').innerHTML = hHtml;

        } catch(e) { console.log("Sync Error"); }
    }
</script>
</body>
</html>
