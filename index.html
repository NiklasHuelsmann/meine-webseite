<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laut.fm Player - Custom Design</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --light-grey: #f5f5f5;
            --accent-green: #28a745;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Suche oben - wie im ersten Bild */
        .search-section {
            width: 100%;
            background: #222;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .search-section input {
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #444;
            background: #333;
            color: white;
            width: 200px;
        }

        .search-section button {
            padding: 10px 25px;
            border-radius: 25px;
            border: none;
            background: white;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* Hauptinhalt - Langgezogen */
        .container {
            width: 95%;
            max-width: 600px;
            padding: 20px;
            text-align: left;
        }

        /* Sender Info & Display Logo */
        .station-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .display-logo {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        /* Play Button - wie in Bild 20d06e6b-30c3-4395-83ea-007a73655977 */
        .start-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        /* Jetzt läuft Sektion */
        .now-playing-card {
            background-color: var(--light-grey);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .track-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .time-label {
            color: #888;
            font-weight: normal;
        }

        /* Letzte Songs Liste - wie in Bild ce50ee63-3fad-4448-b19d-f3da7156721f */
        .history-list {
            width: 100%;
            border-top: 1px solid #eee;
        }

        .history-item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            gap: 20px;
        }

        .history-time {
            color: #666;
            min-width: 50px;
        }

        .history-details strong {
            display: block;
            font-size: 1rem;
        }

        .history-details span {
            color: #666;
            font-size: 0.9rem;
        }

        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="search-section">
        <form onsubmit="event.preventDefault(); loadRadio();">
            <input type="text" id="stationName" placeholder="Sendername..." autocomplete="off">
            <button type="submit">Suchen</button>
        </form>
    </div>

    <div class="container" id="mainPlayer" style="display: none;">
        
        <div class="station-header">
            <div id="listeners" style="font-size: 0.9rem; margin-bottom: 10px; color: #888;">Hörer: -</div>
            <img id="stationLogo" class="display-logo" src="" alt="Display Logo">
            <button class="start-btn" onclick="togglePlay()">
                <span id="playIcon">▶</span> Sender starten
            </button>
        </div>

        <div class="now-playing-card">
            <span class="section-title">Jetzt läuft</span>
            <div class="track-info">
                <span id="currentTime" class="time-label">--:--</span>
                <div>
                    <strong id="currentTitle" style="display: block; font-size: 1.1rem;">Titel</strong>
                    <span id="currentArtist" style="color: #666;">Interpret</span>
                </div>
            </div>
        </div>

        <div class="history-list">
            <span class="section-title">Letzte Songs</span>
            <div id="songsLog"></div>
        </div>
    </div>

    <audio id="stream" style="display:none;"></audio>

    <script>
        let isPlaying = false;
        let station = "";
        let timer;

        async function loadRadio() {
            const input = document.getElementById('stationName').value.trim().toLowerCase();
            if (!input) return;
            station = input;

            document.getElementById('mainPlayer').style.display = 'block';
            const audio = document.getElementById('stream');
            audio.src = `https://stream.laut.fm/${station}`;
            
            updateData();
            if(timer) clearInterval(timer);
            timer = setInterval(updateData, 20000);
            
            audio.play();
            isPlaying = true;
            document.getElementById('playIcon').innerText = "⏸";
        }

        function togglePlay() {
            const audio = document.getElementById('stream');
            if(isPlaying) {
                audio.pause();
                document.getElementById('playIcon').innerText = "▶";
            } else {
                audio.play();
                document.getElementById('playIcon').innerText = "⏸";
            }
            isPlaying = !isPlaying;
        }

        async function updateData() {
            try {
                // Sender & Logo & Hörer
                const sRes = await fetch(`https://api.laut.fm/station/${station}`);
                const sData = await sRes.json();
                document.getElementById('stationLogo').src = sData.images.station_120x120 || sData.images.station;
                document.getElementById('listeners').innerText = `Hörer: ${sData.current_listeners}`;

                // Aktueller Song
                const cRes = await fetch(`https://api.laut.fm/station/${station}/current_song`);
                const cData = await cRes.json();
                document.getElementById('currentTitle').innerText = cData.title;
                document.getElementById('currentArtist').innerText = cData.artist;
                
                const now = new Date();
                document.getElementById('currentTime').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

                // Letzte Songs (Verlauf)
                const hRes = await fetch(`https://api.laut.fm/station/${station}/last_songs`);
                const hData = await hRes.json();
                const log = document.getElementById('songsLog');
                log.innerHTML = "";

                hData.slice(0, 8).forEach(song => {
                    const sTime = new Date(song.started_at);
                    const timeStr = sTime.getHours().toString().padStart(2, '0') + ":" + sTime.getMinutes().toString().padStart(2, '0');
                    
                    log.innerHTML += `
                        <div class="history-item">
                            <div class="history-time">${timeStr}</div>
                            <div class="history-details">
                                <strong>${song.title}</strong>
                                <span>${song.artist}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (e) { console.log("Fehler beim Laden."); }
        }
    </script>
</body>
</html>
