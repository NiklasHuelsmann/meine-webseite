<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub 2027</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d26a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* HEADER: Navigation & Suche */
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 4px 6px;
            width: 400px;
            transition: 0.3s;
        }

        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 210, 106, 0.3);
        }

        .search-container input {
            background: none;
            border: none;
            padding: 10px 15px;
            color: white;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
        }

        .search-container button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            font-weight: bold;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-container button:hover {
            transform: scale(1.05);
        }

        .station-dropdown {
            background: #1e293b;
            color: white;
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        /* MAIN HUB GRID */
        .main-grid {
            max-width: 1400px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 30px;
            flex: 1;
        }

        /* CARD STYLES (Glassmorphism 2027) */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* CENTER DISPLAY: Player & Cover */
        .player-display {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .cover-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            flex-shrink: 0;
        }

        .main-cover {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            background: #0f172a;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-cover:hover {
            transform: scale(1.03);
        }

        .track-info {
            flex: 1;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 210, 106, 0.1);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.8s infinite;
        }

        .track-info h1 {
            font-size: 2.6rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            line-height: 1.2;
            word-break: break-word;
        }

        .track-info h2 {
            font-size: 1.4rem;
            color: var(--text-muted);
            margin: 0 0 25px 0;
            font-weight: 400;
        }

        .info-stats {
            display: flex;
            gap: 20px;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .info-stats b {
            color: white;
        }

        /* RIGHT PANEL: Song Verlauf */
        .history-panel h3 {
            font-size: 1.2rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .history-timeline {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: 0.2s;
        }

        .history-row:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border);
        }

        .history-time {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            background: rgba(0, 210, 106, 0.08);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .history-meta {
            overflow: hidden;
        }

        .history-artist {
            font-weight: 600;
            font-size: 0.95rem;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* BOTTOM CONTROLS BAR */
        .controls-bar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 95px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 50px;
            z-index: 1000;
        }

        .btn-main-play {
            background: var(--accent);
            color: #0f172a;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 210, 106, 0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-main-play:hover {
            transform: scale(1.1);
            background: #00ff82;
        }

        .footer-partner {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .footer-partner b {
            color: var(--text-main);
        }

        .volume-slider {
            accent-color: var(--accent);
            cursor: pointer;
            width: 120px;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 14px var(--accent); }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        @media (max-width: 1050px) {
            .main-grid { grid-template-columns: 1fr; margin: 20px auto; padding-bottom: 120px; }
            .player-display { flex-direction: column; text-align: center; }
            .header { flex-direction: column; gap: 15px; padding: 20px; }
            .search-container { width: 100%; }
            .controls-bar { padding: 0 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-area">NiklasIT Hub</div>
    
    <div class="search-container">
        <input type="text" id="stationSearchInput" placeholder="Sender suchen (z.B. simulator4)...">
        <button onclick="searchStation()">LOS</button>
    </div>

    <div>
        <select id="premiumDropdown" class="station-dropdown" onchange="selectPremiumStation(this.value)">
            <option value="simulator4">🎮 Simulator 4</option>
            <option value="brian-radio">🎧 Brian Radio</option>
            <option value="feierabend-radio">☕ Feierabend Radio</option>
        </select>
    </div>
</div>

<div class="main-grid">
    <div class="glass-card">
        <div class="player-display">
            <div class="cover-wrapper">
                <img id="trackCover" src="" class="main-cover" alt="Radio Cover">
            </div>
            
            <div class="track-info">
                <div class="live-badge">
                    <span class="pulse-dot"></span>
                    <span id="currentStationName">Lade Sender...</span>
                </div>
                <h1 id="currentArtist">Interpret</h1>
                <h2 id="currentTitle">Songtitel</h2>
                
                <div class="info-stats">
                    <div>👥 Hörer online: <b id="listenerCount">0</b></div>
                    <div>🕒 Startzeit: <b id="trackStartTime">--:--</b></div>
                </div>
            </div>
        </div>
    </div>

    <div class="glass-card history-panel">
        <h3>Zuletzt gespielt</h3>
        <div class="history-timeline" id="historyTimeline">
            </div>
    </div>
</div>

<div class="controls-bar">
    <div class="footer-partner">
        In offizieller Kooperation mit <b>laut.fm</b>
    </div>
    
    <div>
        <button id="masterPlayBtn" class="btn-main-play" onclick="toggleAudio()">▶</button>
    </div>

    <div style="display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 0.85rem; color: var(--text-muted)">🔊</span>
        <input type="range" class="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="audioEngine.volume=this.value">
    </div>
</div>

<audio id="audioEngine"></audio>

<script>
    let activeSlug = "simulator4";
    const audioEngine = document.getElementById('audioEngine');

    async function fetchRadioData() {
        try {
            // 1. Basis-Infos der Station laden
            const stationResponse = await fetch(`https://api.laut.fm/station/${activeSlug}`);
            if (!stationResponse.ok) return;
            const stationData = await stationResponse.json();

            // Sendername und Hörer live aktualisieren
            document.getElementById('currentStationName').innerText = stationData.display_name;
            document.getElementById('listenerCount').innerText = stationData.current_listeners || 0;

            // Definition der Standard-Bilder (Fallback auf das Senderlogo)
            const fallbackLogo = stationData.images.station_640x640;

            // 2. Aktuellen Song abrufen
            const songResponse = await fetch(`https://api.laut.fm/station/${activeSlug}/current_song`);
            const currentSong = await songResponse.json();

            document.getElementById('currentArtist').innerText = currentSong.artist ? currentSong.artist.name : stationData.display_name;
            document.getElementById('currentTitle').innerText = currentSong.title || "Live Stream";
            document.getElementById('trackStartTime').innerText = currentSong.started_at ? new Date(currentSong.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "--:--";

            // Cover setzen - Wenn kein Bild vorhanden, greift das Standard-Senderlogo
            const coverImg = document.getElementById('trackCover');
            if (currentSong.image && currentSong.image.trim() !== "") {
                coverImg.src = currentSong.image;
            } else {
                coverImg.src = fallbackLogo;
            }

            // 3. Verlauf laden (Rechte Spalte)
            const historyResponse = await fetch(`https://api.laut.fm/station/${activeSlug}/last_songs`);
            const historyData = await historyResponse.json();

            const timelineHtml = historyData.slice(0, 5).map(item => {
                const itemTime = item.started_at ? new Date(item.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "--:--";
                return `
                    <div class="history-row">
                        <div class="history-time">${itemTime}</div>
                        <div class="history-meta">
                            <span class="history-artist">${item.artist ? item.artist.name : 'Interpret'}</span>
                            <span class="history-title">${item.title || 'Titel'}</span>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('historyTimeline').innerHTML = timelineHtml || "<p style='color:var(--text-muted); font-size:0.9rem;'>Kein Verlauf verfügbar.</p>";

        } catch (error) {
            console.error("API-Verbindungsfehler:", error);
        }
    }

    function selectPremiumStation(slug) {
        activeSlug = slug;
        switchStreamIfActive();
        fetchRadioData();
    }

    function searchStation() {
        const inputVal = document.getElementById('stationSearchInput').value.toLowerCase().trim();
        if (inputVal) {
            activeSlug = inputVal;
            switchStreamIfActive();
            fetchRadioData();
        }
    }

    function switchStreamIfActive() {
        if (!audioEngine.paused) {
            audioEngine.src = `https://stream.laut.fm/${activeSlug}`;
            audioEngine.play();
        }
    }

    function toggleAudio() {
        const btn = document.getElementById('masterPlayBtn');
        if (audioEngine.paused) {
            audioEngine.src = `https://stream.laut.fm/${activeSlug}`;
            audioEngine.play();
            btn.innerText = "⏸";
            btn.style.background = "#ff4757";
            btn.style.boxShadow = "0 0 20px rgba(255, 71, 87, 0.4)";
        } else {
            audioEngine.pause();
            btn.innerText = "▶";
            btn.style.background = "var(--accent)";
            btn.style.boxShadow = "0 0 20px rgba(0, 210, 106, 0.4)";
        }
    }

    window.onload = () => {
        fetchRadioData();
        setInterval(fetchRadioData, 15000); // Schnelles Update alle 15 Sekunden
    };
</script>
</body>
</html>
