<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Pro v41.0</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --card: #111; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 10px 15px; border-bottom: 1px solid #222; }
        .search-bar { display: flex; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; align-items: center; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }
        .uhr { text-align: center; font-size: 10px; color: var(--accent); margin-top: 5px; font-weight: bold; }

        .main { flex: 1; overflow-y: auto; padding: 10px 15px 220px 15px; }
        .hero { background: var(--card); border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; border: 1px solid #222; }
        #mainImg { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #000; }
        .hero-info { overflow: hidden; }
        #stName { font-size: 15px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #hoerer { font-size: 9px; color: var(--accent); font-weight: bold; }

        .now { background: #1a1a1a; border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-left: 3px solid var(--accent); }
        .tag { background: var(--accent); color: #000; font-size: 8px; font-weight: bold; padding: 2px 5px; border-radius: 3px; }
        #curT { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .h-item { background: #080808; padding: 8px 10px; border-radius: 8px; display: flex; gap: 10px; font-size: 12px; margin-bottom: 5px; align-items: center; border: 1px solid #111; }
        .h-time { color: var(--accent); font-weight: bold; font-family: monospace; min-width: 35px; }
        .h-info { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        .footer { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 15px 20px 35px 20px; border-top: 1px solid #222; border-radius: 20px 20px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 4px; border-radius: 4px; margin-bottom: 12px; border: 1px solid #1a1a1a; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 10px; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .controls { display: flex; align-items: center; gap: 15px; }
        .pBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 26px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .pBtn.active { background: var(--accent); }
        .vol { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); }
        #status { font-size: 9px; color: #666; text-align: center; margin-top: 5px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header>
        <div class="search-bar">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') sync()">
            <span onclick="sync()" style="cursor:pointer; font-size: 18px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="main">
        <div class="hero">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="hero-info">
                <div id="stName">RADIO PRO</div>
                <div id="hoerer">READY</div>
            </div>
        </div>
        <div class="now">
            <div class="tag">JETZT</div>
            <div id="curT">Sender suchen & Play</div>
        </div>
        <div id="hList"></div>
    </div>

    <div class="footer">
        <div class="ticker"><div id="tText">+++ RADIO
