<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Player Pro v95.00</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #949fb1;
            --status-yellow: #ffb300; --status-blue: #00aaff; --status-pink: #ff00ff; 
        }
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 500px; height: 100%; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        
        .top-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; }
        #sysTime { font-size: 14px; font-weight: bold; }
        .icon-btn { font-size: 18px; color: var(--accent-main); cursor: pointer; }
        
        #searchOverlay { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 85%; height: 42px; background: var(--bg-card); z-index: 100; align-items: center; padding: 0 15px; border-radius: 20px; border: 1px solid var(--accent-main); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }
        
        .hero { padding: 15px 0; text-align: center; }
        #stNameHeader { font-size: 22px; font-weight: bold; margin-bottom: 12px; display: block; color: #fff; }
        #mainImg { width: 60%; aspect-ratio: 1/1; border-radius: 15px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin: 15px 0; }
        #pBtn { width: 65px; height: 65px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 26px; color: #1e2538; cursor: pointer; }
        
        #nowPlayingBox { margin: 0 15px 5px; padding: 12px; border-radius: 15px; background: var(--bg-card); transition: background 0.4s; }
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 8px; border-radius: 10px; margin-bottom: 5px; background: rgba(0,0,0,0.2); }
        .track-cover { width: 45px; height: 45px; border-radius: 5px; object-fit: cover; }
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 14px; font-weight: bold; display: block; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-tit { font-size: 12px; color: #eee; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-time { font-size: 11px; color: var(--accent-main); font-weight: bold; }

        /* Der Button Bereich */
        .more-songs-area { text-align: center; padding: 10px 10px 20px 10px; }
        #btnToggleList { background: none; border: none; color: var(--accent-main); font-size: 14px; font-weight: bold; cursor: pointer; }
        
        .footer-info { padding: 15px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        #footerSlogan { font-size: 14px; text-align: center; margin-bottom: 10px; color: #fff; font-style: italic; }
        .footer-row { display: flex; justify-content: center; margin-bottom: 12px; }
        .hoerer-badge { background: var(--accent-main); color: #1e2538; padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        
        .vol-area { display: flex; align-items: center; gap: 10px; }
        #volSlider { flex: 1; accent-color: var(--accent-main); cursor: pointer; }
        #volLabel { color: var(--accent-main); font-size: 12px; font-weight: bold; min-width: 35px; }
    </style>
</head>
<body onload="initApp()">
<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="icon-btn" onclick="toggleSearch()">🔍</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameHeader">RADIO</span>
            <img id="mainImg" src="">
            <div class="controls">
                <div class="icon-btn" onclick="share()">🔗</div>
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div style="width:20px"></div>
            </div>
        </div>

        <div id="nowPlayingBox">
            <div id="trackList"></div>
        </div>

        <div class="more-songs-area">
            <button id="btnToggleList" onclick="toggleListSize()">mehr Songs anzeigen</button>
        </div>
    </div>

    <div class="footer-info">
        <div id="footerSlogan">Lade Sender...</div>
        <div class="footer-row">
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
        <div class="vol-area">
            <span style="font-size:10px; font-weight:bold; color:var(--accent-main)">VOL</span>
            <input type="range" id="volSlider" min="0" max="100" step="1" value="50" oninput="changeVol(this.value)">
            <span id="volLabel">50%</span>
        </div>
    </div>
</div>

<script>
    const DEFAULT_STATION = "niklas-fm"; const au = new Audio(); au.volume = 0.5;
    let currentSlug = ""; 
    let showFullList = false;

    function initApp() { 
        startStation(DEFAULT_STATION, false); 
        setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000); 
    }

    function toggleListSize() {
        showFullList = !showFullList;
        document.getElementById('btnToggleList').innerText = showFullList ? "weniger anzeigen" : "mehr Songs anzeigen";
        updateUI();
    }

    function changeVol(v) { au.volume = v / 100; document.getElementById('volLabel').innerText = v + "%"; }
    function toggleSearch() { const s = document.getElementById('searchOverlay'); s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; }
    function execSearch() { const input = document.getElementById('sInput'); if(input.value.trim()) { startStation(input.value.trim(), true); toggleSearch(); } }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('footerSlogan').innerText = s.page_title || s.description || "Dein Sound.";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            
            let html = "";
            let currentStatusColor = "var(--bg-card)";
            // Genau 10 Songs wenn "mehr" geklickt wurde, sonst 4
            const listLimit = showFullList ? 9 : 3; 

            l.forEach((song, i) => {
                if(i > listLimit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();
                
                if(check.includes("werbung") || song.type === "gold" || tit.includes("AD_BREAK")) {
                    if(isCurrent) { art = "WERBUNG"; tit = "Gleich geht's weiter..."; currentStatusColor = "var(--status-yellow)"; }
                } else if(check.includes("news") || check.includes("nachrichten")) {
                    if(isCurrent) { art = "NACHRICHTEN"; tit = "Aktuelle Infos..."; currentStatusColor = "var(--status-blue)"; }
                } else if(check.includes("moderation") || check.includes("talk") || check.includes("live") || check.includes("beratung")) {
                    if(isCurrent) { art = "MODERATION AKTIV"; tit = "Es geht gleich weiter..."; currentStatusColor = "var(--status-pink)"; }
                }

                if(isCurrent) {
                    const hasStatus = currentStatusColor !== "var(--bg-card)";
                    document.getElementById('mainImg').src = hasStatus ? s.images.station_640x640 : (song.image_640x640 || s.images.station_640x640);
                    document.getElementById('nowPlayingBox').style.backgroundColor = currentStatusColor;
                }

                html += `<div class="track-entry">
                    <img class="track-cover" src="${song.image_640x640 || s.images.station_120x120}">
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <div class="track-time">${isCurrent ? 'JETZT' : new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
    function share() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
