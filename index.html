<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Radio App Station</title>
    <style>
        :root {
            --primary: #ff5500;
            --bg: #0a0a0c;
            --card: #16161a;
            --accent: #00d4ff;
            --text: #ffffff;
            --text-dim: #888;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 80px rgba(0,0,0,0.6);
            position: relative;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }

        /* --- SUCHE --- */
        .header-search {
            padding: 25px 20px 15px;
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #search-input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid #333;
            background: #222;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #search-input:focus { border-color: var(--primary); }

        #results-box {
            position: absolute;
            top: 80px; left: 20px; right: 20px;
            background: #1e1e24;
            border-radius: 18px;
            max-height: 380px;
            overflow-y: auto;
            display: none;
            border: 1px solid #444;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            z-index: 2000;
        }

        .result-item {
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2d2d35;
            cursor: pointer;
        }

        .result-item:hover { background: #2d2d35; }
        .result-item img { width: 45px; height: 45px; border-radius: 10px; }

        /* --- MAIN PLAYER --- */
        .content {
            flex: 1;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .top-meta {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 25px;
        }

        #station-name { font-size: 26px; font-weight: 800; margin-bottom: 25px; color: #fff; }

        #album-cover {
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1/1;
            border-radius: 35px;
            object-fit: cover;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            background: #111;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        #track-title { font-size: 20px; font-weight: bold; color: #00ffaa; margin-bottom: 5px; }
        #artist-name { font-size: 17px; color: var(--text-dim); margin-bottom: 30px; }

        .play-btn {
            width: 85px; height: 85px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 30px rgba(255, 85, 0, 0.4);
            transition: 0.2s;
        }

        .play-btn:active { transform: scale(0.92); }

        /* --- INFO BOXEN --- */
        .station-bio {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 18px;
            font-size: 14px;
            color: #ccc;
            text-align: left;
            margin-top: 30px;
            line-height: 1.5;
        }

        .history { width: 100%; text-align: left; margin-top: 25px; }
        .history-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0; border-bottom: 1px solid #222; font-size: 13px;
        }
        .history-item img { width: 35px; height: 35px; border-radius: 6px; }

        /* --- VERSION FOOTER --- */
        .footer {
            padding: 15px;
            text-align: center;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-search">
        <input type="text" id="search-input" placeholder="Sender sofort suchen..." autocomplete="off">
        <div id="results-box"></div>
    </div>

    <div class="content">
        <div class="top-meta">
            <div id="clock">00:00:00</div>
            <div id="listeners">● 0 HÖRER</div>
        </div>

        <div id="station-name">Ready to Play</div>
        
        <img id="album-cover" src="" alt="">

        <div id="track-title">Kein Sender gewählt</div>
        <div id="artist-name">Suche oben eine Station</div>

        <button class="play-btn" id="mainPlay">
            <svg id="p-svg" width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            <svg id="s-svg" width="40" height="40" viewBox="0 0 24 24" fill="white" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="station-bio" id="bio">Wähle eine Station aus der Suche, um Hörerzahlen und Details zu sehen.</div>

        <div class="history" id="hist-list"></div>
    </div>

    <div class="footer">VERSION 3.5.0 PREMIUM STATION</div>
</div>

<audio id="audio-engine" playsinline></audio>

<script>
    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('mainPlay');
    const input = document.getElementById('search-input');
    const results = document.getElementById('results-box');
    
    let activeStation = "";

    async function loadStation(name) {
        try {
            const r = await fetch(`https://api.laut.fm/station/${name}`);
            const data = await r.json();

            document.getElementById('station-name').innerText = data.display_name;
            document.getElementById('listeners').innerText = `● ${data.current_listeners} HÖRER`;
            document.getElementById('bio').innerText = data.description || "Keine Info.";
            const logo = data.images.station_640x640;

            const rS = await fetch(`https://api.laut.fm/station/${name}/last_songs`);
            const songs = await rS.json();

            if(songs && songs.length > 0) {
                document.getElementById('track-title').innerText = songs[0].title;
                document.getElementById('artist-name').innerText = songs[0].artist.name;
                document.getElementById('album-cover').src = songs[0].image_640x640 || logo;
                
                let h = "";
                songs.slice(1, 6).forEach(s => {
                    const t = s.started_at.split(' ')[1].substring(0,5);
                    h += `<div class="history-item"><b style="color:var(--primary)">${t}</b> <img src="${s.image_120x120 || logo}"> <span>${s.artist.name} - ${s.title}</span></div>`;
                });
                document.getElementById('hist-list').innerHTML = h;
            }
        } catch(e) { console.log("Fehler beim Laden"); }
    }

    function change(name) {
        activeStation = name;
        audio.pause();
        audio.src = `https://stream.laut.fm/${name}`;
        
        document.getElementById('p-svg').style.display = "none";
        document.getElementById('s-svg').style.display = "block";
        
        audio.play().catch(e => console.log("Klick erforderlich"));
        loadStation(name);
        results.style.display = "none";
        input.value = "";
    }

    playBtn.onclick = () => {
        if(!activeStation) return;
        if(audio.paused) {
            audio.play();
            document.getElementById('p-svg').style.display = "none";
            document.getElementById('s-svg').style.display = "block";
        } else {
            audio.pause();
            document.getElementById('p-svg').style.display = "block";
            document.getElementById('s-svg').style.display = "none";
        }
    };

    input.oninput = async () => {
        const val = input.value.trim();
        if(val.length < 2) { results.style.display = "none"; return; }
        const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`);
        const d = await r.json();
        if(d.items) {
            results.innerHTML = "";
            results.style.display = "block";
            d.items.slice(0, 10).forEach(s => {
                const item = document.createElement('div');
                item.className = "result-item";
                item.onmousedown = (e) => { e.preventDefault(); change(s.name); };
                item.innerHTML = `<img src="${s.images.station_80x80}"> <div><b>${s.display_name}</b><br><small style="color:#666">${s.current_listeners} Hörer</small></div>`;
                results.appendChild(item);
            });
        }
    };

    input.onblur = () => setTimeout(() => results.style.display = "none", 300);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(() => { if(activeStation) loadStation(activeStation); }, 30000);
</script>
</body>
</html>
