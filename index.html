<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.39</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #cbd5e0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d111a; margin: 0; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; }
        
        .app { width: 100%; max-width: 1000px; height: 100vh; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }

        .top-bar { height: 45px; display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 15px; flex-shrink: 0; }
        #sysTime { font-size: 14px; font-weight: bold; }
        .search-trigger { cursor: pointer; font-size: 20px; }

        .main-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* HEADER / HERO */
        .hero { padding: 10px 0; text-align: center; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
        #stNameHeader { font-size: 20px; font-weight: 900; margin: 0 0 10px; text-transform: uppercase; color: var(--accent-main); letter-spacing: 1px; }
        #mainImg { width: 140px; height: 140px; border-radius: 15px; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        
        .controls { margin: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #pBtn { width: 50px; height: 50px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 22px; cursor: pointer; color: #1e2538; display: flex; align-items: center; justify-content: center; }
        .hoerer-badge { background: rgba(0,250,217,0.1); color: var(--accent-main); padding: 3px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; border: 1px solid var(--accent-main); }

        /* DIE LISTE */
        .list-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .list-header { font-size: 11px; font-weight: 900; color: var(--accent-main); margin: 5px 15px; text-transform: uppercase; opacity: 0.7; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 0 12px 20px; scrollbar-width: none; }
        .scroll-content::-webkit-scrollbar { display: none; }
        
        .track-entry { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.04); }
        .track-entry.current { border-left: 4px solid var(--accent-main); background: rgba(255,255,255,0.08); }
        .status-icon { width: 22px; font-size: 16px; text-align: center; }
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 13px; font-weight: bold; display: block; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track-tit { font-size: 11px; color: var(--text-dim); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* DER MEHR BUTTON IN DER LISTE */
        #btnMore { 
            width: 100%; padding: 10px; margin-top: 5px; background: rgba(255,255,255,0.03); 
            border: 1px dashed var(--accent-main); color: var(--accent-main); 
            border-radius: 10px; font-size: 11px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        #btnMore:hover { background: rgba(0, 250, 217, 0.1); }

        /* FOOTER */
        .fixed-footer { padding: 8px; background: rgba(0,0,0,0.3); text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        #footerDesc { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
        .version-tag { font-size: 9px; opacity: 0.3; letter-spacing: 2px; }

        #searchOverlay { position: absolute; top: 5px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 300px; height: 45px; background: var(--bg-card); z-index: 1000; display: none; align-items: center; padding: 0 15px; border-radius: 20px; border: 2px solid var(--accent-main); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; }

        @media (min-width: 800px) {
            .main-layout { flex-direction: row; }
            .hero { width: 35%; justify-content: center; border-right: 1px solid rgba(255,255,255,0.05); }
            .list-container { width: 65%; }
            #mainImg { width: 220px; height: 220px; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none;border:none;color:#fff;cursor:pointer;">✕</button>
    </div>

    <div class="top-bar"><div id="sysTime">00:00</div><div class="search-trigger" onclick="toggleSearch()">🔍</div></div>

    <div class="main-layout">
        <div class="hero">
            <h1 id="stNameHeader">RADIO</h1>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
        </div>

        <div class="list-container">
            <div class="list-header">PROGAMM & VERLAUF</div>
            <div class="scroll-content" id="scrollBox">
                <div id="trackList"></div>
                <button id="btnMore" onclick="toggleMore()" style="display:none;">MEHR ANZEIGEN</button>
            </div>
        </div>
    </div>

    <div class="fixed-footer">
        <div id="footerDesc">Suche einen Sender...</div>
        <div class="version-tag">V115.39</div>
    </div>
</div>

<script>
    const au = new Audio(); let currentSlug = ""; let limit = 4;
    function initApp() { setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000); }
    function toggleSearch() { const s = document.getElementById('searchOverlay'); s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; if(s.style.display === 'flex') document.getElementById('sInput').focus(); }
    function execSearch() { const val = document.getElementById('sInput').value.trim(); if(val) { startStation(val, true); toggleSearch(); document.getElementById('sInput').value=""; } }
    
    function toggleMore() { 
        limit = (limit === 4) ? 9 : 4; 
        document.getElementById('btnMore').innerText = (limit === 4) ? "MEHR ANZEIGEN" : "WENIGER ANZEIGEN";
        updateUI(); 
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnMore').style.display = 'block';
        updateUI(); if(window.uiInterval) clearInterval(window.uiInterval); window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { if(!currentSlug) return; if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json())
            ]);
            const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/listeners`);
            const hCount = await hRes.text();

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('footerDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = (hCount.includes("<") ? "0" : hCount) + " HÖRER";

            let html = "";
            l.forEach((song, i) => {
                if(i >= limit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name; let tit = song.title;
                const fullText = (art + " " + tit).toLowerCase();
                
                // Prio: Song-Bild > Station-Bild
                let albumImg = song.image_640x640 || song.image_170x170 || s.images.station_640x640;
                
                if(isCurrent) document.getElementById('mainImg').src = albumImg;
                
                let icon = isCurrent ? "🔊" : "";
                if(song.type === "ads" || fullText.includes("reklame")) { icon = "📢"; art = "WERBUNG"; }
                else if(fullText.includes("nachrichten") || fullText.includes("news")) { icon = "📰"; art = "NACHRICHTEN"; }
                else if(art.toLowerCase().includes("moderation")) { icon = "🎙️"; }

                html += `<div class="track-entry ${isCurrent ? 'current' : ''}">
                    <div class="status-icon">${icon}</div>
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <img class="track-cover" src="${albumImg}">
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
