<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Console v27</title>
    <style>
        :root { --accent: #00ffa3; --bg: #05070a; --panel: #12151c; --border: #2a2f3a; }
        body { margin: 0; background: var(--bg); color: #eef; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER / VU-METER AREA */
        header { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .vu-container { display: flex; gap: 3px; height: 20px; align-items: flex-end; }
        .vu-bar { width: 4px; background: var(--accent); animation: bounce 0.5s infinite alternate; }
        @keyframes bounce { from { height: 20%; } to { height: 100%; } }

        /* MAIN STUDIO LAYOUT */
        .studio-grid { display: grid; grid-template-columns: 320px 1fr 320px; gap: 10px; padding: 10px; flex: 1; overflow: hidden; }

        .module { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .module-head { background: rgba(255,255,255,0.05); padding: 10px; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid var(--border); color: var(--accent); display: flex; justify-content: space-between; }

        /* LINKS: LAUT.FM SEARCH */
        .search-input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; margin-bottom: 10px; }
        .list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .radio-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #1c2028; cursor: pointer; border-radius: 4px; margin-bottom: 5px; font-size: 0.85rem; }
        .radio-item:hover { background: #1c2128; }
        .radio-item img { width: 35px; height: 35px; border-radius: 3px; }

        /* MITTE: MAIN PLAYER & DB */
        .center-wrap { display: flex; flex-direction: column; gap: 10px; }
        .main-display { background: #000; border: 2px solid #1c2128; border-radius: 12px; padding: 20px; text-align: center; position: relative; }
        #main-cover { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--accent); object-fit: cover; margin-bottom: 15px; }
        .on-air-lamp { position: absolute; top: 15px; right: 20px; padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; background: #222; color: #444; }
        .on-air-active { background: #f00 !important; color: #fff !important; box-shadow: 0 0 15px #f00; }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .btn-round { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .btn-play { background: var(--accent); color: #000; }
        .btn-reset { background: #333; color: #fff; }

        .db-area { flex: 1; background: #080a0e; border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .db-controls { padding: 10px; border-bottom: 1px solid var(--border); display: flex; gap: 5px; }

        /* RECHTS: LOCAL SETUP & UPLOAD */
        .setup-body { padding: 15px; font-size: 0.85rem; }
        .setup-body label { display: block; margin-bottom: 5px; color: #8b949e; }
        input[type="text"], textarea { width: 100%; padding: 8px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 4px; margin-bottom: 15px; }
        .upload-box { border: 2px dashed var(--border); padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; }

        footer { background: #000; padding: 8px 20px; font-size: 0.75rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; color: #555; }
    </style>
</head>
<body>

<header>
    <div class="logo">STUDIO CONSOLE <span style="color:white">PRO</span></div>
    <div class="vu-container">
        <div class="vu-bar" style="animation-duration: 0.4s"></div>
        <div class="vu-bar" style="animation-duration: 0.7s"></div>
        <div class="vu-bar" style="animation-duration: 0.5s"></div>
        <div class="vu-bar" style="animation-duration: 0.3s"></div>
        <div class="vu-bar" style="animation-duration: 0.6s"></div>
    </div>
</header>

<div class="studio-grid">
    <div class="module">
        <div class="module-head">LAUT.FM BROWSER <span>LIVE</span></div>
        <div style="padding:10px; border-bottom:1px solid #222;">
            <input type="text" id="l-search" class="search-input" placeholder="Sender suchen..." oninput="searchL()">
        </div>
        <div id="l-results" class="list-container"></div>
    </div>

    <div class="column center-wrap">
        <div class="main-display">
            <div id="on-air" class="on-air-lamp">OFF AIR</div>
            <img id="main-cover" src="https://via.placeholder.com/160/111/fff?text=STUDIO">
            <h2 id="cur-title" style="margin:0; font-size: 1.5rem;">Radio Station</h2>
            <p id="cur-info" style="color:var(--accent); font-size: 0.9rem; margin:5px 0 15px;">Warte auf Signal...</p>
            
            <div class="controls">
                <button class="btn-round btn-play" onclick="toggle()">ON</button>
                <button class="btn-round btn-reset" onclick="location.reload()">RST</button>
            </div>
        </div>

        <div class="db-area module">
            <div class="module-head">INTERNET MUSIK DATENBANK</div>
            <div class="db-controls">
                <input type="text" id="db-url" placeholder="Musik-URL (http://...)" style="margin:0; flex:1; background:#000; color:white; border:1px solid #333; padding:5px;">
                <button onclick="addDB()" style="background:var(--accent); border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">ADD</button>
            </div>
            <div id="db-list" class="list-container"></div>
        </div>
    </div>

    <div class="module">
        <div class="module-head">STUDIO SETUP & LOKAL</div>
        <div class="setup-body">
            <label>Name des Senders:</label>
            <input type="text" id="set-name" placeholder="Mein Radio" oninput="updateUI()">
            <label>Standort (Straße / Ort):</label>
            <input type="text" id="set-loc" placeholder="Musterstadt" oninput="updateUI()">
            
            <label>Lokale MP3 hochladen:</label>
            <div class="upload-box" onclick="document.getElementById('f-input').click()">
                Klicken zum Hochladen
                <input type="file" id="f-input" hidden multiple accept="audio/*" onchange="localUp(event)">
            </div>
            <div id="local-list" style="margin-top:10px; font-size:0.75rem;"></div>
        </div>
    </div>
</div>

<footer>
    <span>STUDIO STATUS: <span id="st-stat">IDLE</span></span>
    <span>SENDER-FREQ: DIGITAL STREAM</span>
    <span id="st-clock">00:00:00</span>
</footer>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio');
    let playlist = [];
    let curIdx = 0;

    // --- LAUT.FM ---
    async function searchL() {
        const q = document.getElementById('l-search').value;
        if(q.length < 2) return;
        const r = await fetch(`https://api.laut.fm/search/stations?query=${q}`);
        const d = await r.json();
        const res = document.getElementById('l-results');
        res.innerHTML = "";
        d.items.forEach(s => {
            const div = document.createElement('div');
            div.className = "radio-item";
            div.onclick = () => loadExt(s.display_name, s.images.station_640x640, `https://stream.laut.fm/${s.name}`);
            div.innerHTML = `<img src="${s.images.station_80x80}"> <b>${s.display_name}</b>`;
            res.appendChild(div);
        });
    }

    // --- PLAYER FUNKTIONEN ---
    function loadExt(name, art, url) {
        audio.src = url;
        audio.play();
        document.getElementById('cur-title').innerText = name;
        document.getElementById('main-cover').src = art;
        setLive(true, "LAUT.FM STREAM");
    }

    function toggle() {
        if(audio.paused) { audio.play(); setLive(true); }
        else { audio.pause(); setLive(false); }
    }

    function setLive(isLive, info) {
        const lamp = document.getElementById('on-air');
        const stat = document.getElementById('st-stat');
        if(isLive) {
            lamp.innerText = "ON AIR";
            lamp.classList.add('on-air-active');
            stat.innerText = "BROADCASTING";
            if(info) document.getElementById('cur-info').innerText = info;
        } else {
            lamp.innerText = "OFF AIR";
            lamp.classList.remove('on-air-active');
            stat.innerText = "IDLE";
        }
    }

    // --- DATENBANK & LOKAL ---
    function addDB() {
        const url = document.getElementById('db-url').value;
        if(!url) return;
        const name = "Online: " + url.split('/').pop();
        playlist.push({name, url});
        renderLists();
        document.getElementById('db-url').value = "";
    }

    function localUp(e) {
        const files = Array.from(e.target.files);
        files.forEach(f => playlist.push({name: f.name, url: URL.createObjectURL(f)}));
        renderLists();
    }

    function renderLists() {
        const dbBox = document.getElementById('db-list');
        const lcBox = document.getElementById('local-list');
        dbBox.innerHTML = ""; lcBox.innerHTML = "";
        playlist.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = "radio-item";
            d.onclick = () => {
                audio.src = t.url; audio.play();
                document.getElementById('cur-title').innerText = t.name;
                document.getElementById('main-cover').src = "https://via.placeholder.com/160/00ffa3/000?text=AUDIO";
                setLive(true, "LOCAL / DB SOURCE");
            };
            d.innerText = `🎵 ${t.name}`;
            t.url.startsWith('blob') ? lcBox.appendChild(d) : dbBox.appendChild(d);
        });
    }

    function updateUI() {
        const n = document.getElementById('set-name').value;
        const l = document.getElementById('set-loc').value;
        if(audio.paused) {
            document.getElementById('cur-title').innerText = n || "Radio Station";
            document.getElementById('cur-info').innerText = l || "Warte auf Signal...";
        }
    }

    setInterval(() => { document.getElementById('st-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
