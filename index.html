<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Pro 2026 - Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; }
        
        /* Status-Anzeige (Admin-Bereich) */
        #status-container { position: fixed; top: 10px; left: 10px; z-index: 1000; background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Header & Suchleiste */
        .header { background: white; padding: 15px 40px; border-bottom: 2px solid #eee; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
        .btn-add { padding: 8px 16px; background: #00a67c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        /* Grid & Karten */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; position: relative; }
        .clickable-logo { cursor: pointer; display: inline-block; border-radius: 4px; overflow: hidden; }
        
        .btn-play { background: #00a67c; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .star { font-size: 1.5rem; cursor: pointer; color: #ccc; float: right; }
        .star.active { display: none; }
    </style>
</head>
<body>

<!-- Status-Anzeige & Login (Oben Links) -->
<div id="status-container">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div id="status-dot" style="width: 12px; height: 12px; border-radius: 50%; background-color: gray;"></div>
        <span id="status-text" style="font-weight: bold; font-family: sans-serif;">Prüfe System...</span>
    </div>
    <button onclick="window.open('https://radioadmin.laut.fm/', '_blank')" style="width: 100%; padding: 8px; background: #00a67c; color: white; border: none; border-radius: 4px; cursor: pointer;">
        Zum Admin-Login
    </button>
</div>

<header class="header">
    <input type="text" id="searchInput" placeholder="Sender-Slug...">
    <button class="btn-add" onclick="addStation()">Hinzufügen</button>
</header>

<div class="grid" id="grid"></div>
<audio id="player"></audio>

<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    let savedFavs = JSON.parse(localStorage.getItem('my_saved_favs')) || [];
    const player = document.getElementById('player');

    // Admin Status Abfrage
    async function checkStatus() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        try {
            await fetch('https://radioadmin.laut.fm', { mode: 'no-cors' });
            dot.style.backgroundColor = '#22c55e';
            text.innerText = 'System Online';
        } catch (e) {
            dot.style.backgroundColor = '#ef4444';
            text.innerText = 'System Offline';
        }
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        stations.forEach(s => {
            const isSaved = savedFavs.includes(s);
            const isPlaying = !player.paused && player.src.includes(s);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="star ${isSaved ? 'active' : ''}" onclick="saveStation('${s}')">★</div>
                <div class="clickable-logo" onclick="window.open('https://laut.fm/${s}', '_blank')">
                    <img id="img-${s}" src="https://api.laut.fm/favicon.ico" style="width:60px; height:60px; object-fit: cover;">
                </div>
                <div><b style="text-transform:uppercase;">${s}</b><br><small id="list-${s}">0 Hörer</small></div>
                <div style="margin:10px 0; font-size:0.9rem;">
                    <div id="art-${s}" style="font-weight:bold;">Lade...</div>
                    <div id="tit-${s}">...</div>
                </div>
                <button class="btn-play" onclick="toggle('${s}')" id="btn-${s}">
                    ${isPlaying ? '⏹ Sender stoppen' : '▶ Sender starten'}
                </button>
            `;
            grid.appendChild(card);
            updateData(s);
        });
    }

    function saveStation(s) {
        if (!savedFavs.includes(s)) {
            savedFavs.push(s);
            localStorage.setItem('my_saved_favs', JSON.stringify(savedFavs));
            render();
        }
    }

    function toggle(s) {
        const btn = document.getElementById(`btn-${s}`);
        if (!player.paused && player.src.includes(s)) {
            player.pause();
            btn.innerHTML = "▶ Sender starten";
        } else {
            player.pause();
            document.querySelectorAll('.btn-play').forEach(b => b.innerHTML = "▶ Sender starten");
            player.src = `https://stream.laut.fm/${s}`;
            player.play();
            btn.innerHTML = "⏹ Sender stoppen";
        }
    }

    async function updateData(s) {
        fetch(`https://api.laut.fm/station/${s}`).then(r => r.json()).then(d => {
            if (d.images) {
                const img = d.images.station_640x640 || d.images.station_800x800 || d.images.station_120x120;
                document.getElementById(`img-${s}`).src = img;
            }
        });
        fetch(`https://api.laut.fm/station/${s}/listeners`).then(r => r.text()).then(t => {
            document.getElementById(`list-${s}`).innerText = t + " Hörer";
        });
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
            document.getElementById(`tit-${s}`).innerText = d.title || "-";
        });
    }

    function addStation() {
        const val = document.getElementById('searchInput').value.toLowerCase().trim();
        if(val && !stations.includes(val)) {
            stations.push(val);
            localStorage.setItem('my_stations', JSON.stringify(stations));
            render();
        }
    }

    window.onload = () => { render(); checkStatus(); };
    setInterval(() => { stations.forEach(updateData); checkStatus(); }, 30000);
</script>
</body>
</html>
