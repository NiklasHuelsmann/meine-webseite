<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas Radio-Dashboard</title>
    <style>
        :root { --bg-color: #f4f6f9; --text-color: #333; --card-bg: white; }
        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #1a1a2e; --text-color: #f0f0f0; --card-bg: #16213e; }
        }
        body { font-family: sans-serif; background-color: var(--bg-color); background-image: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); background-attachment: fixed; color: var(--text-color); margin: 0; }
        #status-container { position: fixed; top: 10px; left: 10px; z-index: 1000; background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid #777; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header { background: var(--card-bg); padding: 15px 40px; border-bottom: 2px solid #333; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 3px solid transparent; cursor: grab; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
        .active-card { border: 3px solid #ef4444 !important; }
        .btn-play { background: #00a67c; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .star { position: absolute; top: 10px; right: 10px; font-size: 1.5rem; cursor: pointer; color: #facc15; }
        .delete-btn { position: absolute; top: 10px; left: 10px; font-size: 1.2rem; cursor: pointer; color: #ef4444; background: rgba(0,0,0,0.1); border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; }
        .status-badge { color: #ef4444; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; display: none; }
        .active-card .status-badge { display: block; }
    </style>
</head>
<body>

<div id="status-container">
    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
        <div id="status-dot" style="width: 12px; height: 12px; border-radius: 50%; background-color: gray;"></div>
        <span id="status-text" style="font-weight: bold;">Prüfe System...</span>
    </div>
    <button onclick="window.open('https://radioadmin.laut.fm', '_blank', 'noopener')" style="width: 100%; padding: 8px; background: #00a67c; color: white; border: none; border-radius: 4px; cursor: pointer;">Login</button>
</div>

<header class="header">
    <input type="text" id="searchInput" placeholder="Sender-Slug..." style="padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
    <button onclick="addStation()" style="padding: 8px 16px; background: #00a67c; color: white; border: none; border-radius: 4px; cursor: pointer;">Hinzufügen</button>
</header>

<div class="grid" id="grid"></div>
<audio id="player"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    let savedFavs = JSON.parse(localStorage.getItem('my_saved_favs')) || [];
    const grid = document.getElementById('grid');
    const player = document.getElementById('player');

    new Sortable(grid, { animation: 150, onEnd: saveOrder });

    function saveOrder() {
        const newOrder = Array.from(document.querySelectorAll('.card')).map(c => c.dataset.id);
        stations = newOrder;
        localStorage.setItem('my_stations', JSON.stringify(stations));
    }

    function render() {
        grid.innerHTML = '';
        stations.forEach(s => {
            const isPlaying = !player.paused && player.src === `https://stream.laut.fm/${s}`;
            const isFav = savedFavs.includes(s);
            
            const card = document.createElement('div');
            card.className = `card ${isPlaying ? 'active-card' : ''}`;
            card.dataset.id = s;
            
            card.innerHTML = `
                <div class="delete-btn" onclick="removeStation('${s}')">×</div>
                ${!isFav ? `<div class="star" onclick="saveStation('${s}')">★</div>` : ''}
                <div class="status-badge">AKTIV - Läuft gerade</div>
                <img id="img-${s}" src="https://api.laut.fm/favicon.ico" style="width:100px; height:100px; object-fit:cover; border-radius:8px; margin-top:5px;">
                <div style="text-transform:uppercase; font-weight:bold; margin-top:10px;">${s}</div>
                <div id="list-${s}" style="font-size:0.8rem; color:#888;">0 Hörer</div>
                <div id="art-${s}" style="font-size:0.9rem; margin-top:5px; font-weight:bold;">Lade...</div>
                <button class="btn-play" onclick="toggle('${s}')">
                    ${isPlaying ? '⏹ Sender stoppen' : '▶ Sender starten'}
                </button>
            `;
            grid.appendChild(card);
            updateData(s);
        });
    }

    async function updateData(s) {
        // Logo
        fetch(`https://api.laut.fm/station/${s}`).then(r => r.json()).then(d => {
            if (d.images) document.getElementById(`img-${s}`).src = `${d.images.station}?t=640x640`;
        });
        // Hörer
        fetch(`https://api.laut.fm/station/${s}/listeners`).then(r => r.text()).then(t => {
            document.getElementById(`list-${s}`).innerText = t + " Hörer";
        });
        // Song
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
        });
    }

    function removeStation(s) {
        stations = stations.filter(st => st !== s);
        savedFavs = savedFavs.filter(st => st !== s);
        localStorage.setItem('my_stations', JSON.stringify(stations));
        localStorage.setItem('my_saved_favs', JSON.stringify(savedFavs));
        render();
    }

    function saveStation(s) {
        if (!savedFavs.includes(s)) {
            savedFavs.push(s);
            localStorage.setItem('my_saved_favs', JSON.stringify(savedFavs));
            render();
        }
    }

    function toggle(s) {
        const streamUrl = `https://stream.laut.fm/${s}`;
        if (!player.paused && player.src === streamUrl) {
            player.pause();
            player.src = "";
        } else {
            player.src = streamUrl;
            player.play();
        }
        render();
    }

    function addStation() {
        const val = document.getElementById('searchInput').value.toLowerCase().trim();
        if(val && !stations.includes(val)) {
            stations.push(val);
            localStorage.setItem('my_stations', JSON.stringify(stations));
            render();
        }
    }

    window.onload = () => { render(); checkStatus(); };
    async function checkStatus() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        try {
            await fetch('https://radioadmin.laut.fm', { mode: 'no-cors', signal: controller.signal });
            clearTimeout(timeoutId);
            dot.style.backgroundColor = '#22c55e';
            text.innerText = 'System Online';
        } catch (e) {
            clearTimeout(timeoutId);
            dot.style.backgroundColor = '#ef4444';
            text.innerText = 'System Offline';
        }
    }
    
    // Auto-Update alle 30s
    setInterval(() => { stations.forEach(updateData); checkStatus(); }, 30000);
</script>
</body>
</html>
