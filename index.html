<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Player</title>
    <style>
        :root {
            --accent: #ff4400; /* Hier kannst du deine Wunschfarbe für den Knopf wählen */
            --text: #000000;
            --bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Obere Leiste mit Suche und Hörerzahl */
        .header-bar {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .listeners-count {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .search-form {
            display: flex;
            background: #f0f0f0;
            border-radius: 20px;
            padding: 5px 10px;
        }

        .search-form input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 0.8rem;
            width: 100px;
        }

        /* Hauptbereich in der Mitte */
        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .station-logo {
            width: 220px;
            height: 220px;
            border-radius: 40px; /* Abgerundetes Quadrat/Display */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }

        .now-playing {
            margin-bottom: 30px;
        }

        .now-playing h2 { margin: 5px 0; font-size: 1.5rem; }
        .now-playing p { margin: 0; color: #666; font-size: 1.1rem; }

        /* Der Play-Knopf */
        .play-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        /* Unterer Bereich: Letzte Songs */
        .history-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            background: #fafafa;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
        }

        .history-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 15px;
            display: block;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .history-info { text-align: left; }
        .history-info strong { display: block; font-size: 0.95rem; }
        .history-info span { font-size: 0.85rem; color: #666; }

        .history-time { font-size: 0.8rem; font-weight: bold; color: var(--accent); }

        /* Unsichtbarer Audio-Player */
        audio { display: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="listeners-count" id="listeners">Hörer: -</div>
        <form class="search-form" onsubmit="event.preventDefault(); loadStation();">
            <input type="text" id="stationInput" placeholder="Sender suchen..." autocomplete="off">
        </form>
    </div>

    <div class="main-display" id="player-ui" style="display: none;">
        <img id="stationLogo" class="station-logo" src="" alt="Station Logo">
        
        <div class="now-playing">
            <h2 id="currentTitle">Titel</h2>
            <p id="currentArtist">Künstler</p>
        </div>

        <button class="play-btn" id="playBtn" onclick="toggleAudio()">▶</button>

        <div class="history-container">
            <span class="history-title">Zuletzt gelaufen</span>
            <div id="historyList"></div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let currentStation = "";
        let isPlaying = false;
        let updateInterval;

        async function loadStation() {
            const input = document.getElementById('stationInput').value.trim().toLowerCase();
            if (!input) return;
            
            currentStation = input;
            const audio = document.getElementById('audioPlayer');
            audio.src = `https://stream.laut.fm/${currentStation}`;
            
            document.getElementById('player-ui').style.display = 'flex';
            
            updateData();
            if(updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateData, 20000);
            
            // Sofort abspielen
            audio.play();
            isPlaying = true;
            document.getElementById('playBtn').innerText = "⏸";
        }

        function toggleAudio() {
            const audio = document.getElementById('audioPlayer');
            if (isPlaying) {
                audio.pause();
                document.getElementById('playBtn').innerText = "▶";
            } else {
                audio.play();
                document.getElementById('playBtn').innerText = "⏸";
            }
            isPlaying = !isPlaying;
        }

        async function updateData() {
            try {
                // Hörer und Logo
                const stationRes = await fetch(`https://api.laut.fm/station/${currentStation}`);
                const sData = await stationRes.json();
                document.getElementById('listeners').innerText = `Hörer: ${sData.current_listeners}`;
                document.getElementById('stationLogo').src = sData.images.station_80x80 || sData.images.station;

                // Aktueller Song
                const songRes = await fetch(`https://api.laut.fm/station/${currentStation}/current_song`);
                const songData = await songRes.json();
                document.getElementById('currentTitle').innerText = songData.title;
                document.getElementById('currentArtist').innerText = songData.artist;

                // Letzte Songs
                const histRes = await fetch(`https://api.laut.fm/station/${currentStation}/last_songs`);
                const histData = await histRes.json();
                const list = document.getElementById('historyList');
                list.innerHTML = "";

                histData.slice(0, 3).forEach(song => {
                    const date = new Date(song.started_at);
                    const time = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
                    list.innerHTML += `
                        <div class="history-item">
                            <div class="history-info">
                                <strong>${song.title}</strong>
                                <span>${song.artist}</span>
                            </div>
                            <div class="history-time">${time}</div>
                        </div>
                    `;
                });
            } catch (e) {
                console.log("Fehler beim Laden.");
            }
        }
    </script>
</body>
</html>
