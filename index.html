<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brian-Radio App-Original</title>
    <style>
        :root { --bg: #1a1e29; --accent: #00d2ff; --surface: #252a38; --highlight: #00f2c3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; position: relative; }
        
        /* Header mit Uhr & Suche */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: var(--bg); z-index: 10; }
        .uhr { font-family: monospace; font-size: 16px; color: #fff; opacity: 0.8; }
        .search-area { background: #00000033; border-radius: 8px; display: flex; padding: 5px 10px; width: 50%; border: 1px solid #ffffff11; }
        .search-area input { background: transparent; border: none; color: #fff; width: 100%; font-size: 13px; outline: none; }

        /* Scroll-Inhalt (Hier wie im Screenshot) */
        .scroll-content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: none; }
        .scroll-content::-webkit-scrollbar { display: none; }

        .headline { font-size: 24px; font-weight: bold; font-style: italic; margin-bottom: 25px; display: block; }
        
        /* Song Liste Design wie im Foto */
        .song-list { display: flex; flex-direction: column; gap: 20px; }
        .song-entry { display: flex; gap: 15px; align-items: flex-start; }
        .time-label { font-size: 13px; color: #ffffff88; min-width: 45px; margin-top: 2px; }
        .song-info { flex: 1; }
        .artist { font-weight: bold; font-size: 16px; display: block; margin-bottom: 2px; }
        .title { color: #ffffffaa; font-size: 14px; }
        
        /* Visualizer im obersten Song */
        .viz-icon { width: 20px; height: 20px; display: flex; align-items: flex-end; gap: 2px; }
        .bar { width: 3px; background: var(--highlight); height: 4px; border-radius: 1px; }
        .playing .bar { animation: bounce 0.8s ease infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { height: 4px; } to { height: 18px; } }

        /* Mehr Anzeigen Button */
        #moreBtn { 
            background: none; border: none; color: var(--highlight); 
            font-weight: bold; font-size: 14px; cursor: pointer; 
            margin: 25px auto; display: block; text-align: center;
        }

        /* Sender Details (Unten) */
        .details-box { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ffffff11; }
        .details-box h2 { font-size: 20px; margin: 0 0 10px 0; color: var(--accent); }
        .details-box p { font-size: 14px; color: #ffffff99; line-height: 1.6; }
        .hoerer-badge { font-size: 12px; font-weight: bold; color: var(--highlight); background: #00f2c311; padding: 5px 12px; border-radius: 20px; display: inline-block; }

        /* Player Dock unten (Die dunkle Leiste) */
        .player-dock { 
            background: #12151e; border-top: 1px solid #ffffff11; 
            padding: 15px 20px calc(20px + env(safe-area-inset-bottom));
            display: flex; align-items: center; gap: 15px;
        }
        #mainImg { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .dock-info { flex: 1; overflow: hidden; }
        .dock-station { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #fff; }
        .dock-song { font-size: 11px; color: #ffffff88; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        #pBtn { background: none; border: none; color: var(--highlight); font-size: 30px; cursor: pointer; }

        .volume-pop { position: absolute; bottom: 85px; right: 20px; background: var(--surface); padding: 10px; border-radius: 10px; display: none; flex-direction: column; align-items: center; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="uhr" class="uhr">00:00:00</div>
        <div class="search-area">
            <input type="text" id="sIn" placeholder="Suche" onkeydown="if(event.key==='Enter') startRadio()">
            <span onclick="startRadio()" style="cursor:pointer">🔍</span>
        </div>
    </header>

    <div class="scroll-content">
        <span class="headline">Jetzt läuft</span>
        
        <div id="hList" class="song-list">
            </div>

        <button id="moreBtn" onclick="toggleMore()">mehr Songs anzeigen</button>

        <div class="details-box">
            <h2 id="stName">Brian-Radio</h2>
            <div id="stDesc">Lade Senderbeschreibung...</div>
            <div id="hoerer" class="hoerer-badge">0 Hörer live</div>
        </div>
    </div>

    <div class="player-dock">
        <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
        <div class="dock-info">
            <div id="dockStation" class="dock-station">SENDER WÄHLEN</div>
            <div id="dockSong" class="dock-song">Warte auf Musik...</div>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" style="width:60px;">
            <button id="pBtn" onclick="toggle()">▶</button>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    let currentSlug = "";
    let dataJob = null;
    let showAllSongs = false;

    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    document.getElementById('vol').oninput = (e) => { au.volume = e.target.value; };

    function startRadio() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play();
        document.getElementById('pBtn').innerHTML = "⏸";
        updateUI();
        if(dataJob) clearInterval(dataJob);
        dataJob = setInterval(updateUI, 15000);
        document.activeElement.blur();
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleMore() {
        showAllSongs = !showAllSongs;
        document.getElementById('moreBtn').innerText = showAllSongs ? "weniger anzeigen" : "mehr Songs anzeigen";
        updateUI();
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            // Bilder & Namen
            document.getElementById('mainImg').src = s.images.station_640x640.replace('http://', 'https://');
            document.getElementById('stName').innerText = s.display_name;
            document.getElementById('dockStation').innerText = s.display_name;
            document.getElementById('stDesc').innerText = s.description || "Willkommen beim Radio.";
            document.getElementById('hoerer').innerText = h + " Hörer live";
            document.getElementById('dockSong').innerText = l[0].artist.name + " - " + l[0].title;

            // Songliste bauen
            let html = "";
            const displayLimit = showAllSongs ? 12 : 4;
            l.slice(0, displayLimit).forEach((song, index) => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                const isFirst = index === 0;
                
                html += `
                    <div class="song-entry">
                        <div class="time-label">${isFirst ? '<div id="viz" class="viz-icon playing"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>' : time}</div>
                        <div class="song-info">
                            <span class="artist">${song.artist.name}</span>
                            <span class="title">${song.title}</span>
                        </div>
                    </div>
                `;
            });
            document.getElementById('hList').innerHTML = html;
            if(!au.paused) document.getElementById('viz').classList.add('playing');

        } catch(e) {}
    }
</script>
</body>
</html>
