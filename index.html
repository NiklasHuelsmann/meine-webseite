<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub</title>
    <style>
        :root { --sidebar-bg: #1a2634; --accent: #00d26a; --bg: #f0f2f5; --card-white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        @media (max-width: 768px) { body { flex-direction: column; height: auto; } .sidebar { width: 100% !important; } .main-layout { grid-template-columns: 1fr !important; } }
        .sidebar { width: 300px; background: var(--sidebar-bg); color: #ecf0f1; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .card { background: var(--card-white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .status-bar { display: flex; gap: 10px; margin-top: 10px; font-size: 0.75rem; }
        .badge { padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .online { background: #00d26a; color: white; }
        .listeners { background: #3498db; color: white; }
        .small-logo { width: 100%; max-width: 120px; border-radius: 10px; display: block; margin: 15px auto; }
        .fav-item { padding: 12px; background: rgba(255,255,255,0.08); border-radius: 8px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .play-btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .history-item { display: flex; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .history-time { width: 50px; font-weight: bold; color: #95a5a6; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="margin-bottom:20px;">
        <input type="text" id="slugInput" placeholder="Sender suchen..." style="width:70%; padding:8px; border-radius:5px;">
        <button onclick="loadStation()" style="padding:8px; cursor:pointer;">OK</button>
    </div>
    <div id="miniPlayer" class="card" style="background: rgba(255,255,255,0.1); border: none; color: white;">
        <div style="display:flex; justify-content:space-between;">
            <b id="sideName">Wähle Sender</b>
            <span id="heartIcon" style="cursor:pointer; font-size:1.4rem;" onclick="toggleFav()">❤</span>
        </div>
        <div class="status-bar">
            <span id="serverStatus" class="badge">Prüfe...</span>
            <span id="listenerCount" class="badge listeners">0 Hörer</span>
        </div>
        <img id="sideLogo" class="small-logo" src="">
        <button id="playBtn" class="play-btn" onclick="toggleAudio()">Sender starten</button>
    </div>
    <div style="margin-top:20px; font-size:0.8rem; color:#7f8c8d;">FAVORITEN</div>
    <div id="favList" style="flex:1; overflow-y:auto; margin-top:10px;"></div>
</div>

<div class="main-layout">
    <div class="card">
        <h2 id="mainTitle" style="margin-top:0;">Radio Dashboard</h2>
        <div id="scheduleSection" style="display:none;">
            <h3 style="color:var(--accent);">Jetzt läuft:</h3>
            <div style="background:#f8f9fa; padding:15px; border-radius:8px; border-left:5px solid var(--accent);">
                <b id="currArtist" style="font-size:1.2rem;">Interpret</b><br>
                <span id="currTitle">Songtitel</span>
            </div>
            <div id="nextInfo" style="margin-top:20px; padding:10px; background:#eef2f7; border-radius:8px;">
                <small>GLEICH:</small><br>
                <span id="nextText">Lade Sendeplan...</span>
            </div>
        </div>
    </div>
    <div class="card">
        <h3 style="margin-top:0;">Letzte Songs</h3>
        <div id="historyContent"></div>
    </div>
</div>

<audio id="radioAudio"></audio>

<script>
    // DEFAULTS jetzt mit Feierabend Radio
    const DEFAULTS = ["feierabend-radio", "test-station-fm", "brian", "niklasheulsmann", "simulator-4"];
    const START_SENDER = "feierabend-radio";

    let currentStation = "";
    let lastNotifiedSong = "";
    let favorites = JSON.parse(localStorage.getItem('radioFavs_v5')) || DEFAULTS;
    const audio = document.getElementById('radioAudio');

    window.onload = () => {
        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }
        renderFavs();
        const last = localStorage.getItem('lastStation') || START_SENDER;
        loadStation(last);
    };

    async function loadStation(name) {
        currentStation = (name || document.getElementById('slugInput').value).toLowerCase().trim();
        if(!currentStation) return;
        localStorage.setItem('lastStation', currentStation);
        updateData();
    }

    async function updateData() {
        try {
            const [cRes, sRes, lRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}/current_song`),
                fetch(`https://api.laut.fm/station/${currentStation}`),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`)
            ]);
            const song = await cRes.json();
            const info = await sRes.json();
            const history = await lRes.json();

            // UI Updates
            document.getElementById('serverStatus').innerText = "ONLINE";
            document.getElementById('serverStatus').className = "badge online";
            document.getElementById('listenerCount').innerText = info.current_listeners + " Hörer";
            document.getElementById('sideName').innerText = info.display_name;
            document.getElementById('mainTitle').innerText = info.display_name;
            document.getElementById('sideLogo').src = info.images.station_120x120;
            document.getElementById('currArtist').innerText = song.artist.name;
            document.getElementById('currTitle').innerText = song.title;

            // Sendeplan
            document.getElementById('scheduleSection').style.display = "block";
            document.getElementById('nextText').innerText = info.next_artists ? "Rotation mit " + info.next_artists : "Kein Sendeplan";

            // Verlauf & Benachrichtigung
            document.getElementById('historyContent').innerHTML = history.map(s => `
                <div class="history-item">
                    <div class="history-time">${new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div><b>${s.artist.name}</b><br>${s.title}</div>
                </div>
            `).join('');

            checkNotification(song);
            checkHeart();
        } catch(e) {
            document.getElementById('serverStatus').innerText = "WARTET AUF API...";
            document.getElementById('serverStatus').className = "badge";
        }
    }

    function checkNotification(song) {
        const currentSongStr = `${song.artist.name} - ${song.title}`;
        if (lastNotifiedSong !== currentSongStr && Notification.permission === "granted") {
            new Notification(`Jetzt auf ${currentStation.toUpperCase()}`, {
                body: currentSongStr,
                icon: document.getElementById('sideLogo').src
            });
            lastNotifiedSong = currentSongStr;
        }
    }

    function toggleFav() {
        const idx = favorites.indexOf(currentStation);
        if(idx === -1) favorites.push(currentStation);
        else favorites.splice(idx, 1);
        localStorage.setItem('radioFavs_v5', JSON.stringify(favorites));
        renderFavs();
        checkHeart();
    }

    function renderFavs() {
        const list = document.getElementById('favList');
        list.innerHTML = favorites.map(f => `
            <div class="fav-item" onclick="loadStation('${f}')">
                <span>${f.toUpperCase()}</span>
                <span onclick="event.stopPropagation(); removeFav('${f}')">×</span>
            </div>
        `).join('');
    }

    function removeFav(f) {
        favorites = favorites.filter(i => i !== f);
        localStorage.setItem('radioFavs_v5', JSON.stringify(favorites));
        renderFavs();
        checkHeart();
    }

    function checkHeart() {
        document.getElementById('heartIcon').style.color = favorites.includes(currentStation) ? "#e74c3c" : "#7f8c8d";
    }

    function toggleAudio() {
        if(audio.paused) {
            audio.src = `https://stream.laut.fm/${currentStation}`;
            audio.play();
            document.getElementById('playBtn').innerText = "Stoppen";
            document.getElementById('playBtn').style.background = "#e74c3c";
        } else {
            audio.pause();
            document.getElementById('playBtn').innerText = "Starten";
            document.getElementById('playBtn').style.background = "var(--accent)";
        }
    }

    setInterval(() => { if(currentStation) updateData(); }, 20000);
</script>
</body>
</html>
