<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Hub - Live</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
        .header { background: white; padding: 20px 50px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .main { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .logo { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .footer { text-align: center; padding: 40px; color: #718096; border-top: 1px solid #e2e8f0; }
        .btn-play { background: #00a67c; width: 100%; padding: 10px; border: none; color: white; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<header class="header">
    <h1>Radio <span>Hub</span></h1>
    <input type="text" id="searchInput" placeholder="Einzelnen Sender suchen...">
    <button onclick="addSingle()">Suchen</button>
</header>

<div class="main">
    <div class="controls">
        <input type="text" id="bulkInput" placeholder="Mehrere Sender (Komma getrennt, z.B. niklas-fm, ndfm)">
        <button onclick="addBulk()">Überprüfen</button>
    </div>
    <div class="grid" id="grid"></div>
</div>

<div class="footer">Partner: <b>laut.fm</b></div>
<audio id="player"></audio>

<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    const player = document.getElementById('player');

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        stations.forEach(s => {
            grid.innerHTML += `
                <div class="card" id="card-${s}">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <img id="img-${s}" src="https://api.laut.fm/favicon.ico" class="logo">
                        <div><b>${s.toUpperCase()}</b><br>Hörer: <span id="list-${s}">0</span></div>
                    </div>
                    <div style="margin-top:15px; font-size:0.9rem;">
                        <div id="art-${s}" style="font-weight:bold">Lade...</div>
                        <div id="tit-${s}">...</div>
                    </div>
                    <button class="btn-play" onclick="toggle('${s}')" id="btn-${s}">▶ Sender starten</button>
                    <button onclick="del('${s}')" style="background:none; border:none; color:red; font-size:0.7rem; cursor:pointer; margin-top:5px;">Entfernen</button>
                </div>
            `;
            update(s);
        });
    }

    async function update(s) {
        fetch(`https://api.laut.fm/station/${s}`).then(r => r.json()).then(d => {
            if(d.images) document.getElementById(`img-${s}`).src = d.images.station_120x120;
        });
        fetch(`https://api.laut.fm/station/${s}/listeners`).then(r => r.text()).then(t => document.getElementById(`list-${s}`).innerText = t);
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
            document.getElementById(`tit-${s}`).innerText = d.title || "-";
        });
    }

    function addSingle() {
        const val = document.getElementById('searchInput').value.toLowerCase().trim();
        if(val && !stations.includes(val)) { stations.push(val); save(); render(); }
    }

    function addBulk() {
        const val = document.getElementById('bulkInput').value.split(',');
        val.forEach(s => {
            const clean = s.trim().toLowerCase();
            if(clean && !stations.includes(clean)) stations.push(clean);
        });
        save(); render();
    }

    function save() { localStorage.setItem('my_stations', JSON.stringify(stations)); }
    function del(s) { stations = stations.filter(x => x !== s); save(); render(); }
    function toggle(s) {
        if(!player.paused && player.src.includes(s)) {
            player.pause();
            document.getElementById(`btn-${s}`).innerText = "▶ Sender starten";
        } else {
            player.src = `https://stream.laut.fm/${s}`;
            player.play();
            document.getElementById(`btn-${s}`).innerText = "⏹ Sender stoppen";
        }
    }

    render();
    setInterval(() => stations.forEach(update), 15000);
</script>
</body>
</html>
