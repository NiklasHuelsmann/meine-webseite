<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laut.fm Profi Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Suchbereich */
        .search-area { width: 100%; max-width: 450px; position: sticky; top: 10px; z-index: 1000; }
        input#search-input { 
            width: 100%; padding: 15px 20px; border-radius: 30px; border: 2px solid #444; 
            background: #222; color: white; font-size: 1.1em; outline: none; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input#search-input:focus { border-color: #ff5500; background: #2a2a2a; }
        
        /* Suchergebnisse Liste */
        #results { 
            position: absolute; background: #222; width: 100%; border-radius: 15px; 
            margin-top: 10px; max-height: 350px; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            display: none; /* Erst beim Tippen zeigen */
        }
        .result-item { 
            padding: 12px; cursor: pointer; border-bottom: 1px solid #333; 
            display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .result-item:hover { background: #333; }
        .result-item img { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #444; }

        /* Player-Card */
        .player-card { 
            background: linear-gradient(145deg, #1a1a1a, #222); 
            width: 100%; max-width: 450px; border-radius: 35px; padding: 30px; 
            margin-top: 30px; text-align: center; border: 1px solid #333;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .status-header { display: flex; justify-content: space-between; font-family: monospace; color: #00ccff; margin-bottom: 20px; font-weight: bold; }
        
        /* Scharfes rundes Logo */
        #station-logo { 
            width: 180px; height: 180px; border-radius: 50%; border: 5px solid #ff5500; 
            margin: 10px 0; object-fit: cover; box-shadow: 0 0 25px rgba(255,85,0,0.2);
            background: #2a2a2a;
        }

        .song-display { margin: 20px 0; min-height: 90px; }
        #station-name { font-size: 1.8em; margin: 0; color: #fff; letter-spacing: -1px; }
        #current-song { color: #00ff00; font-size: 1.1em; margin: 10px 0; font-weight: bold; }

        /* Der Player-Container (Audiospur unverändert) */
        #player-wrapper { 
            background: #000; border-radius: 20px; padding: 5px; margin: 20px 0; 
            min-height: 150px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        iframe { border: none; width: 100%; height: 150px; border-radius: 15px; }

        /* History Liste */
        .history { text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; font-size: 0.85em; }
        .history-title { color: #777; font-size: 0.7em; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .history-item { padding: 8px 0; border-bottom: 1px solid #333; color: #ccc; }
        .history-item:last-child { border: none; }

        .live-indicator { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 15px; font-size: 0.75em; color: #555; }
        .dot { height: 10px; width: 10px; background: #ff3300; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="search-area">
    <input type="text" id="search-input" placeholder="🔍 Sender suchen & sofort hören..." autocomplete="off">
    <div id="results"></div>
</div>

<div class="player-card">
    <div class="status-header">
        <div id="clock">00:00:00</div>
        <div id="listeners">● 0 Hörer</div>
    </div>

    <img id="station-logo" src="" alt="Lade...">
    
    <div class="song-display">
        <h2 id="station-name">Wähle einen Sender</h2>
        <div id="current-song">Suche oben nach deinem Radio</div>
    </div>

    <div id="player-wrapper">
        </div>

    <div class="history">
        <div class="history-title">Zuletzt gelaufen</div>
        <div id="history-list">
            <div class="history-item">Suche starten...</div>
        </div>
    </div>

    <div class="live-indicator">
        <div class="dot"></div>
        <span>LIVE DATEN-SYNC AKTIV</span>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const resultsDiv = document.getElementById('results');
    let refreshTimer;

    // 1. Interaktive Suche
    searchInput.addEventListener('input', () => {
        const query = searchInput.value;
        if (query.length < 2) { 
            resultsDiv.style.display = 'none'; 
            return; 
        }

        fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                resultsDiv.style.display = 'block';
                
                data.items.slice(0, 6).forEach(st => {
                    const item = document.createElement('div');
                    item.className = 'result-item';
                    item.innerHTML = `
                        <img src="${st.images.station_80x80}"> 
                        <div>
                            <strong>${st.display_name}</strong><br>
                            <small style="color:#777">${st.format || 'Radio'}</small>
                        </div>`;
                    item.onclick = () => selectAndPlay(st.name);
                    resultsDiv.appendChild(item);
                });
            });
    });

    // 2. Sender wählen & SOFORT STARTEN
    function selectAndPlay(shortname) {
        resultsDiv.style.display = 'none';
        searchInput.value = '';
        
        // Player Widget mit Autoplay-Befehl neu laden
        // allow="autoplay" sorgt dafür, dass Chrome/Firefox den Ton erlauben
        document.getElementById('player-wrapper').innerHTML = `
            <iframe src="https://laut.fm/widgets/player/${shortname}?autoplay=1" allow="autoplay" scrolling="no"></iframe>
        `;

        // Daten sofort laden
        updateUI(shortname);
        
        // Intervall für Song-Updates neu setzen
        if(refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(() => updateUI(shortname), 15000);
    }

    // 3. Scharfe UI-Updates (HD Bilder & Hörer)
    function updateUI(name) {
        // Allgemeine Infos
        fetch(`https://api.laut.fm/station/${name}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('station-name').innerText = data.display_name;
                // Scharfes HD Logo laden (640x640)
                document.getElementById('station-logo').src = data.images.station_640x640;
                document.getElementById('listeners').innerText = `● ${data.current_listeners || 0} Hörer`;
            });

        // Songs & History
        fetch(`https://api.laut.fm/station/${name}/last_songs`)
            .then(res => res.json())
            .then(songs => {
                if(songs && songs.length > 0) {
                    document.getElementById('current-song').innerText = `🎶 ${songs[0].artist.name} - ${songs[0].title}`;
                    
                    let historyHTML = '';
                    songs.slice(1, 4).forEach(s => {
                        historyHTML += `<div class="history-item">🕒 ${s.artist.name} - ${s.title}</div>`;
                    });
                    document.getElementById('history-list').innerHTML = historyHTML || "Keine History.";
                }
            });
    }

    // Uhrzeit Ticker
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);

    // Initialer Start mit einem Sender
    selectAndPlay("eins");
</script>

</body>
</html>
