<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Dashboard</title>
    <style>
        :root { 
            --bg: #05080f; 
            --karte: rgba(15, 23, 42, 0.85); 
            --akzent: #0088ff; 
            --text: #f8fafc; 
            --rand: rgba(0, 136, 255, 0.3);
            --glow: 0 0 25px rgba(0, 136, 255, 0.5);
            --glass: blur(25px);
        }

        .light-mode {
            --bg: #f8fafc;
            --karte: rgba(255, 255, 255, 0.9);
            --akzent: #0055ff;
            --text: #0f172a;
            --rand: rgba(0, 0, 0, 0.1);
            --glow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        html, body { overscroll-behavior: none; margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg); color: var(--text); transition: 0.5s; overflow-x: hidden; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        header { 
            padding: 15px 5%; display: flex; align-items: center; justify-content: space-between; 
            background: var(--karte); backdrop-filter: var(--glass); border-bottom: 3px solid var(--akzent); 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--glow);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        #miniLogo { width: 45px; height: 45px; border-radius: 12px; border: 2px solid var(--akzent); display: none; object-fit: cover; box-shadow: var(--glow); }
        #senderOben { font-weight: 900; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 1px; }
        #uhrDisplay { font-family: 'Courier New', monospace; font-weight: bold; font-size: 22px; color: var(--akzent); text-shadow: var(--glow); }

        /* CONTENT GRID */
        .container { padding: 30px 5%; max-width: 1550px; margin: 0 auto; width: 100%; }

        .top-row { display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-bottom: 35px; }
        .suche-wrapper { 
            display: flex; background: var(--karte); border: 1px solid var(--rand); 
            border-radius: 18px; padding: 10px 22px; align-items: center; width: 340px; box-shadow: var(--glow);
        }
        #sIn { flex-grow: 1; background: transparent; border: none; color: var(--text); outline: none; font-size: 16px; }
        .btn-main { background: var(--akzent); color: white; border: none; border-radius: 14px; padding: 12px 24px; cursor: pointer; font-weight: 800; box-shadow: var(--glow); transition: 0.3s; }
        .btn-main:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .main-grid { display: grid; grid-template-columns: 420px 1fr; gap: 40px; }
        @media (max-width: 1150px) { .main-grid { grid-template-columns: 1fr; } }

        .card { 
            background: var(--karte); border: 1px solid var(--rand); border-radius: 35px; 
            padding: 40px; box-shadow: var(--glow); backdrop-filter: var(--glass);
        }

        /* PLAYER ELEMENTE */
        .player-content { text-align: center; }
        #hauptLogo { 
            width: 100%; max-width: 320px; aspect-ratio: 1/1; border-radius: 30px; 
            border: 4px solid var(--akzent); box-shadow: var(--glow); margin-bottom: 25px; 
        }
        
        .hoerer-pill { 
            display: inline-block; background: rgba(0, 136, 255, 0.2); border: 2px solid var(--akzent); 
            color: var(--akzent); padding: 8px 20px; border-radius: 25px; font-size: 13px; 
            font-weight: 900; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1.5px;
        }

        .station-desc { 
            font-size: 14px; line-height: 1.7; opacity: 0.85; margin-top: 20px; 
            padding: 20px; background: rgba(0,0,0,0.3); border-radius: 22px; min-height: 100px;
            border: 1px solid var(--rand);
        }

        .controls-area { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 35px 0; }
        .vis-bars { display: flex; align-items: flex-end; gap: 7px; height: 50px; }
        .v-bar { width: 11px; background: var(--akzent); height: 10px; border-radius: 6px; }
        .ani-bar { animation: bounce 0.6s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { height: 10px; } 50% { height: 45px; } }

        .play-btn-big { 
            width: 90px; height: 90px; border-radius: 30px; border: none; 
            background: #fff; color: #000; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            transition: 0.2s;
        }

        .volume-panel { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 25px; text-align: left; }
        #volLabel { font-size: 12px; font-weight: 900; color: var(--akzent); margin-bottom: 12px; display: block; }

        /* RECHTE SEITE: SONGS */
        .section-label { font-size: 13px; color: var(--akzent); font-weight: 900; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1.5px; }
        .current-song-box { 
            font-size: 1.9rem; font-weight: 900; padding: 40px; background: var(--karte); 
            border-radius: 30px; border-left: 12px solid var(--akzent); margin-bottom: 45px; 
            box-shadow: var(--glow); transition: 0.6s;
        }
        .flash-effect { animation: songFlash 1.2s ease-out; }
        @keyframes songFlash { 0% { background: var(--akzent); color: white; } 100% { background: var(--karte); } }

        .history-row { 
            padding: 20px 0; border-bottom: 1px solid var(--rand); 
            display: flex; gap: 25px; font-size: 17px; align-items: center; 
        }
        .history-time { color: var(--akzent); font-weight: 800; min-width: 75px; font-family: monospace; font-size: 18px; }

        /* FOOTER */
        footer { 
            margin-top: 50px; padding: 30px 5%; background: rgba(0,0,0,0.6); 
            border-top: 2px solid var(--rand); display: flex; justify-content: space-between; align-items: center;
        }
        .status-badge { font-weight: 900; color: var(--akzent); text-transform: uppercase; font-size: 14px; letter-spacing: 1px; }

        /* TV MODUS */
        #tvBtn { display: none; }
        .tv-mode-active header, .tv-mode-active .top-row, .tv-mode-active footer, .tv-mode-active .section-label:last-of-type, .tv-mode-active #verlaufListe { display: none; }
        .tv-mode-active .main-grid { grid-template-columns: 1fr; padding-top: 10vh; }
        .tv-mode-active #hauptLogo { max-width: 550px; }
        .tv-mode-active .current-song-box { font-size: 4.5rem; border: none; text-align: center; background: transparent; box-shadow: none; }
    </style>
</head>
<body onload="initApp()">

<header>
    <div class="header-left">
        <img id="miniLogo" src="">
        <span id="senderOben">RADIO DASHBOARD</span>
    </div>
    <div id="uhrDisplay">00:00:00</div>
</header>

<div class="container">
    <div class="top-row">
        <button class="btn-main" onclick="document.body.classList.toggle('light-mode')">DESIGN WECHSELN</button>
        <div class="suche-wrapper">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') waehleSender(this.value)">
            <button style="background:none; border:none; color:var(--akzent); cursor:pointer; font-size: 22px;" onclick="waehleSender(document.getElementById('sIn').value)">🔍</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="card player-content">
            <img id="hauptLogo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <div><span id="hoererZahl" class="hoerer-pill">STATUS BEREIT</span></div>
            <div id="descText" class="station-desc">Geben Sie den Namen eines laut.fm Senders ein, um den Stream zu starten.</div>

            <div class="controls-area">
                <div class="vis-bars">
                    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
                </div>
                <button class="play-btn-big" onclick="togglePlay()" id="pBtn">
                    <svg width="45" height="45" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="black"/></svg>
                </button>
            </div>

            <div class="volume-panel">
                <span id="volLabel">LAUTSTÄRKE: 90%</span>
                <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="updateVol(this.value)">
            </div>
        </div>

        <div class="card">
            <div class="section-label">Aktueller Titel</div>
            <div id="aktSong" class="current-song-box">Warte auf Auswahl...</div>
            <div class="section-label">Letzte 9 Titel</div>
            <div id="verlaufListe"></div>
        </div>
    </div>
</div>

<footer>
    <div style="opacity: 0.6; font-weight: bold;">RADIO DASHBOARD | STABLE</div>
    <div id="statusInfo" class="status-badge">SYSTEM AKTIV</div>
    <button id="tvBtn" class="btn-main" style="padding: 10px 18px; font-size: 12px;" onclick="document.body.classList.toggle('tv-mode-active')">TV MODUS</button>
</footer>

<audio id="audioEngine" preload="none"></audio>

<script>
    const audio = document.getElementById('audioEngine');
    let isPlaying = false, currentStation = "", dataTimer = null, lastTrack = "";

    function initApp() {
        setInterval(() => { document.getElementById('uhrDisplay').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        const ua = navigator.userAgent.toLowerCase();
        const isTV = ua.includes("smart-tv") || ua.includes("tizen") || ua.includes("webos") || ua.includes("firetv") || ua.includes("androidtv");
        if(isTV) { document.getElementById('tvBtn').style.display = "block"; }
    }

    function updateVol(v) {
        audio.volume = v;
        document.getElementById('volLabel').innerText = "LAUTSTÄRKE: " + Math.round(v * 100) + "%";
    }

    function waehleSender(val) {
        if(!val) return;
        currentStation = val.toLowerCase().trim().replace(/\s+/g, '-');
        document.getElementById('statusInfo').innerText = "VERBINDE...";
        refreshData();
        if(dataTimer) clearInterval(dataTimer);
        dataTimer = setInterval(refreshData, 15000);
        if(isPlaying) { stop(); play(); }
    }

    function togglePlay() { if(!currentStation) return; isPlaying ? stop() : play(); }

    function play() {
        audio.src = "https://stream.laut.fm/" + currentStation;
        audio.play().then(() => {
            isPlaying = true;
            document.querySelectorAll('.v-bar').forEach(b => b.classList.add('ani-bar'));
            document.getElementById('pBtn').innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" fill="black"/></svg>';
            document.getElementById('statusInfo').innerText = "LIVE";
        }).catch(e => { document.getElementById('statusInfo').innerText = "FEHLER"; });
    }

    function stop() {
        audio.pause(); audio.src = ""; isPlaying = false;
        document.querySelectorAll('.v-bar').forEach(b => b.classList.remove('ani-bar'));
        document.getElementById('pBtn').innerHTML = '<svg width="45" height="45" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="black"/></svg>';
        document.getElementById('statusInfo').innerText = "GESTOPPT";
    }

    async function refreshData() {
        if(!currentStation) return;
        try {
            const [info, lieder, hoerer] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/listeners`).then(r => r.text())
            ]);
            const logo = info.images.station_120x120;
            document.getElementById('senderOben').innerText = info.display_name;
            document.getElementById('miniLogo').src = logo;
            document.getElementById('miniLogo').style.display = "block";
            document.getElementById('hauptLogo').src = logo;
            document.getElementById('descText').innerText = info.description || "laut.fm Sender";
            document.getElementById('hoererZahl').innerText = hoerer + " PERSONEN HÖREN ZU";
            const curT = lieder[0].artist.name + " - " + lieder[0].title;
            if(lastTrack !== curT) {
                lastTrack = curT;
                const box = document.getElementById('aktSong');
                box.innerText = curT;
                box.classList.remove('flash-effect');
                void box.offsetWidth; box.classList.add('flash-effect');
            }
            let hHtml = "";
            lieder.slice(1, 10).forEach(s => {
                const time = new Date(s.started_at).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                hHtml += `<div class="history-row"><span class="history-time">${time}</span><span>${s.artist.name} - ${s.title}</span></div>`;
            });
            document.getElementById('verlaufListe').innerHTML = hHtml;
        } catch (e) { document.getElementById('statusInfo').innerText = "OFFLINE"; }
    }
</script>
</body>
</html>
