<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCustom Radio Dashboard</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0f172a; --panel: #1e293b; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: #f8fafc; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* GLASS MORPHISM DESIGN */
        .main-container { display: grid; grid-template-columns: 350px 1fr 350px; gap: 20px; padding: 20px; flex: 1; overflow: hidden; }
        .card { background: var(--panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* CENTER: NOW PLAYING */
        .player-center { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .logo-box { position: absolute; top: 20px; left: 20px; width: 60px; height: 60px; border-radius: 12px; background: #000; overflow: hidden; border: 2px solid var(--accent); }
        #st-logo { width: 100%; height: 100%; object-fit: cover; }
        
        #album-cover { width: 300px; height: 300px; border-radius: 20px; object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); transition: transform 0.5s ease; }
        #album-cover:hover { transform: scale(1.02); }

        .track-meta { margin-top: 25px; }
        #current-song { font-size: 26px; font-weight: bold; margin: 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #current-station { font-size: 16px; color: var(--accent); margin-top: 5px; text-transform: uppercase; letter-spacing: 2px; }
        #station-desc { font-size: 13px; color: #94a3b8; margin-top: 15px; max-width: 80%; line-height: 1.5; }

        /* SIDES: SEARCH & HISTORY */
        .side-head { padding: 15px 20px; background: var(--glass); font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }

        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--accent); }

        .list-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        .list-item:hover { background: var(--glass); }
        .list-item img { width: 45px; height: 45px; border-radius: 8px; }
        
        .history-card { padding: 10px; border-left: 3px solid var(--accent); background: var(--glass); margin-bottom: 10px; border-radius: 0 8px 8px 0; }
        .history-card span { display: block; font-size: 11px; color: #64748b; }

        /* CONTROLS */
        .controls { margin-top: 30px; display: flex; gap: 20px; }
        .play-btn { width: 70px; height: 70px; border-radius: 50%; border: none; background: var(--accent); color: #000; font-size: 24px; cursor: pointer; box-shadow: 0 0 20px rgba(0,210,255,0.4); }

        footer { padding: 10px 40px; background: #020617; font-size: 12px; color: #475569; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="card">
        <div class="side-head">SENDER SUCHEN</div>
        <div class="scroll-area">
            <input type="text" id="search-bar" placeholder="Name oder Genre..." onkeyup="searchStation()">
            <div id="search-results"></div>
        </div>
    </div>

    <div class="card player-center">
        <div class="logo-box"><img id="st-logo" src="https://via.placeholder.com/60"></div>
        
        <img id="album-cover" src="https://via.placeholder.com/300/1e293b/fff?text=Wähle+Sender">
        
        <div class="track-meta">
            <p id="current-station">RADIO STUDIO</p>
            <h1 id="current-song">Bereit zum Start</h1>
            <p id="station-desc">Suche links nach deinem Lieblingssender von laut.fm oder starte eine Station.</p>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="togglePlay()" id="btn-p">▶</button>
        </div>
    </div>

    <div class="card">
        <div class="side-head">ZULETZT GELAUFEN</div>
        <div class="scroll-area" id="history-list">
            <p style="text-align:center; color:#475569; margin-top:20px;">Noch kein Verlauf verfügbar.</p>
        </div>
    </div>
</div>

<footer>
    <span>DESIGNED FOR LAUT.FM API</span>
    <span id="clock">00:00:00</span>
</footer>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const player = document.getElementById('player');
    let currentStationName = "";

    // SENDER SUCHE
    async function searchStation() {
        const q = document.getElementById('search-bar').value;
        const res = document.getElementById('search-results');
        if(q.length < 2) return;

        try {
            const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(q)}`);
            const d = await r.json();
            res.innerHTML = "";
            d.items.forEach(s => {
                const div = document.createElement('div');
                div.className = "list-item";
                div.onclick = () => selectStation(s);
                div.innerHTML = `<img src="${s.images.station_80x80}"> <div><strong>${s.display_name}</strong><br><small>${s.page_url.split('/').pop()}</small></div>`;
                res.appendChild(div);
            });
        } catch(e) { console.error("API Fehler"); }
    }

    // SENDER AUSWÄHLEN
    function selectStation(s) {
        currentStationName = s.name;
        player.src = `https://stream.laut.fm/${s.name}`;
        player.play();
        
        document.getElementById('st-logo').src = s.images.station_120x120;
        document.getElementById('current-station').innerText = s.display_name;
        document.getElementById('station-desc').innerText = s.description || "Keine Beschreibung verfügbar.";
        document.getElementById('btn-p').innerText = "⏸";
        
        updateLiveInfo();
    }

    // LIVE INFOS (SONG & COVER)
    async function updateLiveInfo() {
        if(!currentStationName) return;
        try {
            const r = await fetch(`https://api.laut.fm/station/${currentStationName}/current_song`);
            const s = await r.json();
            
            const oldSong = document.getElementById('current-song').innerText;
            if(oldSong !== s.title && oldSong !== "Bereit zum Start") {
                addToHistory(oldSong);
            }

            document.getElementById('current-song').innerText = s.title + " - " + s.artist.name;
            if(s.image) {
                document.getElementById('album-cover').src = s.image;
            }
        } catch(e) {}
    }

    function addToHistory(song) {
        const list = document.getElementById('history-list');
        if(list.innerText.includes("Noch kein Verlauf")) list.innerHTML = "";
        
        const div = document.createElement('div');
        div.className = "history-card";
        div.innerHTML = `<span>${new Date().toLocaleTimeString()}</span><strong>${song}</strong>`;
        list.prepend(div);
    }

    function togglePlay() {
        if(player.paused) { player.play(); document.getElementById('btn-p').innerText = "⏸"; }
        else { player.pause(); document.getElementById('btn-p').innerText = "▶"; }
    }

    // INTERVALS
    setInterval(updateLiveInfo, 10000); // Alle 10 Sek checken ob neuer Song läuft
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
