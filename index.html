<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas Radio - Profi Edition</title>
    <style>
        :root { --bg: #f4f7f6; --text: #2c3e50; --accent: #00d26a; --card: #ffffff; --gray: #7f8c8d; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        
        /* Suche & Header */
        .search-section { background: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .search-box { display: flex; gap: 8px; }
        input#slug { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .share-link { font-size: 0.8rem; color: #3498db; cursor: pointer; display: block; margin-top: 8px; text-align: center; text-decoration: underline; }

        /* Player Karte */
        .player-card { background: var(--card); border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); padding: 25px; position: sticky; top: 20px; }
        .live-indicator { display: flex; align-items: center; gap: 6px; color: var(--accent); font-weight: bold; font-size: 0.85rem; margin-bottom: 15px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .current-track-row { display: flex; gap: 15px; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .start-time { font-size: 1.1rem; color: var(--gray); font-weight: 500; min-width: 55px; }
        .track-info b { font-size: 1.3rem; display: block; line-height: 1.2; color: #111; }
        
        /* NEU: Gleich Vorschau */
        .next-box { background: #f9f9f9; border-left: 4px solid #ddd; padding: 10px 15px; margin-bottom: 20px; border-radius: 4px; }
        .next-label { font-size: 0.75rem; font-weight: bold; color: #999; text-transform: uppercase; display: block; }
        #next-info { font-size: 0.95rem; color: #555; }

        .st-logo { width: 100%; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .play-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: transform 0.1s; }
        .play-btn:active { transform: scale(0.98); }

        /* Rechte Liste */
        .list-card { background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .list-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #fafafa; border-bottom: 1px solid #eee; }
        .list-item { display: flex; gap: 20px; padding: 15px 25px; border-bottom: 1px solid #f1f1f1; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .item-details b { display: block; font-size: 1rem; color: #333; }
        .item-details i { font-size: 0.85rem; color: var(--gray); font-style: normal; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="left-side">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="slug" placeholder="Sendername..." onkeypress="if(event.key === 'Enter') start()">
                <button onclick="start()" style="padding: 0 15px; border-radius: 8px; border:none; background:#333; color:white; cursor:pointer;">Laden</button>
            </div>
            <span id="shareBtn" class="share-link" style="display:none;" onclick="copyLink()">Teilen-Link kopieren</span>
        </div>

        <div id="playerUI" class="player-card" style="display:none;">
            <div class="live-indicator"><div class="dot"></div> LIVE <span id="listeners" style="color:#555; font-weight:normal; margin-left:10px;"></span></div>
            
            <div class="current-track-row">
                <div id="c-time" class="start-time">--:--</div>
                <div class="track-info">
                    <b id="c-artist">Interpret</b>
                    <span id="c-title">Titel</span>
                </div>
            </div>

            <!-- Die "Gleich"-Vorschau -->
            <div id="next-box" class="next-box" style="display:none;">
                <span class="next-label">Gleich:</span>
                <div id="next-info">Wird geladen...</div>
            </div>

            <img id="logo" class="st-logo" src="">
            <button id="pBtn" class="play-btn" onclick="togglePlay()">Sender starten</button>
        </div>
    </div>

    <div id="listUI" class="right-side" style="display:none;">
        <div class="list-card">
            <div class="list-header">
                <span id="view-title" style="font-weight:bold; font-size:1.2rem;">Letzte Songs</span>
                <button id="planToggle" onclick="toggleMode()" style="display:none; padding:5px 10px; cursor:pointer; border-radius:5px; border:1px solid #ddd; background:white;">Sendeplan</button>
            </div>
            <div id="list-content"></div>
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    let station = "";
    let isPlan = false;
    let currentId = "";
    const audio = document.getElementById('audio');

    // Link-Teilen Funktion beim Start prüfen
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.get('station')) {
            document.getElementById('slug').value = params.get('station');
            start();
        }
    };

    function start() {
        station = document.getElementById('slug').value.toLowerCase().trim();
        if(!station) return;
        document.getElementById('playerUI').style.display = "block";
        document.getElementById('listUI').style.display = "block";
        document.getElementById('shareBtn').style.display = "block";
        update();
        setInterval(update, 10000); // Alle 10 Sek. Update
    }

    async function update() {
        try {
            const [cRes, lRes, pRes, nRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${station}/current_song`),
                fetch(`https://api.laut.fm/station/${station}/listeners`),
                fetch(`https://api.laut.fm/station/${station}/schedule`),
                fetch(`https://api.laut.fm/station/${station}/next_song`)
            ]);

            const song = await cRes.json();
            const listeners = await lRes.text();
            const schedule = await pRes.json();
            
            // 1. Jetzt läuft & Zeit
            document.getElementById('c-artist').innerText = song.artist.name;
            document.getElementById('c-title').innerText = song.title;
            document.getElementById('c-time').innerText = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('listeners').innerText = `(${listeners.trim()} Hörer)`;
            
            // 2. "Gleich" Vorschau (Feature Nummer 1)
            if(nRes.ok) {
                const next = await nRes.json();
                if(next && next.title) {
                    document.getElementById('next-box').style.display = "block";
                    document.getElementById('next-info').innerText = `${next.artist.name} - ${next.title}`;
                } else { document.getElementById('next-box').style.display = "none"; }
            }

            // 3. Sendeplan-Button Automatik
            document.getElementById('planToggle').style.display = schedule.length > 0 ? "block" : "none";

            // 4. Logo & Liste (nur bei neuem Song)
            if(song.id !== currentId) {
                currentId = song.id;
                const sRes = await fetch(`https://api.laut.fm/station/${station}`);
                const sData = await sRes.json();
                document.getElementById('logo').src = sData.images.station_640x640;
                renderList();
            }
        } catch(e) { console.error("API Error"); }
    }

    async function renderList() {
        const container = document.getElementById('list-content');
        container.innerHTML = "";
        
        if(!isPlan) {
            document.getElementById('view-title').innerText = "Letzte Songs";
            const res = await fetch(`https://api.laut.fm/station/${station}/last_songs`);
            const data = await res.json();
            data.forEach(s => {
                if(s.id !== currentId) { // Keine Doppelten!
                    const t = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    container.innerHTML += `<div class="list-item"><div class="start-time" style="font-size:0.9rem;">${t}</div><div class="item-details"><b>${s.artist.name}</b><i>${s.title}</i></div></div>`;
                }
            });
        } else {
            document.getElementById('view-title').innerText = "Sendeplan";
            const res = await fetch(`https://api.laut.fm/station/${station}/schedule`);
            const data = await res.json();
            data.forEach(p => {
                const t = p.start_time.substring(0,5);
                container.innerHTML += `<div class="list-item"><div class="start-time" style="font-size:0.9rem;">${t}</div><div class="item-details"><b>${p.name}</b><i>${p.description || ""}</i></div></div>`;
            });
        }
    }

    function toggleMode() { isPlan = !isPlan; renderList(); }

    function togglePlay() {
        if(audio.paused) {
            audio.src = `https://stream.laut.fm/${station}`;
            audio.play();
            document.getElementById('pBtn').innerText = "⏸ Pause";
            document.getElementById('pBtn').style.background = "#e74c3c";
        } else {
            audio.pause();
            document.getElementById('pBtn').innerText = "▶ Weiterspielen";
            document.getElementById('pBtn').style.background = var(--accent);
        }
    }

    function copyLink() {
        const url = window.location.origin + window.location.pathname + "?station=" + station;
        navigator.clipboard.writeText(url);
        alert("Link kopiert! Jetzt kannst du ihn teilen.");
    }
</script>
</body>
</html>
