<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Custom Radio Control</title>
    <style>
        /* Dein individuelles Farbschema */
        :root { --sidebar: #16212d; --accent: #00d26a; --bg-main: #f0f4f8; --card-white: #ffffff; --text-primary: #2c3e50; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-main); margin: 0; display: flex; height: 100vh; color: var(--text-primary); }
        
        /* Eigener Sidebar-Stil */
        .sidebar { width: 320px; background: var(--sidebar); color: white; padding: 25px; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
        .nav-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; color: var(--accent); border-bottom: 1px solid #2c3e50; padding-bottom: 10px; }
        
        /* Main Layout - Dein Dashboard */
        .dashboard { flex: 1; padding: 30px; display: grid; grid-template-columns: 1fr 400px; gap: 25px; overflow-y: auto; padding-bottom: 120px; }
        .hub-card { background: var(--card-white); border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); height: fit-content; }

        /* Song-Verlauf in deinem IT-Stil */
        .song-list { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .song-entry { background: #fcfcfc; transition: transform 0.2s; }
        .song-entry:hover { transform: translateX(5px); }
        .time-badge { padding: 15px; font-weight: 800; color: #1a2634; font-size: 1rem; width: 70px; }
        .cover-preview { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; }
        .song-meta { padding: 10px; border-left: 3px solid var(--accent); }

        /* Dein Radio-Display */
        .display-center { text-align: center; padding: 20px; }
        .station-branding { width: 240px; height: 240px; border-radius: 50%; object-fit: cover; border: 5px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); margin-bottom: 15px; }
        .branding-label { font-size: 1.2rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }

        /* Eigene Player-Kontrollen */
        .control-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: white; border-top: 1px solid #e1e8ed; display: flex; align-items: center; padding: 0 40px; justify-content: space-between; z-index: 1000; }
        .now-playing-mini { display: flex; align-items: center; width: 350px; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(0,210,106,0.3); }
        .vol-slider { accent-color: var(--accent); width: 150px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-title">Niklas IT Radio</div>
    <div style="display:flex; gap:10px; margin-bottom:30px;">
        <input type="text" id="slugInput" placeholder="Sender suchen..." style="flex:1; padding:12px; border:none; border-radius:8px; background:#243242; color:white;">
        <button onclick="loadStation()" style="background:var(--accent); border:none; border-radius:8px; color:white; padding:0 15px; cursor:pointer;">Go</button>
    </div>
    <div id="favList" style="flex:1; overflow-y:auto;"></div>
</div>

<div class="dashboard">
    <div class="hub-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 id="stationTitle" style="margin:0; font-size:2rem;">Dashboard</h1>
            <span id="favHeart" onclick="toggleFav()" style="font-size:2.5rem; cursor:pointer; color:#eee;">❤</span>
        </div>

        <div class="display-center">
            <img id="mainLogo" class="station-branding" src="">
            <div id="stationSub" class="branding-label">Auswahl erforderlich</div>
        </div>

        <div id="progBox" style="display:none; margin-top:30px; padding:20px; background:#f0fff7; border-radius:15px;">
            <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">Sendeplan Info</div>
            <div id="progContent" style="font-size:1.3rem; font-weight:bold;">---</div>
        </div>
    </div>

    <div class="hub-card">
        <h3 style="margin-top:0;">Sendeverlauf</h3>
        <table class="song-list" id="historyView"></table>
    </div>
</div>

<div class="control-bar">
    <div class="now-playing-mini">
        <img id="miniCover" src="" style="width:60px; height:60px; border-radius:10px; margin-right:20px;">
        <div>
            <b id="miniArtist" style="display:block; font-size:1rem;">Interpret</b>
            <span id="miniTitle" style="color:#7f8c8d;">Titel wird geladen</span>
        </div>
    </div>
    <button id="playToggle" class="btn-action" onclick="handleAudio()">Start</button>
    <div style="display:flex; align-items:center; gap:15px;">
        <span>🔈</span>
        <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.5" oninput="audioNode.volume=this.value">
        <span>🔊</span>
    </div>
</div>

<audio id="audioNode"></audio>

<script>
    const CONFIG = { 
        "feierabend-radio": "Feierabend Radio", 
        "brian-radio": "Brian-Radio", 
        "niklasheulsmann": "Niklas Hülsmann", 
        "simulator4": "Simulator4" 
    };

    let activeSlug = "";
    let myFavs = JSON.parse(localStorage.getItem('it_radio_favs_v12')) || Object.keys(CONFIG);
    const audioNode = document.getElementById('audioNode');

    window.onload = () => {
        renderFavs();
        loadStation(localStorage.getItem('it_last_station') || "brian-radio");
    };

    async function loadStation(slug) {
        activeSlug = slug.toLowerCase().trim();
        localStorage.setItem('it_last_station', activeSlug);
        refreshData();
    }

    async function refreshData() {
        try {
            const [c, s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${activeSlug}/current_song`),
                fetch(`https://api.laut.fm/station/${activeSlug}`),
                fetch(`https://api.laut.fm/station/${activeSlug}/last_songs`)
            ]);
            const songData = await c.json();
            const stationData = await s.json();
            const historyData = await l.json();

            const name = CONFIG[activeSlug] || stationData.display_name;
            document.getElementById('stationTitle').innerText = name;
            document.getElementById('stationSub').innerText = name;
            
            const logo = stationData.images.station_640x640;
            document.getElementById('mainLogo').src = logo;
            document.getElementById('miniCover').src = logo;

            document.getElementById('miniArtist').innerText = songData.artist ? songData.artist.name : name;
            document.getElementById('miniTitle').innerText = songData.title || "Live Stream läuft";

            // Sendeplan Logik (Rechtlich sicher & Eigenständig)
            if (stationData.current_playlist && stationData.current_playlist.name !== "Rotation") {
                document.getElementById('progBox').style.display = "block";
                document.getElementById('progContent').innerText = stationData.current_playlist.name;
            } else {
                document.getElementById('progBox').style.display = "none";
            }

            // Verlauf in deinem Design
            document.getElementById('historyView').innerHTML = historyData.map(s => `
                <tr class="song-entry">
                    <td class="time-badge">${new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                    <td style="width:60px;"><img class="cover-preview" src="${logo}"></td>
                    <td class="song-meta"><b>${s.artist.name}</b><br><span style="color:#7f8c8d; font-size:0.9rem;">${s.title}</span></td>
                </tr>
            `).join('');

            document.getElementById('favHeart').style.color = myFavs.includes(activeSlug) ? "#e74c3c" : "#eee";
        } catch(err) { console.error("Update fehlgeschlagen"); }
    }

    function renderFavs() {
        document.getElementById('favList').innerHTML = myFavs.map(f => `
            <div style="padding:15px; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:10px; cursor:pointer; display:flex; justify-content:space-between;" onclick="loadStation('${f}')">
                <span>${CONFIG[f] || f.toUpperCase()}</span>
                <span onclick="event.stopPropagation(); removeFav('${f}')">×</span>
            </div>
        `).join('');
    }

    function toggleFav() {
        const i = myFavs.indexOf(activeSlug);
        if(i === -1) myFavs.push(activeSlug); else myFavs.splice(i, 1);
        localStorage.setItem('it_radio_favs_v12', JSON.stringify(myFavs));
        renderFavs(); refreshData();
    }

    function removeFav(f) {
        myFavs = myFavs.filter(x => x !== f);
        localStorage.setItem('it_radio_favs_v12', JSON.stringify(myFavs));
        renderFavs();
    }

    function handleAudio() {
        if(audioNode.paused) { 
            audioNode.src = `https://stream.laut.fm/${activeSlug}`; 
            audioNode.play(); 
            document.getElementById('playToggle').innerText="Stoppen";
            document.getElementById('playToggle').style.background="#e74c3c";
        } else { 
            audioNode.pause(); 
            document.getElementById('playToggle').innerText="Starten";
            document.getElementById('playToggle').style.background="var(--accent)";
        }
    }

    setInterval(() => { if(activeSlug) refreshData(); }, 20000);
</script>
</body>
</html>
