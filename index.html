<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein laut.fm Radio-Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-container { margin-bottom: 20px; width: 100%; max-width: 400px; position: relative; }
        input { width: 100%; padding: 15px; border-radius: 30px; border: 2px solid #333; outline: none; font-size: 1em; background: #222; color: white; box-sizing: border-box; }
        input:focus { border-color: #ff5500; }
        #results { position: absolute; background: #222; width: 100%; border-radius: 10px; margin-top: 5px; z-index: 10; max-height: 250px; overflow-y: auto; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        .result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .result-item:hover { background: #444; }
        .result-item img { width: 40px; height: 40px; border-radius: 50%; }

        .player-card { background: #1e1e1e; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.7); }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 15px; color: #00ccff; font-weight: bold; }
        #station-logo { width: 140px; height: 140px; border-radius: 50%; border: 4px solid #ff5500; margin: 10px 0; object-fit: cover; }
        
        .history-box { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; font-size: 0.85em; }
        .history-title { color: #ff5500; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; font-size: 0.8em; }
        .history-item { border-bottom: 1px solid #333; padding: 5px 0; color: #ccc; }
        .history-item:last-child { border: none; }

        iframe { border: none; margin-top: 20px; border-radius: 15px; width: 100%; height: 160px; }
        .footer-info { margin-top: 20px; font-size: 0.8em; color: #666; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .live-dot { height: 8px; width: 8px; background-color: #00ff00; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Sender suchen...">
    <div id="results"></div>
</div>

<div class="player-card">
    <div class="status-bar">
        <span id="clock">00:00:00</span>
        <span id="listeners" style="color: #ff3300;">● 0 Hörer</span>
    </div>
    
    <img id="station-logo" src="">
    <h2 id="station-name" style="margin: 10px 0 5px 0;">Wähle Sender</h2>
    <p id="current-song" style="color: #00ff00; font-weight: bold; min-height: 1.2em;">Lade...</p>

    <div id="player-wrapper">
        </div>

    <div class="history-box">
        <div class="history-title">Zuletzt gelaufen:</div>
        <div id="history-list">
            <div class="history-item">Suche einen Sender...</div>
        </div>
    </div>

    <div class="footer-info">
        <span>🎤 Mikrofon aktiv</span> | 
        <span>News: <span id="next-news">--:--</span></span>
        <span class="live-dot"></span>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const resultsDiv = document.getElementById('results');
    let updateInterval;

    // 1. Suche
    searchInput.addEventListener('input', () => {
        const query = searchInput.value;
        if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
        fetch(`https://api.laut.fm/search/stations?query=${query}`)
            .then(res => res.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                data.items.slice(0, 5).forEach(st => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<img src="${st.images.station_80x80}"> <span>${st.display_name}</span>`;
                    div.onclick = () => selectStation(st.name);
                    resultsDiv.appendChild(div);
                });
            });
    });

    // 2. Sender wählen
    function selectStation(name) {
        resultsDiv.innerHTML = '';
        searchInput.value = '';
        document.getElementById('player-wrapper').innerHTML = `
            <iframe src="https://laut.fm/widgets/player/${name}" scrolling="no"></iframe>
        `;
        updateStationData(name);
        if(updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(() => updateStationData(name), 15000);
    }

    // 3. API Daten (Songs, History, Hörer)
    function updateStationData(name) {
        // Allgemeine Infos & Hörer
        fetch(`https://api.laut.fm/station/${name}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('station-name').innerText = data.display_name;
                document.getElementById('station-logo').src = data.images.station_120x120;
                document.getElementById('listeners').innerText = `● ${data.current_listeners || 0} Hörer`;
                
                const now = new Date();
                document.getElementById('next-news').innerText = (now.getHours() + 1) + ":00 Uhr";
            });

        // Aktueller Song & History
        fetch(`https://api.laut.fm/station/${name}/last_songs`)
            .then(res => res.json())
            .then(songs => {
                if(songs.length > 0) {
                    document.getElementById('current-song').innerText = `${songs[0].artist.name} - ${songs[0].title}`;
                    
                    // History Liste bauen (die letzten 3 Songs nach dem aktuellen)
                    let historyHTML = '';
                    songs.slice(1, 4).forEach(s => {
                        historyHTML += `<div class="history-item">${s.artist.name} - ${s.title}</div>`;
                    });
                    document.getElementById('history-list').innerHTML = historyHTML || "Keine weiteren Songs.";
                }
            });
    }

    // Uhrzeit Ticker
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString('de-DE');
    }, 1000);

    // Standard-Start
    selectStation("eins");
</script>

</body>
</html>
