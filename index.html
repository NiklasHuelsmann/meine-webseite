<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.49</title>
    <style>
        :root { 
            --bg-dark: #0d111a; --bg-panel: #1e2538; --accent: #00fad9; 
            --white: #ffffff; --text-dim: #cbd5e0;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark); margin: 0; height: 100vh; 
            color: var(--white); font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; justify-content: center; overflow: hidden;
        }

        .app-shell { 
            width: 100%; max-width: 1200px; height: 100vh; 
            background-color: var(--bg-panel); display: flex; 
            flex-direction: column; position: relative; 
        }

        /* HEADER */
        .top-nav { 
            height: 60px; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 20px; 
            background: rgba(0,0,0,0.4); flex-shrink: 0; z-index: 100;
        }
        #clock { font-weight: bold; font-size: 16px; color: var(--accent); font-variant-numeric: tabular-nums; }
        .app-title { font-weight: 900; letter-spacing: 2px; font-size: 14px; }

        /* CONTENT */
        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* PLAYER ZONE */
        .player-zone { 
            padding: 20px; text-align: center; display: flex; 
            flex-direction: column; align-items: center; flex-shrink: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);
        }
        #displayLogo { 
            font-size: 24px; font-weight: 900; margin-bottom: 15px; 
            color: var(--white); text-transform: uppercase; min-height: 1.2em;
        }
        
        .cover-container { width: 200px; height: 200px; flex-shrink: 0; }
        #bigAlbumArt { 
            width: 100%; height: 100%; border-radius: 20px; object-fit: cover; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 2px solid rgba(255,255,255,0.1);
        }
        
        .play-area { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        #playBtn { 
            width: 60px; height: 60px; border-radius: 50%; background: var(--accent); 
            border: none; font-size: 26px; cursor: pointer; color: #1e2538; 
            display: flex; align-items: center; justify-content: center;
        }

        /* LIST ZONE */
        .list-zone { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .list-label { font-size: 11px; font-weight: 900; color: var(--accent); padding: 10px 20px; text-transform: uppercase; }
        
        .scroll-list { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: 0 15px 10px; 
        }
        .scroll-list::-webkit-scrollbar { display: none; }

        .song-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px; 
            background: rgba(255,255,255,0.05); border-radius: 14px; 
            margin-bottom: 8px; border: 1px solid transparent; 
        }
        .song-item.active { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .song-icon { width: 25px; font-size: 18px; text-align: center; }
        .song-meta { flex: 1; overflow: hidden; }
        .song-artist { font-size: 13px; font-weight: bold; display: block; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-title { font-size: 11px; color: var(--text-dim); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-cover-mini { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; background: #000; }

        #btnExpand { 
            width: calc(100% - 30px); margin: 5px 15px 15px; padding: 12px; 
            background: transparent; border: 1px dashed var(--accent); 
            color: var(--accent); border-radius: 12px; font-weight: bold; cursor: pointer;
            display: none;
        }

        /* SEARCH OVERLAY */
        .search-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            background: var(--bg-panel); display: none; align-items: center; 
            padding: 0 20px; z-index: 1000; border-bottom: 2px solid var(--accent);
        }
        #query { flex: 1; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; }

        /* WEB DESIGN (PC) */
        @media (min-width: 850px) {
            .main-view { flex-direction: row; }
            .player-zone { width: 40%; justify-content: center; border-right: 1px solid rgba(255,255,255,0.05); padding: 40px; }
            .list-zone { width: 60%; }
            .cover-container { width: 320px; height: 320px; }
            #displayLogo { font-size: 32px; }
        }
    </style>
</head>
<body onload="init()">

<div class="app-shell">
    <div class="search-screen" id="searchUI">
        <input type="text" id="query" placeholder="Sendernamen eingeben...">
        <button onclick="startSearch()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer; margin-left:10px;">OK</button>
        <button onclick="closeUI()" style="background:none; border:none; color:#fff; font-size:22px; cursor:pointer; margin-left:10px;">✕</button>
    </div>

    <header class="top-nav">
        <div id="clock">00:00</div>
        <div class="app-title">RADIO ULTIMATE</div>
        <div onclick="openUI()" style="cursor:pointer; font-size: 22px;">🔍</div>
    </header>

    <main class="main-view">
        <section class="player-zone">
            <h1 id="displayLogo">RADIO BEREIT</h1>
            <div class="cover-container">
                <img id="bigAlbumArt" src="https://api.laut.fm/station/default/images/station_640x640.png">
            </div>
            <div class="play-area">
                <button id="playBtn" onclick="toggleAudio()" disabled>▶</button>
                <div id="listeners" style="font-size: 11px; color: var(--accent); font-weight: bold; margin-top: 5px; display: none;">0 HÖRER</div>
            </div>
        </section>

        <section class="list-zone">
            <h2 class="list-label">Programm & Verlauf</h2>
            <div class="scroll-list" id="listContent">
                <div id="welcome" style="text-align:center; opacity:0.3; padding-top:40px;">Nutze die Suche für einen Stream</div>
            </div>
            <button id="btnExpand" onclick="changeLimit()">MEHR ANZEIGEN</button>
        </section>
    </main>

    <footer style="padding: 10px; background: rgba(0,0,0,0.2); text-align: center; font-size: 9px; opacity: 0.4;">
        V115.49 • MULTI-DEVICE OPTIMIZED
    </footer>
</div>

<script>
    const snd = new Audio();
    let currentStation = "";
    let limit = 4;

    function init() {
        const updateClock = () => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        };
        updateClock();
        setInterval(updateClock, 1000);
        document.getElementById('query').addEventListener('keypress', (e) => { if(e.key === 'Enter') startSearch(); });
    }

    function openUI() { document.getElementById('searchUI').style.display = 'flex'; document.getElementById('query').value = ""; document.getElementById('query').focus(); }
    function closeUI() { document.getElementById('searchUI').style.display = 'none'; }

    function startSearch() {
        const val = document.getElementById('query').value.trim();
        if(val) {
            currentStation = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('playBtn').disabled = false;
            document.getElementById('listeners').style.display = 'block';
            document.getElementById('btnExpand').style.display = 'block';
            snd.src = `https://stream.laut.fm/${currentStation}`;
            snd.play().catch(() => {});
            document.getElementById('playBtn').innerHTML = "⏸";
            update();
            if(window.timer) clearInterval(window.timer);
            window.timer = setInterval(update, 8000);
            closeUI();
        }
    }

    function toggleAudio() {
        if(snd.paused) { snd.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { snd.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    function changeLimit() {
        limit = (limit === 4) ? 12 : 4;
        document.getElementById('btnExpand').innerText = (limit === 4) ? "MEHR ANZEIGEN" : "WENIGER ANZEIGEN";
        update();
    }

    async function update() {
        if(!currentStation) return;
        try {
            const [sInfo, sSongs] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`).then(r => r.json())
            ]);
            const lCount = await fetch(`https://api.laut.fm/station/${currentStation}/listeners`).then(r => r.text());

            document.getElementById('displayLogo').innerText = sInfo.display_name;
            document.getElementById('listeners').innerText = (lCount.includes("<") ? "0" : lCount) + " HÖRER";

            let html = "";
            sSongs.forEach((song, i) => {
                if(i >= limit) return;
                const isNow = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();
                
                // Schärfstes verfügbares Bild wählen
                const cover = song.image_640x640 || song.image_170x170 || sInfo.images.station_640x640;
                
                if(isNow) document.getElementById('bigAlbumArt').src = cover;

                let icon = "";
                if(check.includes("nachrichten") || check.includes("news")) {
                    icon = "📰"; art = "NACHRICHTEN"; tit = "Aktuelle Infos";
                } else if(check.includes("moderation") || check.includes("ident") || check.includes("ansage") || check.includes("sprecher")) {
                    icon = "🎙️";
                }

                html += `
                    <div class="song-item ${isNow ? 'active' : ''}">
                        <div class="song-icon">${icon}</div>
                        <div class="song-meta">
                            <span class="song-artist">${art}</span>
                            <span class="song-title">${tit}</span>
                        </div>
                        <img class="song-cover-mini" src="${cover}">
                    </div>
                `;
            });
            document.getElementById('listContent').innerHTML = html;
        } catch (e) {}
    }
</script>
</body>
</html>
