<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v115.04 - App Edition</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #949fb1;
            --status-yellow: #ffcc00; --status-blue: #007bff; --status-red: #ff3b3b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        
        .app { width: 100%; max-width: 800px; height: 100vh; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        
        .top-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; }
        #sysTime { font-size: 14px; font-weight: bold; }
        .icon-btn-large { font-size: 24px; color: var(--accent-main); cursor: pointer; }
        
        #searchOverlay { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; height: 50px; background: var(--bg-card); z-index: 100; align-items: center; padding: 0 15px; border-radius: 25px; border: 2px solid var(--accent-main); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }

        .main-content { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .main-content::-webkit-scrollbar { display: none; }
        
        .hero { padding: 10px 0; text-align: center; }
        #stNameHeader { font-size: 26px; font-weight: 900; color: #fff; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        #stPageTitle { font-size: 12px; color: var(--accent-main); margin-bottom: 10px; display: block; font-weight: bold; }
        #mainImg { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; background: #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        #pBtn { width: 65px; height: 65px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 26px; color: #1e2538; cursor: pointer; box-shadow: 0 0 20px rgba(0, 250, 217, 0.2); }
        
        .list-header { font-size: 11px; font-weight: bold; color: var(--accent-main); margin: 15px 15px 8px; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid rgba(0, 250, 217, 0.2); padding-bottom: 4px; }
        
        #nowPlayingBox { margin: 0 12px; }
        
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border: 1px solid transparent; }
        .track-entry.current { border-color: var(--accent-main); background: rgba(0, 250, 217, 0.05); }
        
        .pure-icon { font-size: 22px; width: 40px; text-align: center; flex-shrink: 0; }
        .track-cover { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; background: #111; flex-shrink: 0; }
        
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 14px; font-weight: bold; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-tit { font-size: 12px; color: #949fb1; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .track-meta { text-align: right; min-width: 50px; }
        .track-time { font-size: 10px; font-weight: bold; color: var(--accent-main); }
        
        .playing-bars { display: flex; align-items: flex-end; gap: 2px; height: 12px; margin-top: 4px; justify-content: flex-end; }
        .bar { width: 2px; background: var(--accent-main); animation: barAnim 1s infinite ease-in-out; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes barAnim { 0%, 100% { height: 3px; } 50% { height: 12px; } }

        .more-songs-area { text-align: center; padding: 10px 0; }
        #btnToggleList { background: rgba(255,255,255,0.05); border: 1px solid var(--accent-main); color: var(--accent-main); padding: 8px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; cursor: pointer; display: none; }

        .fixed-footer { padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); background: #151a29; border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); }
        .footer-row { display: flex; justify-content: center; margin-bottom: 12px; }
        .hoerer-badge { background: var(--accent-main); color: #1e2538; padding: 6px 20px; border-radius: 10px; font-size: 18px; font-weight: 900; letter-spacing: 0.5px; }
        
        #footerDesc { font-size: 12px; line-height: 1.4; text-align: center; color: #ddd; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; max-height: 60px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05); }
        .version-tag { text-align: center; font-size: 9px; color: var(--text-dim); margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onload="initApp()">
<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="icon-btn-large" onclick="toggleSearch()">🔍</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff; font-size: 20px;">✕</button>
    </div>

    <div class="main-content">
        <div class="hero">
            <h1 id="stNameHeader">RADIO PLAYER</h1>
            <span id="stPageTitle">Suche einen Sender</span>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <div style="font-size: 22px; color: var(--accent-main); cursor:pointer" onclick="share()">🔗</div>
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div style="width:22px"></div>
            </div>
        </div>

        <div class="list-header">WAS JETZT LÄUFT</div>
        <div id="nowPlayingBox">
            <div id="trackList" style="text-align:center; padding: 20px; opacity:0.5;">Bitte Sender suchen...</div>
        </div>

        <div class="more-songs-area">
            <button id="btnToggleList" onclick="toggleListSize()">NEUN SONGS ANZEIGEN</button>
        </div>
    </div>

    <div class="fixed-footer">
        <div class="footer-row">
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
        <div id="footerDesc">Suche einen laut.fm Sender über die Lupe oben rechts.</div>
        <div class="version-tag">Version v115.04 • Final Build</div>
    </div>
</div>

<script>
    const au = new Audio(); 
    let currentSlug = ""; 
    let showFullList = false;

    function initApp() { 
        setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000); 
    }

    function toggleListSize() { 
        showFullList = !showFullList; 
        document.getElementById('btnToggleList').innerText = showFullList ? "WENIGER ANZEIGEN" : "NEUN SONGS ANZEIGEN";
        updateUI(); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; 
    }
    
    function execSearch() { 
        const input = document.getElementById('sInput'); 
        if(input.value.trim()) { startStation(input.value.trim(), true); toggleSearch(); } 
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnToggleList').style.display = 'inline-block';
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 10000);
    }

    function togglePlay() { 
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json())
            ]);
            
            const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/listeners`);
            const hText = await hRes.text();
            const hCount = hText.includes("<") ? "0" : hText;

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('stPageTitle').innerText = s.page_title || "";
            document.getElementById('footerDesc').innerText = s.description || "Keine Beschreibung.";
            document.getElementById('hoerer').innerText = hCount + " HÖRER";
            document.getElementById('mainImg').src = s.images.station_640x640;

            let html = "";
            const listLimit = showFullList ? 9 : 3;

            l.forEach((song, i) => {
                if(i >= listLimit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();
                
                let img = song.image_640x640 || (song.artist && song.artist.image) || s.images.station_120x120;
                let mediaElement = `<img class="track-cover" src="${img}">`;
                let iconOverride = "";

                if(check.includes("reklame") || check.includes("werbung") || song.type === "gold") {
                    iconOverride = "📢";
                } else if(check.includes("news") || check.includes("nachrichten")) {
                    iconOverride = "📰";
                } else if(check.includes("moderation") || check.includes("talk") || check.includes("live") || check.includes("spricht")) {
                    iconOverride = "🎙️";
                }

                if(iconOverride) {
                    mediaElement = `<div class="pure-icon">${iconOverride}</div>`;
                    if(isCurrent) { art = iconOverride === "📢" ? "REKLAME" : (iconOverride === "📰" ? "NEWS" : "MODERATION"); }
                }

                html += `<div class="track-entry ${isCurrent ? 'current' : ''}">
                    ${mediaElement}
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <div class="track-meta">
                        <div class="track-time">${isCurrent ? 'LIVE' : new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div>
                        ${isCurrent ? '<div class="playing-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>' : ''}
                    </div>
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
    function share() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
