<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Pro v7.5 FINAL</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --accent: #00d2ff;
            --stopp: #ff7043;
            --text: #ffffff;
            --border: #333333;
            --error: #ff4444;
        }

        * { box-sizing: border-box; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { padding: 10px 15px; display: flex; align-items: center; gap: 15px; background: #000; border-bottom: 1px solid var(--border); }
        .search-area { display: flex; background: #222; border-radius: 20px; padding: 6px 15px; align-items: center; border: 2px solid #444; }
        #sIn { background: transparent; border: none; color: white; width: 130px; font-size: 14px; outline: none; }
        .search-btn { color: var(--accent); cursor: pointer; font-size: 16px; margin-left: 5px; }
        .uhr { font-family: monospace; color: var(--accent); font-weight: bold; font-size: 14px; margin-left: auto; }

        .container { flex: 1; display: grid; grid-template-columns: 380px 1fr; overflow: hidden; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; overflow-y: auto; } body { overflow: auto; } }

        .left-panel { background: #111; padding: 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        #stName { font-size: 20px; font-weight: bold; color: var(--accent); text-transform: lowercase; }
        #stationDisplay { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; border: 1px solid #333; }
        
        .btn-main { background: #238636; color: white; border: none; padding: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        .btn-main.is-playing { background: var(--stopp); }

        .vol-area { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        input[type=range] { flex: 1; -webkit-appearance: none; background: #444; height: 3px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #fff; border-radius: 50%; border: 1px solid #000; cursor: pointer; }

        #streamUrlDisplay { font-size: 10px; color: var(--accent); word-break: break-all; margin-top: 8px; font-family: monospace; background: rgba(0,0,0,0.5); padding: 5px; border: 1px solid #222; }

        /* Fehlermeldung Style */
        .error-msg { color: var(--error); font-weight: bold; font-size: 12px; margin-top: 5px; display: none; }

        .right-panel { padding: 25px; overflow-y: auto; background: #1a1a1a; }
        .section-title { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 15px; }
        .now-box { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.4); padding: 15px; margin-bottom: 20px; border-left: 3px solid var(--accent); }
        
        .history-item { display: flex; gap: 20px; padding: 12px 0; border-bottom: 1px dotted #333; font-size: 14px; }
        .h-time { color: var(--accent); font-weight: bold; min-width: 50px; }
        .h-info b { color: #fff; display: block; }

        footer { background: #000; height: 75px; display: flex; align-items: center; padding: 0 15px; border-top: 1px solid #333; gap: 15px; }
        .vis-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .bar { width: 4px; background: var(--accent); height: 8px; border-radius: 2px; }
        .vis-circle.active .bar { animation: dance 0.7s infinite ease-in-out; }
        @keyframes dance { 0%, 100% { height: 8px; } 50% { height: 25px; } }
        
        .marquee { flex: 1; overflow: hidden; white-space: nowrap; color: var(--accent); font-weight: bold; font-size: 18px; }
        #fSong { display: inline-block; animation: scroll 15s linear infinite; padding-left: 100%; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body onload="boot()">

<header>
    <div class="search-area">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') startSync(this.value)">
        <span class="search-btn" onclick="startSync(document.getElementById('sIn').value)">🔍</span>
    </div>
    <div id="uhr" class="uhr">00:00:00</div>
</header>

<div class="container">
    <div class="left-panel">
        <div id="stName">RADIO PRO</div>
        <div id="errorBox" class="error-msg">⚠️ Dieser Sender existiert nicht oder ist offline.</div>
        <img id="stationDisplay" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <button id="pBtn" class="btn-main" onclick="playClick()">START</button>
        
        <div class="vol-area">
            <span>🔈</span>
            <input type="range" id="volRange" min="0" max="1" step="0.01" value="0.9" oninput="setV(this.value)">
        </div>
        <div id="streamUrlDisplay">URL: bereit</div>
    </div>

    <div class="right-panel">
        <div class="section-title">JETZT LÄUFT</div>
        <div class="now-box">
            <span id="curT" style="color:var(--accent); font-weight:bold; margin-right:10px;">--:--</span>
            <span id="curS" style="font-weight:bold;">Bitte suchen</span>
        </div>
        <div class="section-title">HISTORIE (9 SONGS)</div>
        <div id="hList"></div>
    </div>
</div>

<footer>
    <div id="fVis" class="vis-circle">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="marquee"><div id="fSong">Bereit...</div></div>
</footer>

<audio id="audioEngine" preload="none" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audioEngine');
    let isPlaying = false, currentSlug = "";

    function boot() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
    }

    function setV(v) { audio.volume = v; }

    function startSync(val) {
        if(!val) return;
        currentSlug = val.toLowerCase().trim().replace(/\s+/g, '-');
        document.getElementById('errorBox').style.display = "none"; // Reset Fehler
        updateAPI();
    }

    function playClick() {
        if(!currentSlug) return;
        const btn = document.getElementById('pBtn');
        if(!isPlaying) {
            audio.src = "https://stream.laut.fm/" + currentSlug + "?nocache=" + Date.now();
            audio.load();
            audio.play().then(() => {
                isPlaying = true;
                btn.innerText = "STOPP";
                document.getElementById('fVis').classList.add('active');
            }).catch(e => {
                // Falls der Stream-Link direkt einen Fehler wirft
                document.getElementById('errorBox').style.display = "block";
            });
        } else {
            audio.pause(); isPlaying = false;
            btn.innerText = "START";
            document.getElementById('fVis').classList.remove('active');
        }
    }

    async function updateAPI() {
        if(!currentSlug) return;
        try {
            const response = await fetch(`https://api.laut.fm/station/${currentSlug}`);
            if(!response.ok) throw new Error("Not Found");
            
            const i = await response.json();
            const s = await fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json());
            
            document.getElementById('stName').innerText = i.display_name;
            document.getElementById('stationDisplay').src = i.images.station_640x640;
            document.getElementById('streamUrlDisplay').innerText = "URL: https://stream.laut.fm/" + currentSlug;
            
            const now = s[0];
            document.getElementById('curS').innerText = now.artist.name + " - " + now.title;
            document.getElementById('fSong').innerText = "+++ " + now.artist.name + " - " + now.title + " +++ ";
            
            let h = "";
            s.slice(1, 10).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                h += `<div class="history-item"><div class="h-time">${time}</div><div class="h-info"><b>${song.artist.name}</b><span>${song.title}</span></div></div>`;
            });
            document.getElementById('hList').innerHTML = h;
        } catch(e) {
            // Fehlerbehandlung: Sender nicht gefunden
            document.getElementById('errorBox').style.display = "block";
            document.getElementById('stName').innerText = "FEHLER";
            document.getElementById('curS').innerText = "Sender nicht aktiv";
            document.getElementById('fSong').innerText = "Sender nicht gefunden...";
            document.getElementById('hList').innerHTML = "";
            document.getElementById('streamUrlDisplay').innerText = "URL: nicht verfügbar";
        }
    }
</script>
</body>
</html>
