<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Studio Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d0d0d; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Suche oben - Findet ALLE laut.fm Sender */
        .search-area { width: 100%; max-width: 420px; position: relative; margin-bottom: 25px; }
        input#search-input { 
            width: 100%; padding: 15px 20px; border-radius: 12px; border: 1px solid #333; 
            background: #1a1a1a; color: white; font-size: 1.1em; outline: none; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        input#search-input:focus { border-color: #ff5500; }
        
        #results-box { 
            position: absolute; background: #222; width: 100%; border-radius: 12px; 
            z-index: 1000; margin-top: 8px; max-height: 350px; overflow-y: auto; 
            box-shadow: 0 10px 40px #000; border: 1px solid #333; display: none;
        }
        .result-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
        .result-item:hover { background: #333; }
        .result-item img { width: 40px; height: 40px; border-radius: 6px; }

        /* Die Haupt-Karte */
        .player-card { 
            background: #161616; width: 100%; max-width: 420px; border-radius: 24px; 
            padding: 30px; text-align: center; border: 1px solid #222; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .status-header { display: flex; justify-content: space-between; color: #00ccff; font-family: 'Courier New', monospace; font-size: 0.95em; margin-bottom: 20px; font-weight: bold; }
        
        /* Viereckiges Logo mit minimalem Radius */
        #station-logo { 
            width: 220px; height: 220px; border-radius: 18px; 
            border: 1px solid #333; object-fit: cover; margin-bottom: 15px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            background: #222;
        }

        h2#station-name { margin: 10px 0 5px 0; font-size: 1.8em; color: #fff; }
        #current-song { color: #00ff00; font-weight: bold; margin: 10px 0 25px 0; font-size: 1.1em; min-height: 1.2em; }

        /* Play-Button Design */
        .big-play-btn {
            background: #ff5500; border: none; width: 80px; height: 80px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 25px auto; transition: transform 0.2s, background 0.2s;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.4);
        }
        .big-play-btn:hover { transform: scale(1.1); background: #ff6622; }
        .big-play-btn svg { width: 35px; height: 35px; fill: white; }

        /* History Liste */
        .history { text-align: left; background: #1e1e1e; padding: 20px; border-radius: 18px; }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #2a2a2a; font-size: 0.9em; }
        .history-item:last-child { border: none; }
        .time-tag { color: #00ccff; font-weight: bold; min-width: 45px; }
        .song-text { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Studio Studio Footer */
        .studio-footer { 
            margin-top: 25px; display: flex; justify-content: space-between; 
            font-size: 0.75em; color: #555; border-top: 1px solid #222; padding-top: 15px;
        }
        .info-box { display: flex; align-items: center; gap: 6px; }
    </style>
</head>
<body>

<div class="search-area">
    <input type="text" id="search-input" placeholder="🔍 Sender suchen (z.B. Rock, Pop, 80er)..." autocomplete="off">
    <div id="results-box"></div>
</div>

<div class="player-card">
    <div class="status-header">
        <div id="uhr">00:00:00</div>
        <div id="listeners">● 0 Hörer</div>
    </div>

    <img id="station-logo" src="" alt="Radio Logo">
    
    <h2 id="station-name">Sender wählen</h2>
    <div id="current-song">Stream bereit</div>

    <button class="big-play-btn" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>

    <audio id="audio-player"></audio>

    <div class="history">
        <div style="font-size: 0.7em; color: #444; font-weight: bold; text-transform: uppercase; margin-bottom: 10px;">Zuletzt gelaufen</div>
        <div id="history-content"></div>
    </div>

    <div class="studio-footer">
        <div class="info-box">🎤 <span>MODERATION AKTIV</span></div>
        <div class="info-box">📰 <span>NEWS: <span id="news-timer">--:--</span></span></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio-player');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    let activeStation = "";

    // Stream steuern
    function togglePlay() {
        if (!activeStation) return;
        if (audio.paused) {
            audio.src = `https://stream.laut.fm/${activeStation}`;
            audio.play();
            playIcon.style.display = "none";
            pauseIcon.style.display = "block";
        } else {
            audio.pause();
            audio.src = ""; // Stop buffering
            playIcon.style.display = "block";
            pauseIcon.style.display = "none";
        }
    }

    // Globale Suche
    const input = document.getElementById('search-input');
    const resBox = document.getElementById('results-box');

    input.addEventListener('input', () => {
        if (input.value.length < 2) { resBox.style.display = "none"; return; }
        fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(input.value)}`)
            .then(r => r.json())
            .then(data => {
                resBox.innerHTML = "";
                resBox.style.display = "block";
                data.items.slice(0, 6).forEach(s => {
                    const d = document.createElement('div');
                    d.className = "result-item";
                    d.innerHTML = `<img src="${s.images.station_80x80}"> <strong>${s.display_name}</strong>`;
                    d.onclick = () => { selectStation(s.name); resBox.style.display="none"; input.value=""; };
                    resBox.appendChild(d);
                });
            });
    });

    function selectStation(name) {
        activeStation = name;
        audio.pause();
        playIcon.style.display = "block";
        pauseIcon.style.display = "none";
        updateInfo(name);
    }

    // Daten-Update (Hörer, Songs, Logo)
    function updateInfo(name) {
        // Hörer & Logo
        fetch(`https://api.laut.fm/station/${name}`)
            .then(r => r.json())
            .then(d => {
                document.getElementById('station-name').innerText = d.display_name;
                document.getElementById('station-logo').src = d.images.station_640x640;
                document.getElementById('listeners').innerText = `● ${d.current_listeners || 0} Hörer`;
                
                const nextHour = (new Date().getHours() + 1) % 24;
                document.getElementById('news-timer').innerText = nextHour + ":00 Uhr";
            });

        // Song History & Aktueller Song
        fetch(`https://api.laut.fm/station/${name}/last_songs`)
            .then(r => r.json())
            .then(songs => {
                if (songs.length > 0) {
                    document.getElementById('current-song').innerText = `🎶 ${songs[0].artist.name} - ${songs[0].title}`;
                    let hHTML = "";
                    songs.slice(1, 4).forEach(s => {
                        const time = s.started_at.split(' ')[1].substring(0,5);
                        hHTML += `<div class="history-item">
                            <span class="time-tag">${time}</span>
                            <span class="song-text">${s.artist.name} - ${s.title}</span>
                        </div>`;
                    });
                    document.getElementById('history-content').innerHTML = hHTML;
                }
            });
    }

    // Uhrzeit Ticker
    setInterval(() => {
        document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);

    // Automatisches Update der Song-Infos alle 20 Sekunden
    setInterval(() => { if(activeStation) updateInfo(activeStation); }, 20000);

    // Start-Sender
    selectStation("eins");
</script>

</body>
</html>
