<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Radio Station Pro</title>
    <style>
        :root { --primary: #ff5500; --bg: #080808; --card: rgba(20, 20, 25, 0.98); --error: #ff3333; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 480px; background: var(--card); display: flex; flex-direction: column; position: relative; min-height: 100vh; border-right: 1px solid #222; border-left: 1px solid #222; }
        
        /* Suche */
        .header { padding: 30px 20px 10px; z-index: 1000; }
        #search-input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #333; background: #111; color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        #results-box { position: absolute; top: 85px; left: 20px; right: 20px; background: #1a1a1a; border-radius: 15px; max-height: 300px; overflow-y: auto; display: none; border: 1px solid #444; box-shadow: 0 20px 50px #000; z-index: 2000; }
        .result-item { padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #222; cursor: pointer; }
        .result-item img { width: 40px; height: 40px; border-radius: 8px; }

        .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        
        /* Status & Error */
        .status-line { width: 100%; display: flex; justify-content: space-between; font-family: monospace; font-size: 12px; color: #00e5ff; margin-bottom: 15px; }
        #error-msg { color: var(--error); font-weight: bold; margin-bottom: 10px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        #station-name { font-size: 26px; font-weight: 800; margin-bottom: 20px; }
        #main-cover { width: 100%; max-width: 280px; aspect-ratio: 1/1; border-radius: 25px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.5); margin-bottom: 20px; border: 1px solid #333; background: #111; }

        #track-title { font-size: 18px; font-weight: bold; color: #00ffaa; }
        #artist-name { font-size: 16px; color: #888; margin-bottom: 25px; }

        .play-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(255, 85, 0, 0.3); margin-bottom: 30px; }
        
        .station-desc { width: 100%; background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; font-size: 13px; color: #999; text-align: left; box-sizing: border-box; }

        .history { width: 100%; text-align: left; margin-top: 20px; }
        .history-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; font-size: 12px; }
        .history-item img { width: 35px; height: 35px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <input type="text" id="search-input" placeholder="Sender suchen..." autocomplete="off">
        <div id="results-box"></div>
    </div>

    <div class="content">
        <div class="status-line">
            <div id="clock">00:00:00</div>
            <div id="listeners">● 0 Hörer</div>
        </div>

        <div id="error-msg">⚠ STATION OFFLINE</div>
        <div id="station-name">Wähle Sender</div>
        
        <img id="main-cover" src="" alt="">

        <div id="track-title">Radio App</div>
        <div id="artist-name">Bereit</div>

        <button class="play-btn" id="playBtn">
            <svg id="p-svg" width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            <svg id="s-svg" width="35" height="35" viewBox="0 0 24 24" fill="white" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="station-desc" id="station-info">Suche eine Station von laut.fm</div>
        <div class="history" id="history-box"></div>
    </div>
</div>

<audio id="audio-engine" playsinline></audio>

<script>
    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('playBtn');
    const input = document.getElementById('search-input');
    const resBox = document.getElementById('results-box');
    const errorMsg = document.getElementById('error-msg');
    
    let currentStation = "niklas-fm";

    async function loadStation(name) {
        errorMsg.style.display = "none";
        try {
            const r = await fetch(`https://api.laut.fm/station/${name}`);
            if(!r.ok) throw new Error("Nicht gefunden");
            const data = await r.json();

            // Check ob Station aktiv ist
            if(data.active === false) {
                errorMsg.style.display = "block";
                errorMsg.innerText = "⚠ STATION DEAKTIVIERT";
            }

            document.getElementById('station-name').innerText = data.display_name;
            document.getElementById('listeners').innerText = `● ${data.current_listeners} Hörer`;
            document.getElementById('station-info').innerText = data.description || "Keine Info.";
            const logo = data.images.station_640x640;

            const rS = await fetch(`https://api.laut.fm/station/${name}/last_songs`);
            const songs = await rS.json();

            if(songs.length > 0) {
                document.getElementById('track-title').innerText = songs[0].title;
                document.getElementById('artist-name').innerText = songs[0].artist.name;
                document.getElementById('main-cover').src = songs[0].image_640x640 || logo;
                
                let h = "";
                songs.slice(1, 6).forEach(s => {
                    const t = s.started_at.split(' ')[1].substring(0,5);
                    h += `<div class="history-item"><b style="color:var(--primary)">${t}</b> <img src="${s.image_120x120 || logo}"> <span>${s.artist.name} - ${s.title}</span></div>`;
                });
                document.getElementById('history-box').innerHTML = h;
            }
        } catch(e) {
            errorMsg.style.display = "block";
            errorMsg.innerText = "⚠ SENDER NICHT GEFUNDEN";
        }
    }

    // Stream Fehler abfangen
    audio.onerror = () => {
        errorMsg.style.display = "block";
        errorMsg.innerText = "⚠ STREAM NICHT ERREICHBAR";
        stopAudio();
    };

    function stopAudio() {
        audio.pause();
        document.getElementById('p-svg').style.display = "block";
        document.getElementById('s-svg').style.display = "none";
    }

    playBtn.onclick = () => {
        if(audio.paused) {
            audio.src = `https://stream.laut.fm/${currentStation}`;
            audio.play().catch(() => {
                errorMsg.style.display = "block";
                errorMsg.innerText = "⚠ FEHLER BEIM STARTEN";
            });
            document.getElementById('p-svg').style.display = "none";
            document.getElementById('s-svg').style.display = "block";
        } else {
            stopAudio();
        }
    };

    input.oninput = async () => {
        const val = input.value.trim();
        if(val.length < 2) { resBox.style.display = "none"; return; }
        const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`);
        const d = await r.json();
        resBox.innerHTML = "";
        if(d.items) {
            resBox.style.display = "block";
            d.items.slice(0, 10).forEach(s => {
                const item = document.createElement('div');
                item.className = "result-item";
                item.onmousedown = (e) => { 
                    e.preventDefault(); 
                    currentStation = s.name;
                    stopAudio();
                    loadStation(s.name);
                    resBox.style.display = "none";
                    input.value = "";
                };
                item.innerHTML = `<img src="${s.images.station_80x80}"> <b>${s.display_name}</b>`;
                resBox.appendChild(item);
            });
        }
    };

    input.onblur = () => setTimeout(() => resBox.style.display = "none", 300);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(() => loadStation(currentStation), 30000);
    loadStation("niklas-fm");
</script>
</body>
</html>
