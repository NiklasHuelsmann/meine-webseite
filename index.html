<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v118.0</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0d1117; --panel: #161b22; --white: #f0f6fc; --gray: #8b949e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { height: 70px; background: #000; border-bottom: 2px solid var(--accent); display: flex; align-items: center; padding: 0 20px; gap: 15px; z-index: 1000; }
        #liveClock { font-weight: 900; color: var(--accent); font-size: 1.2rem; min-width: 90px; }
        .search-area { position: relative; flex: 1; max-width: 500px; }
        #query { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; }
        #results { position: absolute; top: 50px; width: 100%; background: white; color: black; border-radius: 8px; display: none; z-index: 9999; box-shadow: 0 10px 30px #000; max-height: 250px; overflow-y: auto; }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* MAIN LAYOUT */
        .main { flex: 1; display: flex; overflow: hidden; }
        .player-side { width: 400px; padding: 25px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #30363d; overflow-y: auto; text-align: center; }
        .history-side { flex: 1; padding: 25px; overflow-y: auto; background: rgba(0,0,0,0.2); }

        /* PLAYER COMPONENTS */
        .studio-frame { width: 280px; height: 280px; border: 4px solid var(--accent); border-radius: 40px; padding: 6px; background: #000; position: relative; margin-bottom: 20px; }
        #mainCover { width: 100%; height: 100%; border-radius: 32px; object-fit: cover; }
        #studioOverlay { position: absolute; inset: 6px; border-radius: 32px; background: rgba(0,210,255,0.4); display: none; align-items: center; justify-content: center; font-size: 90px; backdrop-filter: blur(4px); }

        #playBtn { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 35px; cursor: pointer; margin-bottom: 15px; }
        .badge { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 5px 20px; border-radius: 20px; font-weight: bold; font-size: 12px; margin-bottom: 10px; }

        /* NOW PLAYING BLOCK (LIKE LAUT.FM) */
        .now-playing-box { width: 100%; background: var(--panel); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid var(--accent); }
        .now-playing-box small { color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        #currentSongDisplay { font-size: 18px; font-weight: bold; margin-top: 5px; display: block; }

        /* LIST ITEMS */
        .song-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--panel); border-radius: 15px; margin-bottom: 10px; border: 1px solid #30363d; }
        .song-card.active { border-color: var(--accent); background: rgba(0,210,255,0.05); }
        .song-time { font-size: 11px; color: var(--accent); font-weight: bold; width: 45px; }
        .song-info { flex: 1; text-align: left; overflow: hidden; }
        .song-info b { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-info span { font-size: 12px; color: var(--gray); }
        .song-img-mini { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* SMARTPHONE / APP VIEW */
        @media (max-width: 850px) {
            .main { flex-direction: column; overflow-y: auto; }
            .player-side { width: 100%; border-right: none; border-bottom: 1px solid #30363d; height: auto; }
            .history-side { flex: none; height: auto; }
            .studio-frame { width: 220px; height: 220px; }
        }
    </style>
</head>
<body onload="init()">

<header class="header">
    <div id="liveClock">00:00:00</div>
    <div class="search-area">
        <input type="text" id="query" placeholder="Sender suchen..." oninput="doSearch()" autocomplete="off">
        <div id="results"></div>
    </div>
</header>

<main class="main">
    <section class="player-side">
        <div class="studio-frame">
            <img id="mainCover" src="https://api.laut.fm/station/default/images/station_640x640.png">
            <div id="studioOverlay"></div>
        </div>
        <button id="playBtn" onclick="togglePlay()" disabled>▶</button>
        <div id="listeners" class="badge">0 HÖRER LIVE</div>
        <h2 id="stTitle" style="margin:5px 0">STUDIO</h2>
        <p id="stBio" style="font-size:13px; color:var(--gray); margin-bottom:10px;"></p>

        <div class="now-playing-box">
            <small>Jetzt läuft:</small>
            <div id="currentSongDisplay">Wähle einen Sender</div>
        </div>
    </section>

    <section class="history-side">
        <h4 style="color:var(--accent); margin-top:0; letter-spacing:2px;">SENDE-PROTOKOLL</h4>
        <div id="playlist"></div>
    </section>
</main>

<script>
    const audio = new Audio();
    let currentID = "";
    const proxy = "https://api.allorigins.win/get?url=";

    function init() {
        setInterval(() => {
            document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);
    }

    async function doSearch() {
        const q = document.getElementById('query').value;
        if(q.length < 2) { document.getElementById('results').style.display = 'none'; return; }
        const r = await fetch(proxy + encodeURIComponent(`https://api.laut.fm/search/stations?query=${q}`));
        const d = await r.json();
        const json = JSON.parse(d.contents);
        if(json.items) {
            document.getElementById('results').innerHTML = json.items.slice(0,8).map(s => `
                <div class="res-item" onclick="load('${s.name}')">
                    <img src="${s.images.station_80x80}" width="30">
                    <b>${s.display_name}</b>
                </div>`).join('');
            document.getElementById('results').style.display = 'block';
        }
    }

    function load(id) {
        currentID = id;
        document.getElementById('results').style.display = 'none';
        document.getElementById('query').value = "";
        document.getElementById('playBtn').disabled = false;
        audio.src = `https://stream.laut.fm/${id}`;
        audio.play();
        document.getElementById('playBtn').innerHTML = "⏸";
        update();
        if(window.itv) clearInterval(window.itv);
        window.itv = setInterval(update, 10000);
    }

    function togglePlay() {
        if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function update() {
        if(!currentID) return;
        try {
            const [stR, soR, liR] = await Promise.all([
                fetch(proxy + encodeURIComponent(`https://api.laut.fm/station/${currentID}`)).then(r => r.json()),
                fetch(proxy + encodeURIComponent(`https://api.laut.fm/station/${currentID}/last_songs`)).then(r => r.json()),
                fetch(proxy + encodeURIComponent(`https://api.laut.fm/station/${currentID}/listeners`)).then(r => r.json())
            ]);

            const info = JSON.parse(stR.contents);
            const songs = JSON.parse(soR.contents);
            const listeners = liR.contents;

            document.getElementById('stTitle').innerText = info.display_name;
            document.getElementById('stBio').innerText = info.description || "";
            document.getElementById('listeners').innerText = listeners + " HÖRER LIVE";

            const overlay = document.getElementById('studioOverlay');
            overlay.style.display = "none";

            let html = "";
            songs.forEach((s, i) => {
                const isNow = i === 0;
                const cover = s.image_640x640 || info.images.station_640x640;
                let ico = "";
                const check = (s.artist.name + s.title).toLowerCase();

                if(check.includes("nachrichten")) {
                    ico = "📰"; if(isNow) { overlay.innerText = "📰"; overlay.style.display = "flex"; }
                } else if(check.includes("moderation")) {
                    ico = "🎙️"; if(isNow) { overlay.innerText = "🎙️"; overlay.style.display = "flex"; }
                }

                if(isNow) {
                    document.getElementById('mainCover').src = cover;
                    document.getElementById('currentSongDisplay').innerHTML = `${s.artist.name}<br><span style="color:var(--gray); font-size:14px; font-weight:normal;">${s.title}</span>`;
                }

                html += `
                    <div class="song-card ${isNow ? 'active' : ''}">
                        <div class="song-time">${s.started_at.split(' ')[1].substring(0,5)}</div>
                        <div style="font-size:20px; width:30px;">${ico}</div>
                        <div class="song-info"><b>${s.artist.name}</b><span>${s.title}</span></div>
                        <img class="song-img-mini" src="${cover}">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
