<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Dashboard</title>
    <style>
        :root { 
            --bg: #05080f; 
            --karte: rgba(15, 23, 42, 0.95); 
            --akzent: #0088ff; 
            --text: #f8fafc; 
            --rand: rgba(0, 136, 255, 0.35);
            --glow: 0 0 25px rgba(0, 136, 255, 0.5);
            --glass: blur(25px);
        }

        html, body { 
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; overflow-x: hidden;
        }

        header { 
            padding: 12px 5%; display: flex; align-items: center; justify-content: space-between; 
            background: var(--karte); backdrop-filter: var(--glass); border-bottom: 2px solid var(--akzent); 
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--glow);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        #miniLogo { width: 40px; height: 40px; border-radius: 10px; border: 2px solid var(--akzent); display: none; object-fit: cover; }
        #senderOben { font-weight: 900; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px; }

        .container { 
            flex-grow: 1; padding: 25px 5%; max-width: 1400px; margin: 0 auto; width: 100%;
            display: flex; flex-direction: column; gap: 20px;
        }

        .top-row { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .suche-box { 
            display: flex; background: var(--karte); border: 1px solid var(--rand); 
            border-radius: 14px; padding: 8px 18px; align-items: center; width: 300px; box-shadow: var(--glow);
        }
        #sIn { background: transparent; border: none; color: white; outline: none; width: 100%; font-size: 15px; }

        .app-grid { 
            display: grid; grid-template-columns: 380px 1fr; gap: 25px; align-items: start;
        }

        @media (max-width: 950px) {
            .app-grid { grid-template-columns: 1fr; }
        }

        .card { 
            background: var(--karte); border: 1px solid var(--rand); border-radius: 28px; 
            padding: 25px; box-shadow: var(--glow); backdrop-filter: var(--glass);
        }

        /* PLAYER */
        .player-side { text-align: center; }
        #hauptLogo { 
            width: 100%; max-width: 250px; aspect-ratio: 1/1; border-radius: 22px; 
            border: 4px solid var(--akzent); margin-bottom: 20px; box-shadow: var(--glow);
        }
        
        .hoerer-pill { 
            display: inline-block; background: rgba(0, 136, 255, 0.2); border: 1.5px solid var(--akzent); 
            color: var(--akzent); padding: 6px 16px; border-radius: 25px; font-size: 12px; font-weight: 900;
            margin-bottom: 20px; text-transform: uppercase;
        }

        .controls { 
            margin: 25px 0; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .play-btn { 
            width: 80px; height: 80px; border-radius: 22px; border: none; background: white; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }

        .vol-slider-row { width: 100%; max-width: 220px; text-align: center; }
        input[type=range] { width: 100%; accent-color: var(--akzent); cursor: pointer; height: 6px; }

        /* SONG-LISTE */
        .label { font-size: 12px; color: var(--akzent); font-weight: 900; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .akt-song-display { 
            font-size: 1.6rem; font-weight: 900; padding: 25px; background: rgba(255,255,255,0.03); 
            border-radius: 22px; border-left: 8px solid var(--akzent); margin-bottom: 30px;
        }

        .history-list { display: flex; flex-direction: column; }
        .history-item { 
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); 
            display: flex; gap: 20px; font-size: 15px; align-items: center;
        }
        .history-time { color: var(--akzent); font-weight: 800; min-width: 60px; font-family: monospace; font-size: 16px; }

        footer { 
            padding: 20px 5%; display: flex; justify-content: space-between; 
            align-items: center; font-size: 12px; background: rgba(0,0,0,0.6); border-top: 1px solid var(--rand);
        }
    </style>
</head>
<body onload="startClock()">

<header>
    <div class="header-left">
        <img id="miniLogo" src="">
        <span id="senderOben">RADIO DASHBOARD</span>
    </div>
    <div id="uhr" style="font-weight: bold; font-family: monospace; font-size: 20px; color: var(--akzent);">00:00:00</div>
</header>

<div class="container">
    <div class="top-row">
        <div class="suche-box">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeypress="if(event.key==='Enter') waehleSender(this.value)">
            <button onclick="waehleSender(document.getElementById('sIn').value)" style="background:none; border:none; color:var(--akzent); cursor:pointer;">🔍</button>
        </div>
    </div>

    <div class="app-grid">
        <div class="card player-side">
            <img id="hauptLogo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <div><span id="hoererZahl" class="hoerer-pill">BEREIT</span></div>
            <div class="controls">
                <button class="play-btn" onclick="togglePlay()" id="pBtn">
                    <svg width="40" height="40" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="black"/></svg>
                </button>
                <div class="vol-slider-row">
                    <span id="volLabel" style="font-size: 11px; font-weight: 900; display: block; margin-bottom: 8px;">LAUTSTÄRKE: 90%</span>
                    <input type="range" min="0" max="1" step="0.01" value="0.9" oninput="setVol(this.value)">
                </div>
            </div>
            <p id="stationDesc" style="font-size: 13px; opacity: 0.7; line-height: 1.6;">Wähle einen Sender für den Live-Sync.</p>
        </div>

        <div class="card">
            <div class="label">AKTUELL IM STREAM</div>
            <div id="aktSong" class="akt-song-display">Kein Stream</div>
            <div class="label">Letzte Songs</div>
            <div id="verlaufListe" class="history-list"></div>
        </div>
    </div>
</div>

<footer>
    <div style="letter-spacing: 1px; opacity: 0.7;">RADIO DASHBOARD | SYNC-MODE</div>
    <div id="statusInfo" style="font-weight: bold; color: var(--akzent);">SYSTEM ONLINE</div>
</footer>

<audio id="radioEngine" preload="none"></audio>

<script>
    const audio = document.getElementById('radioEngine');
    let isPlaying = false, stationID = "", syncTimer = null;

    function startClock() { setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000); }

    function setVol(v) {
        audio.volume = v;
        document.getElementById('volLabel').innerText = "LAUTSTÄRKE: " + Math.round(v * 100) + "%";
    }

    function waehleSender(val) {
        if(!val) return;
        stationID = val.toLowerCase().trim().replace(/\s+/g, '-');
        fetchSync();
        if(syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(fetchSync, 10000); // 10 Sek Sync für maximale Aktualität
        if(isPlaying) { stopRadio(); playRadio(); }
    }

    function togglePlay() { if(!stationID) return; isPlaying ? stopRadio() : playRadio(); }

    function playRadio() {
        audio.src = "https://stream.laut.fm/" + stationID;
        audio.play().then(() => {
            isPlaying = true;
            document.getElementById('pBtn').innerHTML = '<svg width="35" height="35" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" fill="black"/></svg>';
            document.getElementById('statusInfo').innerText = "LIVE";
        });
    }

    function stopRadio() {
        audio.pause(); audio.src = ""; isPlaying = false;
        document.getElementById('pBtn').innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="black"/></svg>';
        document.getElementById('statusInfo').innerText = "GESTOPPT";
    }

    async function fetchSync() {
        if(!stationID) return;
        try {
            const [info, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${stationID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${stationID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${stationID}/listeners`).then(r => r.text())
            ]);

            document.getElementById('senderOben').innerText = info.display_name;
            document.getElementById('miniLogo').src = info.images.station_120x120;
            document.getElementById('miniLogo').style.display = "block";
            document.getElementById('hauptLogo').src = info.images.station_120x120;
            document.getElementById('stationDesc').innerText = info.description;
            document.getElementById('hoererZahl').innerText = "AKTUELL HÖRER: " + listeners;
            document.getElementById('aktSong').innerText = songs[0].artist.name + " - " + songs[0].title;

            let listHtml = "";
            songs.slice(1, 10).forEach(s => {
                const sDate = new Date(s.started_at);
                const timeStr = sDate.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                listHtml += `<div class="history-item"><span class="history-time">${timeStr}</span><span>${s.artist.name} - ${s.title}</span></div>`;
            });
            document.getElementById('verlaufListe').innerHTML = listHtml;
        } catch (err) {}
    }
</script>
</body>
</html>
