<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas Radio - laut.fm Pro</title>
    <style>
        :root { 
            --primary: #1db954; 
            --bg-gray: #2c2f33; /* Dunkelgrauer Hintergrund */
            --card-white: #ffffff; 
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg-gray); 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Suche oben */
        .search-box { background: #40444b; padding: 10px 20px; border-radius: 30px; display: flex; gap: 10px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .search-box input { border: none; outline: none; width: 180px; background: transparent; color: white; }
        .search-box button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        #main-app { display: none; width: 100%; max-width: 1150px; }

        /* Sendername & Hörer */
        .header-info { text-align: center; margin-bottom: 20px; }
        .station-name { font-size: 2.5rem; font-weight: 900; display: block; margin-bottom: 5px; }
        .listener-badge { background: #40444b; padding: 6px 15px; border-radius: 10px; font-weight: bold; border: 1px solid #4f545c; display: inline-flex; align-items: center; gap: 8px; }
        .dot { height: 10px; width: 10px; background: #ff4747; border-radius: 50%; box-shadow: 0 0 8px #ff4747; }

        /* Layout: Links Player, Rechts Verlauf */
        .layout-container { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }

        /* Weiße Karten */
        .white-card { background: var(--card-white); color: #333; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }

        .logo-img { width: 100%; max-width: 320px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Jetzt läuft Info */
        .playing-bar { display: flex; gap: 15px; border-top: 2px solid #f0f0f0; padding-top: 20px; text-align: left; }
        .song-time { color: var(--primary); font-weight: bold; font-size: 1.2rem; min-width: 55px; }
        .song-meta b { display: block; font-size: 1.4rem; color: #000; }
        .song-meta span { color: #666; font-size: 1.1rem; }

        .play-control { margin-top: 25px; background: var(--primary); color: white; border: none; width: 75px; height: 75px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; transition: 0.2s; }
        .play-control:hover { transform: scale(1.1); }

        /* Verlauf Rechts */
        .history-card { background: var(--card-white); color: #333; padding: 20px; border-radius: 20px; text-align: left; }
        .history-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; }
        .h-time { font-weight: bold; color: #bbb; font-size: 0.9rem; }
        .h-details b { display: block; font-size: 1rem; }
        .h-details span { font-size: 0.9rem; color: #777; }

        @media (max-width: 950px) { .layout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="userInput" placeholder="Sendernamen eingeben..." onkeypress="if(event.key==='Enter') startApp()">
        <button onclick="startApp()">START</button>
    </div>

    <div id="main-app">
        <div class="header-info">
            <span class="station-name" id="stName">RADIO</span>
            <div class="listener-badge">
                <div class="dot"></div>
                Hörer: <span id="lCount">0</span>
            </div>
        </div>

        <div class="layout-container">
            <!-- AKTUELLER SONG (Links) -->
            <div class="white-card">
                <center>
                    <img id="stLogo" class="logo-img" src="">
                    <div class="playing-bar">
                        <div class="song-time" id="cTime">--:--</div>
                        <div class="song-meta">
                            <b id="cArtist">Interpret</b>
                            <span id="cTitle">Titel wird geladen...</span>
                        </div>
                    </div>
                    <button class="play-control" id="pBtn" onclick="toggle()">▶</button>
                </center>
            </div>

            <!-- VERLAUF (Rechts) -->
            <div class="history-card">
                <strong style="color:#999; text-transform: uppercase; font-size: 0.8rem; display: block; margin-bottom: 15px;">Zuletzt gelaufen</strong>
                <div id="hList"></div>
            </div>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        let station = "";
        let isPlaying = false;

        async function startApp() {
            station = document.getElementById('userInput').value.trim().toLowerCase();
            if(!station) return;
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('player').src = `https://stream.laut.fm/${station}`;
            refresh();
            setInterval(refresh, 15000);
            document.getElementById('player').play();
            isPlaying = true;
            document.getElementById('pBtn').innerText = "⏸";
        }

        function toggle() {
            const p = document.getElementById('player');
            if(isPlaying) { p.pause(); document.getElementById('pBtn').innerText = "▶"; }
            else { p.play(); document.getElementById('pBtn').innerText = "⏸"; }
            isPlaying = !isPlaying;
        }

        function cleanText(val) {
            if (!val) return "Unbekannt";
            if (typeof val === 'object') return val.name || "Künstler";
            return String(val);
        }

        function formatTime(iso) {
            if(!iso) return "--:--";
            const d = new Date(iso);
            return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        }

        async function refresh() {
            try {
                const sR = await fetch(`https://api.laut.fm/station/${station}`);
                const sD = await sR.json();
                document.getElementById('stName').innerText = sD.display_name;
                document.getElementById('lCount').innerText = sD.current_listeners || 0;
                document.getElementById('stLogo').src = sD.images.station_640x640;

                const cR = await fetch(`https://api.laut.fm/station/${station}/current_song`);
                const cD = await cR.json();
                document.getElementById('cTime').innerText = formatTime(cD.started_at);
                document.getElementById('cArtist').innerText = cleanText(cD.artist);
                document.getElementById('cTitle').innerText = cleanText(cD.title);

                const hR = await fetch(`https://api.laut.fm/station/${station}/last_songs`);
                const hD = await hR.json();
                const list = document.getElementById('hList');
                list.innerHTML = "";
                hD.slice(1, 10).forEach(s => {
                    list.innerHTML += `
                        <div class="history-item">
                            <span class="h-time">${formatTime(s.started_at)}</span>
                            <div class="h-details">
                                <b>${cleanText(s.artist)}</b>
                                <span>${cleanText(s.title)}</span>
                            </div>
                        </div>`;
                });
            } catch (e) { console.log("Fehler beim Laden"); }
        }
    </script>
</body>
</html>
