<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.53</title>
    <style>
        :root { 
            --bg-dark: #0a0e14; --bg-panel: #161b26; --accent: #00fad9; 
            --white: #ffffff; --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-dark); margin: 0; height: 100vh; 
            color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; overflow: hidden;
        }

        .app-shell { width: 100%; max-width: 1400px; height: 100vh; background-color: var(--bg-panel); display: flex; flex-direction: column; position: relative; }

        /* NAVIGATION & SUCHE */
        .top-nav { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(0,0,0,0.5); flex-shrink: 0; z-index: 1000; border-bottom: 1px solid rgba(0,250,217,0.2); }
        #clock { font-weight: bold; font-size: 18px; color: var(--accent); min-width: 80px; }
        
        .search-area { position: relative; flex: 1; max-width: 600px; margin: 0 15px; }
        #query { width: 100%; background: rgba(255,255,255,0.05); border: 2px solid var(--accent); border-radius: 15px; padding: 12px 45px 12px 20px; color: #fff; outline: none; font-size: 16px; transition: 0.3s; }
        #query:focus { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(0,250,217,0.3); }
        
        /* RESULTATE MIT LOGO */
        #results { 
            position: absolute; top: 65px; left: 0; width: 100%; background: #1c222d; 
            border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.9); 
            max-height: 400px; overflow-y: auto; display: none; z-index: 2000; border: 1px solid rgba(255,255,255,0.1);
        }
        .res-item { padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.2s; }
        .res-item:hover { background: var(--accent); color: #000; }
        .res-img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: #000; }
        .res-name { font-weight: bold; font-size: 15px; }

        .main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* LISTE */
        .list-zone { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 20px; }
        .list-label { font-size: 12px; font-weight: 900; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }
        .scroll-list { flex: 1; overflow-y: auto; }
        .scroll-list::-webkit-scrollbar { width: 4px; }
        .scroll-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .song-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 10px; transition: 0.3s; }
        .song-item.active { background: rgba(0,250,217,0.15); border-left: 5px solid var(--accent); }
        .song-time { font-size: 11px; color: var(--accent); font-weight: bold; width: 45px; }
        .song-meta { flex: 1; overflow: hidden; }
        .song-artist { font-size: 14px; font-weight: bold; display: block; color: #fff; }
        .song-title { font-size: 12px; color: var(--text-dim); display: block; }
        .song-icon { font-size: 20px; width: 30px; text-align: center; }
        .song-cover-mini { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; }

        /* PLAYER SEITE (Rechts auf PC) */
        .player-side { width: 450px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-left: 1px solid rgba(255,255,255,0.05); }
        
        .station-branding { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; width: 100%; justify-content: center; }
        #station-logo-main { width: 55px; height: 55px; border-radius: 12px; border: 2px solid var(--accent); object-fit: cover; display: none; }
        #station-display { font-size: 20px; font-weight: 900; color: var(--white); text-transform: uppercase; letter-spacing: 1px; }

        .art-box { width: 320px; height: 320px; margin-bottom: 30px; position: relative; }
        #bigAlbumArt { width: 100%; height: 100%; border-radius: 40px; object-fit: cover; box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        
        .btn-main { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); border: none; font-size: 35px; cursor: pointer; color: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,250,217,0.3); transition: 0.3s; }
        .btn-main:active { transform: scale(0.9); }
        
        #listeners { font-size: 12px; font-weight: bold; color: var(--accent); margin-top: 20px; letter-spacing: 1px; }

        #btnExpand { width: 100%; padding: 14px; background: rgba(0,250,217,0.05); border: 1px dashed var(--accent); color: var(--accent); border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        @media (max-width: 900px) {
            .main-view { flex-direction: column-reverse; }
            .player-side { width: 100%; border-left: none; border-bottom: 1px solid rgba(0,250,217,0.2); padding: 25px; }
            .art-box { width: 240px; height: 240px; }
            .list-zone { height: 40vh; }
            #station-display { font-size: 18px; }
        }
    </style>
</head>
<body onload="init()">

<div class="app-shell">
    <header class="top-nav">
        <div id="clock">00:00</div>
        <div class="search-area">
            <input type="text" id="query" placeholder="Suchen: Name oder Genre..." autocomplete="off">
            <div id="results"></div>
        </div>
        <div style="font-size: 24px;">📡</div>
    </header>

    <main class="main-view">
        <section class="list-zone">
            <h2 class="list-label">Programm-Historie</h2>
            <div class="scroll-list" id="listContent">
                <div style="text-align:center; opacity:0.2; margin-top:100px;">
                    <span style="font-size: 40px;">📻</span><br>Wähle einen Sender
                </div>
            </div>
            <button id="btnExpand" onclick="toggleLimit()">MEHR ANZEIGEN</button>
        </section>

        <section class="player-side">
            <div class="station-branding">
                <img id="station-logo-main" src="">
                <h1 id="station-display">RADIO READY</h1>
            </div>
            <div class="art-box">
                <img id="bigAlbumArt" src="https://api.laut.fm/station/default/images/station_640x640.png">
            </div>
            <button id="playBtn" class="btn-main" onclick="toggleAudio()" disabled>▶</button>
            <div id="listeners" style="display:none;">0 LIVE-HÖRER</div>
        </section>
    </main>
</div>

<script>
    const snd = new Audio();
    let currentStation = "";
    let limit = 4;
    const queryInput = document.getElementById('query');
    const resultsDiv = document.getElementById('results');

    function init() {
        // Uhrzeit-Update
        const updateClock = () => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        };
        updateClock();
        setInterval(updateClock, 1000);

        // Intelligente Sendersuche
        queryInput.addEventListener('input', async () => {
            const q = queryInput.value.trim();
            if(q.length < 2) { resultsDiv.style.display = 'none'; return; }
            
            try {
                const res = await fetch(`https://api.laut.fm/search/stations?query=${q}`).then(r => r.json());
                if(res.items && res.items.length > 0) {
                    resultsDiv.innerHTML = res.items.map(s => `
                        <div class="res-item" onclick="selectStation('${s.name}')">
                            <img class="res-img" src="${s.images.station_120x120 || s.images.station_80x80}">
                            <div class="res-name">${s.display_name}</div>
                        </div>
                    `).join('');
                    resultsDiv.style.display = 'block';
                }
            } catch(e) { console.log("Suche fehlgeschlagen"); }
        });

        // Schließen der Ergebnisse bei Klick außerhalb
        document.addEventListener('click', (e) => {
            if(!resultsDiv.contains(e.target) && e.target !== queryInput) resultsDiv.style.display = 'none';
        });
    }

    function selectStation(name) {
        currentStation = name;
        resultsDiv.style.display = 'none';
        queryInput.value = "";
        document.getElementById('playBtn').disabled = false;
        document.getElementById('listeners').style.display = 'block';
        document.getElementById('station-logo-main').style.display = 'block';
        
        snd.src = `https://stream.laut.fm/${currentStation}`;
        snd.play().catch(e => console.log("Autoplay blockiert"));
        document.getElementById('playBtn').innerHTML = "⏸";
        
        update();
        if(window.sync) clearInterval(window.sync);
        window.sync = setInterval(update, 10000);
    }

    function toggleAudio() {
        if(snd.paused) { snd.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { snd.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    function toggleLimit() {
        limit = (limit === 4) ? 15 : 4;
        document.getElementById('btnExpand').innerText = (limit === 4) ? "MEHR ANZEIGEN" : "WENIGER ANZEIGEN";
        update();
    }

    async function update() {
        if(!currentStation) return;
        try {
            const [info, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/listeners`).then(r => r.text())
            ]);

            // Sender-Branding aktualisieren
            document.getElementById('station-display').innerText = info.display_name;
            document.getElementById('station-logo-main').src = info.images.station_120x120;
            document.getElementById('listeners').innerText = (listeners.includes("<") ? "0" : listeners) + " LIVE-HÖRER";

            let html = "";
            songs.forEach((s, i) => {
                if(i >= limit) return;
                const isNow = (i === 0);
                const time = s.started_at.split(' ')[1].substring(0,5);
                let art = s.artist.name;
                let tit = s.title;
                const check = (art + " " + tit).toLowerCase();
                const cover = s.image_640x640 || s.image_170x170 || info.images.station_640x640;

                if(isNow) document.getElementById('bigAlbumArt').src = cover;

                // LOGIK FÜR ICONS
                let icon = "";
                if(check.includes("nachrichten") || check.includes("news")) {
                    icon = "📰"; art = ""; tit = ""; 
                } else if(check.includes("moderation") || check.includes("ident") || check.includes("ansage") || check.includes("sprecher")) {
                    icon = "🎙️";
                } else if(isNow) {
                    icon = "🔊";
                }

                html += `
                    <div class="song-item ${isNow ? 'active' : ''}">
                        <div class="song-time">${time}</div>
                        <div class="song-icon">${icon}</div>
                        <div class="song-meta">
                            <span class="song-artist">${art}</span>
                            <span class="song-title">${tit}</span>
                        </div>
                        <img class="song-cover-mini" src="${cover}">
                    </div>
                `;
            });
            document.getElementById('listContent').innerHTML = html;
        } catch(e) { console.log("Update Fehler"); }
    }
</script>
</body>
</html>
