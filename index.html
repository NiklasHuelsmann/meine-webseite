<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub V23 (Full Version)</title>
    <style>
        :root { --sidebar-bg: #1a2634; --accent: #00d26a; --bg: #f5f7f9; --text-dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-dark); }
        
        /* Sidebar mit Suchfeld */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.15); }
        .search-box { display: flex; gap: 8px; margin-bottom: 25px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #2c3e50; color: white; }
        .search-box button { background: var(--accent); border: none; border-radius: 5px; color: white; padding: 0 15px; cursor: pointer; }
        .fav-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .fav-item:hover { background: rgba(255,255,255,0.1); }

        /* Layout */
        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 450px; gap: 20px; padding: 25px; padding-bottom: 110px; overflow-y: auto; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }

        /* Anzeige-Elemente */
        .display-unit { text-align: center; margin-top: 10px; flex: 1; }
        .main-art { width: 240px; height: 240px; border-radius: 12px; object-fit: cover; box-shadow: 0 12px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .now-box { background: #fcfcfc; border-radius: 10px; padding: 20px; border: 1px solid #eee; display: flex; align-items: flex-start; gap: 20px; text-align: left; }
        .start-time { font-size: 1.1rem; font-weight: 800; color: #000; min-width: 60px; }

        /* Tabs & Buttons */
        .toggle-container { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 15px; min-height: 40px; }
        .btn-toggle { background: #eee; border: 1px solid #ddd; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-toggle.active { background: #ccc; border-color: #bbb; }
        
        .day-bar { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; overflow-x: auto; }
        .day-tab { cursor: pointer; font-weight: bold; color: #888; padding: 5px 10px; white-space: nowrap; }
        .day-tab.active { color: #000; border-bottom: 2px solid #000; }

        /* Listen */
        .list-container { flex: 1; overflow-y: auto; }
        .list-entry { display: flex; padding: 15px 0; border-bottom: 1px solid #f2f2f2; }
        .list-time { width: 70px; font-weight: bold; color: #666; }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: white; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 40px; z-index: 1000; }
        .player-info { width: 350px; display: flex; align-items: center; }
        .player-center { flex: 1; text-align: center; }
        .player-controls { width: 300px; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
        .btn-play { background: var(--accent); color: white; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);">Radio Hub V23</h2>
    <div class="search-box">
        <input type="text" id="slugInput" placeholder="Sender suchen...">
        <button onclick="loadStation()">OK</button>
    </div>
    <div id="favList"></div>
</div>

<div class="main-layout">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <img id="miniLogo" src="" style="width:50px; height:50px; border-radius:5px; vertical-align:middle; margin-right:15px;">
                <h1 id="stationName" style="display:inline; font-size:1.5rem; margin:0;">Lade...</h1>
            </div>
        </div>

        <div class="display-unit">
            <img id="displayCover" class="main-art" src="">
            <div class="now-box">
                <div id="startTime" class="start-time">--:--</div>
                <div>
                    <small style="color:var(--accent); font-weight:bold; text-transform:uppercase;">Jetzt läuft</small>
                    <b id="liveArtist" style="display:block; font-size:1.3rem; margin:5px 0;">Interpret</b>
                    <span id="liveTitle" style="color:#555;">Songtitel</span>
                </div>
            </div>
            <div id="stationDesc" style="margin-top:20px; text-align:left; font-size:0.9rem; color:#666; line-height:1.4;"></div>
        </div>

        <div style="margin-top:20px; font-size:0.85rem; color:#7f8c8d; border-top:1px solid #eee; padding-top:15px; display:flex; justify-content:space-between;">
            <span>👥 Hörer: <b id="listeners" style="color:#2c3e50;">0</b></span>
            <span>🌐 Status: <b id="statusText" style="color:var(--accent);">Live</b></span>
        </div>
    </div>

    <div class="card">
        <div class="toggle-container">
            <button id="btnSongs" class="btn-toggle active" onclick="setMode('songs')">Letzte Songs</button>
            <button id="btnPlan" class="btn-toggle" onclick="setMode('plan')" style="display:none;">Sendeplan</button>
        </div>
        <div id="dayBar" class="day-bar" style="display: none;"></div>
        <div id="listView" class="list-container"></div>
    </div>
</div>

<div class="player-bar">
    <div class="player-info">
        <img id="barCover" src="" style="width:55px; height:55px; border-radius:8px; margin-right:15px;">
        <div style="overflow:hidden;">
            <b id="barArtist" style="display:block; white-space:nowrap; text-overflow:ellipsis;">Wähle Sender</b>
            <span id="barSong" style="color:#7f8c8d; font-size:0.85rem; white-space:nowrap; text-overflow:ellipsis;">Bereit</span>
        </div>
    </div>
    
    <div class="player-center">
        <button id="pToggle" class="btn-play" onclick="handlePlay()">Sender starten</button>
    </div>

    <div class="player-controls">
        <span>🔈</span>
        <input type="range" style="flex:1; accent-color:var(--accent);" min="0" max="1" step="0.01" value="0.5" oninput="audio.volume=this.value">
        <span>🔊</span>
    </div>
</div>

<audio id="radioAudio"></audio>

<script>
    let currentSlug = localStorage.getItem('it_hub_last_v23') || "simulator4";
    let viewMode = "songs";
    let selectedDay = new Date().toLocaleDateString('de-DE', {weekday: 'long'}).toLowerCase();
    const DAYS = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
    const favs = ["brian-radio", "simulator4", "niklasheulsmann", "feierabend-radio"];
    const audio = document.getElementById('radioAudio');

    async function loadStation(slug) {
        if(slug) currentSlug = slug;
        else currentSlug = document.getElementById('slugInput').value.toLowerCase().trim();
        localStorage.setItem('it_hub_last_v23', currentSlug);
        update();
    }

    async function update() {
        try {
            const [cRes, sRes, lRes, scRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}/current_song`),
                fetch(`https://api.laut.fm/station/${currentSlug}`),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`),
                fetch(`https://api.laut.fm/station/${currentSlug}/schedule`)
            ]);
            
            const song = await cRes.json();
            const station = await sRes.json();
            const history = await lRes.json();
            const schedule = await scRes.json();

            // Sendeplan Button Logik
            const btnPlan = document.getElementById('btnPlan');
            if (schedule && schedule.length > 0) btnPlan.style.display = "inline-block";
            else { btnPlan.style.display = "none"; if(viewMode === "plan") setMode('songs'); }

            document.getElementById('stationName').innerText = station.display_name;
            document.getElementById('miniLogo').src = station.images.station_120x120;
            document.getElementById('displayCover').src = station.images.station_640x640;
            document.getElementById('barCover').src = station.images.station_120x120;
            document.getElementById('stationDesc').innerText = station.description;
            document.getElementById('listeners').innerText = station.current_listeners;

            document.getElementById('liveArtist').innerText = song.artist ? song.artist.name : station.display_name;
            document.getElementById('liveTitle').innerText = song.title || "Live Stream";
            document.getElementById('barArtist').innerText = song.artist ? song.artist.name : station.display_name;
            document.getElementById('barSong').innerText = song.title || "Online";
            document.getElementById('startTime').innerText = song.started_at ? new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "--:--";

            renderContent(viewMode === "songs" ? history.filter(h => h.id !== song.id) : schedule);
        } catch(e) { console.log("Fehler"); }
    }

    function renderContent(data) {
        const view = document.getElementById('listView');
        const dayBar = document.getElementById('dayBar');
        view.innerHTML = "";

        if(viewMode === "songs") {
            dayBar.style.display = "none";
            view.innerHTML = data.slice(0, 7).map(i => `
                <div class="list-entry">
                    <div class="list-time">${new Date(i.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div class="list-content"><b>${i.artist.name}</b><span>${i.title}</span></div>
                </div>
            `).join('');
        } else {
            dayBar.style.display = "flex";
            dayBar.innerHTML = DAYS.map(d => `<div class="day-tab ${selectedDay === d.toLowerCase() ? 'active' : ''}" onclick="changeDay('${d.toLowerCase()}')">${d}</div>`).join('');
            const dayData = data.filter(e => e.day === selectedDay);
            view.innerHTML = dayData.sort((a,b) => a.hour - b.hour).map(item => `
                <div class="list-entry">
                    <div class="list-time">${item.hour.toString().padStart(2, '0')}:00</div>
                    <div class="list-content"><b>${item.name}</b><span>${item.description || ''}</span></div>
                </div>
            `).join('');
        }
    }

    function setMode(mode) { viewMode = mode; update(); document.getElementById('btnSongs').classList.toggle('active', mode==='songs'); document.getElementById('btnPlan').classList.toggle('active', mode==='plan'); }
    function changeDay(day) { selectedDay = day; update(); }

    function handlePlay() {
        if(audio.paused) { 
            audio.src = `https://stream.laut.fm/${currentSlug}`; audio.play(); 
            document.getElementById('pToggle').innerText="Stoppen";
            document.getElementById('pToggle').style.background="#e74c3c";
        } else { 
            audio.pause(); document.getElementById('pToggle').innerText="Starten";
            document.getElementById('pToggle').style.background="var(--accent)";
        }
    }

    function renderFavs() {
        document.getElementById('favList').innerHTML = favs.map(f => `
            <div class="fav-item" onclick="loadStation('${f}')">
                <img src="https://api.laut.fm/station/${f}/images/station_120x120" style="width:40px; border-radius:4px;">
                <span>${f}</span>
            </div>
        `).join('');
    }

    window.onload = () => { renderFavs(); update(); };
    setInterval(update, 15000);
</script>
</body>
</html>
