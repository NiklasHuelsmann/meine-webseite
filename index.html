<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Pro Ultimate - Final Stable</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00d2ff;
            --panel: #111;
            --text: #fff;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        header { padding: 10px 20px; display: flex; align-items: center; background: #000; border-bottom: 2px solid var(--accent); gap: 15px; }
        .search-area { display: flex; background: #222; border-radius: 20px; padding: 5px 15px; align-items: center; flex-shrink: 0; }
        #sIn { background: transparent; border: none; color: white; width: 150px; outline: none; font-size: 15px; }
        
        .header-logos { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .mini-img { width: 35px; height: 35px; border-radius: 4px; border: 1px solid #333; object-fit: cover; }
        #uhr { font-family: monospace; color: var(--accent); font-size: 18px; font-weight: bold; margin-left: 10px; }

        /* CONTENT */
        .main { flex: 1; display: grid; grid-template-columns: 380px 1fr; overflow: hidden; }
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; overflow-y: auto; } body { overflow: auto; } }

        /* LEFT PANEL */
        .left { background: var(--panel); padding: 25px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 15px; }
        #stName { font-size: 26px; font-weight: bold; color: var(--accent); letter-spacing: -1px; }
        #stationDisplay { width: 100%; aspect-ratio: 1/1; border-radius: 12px; border: 1px solid #444; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .btn-play { background: #1db954; color: white; border: none; padding: 20px; font-weight: bold; cursor: pointer; border-radius: 40px; font-size: 18px; transition: 0.3s; }
        .btn-play.active { background: #ff5252; box-shadow: 0 0 15px rgba(255,82,82,0.4); }
        
        .vol-box { display: flex; align-items: center; gap: 10px; background: #000; padding: 12px; border-radius: 15px; }
        input[type=range] { flex: 1; accent-color: var(--accent); }

        /* RIGHT PANEL */
        .right { padding: 30px; overflow-y: auto; }
        .on-air-box { background: #1a1a1a; padding: 25px; border-radius: 12px; border-left: 6px solid var(--accent); margin-bottom: 30px; }
        .song-title { font-size: 24px; font-weight: bold; display: block; margin-top: 5px; }
        .song-time { color: var(--accent); font-family: monospace; font-size: 16px; opacity: 0.8; }

        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .song-card { background: #151515; padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 20px; border: 1px solid #222; transition: 0.2s; }
        .song-card:hover { border-color: var(--accent); background: #1c1c1c; }
        .h-time { color: var(--accent); font-weight: bold; font-family: monospace; min-width: 65px; font-size: 16px; }

        /* FOOTER */
        footer { height: 85px; background: #000; display: flex; align-items: center; padding: 0 25px; border-top: 2px solid #222; gap: 20px; }
        .vis-circle { width: 50px; height: 50px; border: 2px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; gap: 3px; }
        .vis-circle.active { border-color: var(--accent); }
        .bar { width: 4px; background: var(--accent); height: 10px; border-radius: 2px; }
        .vis-circle.active .bar { animation: dance 0.6s infinite ease-in-out; }
        @keyframes dance { 0%, 100% { height: 10px; } 50% { height: 30px; } }

        .marquee-box { flex: 1; overflow: hidden; }
        #fSong { display: inline-block; animation: scroll 25s linear infinite; font-size: 20px; font-weight: bold; color: var(--accent); white-space: nowrap; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #hoerer { background: #1a1a1a; color: var(--accent); padding: 10px 20px; border-radius: 25px; font-weight: bold; border: 1px solid #333; }
    </style>
</head>
<body onload="boot()">

<header>
    <div class="search-area">
        <input type="text" id="sIn" placeholder="Sendername..." onkeypress="if(event.key==='Enter') sync(this.value)">
        <span style="cursor:pointer; font-size: 20px;" onclick="sync(document.getElementById('sIn').value)">🔍</span>
    </div>
    <div class="header-logos">
        <img id="mini1" class="mini-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
        <img id="mini2" class="mini-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="">
        <div id="uhr">00:00:00</div>
    </div>
</header>

<div class="main">
    <div class="left">
        <div id="stName">RADIO PRO</div>
        <img id="stationDisplay" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <button id="pBtn" class="btn-play" onclick="toggle()">START RADIO</button>
        <div class="vol-box">
            <span style="font-size: 20px;">🔈</span>
            <input type="range" min="0" max="1" step="0.01" value="0.8" oninput="audio.volume=this.value">
        </div>
    </div>

    <div class="right">
        <p style="font-size: 12px; color: #555; margin-bottom: 10px; letter-spacing: 2px;">AKTUELL AUF SENDUNG:</p>
        <div class="on-air-box">
            <span id="curTime" class="song-time">--:--:--</span>
            <span id="curSong" class="song-title">Bitte Sender suchen...</span>
        </div>
        <p style="font-size: 12px; color: #555; margin-bottom: 15px; letter-spacing: 2px;">VORHERIGE TITEL:</p>
        <div id="hList" class="history-list"></div>
    </div>
</div>

<footer>
    <div id="fVis" class="vis-circle">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="marquee-box">
        <div id="fSong">+++ Willkommen beim Radio Pro - Stream bereit +++</div>
    </div>
    <div id="hoerer">0 HÖRER</div>
</footer>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio');
    let slug = "", isPlaying = false;

    function boot() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString(); }, 1000);
        audio.volume = 0.8;
    }

    function sync(val) {
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-');
        loadData();
        setInterval(loadData, 10000); // Alle 10 Sekunden frische Daten
    }

    function toggle() {
        if(!slug) return;
        if(!isPlaying) {
            // Direkt-Link ohne Umwege für maximale Kompatibilität
            audio.src = "https://stream.laut.fm/" + slug + "?t=" + Date.now();
            audio.play();
            isPlaying = true;
            document.getElementById('pBtn').innerText = "STOPP";
            document.getElementById('pBtn').classList.add('active');
            document.getElementById('fVis').classList.add('active');
        } else {
            audio.pause();
            audio.src = "";
            isPlaying = false;
            document.getElementById('pBtn').innerText = "START RADIO";
            document.getElementById('pBtn').classList.remove('active');
            document.getElementById('fVis').classList.remove('active');
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const r = await fetch(`https://api.laut.fm/station/${slug}`);
            const i = await r.json();
            const s = await fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(res => res.json());
            const l = await fetch(`https://api.laut.fm/station/${slug}/listeners`).then(res => res.text());

            // 3 Displays aktualisieren
            document.getElementById('stationDisplay').src = i.images.station_640x640;
            document.getElementById('mini1').src = i.images.station_80x80;
            document.getElementById('mini2').src = i.images.station_80x80;
            
            document.getElementById('stName').innerText = i.display_name;
            document.getElementById('hoerer').innerText = l + " HÖRER";
            
            const now = s[0];
            document.getElementById('curTime').innerText = "START: " + new Date(now.started_at).toLocaleTimeString();
            document.getElementById('curSong').innerText = now.artist.name + " - " + now.title;
            document.getElementById('fSong').innerText = " +++ JETZT: " + now.artist.name + " - " + now.title + " +++ ";

            let hHtml = "";
            s.slice(1, 10).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                hHtml += `
                <div class="song-card">
                    <div class="h-time">${time}</div>
                    <div><b>${song.artist.name}</b><br><small style="color:#666">${song.title}</small></div>
                </div>`;
            });
            document.getElementById('hList').innerHTML = hHtml;
        } catch(e) {}
    }
</script>
</body>
</html>
