<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Ultimate v30.0 - Ton Fix</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --text: #fff; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; border: 1px solid #222; position: relative; }
        header { padding: 15px; border-bottom: 1px solid #222; }
        .search { display: flex; background: #1a1a1a; border-radius: 12px; padding: 8px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; padding-left: 10px; }
        .uhr { text-align: center; font-size: 14px; color: var(--accent); margin-top: 8px; font-family: monospace; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 250px; text-align: center; }
        #mainImg { width: 100%; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; border: 1px solid #333; margin: 20px 0; background: #111; }
        #curT { font-size: 1.2rem; font-weight: bold; color: var(--accent); display: block; }
        .player { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-top: 1px solid #222; padding: 20px; }
        .ticker-box { overflow: hidden; background: #080808; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        #ticker { display: inline-block; white-space: nowrap; color: var(--accent); font-size: 12px; font-weight: bold; animation: swing 15s ease-in-out infinite; }
        @keyframes swing { 0%, 20% { transform: translateX(0); } 45%, 55% { transform: translateX(calc(-100% + 180px)); } 80%, 100% { transform: translateX(0); } }
        .controls { display: flex; align-items: center; gap: 20px; }
        .pBtn { width: 80px; height: 80px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 35px; cursor: pointer; flex-shrink: 0; }
        .pBtn.active { background: var(--accent); }
        .vol-box { flex: 1; }
        #vControl { width: 100%; accent-color: var(--accent); cursor: pointer; }
        .history { margin-top: 20px; text-align: left; }
        .h-item { background: #0a0a0a; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #1a1a1a; font-size: 13px; display: flex; gap: 10px; }
        #status { font-size: 11px; color: #ff4444; margin-top: 5px; min-height: 15px; }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header>
        <div class="search">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') sync()">
            <button onclick="sync()" style="background:none; border:none; font-size:20px; cursor:pointer;">🔍</button>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="content">
        <div id="stName" style="font-weight: bold; font-size: 1.4rem;">Radio Standby</div>
        <img id="mainImg" src="">
        <span id="curT">Bitte Sender suchen...</span>
        <div id="hoerer" style="color:var(--accent); font-size: 12px; margin-top: 5px;">0 Hörer</div>
        <div id="hList" class="history"></div>
    </div>

    <div class="player">
        <div class="ticker-box"><div id="ticker">BEREIT ZUM ABSPIELEN...</div></div>
        <div class="controls">
            <button id="pBtn" class="pBtn" onclick="togglePlay()">▶</button>
            <div class="vol-box">
                <input type="range" id="vControl" min="0" max="1" step="0.01" value="0.8">
                <div id="status"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let slug = "";
    let dataTimer = null;
    const btn = document.getElementById('pBtn');
    const status = document.getElementById('status');

    function init() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vControl').oninput = (e) => { if(audio) audio.volume = e.target.value; };
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        status.innerText = "Lade Sender...";
        
        if(audio) { audio.pause(); audio = null; }
        btn.innerHTML = "▶";
        btn.classList.remove('active');
        
        await loadData();
        if(dataTimer) clearInterval(dataTimer);
        dataTimer = setInterval(loadData, 15000);
    }

    function togglePlay() {
        if(!slug) { status.innerText = "Erst Sender suchen!"; return; }

        if(!audio || audio.paused) {
            status.innerText = "Ton wird geladen...";
            
            // Neuer Audio-Context zur Entsperrung
            audio = new Audio();
            audio.crossOrigin = "anonymous";
            audio.preload = "none"; 
            audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
            audio.volume = document.getElementById('vControl').value;
            
            // Force Play
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    btn.innerHTML = "⏸";
                    btn.classList.add('active');
                    status.innerText = "TON AN";
                    status.style.color = "#00ff00";
                }).catch(e => {
                    status.innerText = "Browser blockiert! Klick nochmal!";
                    status.style.color = "#ff4444";
                });
            }
        } else {
            audio.pause();
            audio = null;
            btn.innerHTML = "▶";
            btn.classList.remove('active');
            status.innerText = "TON AUS";
            status.style.color = "#ff4444";
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const [rS, rL, rH] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stName').innerText = rS.display_name;
            document.getElementById('mainImg').src = rS.images.station_640x640;
            document.getElementById('hoerer').innerText = rH + " Hörer online";
            const cur = rL[0];
            const track = cur.artist.name + " - " + cur.title;
            document.getElementById('curT').innerText = track;
            
            // TICKER: spielt (klein)
            document.getElementById('ticker').innerText = 
                `${rS.display_name.toUpperCase()} spielt | ALBUM: ${(cur.album || "SINGLE").toUpperCase()} | AKTUELL: ${track.toUpperCase()}`;

            let hHtml = "";
            rL.slice(1, 6).forEach(s => {
                const zeit = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                hHtml += `<div class="h-item"><b>${zeit}</b> <span>${s.artist.name} - ${s.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = hHtml;
        } catch(e) { status.innerText = "Sender-Fehler!"; }
    }
</script>
</body>
</html>
