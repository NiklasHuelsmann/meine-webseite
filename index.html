<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Live Hub</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: white; padding: 20px; border-bottom: 1px solid #ddd; z-index: 10; }
        .bulk-area { display: flex; gap: 10px; margin-top: 10px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        
        /* Der scrollbare Bereich */
        .main { flex-grow: 1; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .head { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .logo { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        
        .info { margin: 10px 0; font-size: 0.9rem; }
        .artist { font-weight: bold; color: black; } /* Interpret fett */
        
        .btn-play { background: black; color: white; border: none; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header class="header">
    <div style="font-weight:bold; font-size:1.3rem;">Radio Live Hub</div>
    <div class="bulk-area">
        <input type="text" id="bulkInput" placeholder="Sender hier einfügen (mit Komma getrennt)...">
        <button onclick="addStations()">Prüfen & Laden</button>
    </div>
</header>

<div class="main">
    <div class="grid" id="grid"></div>
</div>

<audio id="player"></audio>

<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || [];
    const player = document.getElementById('player');

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        stations.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="head">
                    <img id="img-${s}" src="https://api.laut.fm/favicon.ico" class="logo">
                    <div><b style="text-transform:uppercase;">${s}</b><br><small>Hörer: <span id="list-${s}">0</span></small></div>
                </div>
                <div class="info">
                    <div id="art-${s}" class="artist">Lade...</div>
                    <div id="tit-${s}">...</div>
                </div>
                <button class="btn-play" onclick="toggle('${s}')" id="btn-${s}">Sender starten</button>
            `;
            grid.appendChild(card);
            updateData(s);
        });
    }

    async function updateData(s) {
        // Logo, Hörer und Song-Infos abrufen
        fetch(`https://api.laut.fm/station/${s}`).then(r => r.json()).then(d => {
            if(d.images) document.getElementById(`img-${s}`).src = d.images.station_120x120;
        });
        fetch(`https://api.laut.fm/station/${s}/listeners`).then(r => r.text()).then(t => document.getElementById(`list-${s}`).innerText = t);
        fetch(`https://api.laut.fm/station/${s}/current_song`).then(r => r.json()).then(d => {
            document.getElementById(`art-${s}`).innerText = d.artist?.name || "-";
            document.getElementById(`tit-${s}`).innerText = d.title || "-";
        });
    }

    function addStations() {
        const input = document.getElementById('bulkInput').value;
        const newStations = input.split(',').map(s => s.trim().toLowerCase()).filter(s => s !== "");
        newStations.forEach(s => { if (!stations.includes(s)) stations.push(s); });
        localStorage.setItem('my_stations', JSON.stringify(stations));
        render();
    }

    function toggle(s) {
        const btn = document.getElementById(`btn-${s}`);
        if(!player.paused && player.src.includes(s)) {
            player.pause();
            btn.innerText = "Sender starten";
        } else {
            player.src = `https://stream.laut.fm/${s}`;
            player.play();
            btn.innerText = "Sender stoppen";
        }
    }

    window.onload = render;
    setInterval(() => stations.forEach(updateData), 15000);
</script>
</body>
</html>
