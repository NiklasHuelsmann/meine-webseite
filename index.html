<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Studio v22.0</title>
    <style>
        :root { --accent: #00ffa3; --bg: #0a0c10; --card: #161b22; --danger: #ff4d4d; }
        body { margin: 0; background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }

        /* NAVIGATION & HEADER */
        header { background: #010409; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); }
        .logo { font-weight: bold; color: var(--accent); font-size: 1.2rem; letter-spacing: 1px; }

        /* DASHBOARD LAYOUT */
        .dashboard { display: grid; grid-template-columns: 320px 1fr 320px; gap: 15px; padding: 15px; flex: 1; overflow: hidden; }
        .column { display: flex; flex-direction: column; gap: 15px; overflow: hidden; }

        /* CARDS */
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; display: flex; flex-direction: column; }
        .card-head { padding: 10px 15px; background: rgba(255,255,255,0.03); border-bottom: 1px solid #30363d; font-size: 0.85rem; font-weight: bold; color: var(--accent); }
        .card-body { padding: 15px; flex: 1; overflow-y: auto; }

        /* PLAYER & CONTROLS */
        .player-box { text-align: center; }
        #cover { width: 180px; height: 180px; border-radius: 15px; object-fit: cover; border: 3px solid #30363d; margin-bottom: 15px; }
        .main-btn { background: var(--accent); border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; color: #000; margin: 5px; }
        .reset-btn { background: var(--danger); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 5px; }
        
        /* PLAYLIST & SEARCH */
        input, textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; margin-bottom: 10px; }
        .list-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #222; font-size: 0.8rem; cursor: pointer; }
        .list-item:hover { background: #21262d; }
        .list-item img { width: 30px; height: 30px; border-radius: 4px; }

        /* FOOTER */
        footer { background: #010409; padding: 8px 20px; font-size: 0.75rem; border-top: 1px solid #30363d; display: flex; gap: 20px; }
        .status-dot { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <div class="logo">RADIO STUDIO v22.0</div>
    <div id="clock">00:00:00</div>
</header>

<div class="dashboard">
    <div class="column">
        <div class="card" style="height: 100%;">
            <div class="card-head">LAUT.FM STATION SUCHE</div>
            <div class="card-body">
                <input type="text" id="s-input" placeholder="Niklas FM, WDR 2..." oninput="search()">
                <div id="s-results"></div>
            </div>
        </div>
    </div>

    <div class="column">
        <div class="card">
            <div class="card-head">LIVE ON AIR</div>
            <div class="card-body player-box">
                <img id="cover" src="https://via.placeholder.com/180/111/fff?text=STUDIO">
                <h3 id="now-playing">Bereit zum Senden</h3>
                <p id="now-artist" style="color:#8b949e">Wähle Musik oder Stream</p>
                
                <button class="main-btn" onclick="toggle()">START / STOP</button>
                <button class="reset-btn" onclick="reboot()">RESTART SYSTEM</button>
            </div>
        </div>

        <div class="card" style="flex:1;">
            <div class="card-head">AUTO-PLAYLIST (EIGENE MUSIK)</div>
            <div class="card-body">
                <input type="file" id="files" multiple accept="audio/*" onchange="addToPlaylist(event)">
                <div id="playlist-box"></div>
                <p style="font-size: 11px; color: #555;">Musik wird nach dem Upload automatisch nacheinander abgespielt.</p>
            </div>
        </div>
    </div>

    <div class="column">
        <div class="card" style="height: 100%;">
            <div class="card-head">MODERATOREN-CENTER</div>
            <div class="card-body">
                <p style="font-size: 0.8rem;">Hier können sich neue DJs bewerben:</p>
                <input type="text" id="b-name" placeholder="Name">
                <input type="text" id="b-ort" placeholder="Straße / Wohnort">
                <textarea id="b-text" rows="5" placeholder="Deine Nachricht..."></textarea>
                <button class="main-btn" style="width:100%;" onclick="sendBewerbung()">BEWERBUNG ABSCHICKEN</button>
                <div id="b-status" style="margin-top:10px; color:var(--accent); font-size: 0.8rem;"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <span><b class="status-dot">●</b> STATUS: <span id="st-mode">STANDBY</span></span>
    <span>QUELL-URL: <span id="st-url">Keine</span></span>
</footer>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio');
    let playlist = [];
    let currentTrackIndex = 0;

    // --- LAUT.FM SUCHE ---
    async function search() {
        const q = document.getElementById('s-input').value;
        if(q.length < 2) return;
        const r = await fetch(`https://api.laut.fm/search/stations?query=${q}`);
        const d = await r.json();
        const res = document.getElementById('s-results');
        res.innerHTML = "";
        d.items.forEach(s => {
            const div = document.createElement('div');
            div.className = "list-item";
            div.onclick = () => playStream(s.name, s.display_name, s.images.station_640x640);
            div.innerHTML = `<img src="${s.images.station_80x80}"> <b>${s.display_name}</b>`;
            res.appendChild(div);
        });
    }

    function playStream(id, name, art) {
        playlist = []; // Playlist leeren bei Stream-Wahl
        audio.src = `https://stream.laut.fm/${id}`;
        audio.play();
        document.getElementById('now-playing').innerText = name;
        document.getElementById('cover').src = art;
        updateStatus("LAUT.FM STREAM", audio.src);
    }

    // --- PLAYLIST LOGIK (EIGENE MUSIK) ---
    function addToPlaylist(e) {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            playlist.push({
                name: file.name,
                url: URL.createObjectURL(file)
            });
        });
        renderPlaylist();
        if(audio.paused && playlist.length > 0) playNext();
    }

    function renderPlaylist() {
        const box = document.getElementById('playlist-box');
        box.innerHTML = "";
        playlist.forEach((track, i) => {
            const div = document.createElement('div');
            div.className = "list-item";
            if(i === currentTrackIndex) div.style.color = "var(--accent)";
            div.innerText = `${i+1}. ${track.name}`;
            box.appendChild(div);
        });
    }

    function playNext() {
        if(currentTrackIndex < playlist.length) {
            audio.src = playlist[currentTrackIndex].url;
            audio.play();
            document.getElementById('now-playing').innerText = playlist[currentTrackIndex].name;
            document.getElementById('cover').src = "https://via.placeholder.com/180/00ffa3/000?text=MP3+PLAYING";
            updateStatus("AUTO-DJ PLAYLIST", "Local File");
            renderPlaylist();
        }
    }

    audio.onended = () => {
        currentTrackIndex++;
        if(currentTrackIndex < playlist.length) playNext();
        else { currentTrackIndex = 0; playNext(); } // Loop
    };

    // --- SYSTEM FUNKTIONEN ---
    function toggle() {
        if(audio.paused) audio.play(); else audio.pause();
    }

    function reboot() {
        const oldSrc = audio.src;
        audio.pause();
        audio.src = "";
        setTimeout(() => {
            audio.src = oldSrc;
            audio.play();
            alert("System wurde neu gestartet und Stream neu geladen!");
        }, 500);
    }

    function updateStatus(mode, url) {
        document.getElementById('st-mode').innerText = mode;
        document.getElementById('st-url').innerText = url;
    }

    function sendBewerbung() {
        const name = document.getElementById('b-name').value;
        if(!name) return alert("Bitte Namen eingeben");
        document.getElementById('b-status').innerText = "Sende Bewerbung...";
        setTimeout(() => {
            document.getElementById('b-status').innerText = "Erfolgreich! Wir melden uns.";
            document.getElementById('b-name').value = "";
            document.getElementById('b-ort').value = "";
            document.getElementById('b-text').value = "";
        }, 2000);
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
