<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Radio Player</title>
    <style>
        :root {
            --primary: #1db954;
            --bg: #f4f7f6;
            --white: #ffffff;
            --text: #2c3e50;
            --muted: #7f8c8d;
            --stats-bg: #e8f5e9;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Suchleiste */
        .search-area {
            background: var(--white);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-area input { border: none; outline: none; width: 200px; font-size: 1rem; }
        .search-area button { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        #player-ui {
            display: none;
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HÖRER-BALKEN (Eigens Merkmal) */
        .info-bar {
            background: var(--stats-bg);
            color: #2e7d32;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            border: 1px solid #c8e6c9;
        }

        .live-indicator {
            height: 10px;
            width: 10px;
            background: #f44336;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .station-header {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--text);
            text-align: center;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 30px;
        }

        /* Linke Seite: Aktuell */
        .box-now {
            background: var(--white);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        .cover-art {
            width: 220px;
            height: 220px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .current-time-tag {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }

        .btn-play {
            background: var(--primary);
            color: white;
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            margin-top: 25px;
            transition: transform 0.2s;
        }

        .btn-play:hover { transform: scale(1.1); }

        /* Rechte Seite: Verlauf */
        .box-history {
            background: rgba(255, 255, 255, 0.4);
            padding: 25px;
            border-radius: 20px;
            border-left: 4px solid var(--primary);
        }

        .history-label {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
            text-transform: uppercase;
            color: var(--muted);
        }

        .song-entry {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .entry-time { font-weight: bold; color: var(--muted); font-size: 0.85rem; min-width: 45px; }
        .entry-details strong { display: block; font-size: 1rem; }
        .entry-details span { font-size: 0.9rem; color: var(--muted); }

        @media (max-width: 800px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Sendername eingeben..." onkeypress="if(event.key === 'Enter') bootPlayer()">
        <button onclick="bootPlayer()">STARTEN</button>
    </div>

    <div id="player-ui">
        <div class="info-bar">
            <div class="live-indicator"></div>
            <span id="listenerDisplay">Lädt Hörerzahlen...</span>
        </div>

        <div class="station-header" id="stationTitle">RADIO</div>

        <div class="main-grid">
            <!-- AKTUELL -->
            <div class="box-now">
                <span class="current-time-tag" id="nowTime">--:--</span>
                <img id="mainLogo" class="cover-art" src="" alt="Station Logo">
                <h2 id="trackTitle" style="margin: 0; font-size: 1.6rem;">Titel</h2>
                <p id="trackArtist" style="color: var(--muted); margin: 10px 0; font-size: 1.1rem;">Interpret</p>
                
                <button class="btn-play" id="playPauseBtn" onclick="handlePlayback()">▶</button>
            </div>

            <!-- VERLAUF -->
            <div class="box-history">
                <span class="history-label">Zuletzt gelaufen</span>
                <div id="historyLog"></div>
            </div>
        </div>
    </div>

    <audio id="streamNode"></audio>

    <script>
        let targetStation = "";
        let isActive = false;
        let updateInterval;

        async function bootPlayer() {
            const val = document.getElementById('searchInput').value.trim().toLowerCase();
            if(!val) return;
            targetStation = val;

            document.getElementById('player-ui').style.display = 'block';
            const audio = document.getElementById('streamNode');
            audio.src = `https://stream.laut.fm/${targetStation}`;
            
            refreshData();
            if(updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(refreshData, 15000); // Alle 15 Sek. Update

            audio.play();
            isActive = true;
            document.getElementById('playPauseBtn').innerText = "⏸";
        }

        function handlePlayback() {
            const audio = document.getElementById('streamNode');
            if(isActive) {
                audio.pause();
                document.getElementById('playPauseBtn').innerText = "▶";
            } else {
                audio.play();
                document.getElementById('playPauseBtn').innerText = "⏸";
            }
            isActive = !isActive;
        }

        async function refreshData() {
            try {
                // Station & Hörer
                const sReq = await fetch(`https://api.laut.fm/station/${targetStation}`);
                const sData = await sReq.json();
                const lCount = sData.current_listeners || 0;
                document.getElementById('listenerDisplay').innerText = `${lCount} ${lCount === 1 ? 'Hörer ist' : 'Hörer sind'} gerade live dabei`;
                document.getElementById('stationTitle').innerText = sData.display_name;
                document.getElementById('mainLogo').src = sData.images.station_640x640 || sData.images.station;

                // Aktueller Song & Zeit
                const cReq = await fetch(`https://api.laut.fm/station/${targetStation}/current_song`);
                const cData = await cReq.json();
                
                // Zeit-Update für jetzt
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                document.getElementById('nowTime').innerText = `SEIT ${timeStr} UHR`;

                // Namen sauber anzeigen (kein [object Object])
                document.getElementById('trackTitle').innerText = String(cData.title || "Kein Titel");
                document.getElementById('trackArtist').innerText = String(cData.artist || "Unbekannter Künstler");

                // Verlauf ohne Dublette
                const hReq = await fetch(`https://api.laut.fm/station/${targetStation}/last_songs`);
                const hData = await hReq.json();
                const log = document.getElementById('historyLog');
                log.innerHTML = "";

                hData.slice(1, 6).forEach(song => {
                    const sTime = new Date(song.started_at);
                    const tStr = sTime.getHours().toString().padStart(2, '0') + ":" + sTime.getMinutes().toString().padStart(2, '0');
                    
                    log.innerHTML += `
                        <div class="song-entry">
                            <div class="entry-time">${tStr}</div>
                            <div class="entry-details">
                                <strong>${String(song.title || "Titel")}</strong>
                                <span>${String(song.artist || "Interpret")}</span>
                            </div>
                        </div>`;
                });
            } catch (err) { console.error("Update fehlgeschlagen"); }
        }
    </script>
</body>
</html>
