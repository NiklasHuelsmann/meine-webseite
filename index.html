<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v39.0 - Force Audio</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --card: #151515; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 12px; border-bottom: 1px solid #222; background: #000; }
        .search-bar { display: flex; background: #1a1a1a; border-radius: 10px; padding: 8px 12px; border: 1px solid #333; align-items: center; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; outline: none; }
        .uhr { text-align: center; font-size: 10px; color: var(--accent); margin-top: 4px; font-weight: bold; letter-spacing: 1px; }

        .main { flex: 1; overflow-y: auto; padding: 10px 15px 220px 15px; }
        .hero { background: var(--card); border-radius: 18px; padding: 12px; text-align: center; border: 1px solid #222; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
        #mainImg { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; background: #000; flex-shrink: 0; }
        .hero-text { text-align: left; overflow: hidden; }
        #stName { font-size: 16px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #hoerer { font-size: 10px; color: var(--accent); font-weight: bold; }

        .now { background: #1a1a1a; border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-left: 3px solid var(--accent); }
        .tag { background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 3px; }
        #curT { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

        .h-item { background: #080808; padding: 8px 10px; border-radius: 8px; display: flex; gap: 10px; font-size: 12px; margin-bottom: 5px; border: 1px solid #111; align-items: center; }
        .h-time { color: var(--accent); font-weight: bold; font-family: monospace; min-width: 40px; }
        .h-info { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .footer { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 15px 20px 35px 20px; border-top: 1px solid #222; border-radius: 20px 20px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 4px; border-radius: 4px; margin-bottom: 12px; border: 1px solid #1a1a1a; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 10px; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .controls { display: flex; align-items: center; gap: 15px; }
        .pBtn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 26px; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .pBtn.active { background: var(--accent); }
        .vol { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); height: 8px; }
        #status { font-size: 9px; color: #777; text-align: center; margin-top: 6px; letter-spacing: 1px; }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header>
        <div class="search-bar">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') sync()">
            <span onclick="sync()" style="cursor:pointer; font-size: 18px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="main">
        <div class="hero">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="hero-text">
                <div id="stName">RADIO STANDBY</div>
                <div id="hoerer">BEREIT ZUM START</div>
            </div>
        </div>
        <div class="now">
            <div class="tag">JETZT</div>
            <div id="curT">Wähle einen Sender</div>
        </div>
        <div id="hList"></div>
    </div>

    <div class="footer">
        <div class="ticker"><div id="tText">+++ BITTE SENDER SUCHEN UND PLAY DRÜCKEN +++</div></div>
        <div class="controls">
            <button id="pBtn" class="pBtn" onclick="togglePlay()">▶</button>
            <div class="vol">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="status">OFFLINE</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = new Audio();
    let slug = "";
    let dataTimer = null;

    function init() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { audio.volume = e.target.value; };
        // Initialer stummer Unlock-Sound
        audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // Browser Unlock beim Klick auf Lupe
        audio.play().catch(() => {});
        
        document.getElementById('status').innerText = "SENDER GEFUNDEN";
        await update();
        if(dataTimer) clearInterval(dataTimer);
        dataTimer = setInterval(update, 15000);
    }

    function togglePlay() {
        if(!slug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(audio.paused || audio.src.includes("data:")) {
            st.innerText = "VERBINDE...";
            audio.src = `https://stream.laut.fm/${slug}?cb=${Date.now()}`;
            audio.crossOrigin = "anonymous";
            audio.volume = document.getElementById('vRange').value;
            
            audio.play().then(() => {
                btn.innerHTML = "⏸";
                btn.classList.add('active');
                st.innerText = "STREAM LIVE";
                st.style.color = "var(--accent)";
            }).catch(() => {
                st.innerText = "KLICK NOCHMAL!";
                st.style.color = "#ff4444";
            });
        } else {
            audio.pause();
            audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
            btn.innerHTML = "▶";
            btn.classList.remove('active');
            st.innerText = "GESTOPPT";
            st.style.color = "#777";
        }
    }

    async function update() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " Hörer aktuell";
            const cur = l[0];
            document.getElementById('curT').innerText = cur.artist.name + " - " + cur.title;
            document.getElementById('tText').innerText = `+++ ${s.display_name.toUpperCase()} spielt: ${cur.artist.name} - ${cur.title} +++`;
            let html = "";
            l.slice(1, 10).forEach(song => {
                const t = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${t}</span><span class="h-info"><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
