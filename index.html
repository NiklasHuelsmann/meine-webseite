<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas Radio Hub</title>
    <style>
        :root { --sidebar-bg: #2c3e50; --accent: #00d26a; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        
        .search-box { margin-bottom: 20px; display: flex; gap: 5px; }
        input { flex: 1; padding: 8px; border-radius: 4px; border: none; }
        
        .player-zone { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; position: relative; }
        .heart { position: absolute; top: 10px; right: 10px; cursor: pointer; color: #888; font-size: 1.5rem; }
        .heart.active { color: #e74c3c; }
        
        .small-logo { width: 60px; height: 60px; border-radius: 5px; margin-bottom: 10px; }
        .play-btn { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        
        .fav-list { flex: 1; overflow-y: auto; margin-top: 10px; }
        .fav-item { padding: 8px; background: rgba(255,255,255,0.05); margin-bottom: 5px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; }
        
        .history-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .history-item { display: flex; padding: 10px 0; border-bottom: 1px solid #eee; }
        .time { width: 60px; font-weight: bold; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="search-box">
        <input type="text" id="slugInput" placeholder="Sender..." onkeypress="if(event.key==='Enter') loadStation()">
        <button onclick="loadStation()" style="cursor:pointer;">OK</button>
    </div>

    <div id="player" class="player-zone" style="display:none;">
        <span id="heartIcon" class="heart" onclick="toggleFav()">❤</span>
        <img id="stationLogo" class="small-logo" src="">
        <div id="songInfo">
            <b id="artistDisplay" style="display:block;">Lädt...</b>
            <span id="titleDisplay" style="font-size:0.9rem;">Bitte warten</span>
        </div>
        <button id="playBtn" class="play-btn" onclick="toggleAudio()">Starten</button>
    </div>

    <div style="font-size:0.8rem; color:#7f8c8d; margin-top:20px;">MEINE FAVORITEN</div>
    <div id="favList" class="fav-list"></div>
</div>

<div class="main">
    <div id="historyZone" class="history-card" style="display:none;">
        <h2 id="historyTitle" style="margin-top:0;">Verlauf</h2>
        <div id="historyContent"></div>
    </div>
</div>

<audio id="radioAudio"></audio>

<script>
    // Konfiguration
    const DEFAULTS = ["test-station-fm", "brian", "niklasheulsmann", "simulator-4"]; 
    const START_SENDER = "test-station-fm";

    let currentStation = "";
    let favorites = JSON.parse(localStorage.getItem('radioFavs_v3')) || DEFAULTS;
    const audio = document.getElementById('radioAudio');

    // Start-Logik
    window.onload = () => {
        renderFavs();
        const last = localStorage.getItem('lastStation') || START_SENDER;
        loadStation(last);
    };

    async function loadStation(name) {
        currentStation = (name || document.getElementById('slugInput').value).toLowerCase().trim();
        if(!currentStation) return;
        
        localStorage.setItem('lastStation', currentStation);
        document.getElementById('player').style.display = "block";
        document.getElementById('historyZone').style.display = "block";
        
        updateData();
        checkHeart();
    }

    async function updateData() {
        try {
            const [cRes, sRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}/current_song`),
                fetch(`https://api.laut.fm/station/${currentStation}`)
            ]);
            const song = await cRes.json();
            const info = await sRes.json();

            document.getElementById('artistDisplay').innerText = song.artist.name;
            document.getElementById('titleDisplay').innerText = song.title;
            document.getElementById('stationLogo').src = info.images.station_120x120 || info.images.station_640x640;
            document.getElementById('historyTitle').innerText = "Verlauf: " + info.display_name;
            
            loadHistory();
        } catch(e) { console.error("Fehler beim Laden"); }
    }

    function toggleFav() {
        const idx = favorites.indexOf(currentStation);
        if(idx === -1) favorites.push(currentStation);
        else favorites.splice(idx, 1);
        
        localStorage.setItem('radioFavs_v3', JSON.stringify(favorites));
        renderFavs();
        checkHeart();
    }

    function checkHeart() {
        document.getElementById('heartIcon').className = favorites.includes(currentStation) ? "heart" : "heart";
        document.getElementById('heartIcon').style.color = favorites.includes(currentStation) ? "#e74c3c" : "#888";
    }

    function renderFavs() {
        const list = document.getElementById('favList');
        list.innerHTML = favorites.map(f => `
            <div class="fav-item" onclick="loadStation('${f}')">
                <span>${f.toUpperCase()}</span>
                <span style="color:#e74c3c" onclick="event.stopPropagation(); removeFav('${f}')">×</span>
            </div>
        `).join('');
    }

    function removeFav(f) {
        favorites = favorites.filter(i => i !== f);
        localStorage.setItem('radioFavs_v3', JSON.stringify(favorites));
        renderFavs();
        checkHeart();
    }

    async function loadHistory() {
        const res = await fetch(`https://api.laut.fm/station/${currentStation}/last_songs`);
        const data = await res.json();
        document.getElementById('historyContent').innerHTML = data.map(s => `
            <div class="history-item">
                <div class="time">${new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                <div><b>${s.artist.name}</b> - ${s.title}</div>
            </div>
        `).join('');
    }

    function toggleAudio() {
        if(audio.paused) {
            audio.src = `https://stream.laut.fm/${currentStation}`;
            audio.play();
            document.getElementById('playBtn').innerText = "Pause";
        } else {
            audio.pause();
            document.getElementById('playBtn').innerText = "Starten";
        }
    }

    setInterval(() => { if(currentStation) updateData(); }, 20000);
</script>
</body>
</html>
