<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.55</title>
    <style>
        :root { 
            --bg-dark: #0a0e14; --bg-panel: #161b26; --accent: #00fad9; 
            --white: #ffffff; --text-dim: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-dark); margin: 0; height: 100vh; 
            color: var(--white); font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; justify-content: center; overflow: hidden;
        }

        .app-shell { width: 100%; max-width: 1400px; height: 100vh; background-color: var(--bg-panel); display: flex; flex-direction: column; position: relative; }

        /* SUCHE FIX */
        .top-nav { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(0,0,0,0.5); flex-shrink: 0; z-index: 2000; border-bottom: 1px solid var(--accent); }
        .search-area { position: relative; flex: 1; max-width: 600px; margin: 0 15px; }
        #query { width: 100%; background: rgba(255,255,255,0.05); border: 2px solid var(--accent); border-radius: 15px; padding: 12px 20px; color: #fff; outline: none; font-size: 16px; }
        
        #results { 
            position: absolute; top: 65px; left: 0; width: 100%; background: #1c222d; 
            border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,1); 
            max-height: 400px; overflow-y: auto; display: none; z-index: 3000; border: 1px solid var(--accent);
        }
        .res-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .res-item:hover { background: var(--accent); color: #000; }
        .res-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }

        .main-view { flex: 1; display: flex; flex-direction: row; overflow: hidden; }

        /* LISTE LINKS */
        .list-zone { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 20px; }
        .scroll-list { flex: 1; overflow-y: auto; }
        .song-item { display: flex; align-items: center; gap: 15px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 10px; }
        .song-item.active { background: rgba(0,250,217,0.1); border-left: 4px solid var(--accent); }

        /* PLAYER RECHTS (STAPEL-DESIGN) */
        .player-side { width: 450px; padding: 30px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.2); border-left: 1px solid rgba(255,255,255,0.05); overflow-y: auto; }
        
        .art-box { width: 300px; height: 300px; margin-bottom: 20px; flex-shrink: 0; }
        #bigAlbumArt { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        #playBtn { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); border: none; font-size: 30px; cursor: pointer; margin-bottom: 20px; flex-shrink: 0; }

        /* TEXT STAPEL UNTER PLAYER */
        .info-stack { text-align: center; width: 100%; }
        #s-display { font-size: 22px; font-weight: 900; margin: 10px 0 5px; color: #fff; }
        #s-desc { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.4; padding: 0 10px; }
        #listeners { font-size: 13px; font-weight: bold; color: var(--accent); background: rgba(0,250,217,0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 20px; }
        .ver-tag { font-size: 10px; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        @media (max-width: 900px) {
            .main-view { flex-direction: column-reverse; }
            .player-side { width: 100%; border-left: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .art-box { width: 200px; height: 200px; }
        }
    </style>
</head>
<body onload="init()">

<div class="app-shell">
    <header class="top-nav">
        <div id="clock">00:00</div>
        <div class="search-area">
            <input type="text" id="query" placeholder="Sender suchen..." autocomplete="off">
            <div id="results"></div>
        </div>
        <div style="font-size: 20px; color: var(--accent);">📡</div>
    </header>

    <main class="main-view">
        <section class="list-zone">
            <div class="scroll-list" id="listContent">
                <div style="text-align:center; opacity:0.3; margin-top:100px;">Suche einen Sender aus</div>
            </div>
        </section>

        <section class="player-side">
            <div class="art-box">
                <img id="bigAlbumArt" src="https://api.laut.fm/station/default/images/station_640x640.png">
            </div>
            
            <button id="playBtn" onclick="toggleAudio()" disabled>▶</button>
            
            <div class="info-stack">
                <div id="s-display">RADIO READY</div>
                <div id="s-desc">Wähle deinen Stream über die Suche</div>
                <div id="listeners" style="display:none;">0 LIVE-HÖRER</div>
                <div class="ver-tag">Version 115.55 • FIX</div>
            </div>
        </section>
    </main>
</div>

<script>
    const snd = new Audio();
    let currentStation = "";
    const queryInput = document.getElementById('query');
    const resultsDiv = document.getElementById('results');

    function init() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        queryInput.addEventListener('input', async () => {
            const q = queryInput.value.trim();
            if(q.length < 2) { resultsDiv.style.display = 'none'; return; }
            const res = await fetch(`https://api.laut.fm/search/stations?query=${q}`).then(r => r.json());
            if(res.items) {
                resultsDiv.innerHTML = res.items.map(s => `
                    <div class="res-item" onclick="selectStation('${s.name}')">
                        <img class="res-img" src="${s.images.station_80x80}">
                        <div style="font-weight:bold;">${s.display_name}</div>
                    </div>
                `).join('');
                resultsDiv.style.display = 'block';
            }
        });
    }

    async function selectStation(name) {
        currentStation = name;
        resultsDiv.style.display = 'none';
        queryInput.value = "";
        
        document.getElementById('playBtn').disabled = false;
        snd.src = `https://stream.laut.fm/${currentStation}`;
        snd.play().catch(() => {});
        document.getElementById('playBtn').innerHTML = "⏸";
        
        update();
        if(window.sync) clearInterval(window.sync);
        window.sync = setInterval(update, 10000);
    }

    function toggleAudio() {
        if(snd.paused) { snd.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { snd.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function update() {
        if(!currentStation) return;
        try {
            const [info, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/listeners`).then(r => r.text())
            ]);

            document.getElementById('s-display').innerText = info.display_name;
            document.getElementById('s-desc').innerText = info.description || info.format || "Keine Beschreibung verfügbar";
            document.getElementById('listeners').innerText = (listeners.includes("<") ? "0" : listeners) + " LIVE-HÖRER";
            document.getElementById('listeners').style.display = "inline-block";

            let html = "";
            songs.forEach((s, i) => {
                const isNow = (i === 0);
                const time = s.started_at.split(' ')[1].substring(0,5);
                const cover = s.image_640x640 || s.image_170x170 || info.images.station_640x640;
                if(isNow) document.getElementById('bigAlbumArt').src = cover;

                html += `
                    <div class="song-item ${isNow ? 'active' : ''}">
                        <div class="song-time">${time}</div>
                        <div class="song-meta">
                            <span class="song-artist" style="font-weight:bold; display:block;">${s.artist.name}</span>
                            <span class="song-title" style="font-size:12px; color:var(--text-dim);">${s.title}</span>
                        </div>
                        <img class="song-cover-mini" src="${cover}" style="width:45px; height:45px; border-radius:8px;">
                    </div>
                `;
            });
            document.getElementById('listContent').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
