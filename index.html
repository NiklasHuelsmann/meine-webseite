<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Version 1.01</title>
    <style>
        :root { 
            --main-bg: #1a202c; 
            --panel-bg: #2d3748;
            --accent: #00fbff; 
            --on-air-bg: #00fbff; 
            --text-dark: #000000;
            --border: #4a5568;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            margin: 0; background: var(--main-bg); 
            color: #fff; min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden;
            padding: 20px 0;
        }

        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--panel-bg); padding: 35px; border-radius: 15px;
            border: 2px solid var(--accent); width: 85%; max-width: 380px; text-align: center;
            box-shadow: 0 0 25px rgba(0, 251, 255, 0.2);
        }

        #mainContent { display: none; width: 92%; max-width: 1200px; margin: 0 auto; }

        header { 
            padding: 15px; background: #0f172a; display: flex; 
            justify-content: space-between; align-items: center; 
            border-radius: 12px; border-bottom: 3px solid var(--accent); 
            margin-bottom: 25px; gap: 10px;
        }

        .content-grid { 
            display: grid; grid-template-columns: 280px 1fr 300px; 
            gap: 25px;
        }

        @media (max-width: 950px) {
            .content-grid { grid-template-columns: 1fr; }
            header { justify-content: center; flex-direction: column; }
        }

        .panel { 
            background: var(--panel-bg); border: 1px solid var(--border); 
            border-radius: 15px; padding: 25px; display: flex; 
            flex-direction: column; align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .now-playing-box { 
            width: 100%; background: var(--on-air-bg); border-radius: 8px; 
            min-height: 70px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; margin: 20px 0;
            padding: 10px; box-sizing: border-box;
        }
        #trackDisplay { font-size: 18px; font-weight: 800; color: var(--text-dark); text-align: center; word-break: break-word; }
        #trackTime { font-size: 12px; font-weight: bold; color: rgba(0,0,0,0.6); margin-top: 5px; text-transform: uppercase; }

        #stLogo { width: 190px; height: 190px; border-radius: 20px; border: 4px solid #fff; margin-bottom: 15px; object-fit: cover; background: #000; }
        
        .play-btn { width: 90px; height: 90px; border-radius: 50%; background: #fff; border: 6px solid var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 15px auto; }

        .song-item { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 13px; width: 100%; box-sizing: border-box; }
        .song-item b { color: var(--accent); margin-right: 10px; font-family: monospace; }

        .login-box input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 8px; border: 1px solid var(--border); background: #1a202c; color: #fff; font-size: 16px; outline: none; }
        .login-btn { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        
        footer { text-align: center; margin-top: 30px; font-size: 11px; color: #4a5568; }
    </style>
</head>
<body onload="init()">

<div id="loginOverlay">
    <div class="login-box">
        <h1 style="color:var(--accent); margin:0; font-size: 32px;">1.01</h1>
        <p style="margin: 0 0 25px 0; font-size: 13px; font-weight: bold; opacity: 0.8;">FIXED BUILD</p>
        <input type="text" id="email" placeholder="BENUTZERNAME">
        <input type="password" id="pass" placeholder="PASSWORT">
        <button class="login-btn" onclick="handleLogin()">SYSTEM STARTEN</button>
    </div>
</div>

<div id="mainContent">
    <header>
        <div style="display:flex; align-items:center; gap:12px;">
            <img id="headerLogo" src="" style="width:40px; height:40px; border-radius:8px; display:none; border:2px solid var(--accent);">
            <div id="headerTitleDisplay" style="font-weight:900; color:var(--accent); letter-spacing: 1px; text-transform: uppercase;">ENGINE v1.01</div>
            <button onclick="location.reload()" style="background:#ef4444; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:10px; font-weight: 900;">LOGOUT</button>
        </div>
        <div style="display:flex; background:#fff; padding:6px 15px; border-radius:8px; align-items:center; flex: 1; max-width: 260px;">
            <input type="text" id="sIn" placeholder="Sender suchen..." style="border:none; outline:none; font-weight:bold; width: 100%; color: #000;" onkeypress="if(event.key==='Enter') changeSt(this.value)">
            <span onclick="changeSt(document.getElementById('sIn').value)" style="cursor:pointer; font-size: 18px; color:#000;">🔍</span>
        </div>
    </header>

    <div class="content-grid">
        <div class="panel">
            <input type="range" style="width:100%; accent-color:var(--accent);" min="0" max="1" step="0.01" value="0.9" oninput="setV(this.value)">
            <div id="vLab" style="font-size:12px; color:var(--accent); margin-top:8px; font-weight:900;">VOL: 90%</div>
            <div id="mainClock" style="font-size:44px; color:var(--accent); font-weight:900; font-family:monospace; margin:20px 0;">00:00:00</div>
            <div id="sideDate" style="font-size:16px; font-weight: bold; opacity:0.8;">--.--.----</div>
            <div style="margin-top:35px; text-align:center; background: rgba(0,0,0,0.25); padding: 15px; border-radius: 12px; width: 100%; box-sizing: border-box;">
                <div style="font-size:10px; opacity:0.6; letter-spacing:2px; font-weight: 900;">HÖRER LIVE</div>
                <div id="listenerCount" style="font-size:34px; color:var(--accent); font-weight:900;">0</div>
            </div>
        </div>

        <div class="panel">
            <img id="stLogo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="stDisplayNameCenter" style="font-size:24px; font-weight:900; letter-spacing:2px; color: #fff; text-transform: uppercase;">SENDERNAME</div>
            <div class="now-playing-box">
                <div id="trackDisplay">BEREIT</div>
                <div id="trackTime">WARTE AUF STREAM...</div>
            </div>
            <button class="play-btn" onclick="togglePlay()" id="pBtn">
                <svg width="50" height="50" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>
            </button>
            <div id="stDesc" style="font-size:12px; color:#cbd5e0; text-align:center; margin-top:15px; line-height: 1.5; opacity: 0.8; max-width: 90%;"></div>
        </div>

        <div class="panel">
            <h3 style="font-size:12px; color:var(--accent); border-bottom:2px solid var(--border); width:100%; padding-bottom:10px; margin:0 0 15px 0; text-transform: uppercase; letter-spacing: 2px; font-weight: 900;">VERLAUF</h3>
            <div id="hist" style="width:100%; overflow-y:auto; max-height:450px;"></div>
        </div>
    </div>
    <footer>BUILD 1.01 &copy; 2026 | ENGINE CONTROL STABLE</footer>
</div>

<audio id="audio" preload="none"></audio>

<script>
    const audio = document.getElementById('audio');
    let playing = false;
    let station = "";
    let currentHistoryJSON = "";

    function handleLogin() {
        const u = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        if(u !== "" && p !== "") {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        } else {
            alert("Login Simulation: Bitte Felder ausfüllen.");
        }
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('mainClock').innerText = now.toLocaleTimeString('de-DE');
        document.getElementById('sideDate').innerText = now.toLocaleDateString('de-DE');
    }
    setInterval(updateTime, 1000);

    function changeSt(v) {
        if(!v) return;
        station = v.toLowerCase().trim().replace(/\s+/g, '-');
        document.getElementById('headerTitleDisplay').innerText = v.toUpperCase();
        document.getElementById('stDisplayNameCenter').innerText = v.toUpperCase();
        if(playing) { stop(); start(); }
        updateData();
    }

    function setV(v) { audio.volume = v; document.getElementById('vLab').innerText = "VOL: " + Math.round(v*100) + "%"; }
    function togglePlay() { if(!station) return; if(!playing) start(); else stop(); }

    function start() {
        audio.src = "https://stream.laut.fm/" + station + "?cache=" + Math.random();
        audio.play().then(() => {
            playing = true;
            document.getElementById('pBtn').innerHTML = '<svg width="50" height="50" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="#000"/></svg>';
        });
    }

    function stop() { 
        audio.pause(); audio.src = ""; playing = false; 
        document.getElementById('pBtn').innerHTML = '<svg width="50" height="50" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" fill="#000"/></svg>'; 
    }

    async function updateData() {
        if(!station) return;
        try {
            const rStat = await fetch(`https://api.laut.fm/station/${station}/listeners`);
            const dStat = await rStat.text();
            document.getElementById('listenerCount').innerText = dStat.trim() || "0";

            const r = await fetch(`https://api.laut.fm/station/${station}`);
            const d = await r.json();
            if (d) {
                const img = d.images ? d.images.station_120x120 : "";
                document.getElementById('stLogo').src = img;
                document.getElementById('headerLogo').src = img;
                document.getElementById('headerLogo').style.display = "block";
                document.getElementById('stDesc').innerText = d.description || "";
            }

            const rH = await fetch(`https://api.laut.fm/station/${station}/last_songs`);
            const s = await rH.json();
            if(s && JSON.stringify(s) !== currentHistoryJSON) {
                currentHistoryJSON = JSON.stringify(s);
                const current = s[0];
                const startTime = new Date(current.started_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('trackDisplay').innerText = current.artist.name + " - " + current.title;
                document.getElementById('trackTime').innerText = "GESTARTET UM: " + startTime;
                let html = "";
                s.slice(1, 12).forEach(x => {
                    const time = new Date(x.started_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    html += `<div class="song-item"><b>${time}</b> ${x.artist.name} - ${x.title}</div>`;
                });
                document.getElementById('hist').innerHTML = html;
            }
        } catch(e) {}
    }
    setInterval(updateData, 8000);
    function init() { audio.volume = 0.9; updateTime(); }
</script>
</body>
</html>
