<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein laut.fm Player</title>
    <style>
        /* Hintergrundfarbe der Webseite */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; /* Ein dunkler Hintergrund, damit das Weiß gut aussieht */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* Suchfeld */
        .suche {
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        input {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background-color: #ffffff;
            cursor: pointer;
            font-weight: bold;
        }

        /* Der Player (ist am Anfang unsichtbar) */
        #player-bereich {
            display: none;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        /* Das Display-Bild (Cover) */
        .cover-bild {
            width: 250px;
            height: 250px;
            border-radius: 50%; /* Rund wie gewünscht */
            object-fit: cover;
            border: 5px solid white;
            margin-bottom: 20px;
        }

        /* Texte in Weiß */
        .weiss-text {
            color: #ffffff;
            margin: 5px 0;
        }

        .aktuell-box {
            margin-bottom: 25px;
        }

        audio {
            width: 100%;
            margin-bottom: 30px;
        }

        /* Liste der letzten Songs */
        .last-songs {
            text-align: left;
            width: 100%;
        }

        .song-eintrag {
            background-color: rgba(255, 255, 255, 0.1); /* Ganz leicht transparent */
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .zeit {
            font-size: 0.8rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <!-- Manuelle Suche -->
    <div class="suche">
        <input type="text" id="sender-name" placeholder="Sendername eingeben...">
        <button onclick="senderLaden()">Hören</button>
    </div>

    <!-- Der Player-Bereich -->
    <div id="player-bereich">
        <img id="display-bild" class="cover-bild" src="" alt="Cover">
        
        <div class="aktuell-box">
            <h2 id="aktuell-titel" class="weiss-text">Titel</h2>
            <p id="aktuell-artist" class="weiss-text">Interpret</p>
        </div>

        <audio id="audio-player" controls autoplay>
            <source id="stream-quelle" src="" type="audio/mpeg">
        </audio>

        <div class="last-songs">
            <h3 class="weiss-text">Zuletzt gelaufen:</h3>
            <div id="historie"></div>
        </div>
    </div>

    <script>
        let interval;

        async function senderLaden() {
            const sender = document.getElementById('sender-name').value.trim().toLowerCase();
            if (!sender) return;

            // Player anzeigen
            document.getElementById('player-bereich').style.display = 'block';

            // Stream starten
            const player = document.getElementById('audio-player');
            const source = document.getElementById('stream-quelle');
            source.src = `https://stream.laut.fm/${sender}`;
            player.load();
            player.play();

            // Daten laden
            updateDaten(sender);
            if(interval) clearInterval(interval);
            interval = setInterval(() => updateDaten(sender), 30000);
        }

        async function updateDaten(sender) {
            try {
                // Aktueller Song
                const res = await fetch(`https://api.laut.fm/station/${sender}/current_song`);
                const data = await res.json();
                
                document.getElementById('aktuell-titel').innerText = data.title;
                document.getElementById('aktuell-artist').innerText = data.artist;
                document.getElementById('display-bild').src = data.image_640 || 'https://laut.fm/images/default-cover.png';

                // Verlauf (Letzte Songs)
                const resHist = await fetch(`https://api.laut.fm/station/${sender}/last_songs`);
                const dataHist = await resHist.json();
                
                const historieDiv = document.getElementById('historie');
                historieDiv.innerHTML = "";

                dataHist.slice(0, 3).forEach(song => {
                    const startZeit = new Date(song.started_at);
                    const zeitString = startZeit.getHours().toString().padStart(2, '0') + ":" + 
                                       startZeit.getMinutes().toString().padStart(2, '0');

                    historieDiv.innerHTML += `
                        <div class="song-eintrag">
                            <span><strong>${song.title}</strong><br>${song.artist}</span>
                            <span class="zeit">${zeitString} Uhr</span>
                        </div>
                    `;
                });
            } catch (f) {
                console.log("Fehler beim Laden.");
            }
        }
    </script>
</body>
</html>
