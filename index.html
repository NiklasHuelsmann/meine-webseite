<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas Radio - Original laut.fm Logik</title>
    <style>
        :root {
            --bg: #12141a;
            --card: #1f232c;
            --accent: #4c8bf5;
            --text: #eceff4;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        /* Haupt-Layout: Links Player, Rechts die interaktive Box */
        .radio-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        @media (max-width: 900px) {
            .radio-grid { grid-template-columns: 1fr; }
        }

        /* Linke Seite: Player & Logo */
        .player-side {
            background: var(--card);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .station-logo {
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            margin-bottom: 20px;
        }

        .search-area {
            display: flex; gap: 10px; margin-bottom: 20px;
        }

        .search-area input {
            flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2e3440; color: white;
        }

        /* Rechte Seite: Die kombinierte Box (Songs & Plan) */
        .info-box {
            background: var(--card);
            border-radius: 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
            height: 650px;
        }

        /* Hörer-Info oben rechts fixiert */
        .status-header {
            padding: 15px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .listener-count { color: var(--accent); font-weight: bold; }

        /* Tabs wie bei laut.fm */
        .nav-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            flex: 1; padding: 15px; border: none; background: transparent;
            color: #888; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .tab-btn.active { color: white; border-bottom: 3px solid var(--accent); background: rgba(76,139,245,0.05); }

        /* Liste: Flackerfrei durch ID-Check */
        .scroll-list {
            flex: 1; overflow-y: auto; padding: 20px;
        }

        .entry {
            display: flex; gap: 15px; padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .entry-time { color: var(--accent); font-weight: bold; min-width: 50px; }
        .entry-content b { display: block; margin-bottom: 2px; }
        .entry-content span { font-size: 0.85rem; color: #999; }

        /* Player-Steuerung */
        .controls { margin-top: 20px; }
        .play-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: white; border: none; font-size: 2rem; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="radio-grid">
    <!-- Links: Dein Player -->
    <div class="player-side">
        <div class="search-area">
            <input type="text" id="stationIn" placeholder="Sendername...">
            <button onclick="startRadio()" style="background:var(--accent); color:white; border:none; border-radius:20px; padding:0 20px; cursor:pointer;">Start</button>
        </div>
        <img id="stLogo" class="station-logo" src="https://laut.fm/assets/images/station_placeholder.png">
        <h2 id="stTitle">Dein Radio</h2>
        <div class="controls">
            <button class="play-btn" id="pBtn" onclick="toggle()">▶</button>
        </div>
    </div>

    <!-- Rechts: Sendeplan & Songs kombiniert -->
    <div class="info-box" id="infoBox" style="display:none;">
        <div class="status-header">
            <span>Status: Live</span>
            <span class="listener-count" id="lCount">Hörer: 0</span>
        </div>
        
        <div class="nav-tabs">
            <button class="tab-btn active" id="tabS" onclick="setMode('songs')">Letzte Songs</button>
            <button class="tab-btn" id="tabP" onclick="setMode('plan')">Sendeplan</button>
        </div>

        <div class="scroll-list" id="listContent">
            <!-- Hier flackert nichts mehr -->
        </div>
    </div>
</div>

<audio id="audio"></audio>

<script>
    let slug = "";
    let mode = "songs";
    let lastDataStr = ""; // Zum Vergleichen gegen Flackern
    const audio = document.getElementById('audio');

    function setMode(m) {
        mode = m;
        document.getElementById('tabS').classList.toggle('active', m === 'songs');
        document.getElementById('tabP').classList.toggle('active', m === 'plan');
        lastDataStr = ""; // Reset für sofortiges Umschalten
        refresh();
    }

    async function startRadio() {
        slug = document.getElementById('stationIn').value.toLowerCase().trim();
        if(!slug) return;
        document.getElementById('infoBox').style.display = "flex";
        audio.src = `https://stream.laut.fm/${slug}`;
        audio.play();
        document.getElementById('pBtn').innerText = "⏸";
        refresh();
        setInterval(refresh, 10000); // Alle 10 Sek. prüfen
    }

    async function refresh() {
        if(!slug) return;
        try {
            // Hörer-Info abgreifen
            const sRes = await fetch(`https://api.laut.fm/station/${slug}`);
            const sData = await sRes.json();
            document.getElementById('stLogo').src = sData.images.station_640x640;
            document.getElementById('stTitle').innerText = sData.display_name;
            document.getElementById('lCount').innerText = `Hörer: ${sData.current_listeners}`;

            // Daten laden je nach Modus
            let url = mode === 'songs' ? `https://api.laut.fm/station/${slug}/last_songs` : `https://api.laut.fm/station/${slug}/schedule`;
            const res = await fetch(url);
            const data = await res.json();
            
            // Flackerschutz: Nur neu zeichnen, wenn sich Daten wirklich geändert haben
            const currentDataStr = JSON.stringify(data);
            if(currentDataStr === lastDataStr) return; 
            lastDataStr = currentDataStr;

            const list = document.getElementById('listContent');
            list.innerHTML = ""; // Sauber leeren

            if(mode === 'songs') {
                data.forEach(s => {
                    const time = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    list.innerHTML += `<div class="entry"><div class="entry-time">${time}</div><div class="entry-content"><b>${s.artist.name}</b><span>${s.title}</span></div></div>`;
                });
            } else {
                data.forEach(p => {
                    const time = p.start_time ? p.start_time.substring(0,5) : "00:00";
                    // Falls nur ein Sendername drin steht, wird er hier sauber angezeigt
                    list.innerHTML += `<div class="entry"><div class="entry-time">${time}</div><div class="entry-content"><b>${p.name}</b><span>Sendung / Playlist</span></div></div>`;
                });
            }
        } catch(e) { console.error("Fehler beim Laden", e); }
    }

    function toggle() { if(audio.paused) { audio.play(); document.getElementById('pBtn').innerText="⏸"; } else { audio.pause(); document.getElementById('pBtn').innerText="▶"; } }
</script>
</body>
</html>
