<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Master v15.0</title>
    <style>
        :root { --primary: #00ffaa; --bg: #08080a; --surface: #1a1a1e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; }

        /* SUCHE - JETZT REIBUNGSLOS FÜR ALLES */
        .search-area { padding: 20px; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .bar { display: flex; background: var(--surface); border-radius: 12px; border: 1px solid #333; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #q { flex: 1; padding: 16px; border: none; background: transparent; color: white; font-size: 16px; outline: none; }
        .btn { background: var(--primary); border: none; padding: 0 20px; cursor: pointer; color: #000; font-weight: bold; }

        /* ERGEBNIS-LISTE (KLICKBAR) */
        #results {
            margin: 0 20px 20px; background: #1c1c20; border-radius: 12px;
            max-height: 400px; overflow-y: auto; display: none; border: 1px solid #444;
        }
        .row { padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2a2a2e; cursor: pointer; }
        .row:hover { background: #2a2a32; }
        .row img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #000; }
        .info b { display: block; font-size: 16px; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-top: 4px; display: inline-block; }
        .badge-l { background: #ffaa00; color: #000; }
        .badge-w { background: #0088ff; color: #fff; }

        /* PLAYER AREA */
        .player { flex: 1; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .top-meta { width: 100%; display: flex; justify-content: space-between; color: var(--primary); font-family: monospace; margin-bottom: 15px; }
        #main-art { width: 100%; max-width: 300px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; box-shadow: 0 15px 40px #000; margin: 20px 0; border: 1px solid #333; }
        #track { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        #artist { color: #888; margin-bottom: 30px; }

        .play-btn { width: 75px; height: 75px; border-radius: 50%; background: #fff; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .play-btn svg { width: 32px; height: 32px; fill: #000; }

        /* PLAYLIST */
        .history { width: 100%; margin-top: 30px; text-align: left; }
        .h-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: #121214; border-radius: 10px; margin-bottom: 8px; border: 1px solid #222; }
        .h-item img { width: 40px; height: 40px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="app">
    <div class="search-area">
        <div class="bar">
            <input type="text" id="q" placeholder="WDR 2, Niklas FM, Top 40..." autocomplete="off">
            <button class="btn" onclick="search()">LOS</button>
        </div>
    </div>
    <div id="results"></div>

    <div class="player">
        <div class="top-meta">
            <div id="clock">00:00:00</div>
            <div id="listeners">● READY</div>
        </div>
        <h2 id="st-name">Radio Player</h2>
        <img id="main-art" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        <div id="track">Wähle einen Sender</div>
        <div id="artist">Suche starten</div>
        
        <button class="play-btn" onclick="toggle()">
            <svg id="p-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="s-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="history" id="hist-box"></div>
    </div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
    const audio = document.getElementById('audio');
    const resBox = document.getElementById('results');
    const input = document.getElementById('q');
    let activeId = ""; let activeType = ""; let timer = null;

    async function search() {
        const query = input.value.trim();
        if(query.length < 2) return;
        resBox.innerHTML = "<div style='padding:20px;text-align:center;'>Suche läuft...</div>";
        resBox.style.display = "block";

        try {
            // Gleichzeitige Abfrage von laut.fm und Welt-Radio
            const [rL, rW] = await Promise.all([
                fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(query)}`),
                fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(query)}`)
            ]);
            const dL = await rL.json();
            const dW = await rW.json();
            resBox.innerHTML = "";

            // LAUT.FM STATIONEN (Niklas FM etc.)
            if(dL.items) dL.items.forEach(s => addRow(s.display_name, s.images.station_80x80, s.name, 'badge-l', 'LAUT.FM'));
            
            // WORLD STATIONEN (WDR 2 etc.)
            if(dW) dW.slice(0, 15).forEach(s => {
                // Logo-Fix: Wenn kein Favicon da ist, nutzen wir einen Platzhalter oder suchen später
                const logo = s.favicon ? s.favicon : `https://logo.clearbit.com/${s.homepage || 'radio.de'}`;
                addRow(s.name, logo, s.url, 'badge-w', 'WORLD');
            });
            
        } catch(e) { resBox.innerHTML = "<div style='padding:20px;'>Fehler bei der Suche</div>"; }
    }

    function addRow(name, img, url, cls, type) {
        const div = document.createElement('div');
        div.className = "row";
        div.onclick = () => select(name, img, url, type);
        // Falls Bild-URL kaputt ist, Standard-Icon laden
        const icon = img || 'https://via.placeholder.com/50/222/fff?text=R';
        div.innerHTML = `<img src="${icon}" onerror="this.src='https://via.placeholder.com/50/222/fff?text=Radio'"> <div class="info"><b>${name}</b><span class="badge ${cls}">${type}</span></div>`;
        resBox.appendChild(div);
    }

    function select(name, img, url, type) {
        resBox.style.display = "none";
        input.value = "";
        activeId = url; activeType = type;
        
        audio.pause();
        audio.src = (type === 'LAUT.FM') ? `https://stream.laut.fm/${url}` : url;
        audio.play().catch(() => {});

        document.getElementById('st-name').innerText = name;
        // WDR 2 Logo Fix: Wenn das Bild fehlt, versuchen wir es über den Namen zu erzwingen
        let finalImg = img;
        if(!img || img.includes('placeholder')) {
            finalImg = `https://logo.clearbit.com/${name.toLowerCase().replace(/\s+/g, '')}.de`;
        }
        document.getElementById('main-art').src = finalImg;
        
        setUI(true);
        if(timer) clearInterval(timer);
        update();
        timer = setInterval(update, 30000);
    }

    async function update() {
        if(!activeId) return;
        const hBox = document.getElementById('hist-box');
        const lBox = document.getElementById('listeners');

        if(activeType === 'LAUT.FM') {
            try {
                const [rStat, rSongs] = await Promise.all([
                    fetch(`https://api.laut.fm/station/${activeId}`),
                    fetch(`https://api.laut.fm/station/${activeId}/last_songs`)
                ]);
                const sInfo = await rStat.json();
                const songs = await rSongs.json();
                
                lBox.innerText = `● ${sInfo.current_listeners} HÖRER`;
                if(songs.length > 0) {
                    document.getElementById('track').innerText = songs[0].title;
                    document.getElementById('artist').innerText = songs[0].artist.name;
                    if(songs[0].image_640x640) document.getElementById('main-art').src = songs[0].image_640x640;
                    
                    let html = "";
                    songs.slice(1, 5).forEach(sg => {
                        html += `<div class="h-item"><img src="${sg.image_120x120 || sInfo.images.station_80x80}"><div><b>${sg.title}</b><br><small>${sg.artist.name}</small></div></div>`;
                    });
                    hBox.innerHTML = html;
                }
            } catch(e) {}
        } else {
            lBox.innerText = "● LIVE";
            document.getElementById('track').innerText = "Live Radio";
            document.getElementById('artist').innerText = "Stream läuft reibungslos";
            hBox.innerHTML = "";
        }
    }

    function toggle() {
        if(audio.paused) { audio.play(); setUI(true); }
        else { audio.pause(); setUI(false); }
    }

    function setUI(playing) {
        document.getElementById('p-icon').style.display = playing ? "none" : "block";
        document.getElementById('s-icon').style.display = playing ? "block" : "none";
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    input.onkeypress = (e) => { if(e.key === 'Enter') search(); };
</script>
</body>
</html>
