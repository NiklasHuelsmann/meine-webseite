<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App v84.5</title>
    <style>
        :root { 
            --bg-global: #050505; --bg-app: #121212; --accent: #00d2ff; 
            --highlight: #00f2c3; --ad-color: #ffcc00; --news-color: #ffffff; --live-color: #ff00ff;
            --text-secondary: #999;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-global); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; background-color: var(--bg-app); position: relative; }
        
        header { padding: 40px 20px 10px; text-align: center; }
        .uhr { font-family: monospace; font-size: 14px; color: var(--accent); margin-bottom: 15px; letter-spacing: 2px; }
        
        .search-container { padding: 0 20px 15px; }
        .search-area { background: #1e1e1e; border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; border: 1px solid #333; }
        .search-area input { background: transparent; border: none; color: #fff; width: 100%; font-size: 16px; outline: none; margin-left: 10px; }
        .lupe { font-size: 18px; color: #666; }

        .scroll-content { flex: 1; overflow-y: auto; padding: 10px 20px 180px; scrollbar-width: none; }
        .scroll-content::-webkit-scrollbar { display: none; }

        .player-hero { text-align: center; margin-bottom: 30px; }
        #mainImg { width: 240px; height: 240px; border-radius: 15px; object-fit: cover; box-shadow: 0 10px 40px rgba(0,0,0,0.8); margin-bottom: 20px; border: 1px solid #222; }
        #stNameDisplay { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        .current-info { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 30px; border-left: 4px solid var(--accent); min-height: 90px; }
        #currentSongArea .artist { font-size: 20px; font-weight: 800; display: block; color: #fff; }
        #currentSongArea .title { font-size: 16px; color: var(--text-secondary); margin-top: 5px; display: block; }

        .history-title { font-size: 12px; color: #555; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .song-entry { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .time-cell { font-size: 11px; color: #444; min-width: 50px; font-family: monospace; }
        .song-info { flex: 1; margin-left: 10px; }
        .song-info .artist { font-size: 14px; font-weight: 600; color: #ccc; }
        .song-info .title { font-size: 13px; color: #666; }

        .meta-info { margin-top: 40px; text-align: center; padding: 20px; background: #0f0f0f; border-radius: 15px; border: 1px solid #1a1a1a; }
        #stDesc { font-size: 14px; color: #777; margin-bottom: 15px; line-height: 1.4; }
        #hoerer { font-size: 14px; color: var(--highlight); font-weight: bold; }
        .version { font-size: 10px; color: #333; margin-top: 20px; text-transform: uppercase; }

        .bottom-controls { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #121212; border-top: 1px solid #222; padding: 20px 25px 40px; }
        .control-row { display: flex; align-items: center; gap: 20px; }
        #pBtn { width: 64px; height: 64px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .vol-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: default; }
        .vol-label { font-size: 10px; color: #444; text-transform: uppercase; }

        /* Farb-Klassen für Status */
        .is-ad { color: var(--ad-color) !important; font-weight: 900 !important; }
        .is-news { color: var(--news-color) !important; font-weight: 900 !important; }
        .is-live { color: var(--live-color) !important; font-weight: 900 !important; }
    </style>
</head>
<body>
<div class="app">
    <header><div id="uhr" class="uhr">00:00:00</div></header>
    
    <div class="search-container">
        <div class="search-area">
            <span class="lupe">🔍</span>
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') startManualSearch()">
        </div>
    </div>

    <div class="scroll-content">
        <div class="player-hero">
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div id="stNameDisplay">BEREIT</div>
        </div>

        <div class="current-info" id="currentSongArea">
            <span class="artist">RADIO STARTEN</span>
            <span class="title">Warte auf Eingabe...</span>
        </div>

        <div class="history-title">Zuletzt gelaufen</div>
        <div id="songHistory" class="history-list"></div>

        <div class="meta-info">
            <div id="stDesc">Keine Beschreibung verfügbar.</div>
            <div id="hoerer">0 Hörer online</div>
            <div class="version">VERSION 84.5 | LAUT.FM APP MODE</div>
        </div>
    </div>

    <div class="bottom-controls">
        <div class="control-row">
            <button id="pBtn" onclick="toggle()">▶</button>
            <div class="vol-box">
                <div class="vol-label">Volume 80%</div>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8" disabled>
            </div>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    au.volume = 0.8;
    let currentSlug = "", updateTimer = null, lastHash = "";
    
    // Uhrzeit-Update
    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    // Suche & Start
    async function startManualSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        currentSlug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play().then(() => { document.getElementById('pBtn').innerHTML = "⏸"; });
        lastHash = "";
        updateUI(); 
        if(updateTimer) clearInterval(updateTimer);
        updateTimer = setInterval(updateUI, 4000); 
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);

            const cur = l[0];
            const art = (cur.artist.name || "").toLowerCase();
            const tit = (cur.title || "").toLowerCase();
            const currentHash = art + tit + h;
            if (currentHash === lastHash) return;
            lastHash = currentHash;

            // UI Texte setzen
            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stDesc').innerText = s.description || "Keine Beschreibung verfügbar.";
            document.getElementById('hoerer').innerText = h + " Hörer online";

            // Zeit-Logik für Reklame (wenn Song abgelaufen)
            const startTime = new Date(cur.started_at.replace(' ', 'T')).getTime();
            const hasEnded = (new Date().getTime() - startTime) > ((cur.length || 0) * 1000 + 2000);

            // Logik-Filter (Reklame, News, Live)
            const isReklame = art.includes("reklame") || tit.includes("reklame") || art.includes("audio") || tit.includes("spot") || art.includes("werbung");
            const isNews = !isReklame && (art.includes("nachrichten") || tit.includes("news") || tit.includes("zeitfunk") || art.includes("wetter"));
            const isLive = !isReklame && !isNews && (art.includes("moderation") || art.includes("live") || art.includes("beratung") || tit.includes("beratung") || tit.includes("spricht"));
            const isAd = !isReklame && !isNews && !isLive && (cur.type === "ad" || hasEnded);

            let aD = cur.artist.name, tD = cur.title, cls = "";
            
            if (isReklame || isAd) { 
                aD = "REKLAME"; tD = "Gleich geht es weiter..."; cls = "is-ad"; 
            } else if (isNews) { 
                aD = "NACHRICHTEN"; tD = "Aktuelle Informationen"; cls = "is-news"; 
            } else if (isLive) { 
                aD = (art.includes("beratung") || tit.includes("beratung")) ? "BERATUNG" : "MODERATION"; 
                tD = "Live am Mikrofon"; cls = "is-live"; 
            }

            // Aktuelle Anzeige updaten
            document.getElementById('currentSongArea').innerHTML = `<span class="artist ${cls}">${aD}</span><span class="title">${tD}</span>`;
            
            // Historie (die letzten 5 Songs)
            let hist = "";
            l.slice(1, 6).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                hist += `<div class="song-entry"><div class="time-cell">${time}</div><div class="song-info"><span class="artist">${song.artist.name}</span><span class="title">${song.title}</span></div></div>`;
            });
            document.getElementById('songHistory').innerHTML = hist;
        } catch(e) { console.error("Update fehlgeschlagen"); }
    }
</script>
</body>
</html>
