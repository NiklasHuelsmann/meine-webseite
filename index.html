<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.81 - History Edition</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #007aff; --white: #ffffff; --text-dim: #8b949e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: var(--white); font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* HEADER & SEARCH */
        .header { 
            height: 75px; background: #000; border-bottom: 3px solid var(--accent); 
            display: flex; align-items: center; padding: 0 15px; gap: 10px; z-index: 1000;
        }
        .search-box { position: relative; flex: 1; max-width: 500px; display: flex; align-items: center; }
        #query { 
            width: 100%; padding: 14px 45px 14px 15px; border-radius: 12px; border: none; 
            font-size: 16px; font-weight: bold; background: #fff; color: #000;
        }
        .search-btn { position: absolute; right: 12px; background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }

        #results { 
            position: absolute; top: 60px; left: 0; width: 100%; background: #fff; 
            border-radius: 12px; color: #333; display: none; z-index: 9999; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); max-height: 400px; overflow-y: auto;
            border: 3px solid var(--accent);
        }
        .res-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .res-item:active { background: #eef5ff; }
        .res-item img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        /* MAIN CONTENT */
        .main { flex: 1; display: flex; overflow: hidden; }
        
        .left-side { 
            width: 420px; padding: 25px; display: flex; flex-direction: column; 
            align-items: center; background: rgba(0,0,0,0.3); border-right: 1px solid #30363d;
            overflow-y: auto; text-align: center;
        }

        .cover-frame { 
            width: 300px; height: 300px; border: 5px solid var(--accent); 
            border-radius: 45px; padding: 6px; position: relative; background: #000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); margin-bottom: 25px;
        }
        #mainCover { width: 100%; height: 100%; border-radius: 36px; object-fit: cover; transition: 0.5s; }
        #statusOverlay { 
            position: absolute; inset: 6px; background: rgba(0,122,255,0.4); 
            border-radius: 36px; display: none; align-items: center; justify-content: center; 
            font-size: 110px; backdrop-filter: blur(5px); color: white;
        }

        #playBtn { 
            width: 85px; height: 85px; border-radius: 50%; background: var(--accent); 
            border: none; color: white; font-size: 38px; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,122,255,0.4);
        }

        .stats-pill { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 8px 25px; border-radius: 30px; font-weight: 900; margin-bottom: 15px; font-size: 14px; }
        .desc-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; padding: 0 15px; margin-bottom: 20px; }

        /* PLAYLIST / HISTORY */
        .right-side { flex: 1; padding: 25px; overflow-y: auto; background: rgba(255,255,255,0.02); }
        .history-label { font-size: 12px; color: var(--accent); font-weight: 900; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }

        .song-card { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            background: #1c2128; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .song-card.active { border: 2px solid var(--accent); background: rgba(0,122,255,0.1); transform: scale(1.02); }

        .time-box { font-size: 12px; color: var(--accent); font-weight: bold; min-width: 50px; }
        .icon-box { font-size: 24px; width: 35px; text-align: center; }

        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .left-side { width: 100%; border-right: none; height: auto; padding: 20px; }
            .cover-frame { width: 220px; height: 220px; }
            .right-side { padding: 15px; }
        }
    </style>
</head>
<body onload="init()">

<header class="header">
    <div style="font-weight:900; color:var(--accent); font-size:22px; letter-spacing:-1px;">RADIO</div>
    <div class="search-box">
        <input type="text" id="query" placeholder="Sender suchen..." autocomplete="off">
        <button class="search-btn" onclick="searchStation()">🔍</button>
        <div id="results"></div>
    </div>
</header>

<main class="main">
    <section class="left-side">
        <div class="cover-frame">
            <img id="mainCover" src="https://api.laut.fm/station/default/images/station_640x640.png">
            <div id="statusOverlay"></div>
        </div>
        <button id="playBtn" onclick="togglePlay()" disabled>▶</button>
        <div id="listenerCount" class="stats-pill">0 HÖRER LIVE</div>
        <h2 id="stTitle" style="margin: 5px 0 10px 0; font-size: 24px;">STUDIO</h2>
        <p id="stDesc" class="desc-text">Suche eine Station, um die Geschichte der Songs zu sehen.</p>
    </section>

    <section class="right-side">
        <div class="history-label">Zuletzt gelaufen</div>
        <div id="playlist"></div>
    </section>
</main>

<script>
    const stream = new Audio();
    let currentID = "";
    const input = document.getElementById('query');
    const resBox = document.getElementById('results');

    function init() {
        input.addEventListener('input', () => searchStation());
        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const first = resBox.querySelector('.res-item');
                if(first) first.click();
            }
        });
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.search-box')) resBox.style.display = 'none';
        });
    }

    async function searchStation() {
        const val = input.value.trim();
        if(val.length < 2) { resBox.style.display = 'none'; return; }
        try {
            const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`);
            const data = await r.json();
            if(data.items) {
                resBox.innerHTML = data.items.slice(0,10).map(st => `
                    <div class="res-item" onclick="playStation('${st.name}')">
                        <img src="${st.images.station_80x80}">
                        <b>${st.display_name}</b>
                    </div>`).join('');
                resBox.style.display = 'block';
            }
        } catch(e) {}
    }

    async function playStation(id) {
        currentID = id;
        resBox.style.display = 'none';
        input.value = "";
        document.getElementById('playBtn').disabled = false;
        
        stream.src = `https://stream.laut.fm/${currentID}`;
        stream.play().catch(() => {});
        document.getElementById('playBtn').innerHTML = "⏸";

        loadContent();
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(loadContent, 10000);
    }

    function togglePlay() {
        if(stream.paused) { stream.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { stream.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function loadContent() {
        if(!currentID) return;
        try {
            const [st, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stTitle').innerText = st.display_name;
            document.getElementById('stDesc').innerText = st.description || "Keine Beschreibung.";
            document.getElementById('listenerCount').innerText = (listeners.includes('<') ? '0' : listeners) + " HÖRER LIVE";

            const overlay = document.getElementById('statusOverlay');
            overlay.style.display = "none";

            let html = '';
            songs.forEach((song, i) => {
                const isNow = i === 0;
                // Album Cover Logik: Priorität auf Song-Bild, sonst Station-Bild
                const cover = song.image_640x640 || st.images.station_640x640;
                let art = song.artist.name, tit = song.title, icon = "";
                const check = (art + tit).toLowerCase();

                // Logo-Erkennung
                if(check.includes("nachrichten") || check.includes("news")) {
                    icon = "📰"; if(isNow) { overlay.innerHTML = "📰"; overlay.style.display = "flex"; }
                } else if(check.includes("moderation") || check.includes("ident")) {
                    icon = "🎙️"; if(isNow) { overlay.innerHTML = "🎙️"; overlay.style.display = "flex"; }
                }

                if(isNow) document.getElementById('mainCover').src = cover;

                // Uhrzeit Formatierung (HH:MM)
                const playTime = song.started_at.split(' ')[1].substring(0,5);

                html += `
                    <div class="song-card ${isNow ? 'active' : ''}">
                        <div class="time-box">${playTime}</div>
                        <div class="icon-box">${icon}</div>
                        <div style="flex:1; overflow:hidden;">
                            <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:15px;">${art}</div>
                            <div style="font-size:13px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${tit}</div>
                        </div>
                        <img src="${cover}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch (e) {}
    }
</script>
</body>
</html>
