<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Ultimate v115.79 - Final Fix</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #007aff; --white: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; height: 100vh; display: flex; flex-direction: column; background: var(--panel); }
        
        /* HEADER MIT FORCE-SEARCH */
        .nav { height: 75px; display: flex; align-items: center; padding: 0 20px; background: #000; border-bottom: 3px solid var(--accent); gap: 15px; position: relative; z-index: 10000; }
        .search-wrap { position: relative; flex: 1; max-width: 600px; }
        
        #query { 
            width: 100%; background: #ffffff; border: 2px solid #ccc; border-radius: 12px; 
            padding: 14px 15px; color: #000; outline: none; font-size: 18px; font-weight: bold;
        }

        /* DIE ERGEBNISSE MÜSSEN SICHTBAR SEIN */
        #results { 
            position: absolute; top: 65px; left: 0; width: 100%; background: #ffffff; 
            border-radius: 12px; display: none; z-index: 99999; color: #333; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.9); max-height: 450px; overflow-y: auto; 
            border: 3px solid var(--accent);
        }
        .res-item { padding: 15px; border-bottom: 2px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .res-item:active { background: #e0eaff; }
        .res-item img { width: 50px; height: 50px; border-radius: 10px; border: 1px solid #ddd; }
        .res-item b { color: #000; font-size: 17px; }

        .main { flex: 1; display: flex; overflow: hidden; }
        .player-side { width: 420px; padding: 30px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
        
        .krenn-frame { width: 300px; height: 300px; border: 5px solid var(--accent); border-radius: 50px; padding: 7px; background: #000; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #mainCover { width: 100%; height: 100%; border-radius: 40px; object-fit: cover; }
        
        #playIcon { width: 90px; height: 90px; border-radius: 50%; background: var(--accent); border: none; font-size: 40px; color: white; cursor: pointer; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,122,255,0.5); }
        
        /* HÖRER INFO */
        #listenerBox { 
            background: #000; border: 1px solid var(--accent); color: var(--accent); 
            padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 15px; letter-spacing: 1px;
        }

        .list-side { flex: 1; overflow-y: auto; padding: 25px; }
        .song-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: #1c2128; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .song-card.active { border: 2px solid var(--accent); background: rgba(0,122,255,0.1); }

        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .player-side { width: 100%; border-right: none; padding: 15px; }
            .krenn-frame { width: 200px; height: 200px; }
        }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header class="nav">
        <div style="font-weight:900; color:var(--accent); font-size:24px;">STUDIO</div>
        <div class="search-wrap">
            <input type="text" id="query" placeholder="SENDER-NAME TIPPEN..." autocomplete="off">
            <div id="results"></div>
        </div>
    </header>

    <main class="main">
        <section class="player-side">
            <div class="krenn-frame">
                <img id="mainCover" src="https://api.laut.fm/station/default/images/station_640x640.png">
            </div>
            <button id="playIcon" onclick="toggleAudio()" disabled>▶</button>
            <h2 id="stationTitle" style="margin:0 0 10px 0; text-align: center;">BEREIT</h2>
            <div id="listenerBox">O HÖRER LIVE</div>
        </section>

        <section class="list-side" id="playlist">
            <div style="text-align:center; opacity:0.3; margin-top:50px;">Suche starten für Live-Playlist...</div>
        </section>
    </main>
</div>

<script>
    const stream = new Audio();
    let currentID = "";
    const input = document.getElementById('query');
    const resBox = document.getElementById('results');

    function init() {
        // Echtzeit-Suche beim Tippen
        input.addEventListener('input', async () => {
            const val = input.value.trim();
            if(val.length < 2) { resBox.style.display = 'none'; return; }
            
            try {
                const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(val)}`);
                const data = await r.json();
                
                if(data.items && data.items.length > 0) {
                    resBox.innerHTML = data.items.slice(0,10).map(st => `
                        <div class="res-item" onclick="selectStation('${st.name}')">
                            <img src="${st.images.station_80x80}">
                            <b>${st.display_name}</b>
                        </div>`).join('');
                    resBox.style.display = 'block';
                }
            } catch(e) { 
                console.log("Suche klemmt - Internet okay?"); 
            }
        });

        // Schließen wenn man außerhalb klickt
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrap')) resBox.style.display = 'none';
        });
    }

    async function selectStation(id) {
        currentID = id;
        resBox.style.display = 'none';
        input.value = "";
        document.getElementById('playIcon').disabled = false;
        
        // Stream laden (Werbung startet automatisch von laut.fm)
        stream.src = `https://stream.laut.fm/${currentID}`;
        stream.play().catch(e => { alert("Bitte Play-Button drücken!"); });
        document.getElementById('playIcon').innerHTML = "⏸";
        
        updateData();
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(updateData, 10000);
    }

    function toggleAudio() {
        if(stream.paused) { stream.play(); document.getElementById('playIcon').innerHTML = "⏸"; }
        else { stream.pause(); document.getElementById('playIcon').innerHTML = "▶"; }
    }

    async function updateData() {
        if(!currentID) return;
        try {
            const [st, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stationTitle').innerText = st.display_name;
            document.getElementById('listenerBox').innerText = (listeners.includes('<') ? '0' : listeners) + " HÖRER LIVE";
            
            let html = '';
            songs.forEach((song, i) => {
                const isNow = i === 0;
                const cover = song.image_640x640 || st.images.station_640x640;
                if(isNow) document.getElementById('mainCover').src = cover;
                html += `
                    <div class="song-card ${isNow ? 'active' : ''}">
                        <div style="width:40px; font-size:11px; font-weight:bold; color:var(--accent);">${song.started_at.split(' ')[1].substring(0,5)}</div>
                        <div style="flex:1; overflow:hidden;">
                            <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${song.artist.name}</div>
                            <div style="font-size:13px; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${song.title}</div>
                        </div>
                        <img src="${cover}" style="width:45px; height:45px; border-radius:10px;">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch (e) { }
    }
</script>
</body>
</html>
