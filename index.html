<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate Pro v39</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --surface: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px 20px; background: rgba(0,0,0,0.9); z-index: 100; }
        .search-box { display: flex; background: #1c1c1e; border-radius: 12px; padding: 10px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; font-size: 16px; }
        .uhr { text-align: center; font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }
        .content { flex: 1; overflow-y: auto; padding: 10px 20px 280px 20px; }
        .hero { background: var(--surface); border-radius: 25px; padding: 20px; text-align: center; border: 1px solid #222; margin-bottom: 20px; }
        #mainImg { width: 130px; height: 130px; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.6); margin-bottom: 15px; }
        #stName { font-size: 20px; font-weight: 800; margin-bottom: 5px; }
        #hoerer { font-size: 11px; color: var(--accent); font-weight: bold; }
        .now-card { background: #1c1c1e; border-radius: 18px; padding: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 25px; border-left: 4px solid var(--accent); }
        .live-dot { width: 8px; height: 8px; background: #ff3b30; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #curT { font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .h-item { background: #0d0d0d; padding: 12px; border-radius: 14px; display: flex; gap: 15px; margin-bottom: 8px; font-size: 13px; border: 1px solid #1a1a1a; }
        .h-time { color: var(--accent); font-weight: bold; font-family: monospace; }
        .dock { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(20,20,20,0.97); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 20px 25px 40px 25px; border-radius: 30px 30px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 6px; border-radius: 8px; margin-bottom: 15px; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 12px; font-weight: bold; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .controls { display: flex; align-items: center; gap: 20px; }
        #pBtn { width: 70px; height: 70px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); transition: 0.2s; }
        #pBtn.playing { background: var(--accent); transform: scale(1.05); }
        .vol-wrap { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); cursor: pointer; }
        #status { font-size: 9px; color: #666; text-align: center; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header>
        <div class="search-box">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') sync()">
            <span onclick="sync()" style="cursor:pointer; font-size: 22px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="content">
        <div class="hero">
            <img id="mainImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <div id="stName">RADIO PRO</div>
            <div id="hoerer">BEREIT</div>
        </div>
        <div class="now-card">
            <div class="live-dot"></div>
            <div id="curT">Sender wählen & Play...</div>
        </div>
        <div id="hList"></div>
    </div>

    <div class="dock">
        <div class="ticker"><div id="tText">+++ WILLKOMMEN BEI RADIO PRO +++</div></div>
        <div class="controls">
            <button id="pBtn" onclick="toggle()">▶</button>
            <div class="vol-wrap">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="status">Standby</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = new Audio(); // Globales Objekt sofort erstellen
    let slug = "";
    let updateTask = null;

    function init() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { audio.volume = e.target.value; };
    }

    async function sync() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        slug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // Browser-Unlock: Einmal kurz stumm anspielen
        audio.muted = true;
        audio.play().catch(()=>{});
        
        document.getElementById('status').innerText = "Lade Daten...";
        await load();
        if(updateTask) clearInterval(updateTask);
        updateTask = setInterval(load, 15000);
    }

    function toggle() {
        if(!slug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(audio.paused || audio.src === "") {
            st.innerText = "Verbinde...";
            audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
            audio.crossOrigin = "anonymous";
            audio.muted = false;
            audio.volume = document.getElementById('vRange').value;
            
            // Automatischer Start-Versuch Loop
            const playAttempt = () => {
                audio.play().then(() => {
                    btn.innerHTML = "⏸";
                    btn.classList.add('playing');
                    st.innerText = "Live";
                }).catch(() => {
                    // Falls blockiert, einfach direkt nochmal versuchen
                    setTimeout(playAttempt, 100);
                });
            };
            playAttempt();
        } else {
            audio.pause();
            audio.src = "";
            btn.innerHTML = "▶";
            btn.classList.remove('playing');
            st.innerText = "Gestoppt";
        }
    }

    async function load() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name.toUpperCase();
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " Hörer online";
            const track = l[0].artist.name + " - " + l[0].title;
            document.getElementById('curT').innerText = track;
            document.getElementById('tText').innerText = `+++ ${s.display_name.toUpperCase()}: ${track.toUpperCase()} +++`;
            
            let list = "";
            l.slice(1, 12).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                list += `<div class="h-item"><span class="h-time">${time}</span> <span><b>${song.artist.name}</b> ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = list;
        } catch(e) { document.getElementById('status').innerText = "Sender-Fehler"; }
    }
</script>
</body>
</html>
