<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Pro Studio v121.0</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0d1117; --panel: #161b22; --white: #f0f6fc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER & SEARCH */
        .header { height: 70px; background: #000; border-bottom: 3px solid var(--accent); display: flex; align-items: center; padding: 0 15px; gap: 15px; z-index: 10000; }
        #clock { font-weight: 900; color: var(--accent); font-size: 1.2rem; min-width: 90px; }
        
        .search-area { position: relative; flex: 1; max-width: 500px; }
        #query { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; background: #fff; color: #000; outline: none; }
        
        /* SUCH-ERGEBNISSE - JETZT STABIL */
        #results { 
            position: absolute; top: 55px; left: 0; width: 100%; background: #fff; 
            border-radius: 8px; color: #333; display: none; z-index: 99999; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); max-height: 350px; overflow-y: auto; border: 2px solid var(--accent);
        }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: bold; }
        .res-item:hover { background: #f0f7ff; }
        .res-item img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }

        /* LAYOUT */
        .main { flex: 1; display: flex; overflow: hidden; }
        .player-side { width: 380px; padding: 20px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #333; overflow-y: auto; text-align: center; }
        .history-side { flex: 1; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.3); }

        /* DISPLAY COMPONENTS */
        .display-box { width: 260px; height: 260px; border: 4px solid var(--accent); border-radius: 40px; background: #000; position: relative; margin-bottom: 15px; overflow: hidden; }
        #mainCover { width: 100%; height: 100%; object-fit: cover; }
        #studioIco { position: absolute; inset: 0; background: rgba(0,210,255,0.4); display: none; align-items: center; justify-content: center; font-size: 90px; backdrop-filter: blur(5px); }

        #playBtn { width: 75px; height: 75px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 35px; cursor: pointer; margin-bottom: 10px; }
        .stat-badge { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }

        .now-box { width: 100%; background: var(--panel); border-radius: 12px; padding: 15px; border-left: 5px solid var(--accent); text-align: left; }

        /* PLAYLIST */
        .song-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--panel); border-radius: 12px; margin-bottom: 8px; border: 1px solid #333; }
        .song-card.active { border-color: var(--accent); background: rgba(0,210,255,0.05); }
        .song-time { font-size: 11px; color: var(--accent); font-weight: bold; width: 45px; }
        .song-img { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; }

        @media (max-width: 850px) { .main { flex-direction: column; overflow-y: auto; } .player-side { width: 100%; border-right: none; height: auto; } .history-side { flex: none; height: auto; } }
    </style>
</head>
<body onload="init()">

<header class="header">
    <div id="clock">00:00:00</div>
    <div class="search-area">
        <input type="text" id="query" placeholder="Sender suchen..." oninput="doSearch()" autocomplete="off">
        <div id="results"></div>
    </div>
</header>

<main class="main">
    <section class="player-side">
        <div class="display-box">
            <img id="mainCover" src="https://api.laut.fm/station/default/images/station_640x640.png">
            <div id="studioIco"></div>
        </div>
        <button id="playBtn" onclick="togglePlay()" disabled>▶</button>
        <div id="lsn" class="stat-badge">OFFLINE</div>
        <h2 id="stTitle" style="margin:5px 0">BEREIT</h2>
        <div id="stBio" style="font-size:12px; color:#8b949e; margin-bottom:15px;">Tippe oben einen Sendernamen ein...</div>

        <div class="now-box">
            <small style="color:var(--accent); font-weight:bold; letter-spacing:1px;">AKTUELL IM SENDER:</small>
            <div id="curSong" style="font-weight:bold; margin-top:5px; font-size:1.1rem;">Kein Sender aktiv</div>
        </div>
    </section>

    <section class="history-side">
        <h4 style="color:var(--accent); margin-top:0; letter-spacing:1px;">SENDE-PROTOKOLL (LIVE)</h4>
        <div id="playlist"></div>
    </section>
</main>

<script>
    const stream = new Audio();
    let currentStation = "";
    // Dieser Proxy sorgt dafür, dass die Suche nicht blockiert wird
    const proxy = "https://api.allorigins.win/get?url=";

    function init() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);
        // Schließt Suche bei Klick außerhalb
        document.addEventListener('click', (e) => {
            if(!e.target.closest('.search-area')) document.getElementById('results').style.display = 'none';
        });
    }

    async function doSearch() {
        const q = document.getElementById('query').value.trim();
        const resBox = document.getElementById('results');
        if(q.length < 2) { resBox.style.display = 'none'; return; }
        
        try {
            const r = await fetch(proxy + encodeURIComponent(`https://api.laut.fm/search/stations?query=${q}`));
            const d = await r.json();
            const json = JSON.parse(d.contents);
            
            if(json.items && json.items.length > 0) {
                resBox.innerHTML = json.items.slice(0, 10).map(s => `
                    <div class="res-item" onclick="loadStation('${s.name}')">
                        <img src="${s.images.station_80x80}">
                        <span>${s.display_name}</span>
                    </div>`).join('');
                resBox.style.display = 'block';
            }
        } catch(e) { console.log("Suchfehler"); }
    }

    async function loadStation(name) {
        currentStation = name;
        document.getElementById('results').style.display = 'none';
        document.getElementById('query').value = "";
        
        stream.src = `https://stream.laut.fm/${name}`;
        stream.play().catch(() => alert("Bitte klicke einmal auf den Player für Ton!"));
        document.getElementById('playBtn').disabled = false;
        document.getElementById('playBtn').innerHTML = "⏸";
        
        refresh();
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(refresh, 10000);
    }

    function togglePlay() {
        if(stream.paused) { stream.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { stream.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function refresh() {
        if(!currentStation) return;
        try {
            const [stR, soR, liR] = await Promise.all([
                fetch(proxy + encodeURIComponent(`https://api.laut.fm/station/${currentStation}`)).then(r => r.json()),
                fetch(proxy + encodeURIComponent(`https://api.laut.fm/station/${currentStation}/last_songs`)).then(r => r.json()),
                fetch(proxy + encodeURIComponent(`https://api.laut.fm/station/${currentStation}/listeners`)).then(r => r.json())
            ]);

            const info = JSON.parse(stR.contents);
            const songs = JSON.parse(soR.contents);
            const listeners = liR.contents;

            document.getElementById('stTitle').innerText = info.display_name;
            document.getElementById('stBio').innerText = info.description || "";
            document.getElementById('lsn').innerText = (listeners || "0") + " HÖRER LIVE";

            const overlay = document.getElementById('studioIco');
            overlay.style.display = "none";

            let html = "";
            songs.forEach((s, i) => {
                const isNow = i === 0;
                const cover = s.image_640x640 || info.images.station_640x640;
                let ico = "";
                const check = (s.artist.name + s.title).toLowerCase();

                if(check.includes("nachrichten") || check.includes("news")) {
                    ico = "📰"; if(isNow) { overlay.innerText = "📰"; overlay.style.display = "flex"; }
                } else if(check.includes("moderation") || check.includes("ident")) {
                    ico = "🎙️"; if(isNow) { overlay.innerText = "🎙️"; overlay.style.display = "flex"; }
                }

                if(isNow) {
                    document.getElementById('mainCover').src = cover;
                    document.getElementById('curSong').innerText = s.artist.name + " - " + s.title;
                }

                html += `
                    <div class="song-card ${isNow ? 'active' : ''}">
                        <div class="song-time">${s.started_at.split(' ')[1].substring(0,5)}</div>
                        <div style="width:30px; font-size:20px;">${ico}</div>
                        <div style="flex:1; overflow:hidden;"><b>${s.artist.name}</b><br><small>${s.title}</small></div>
                        <img class="song-img" src="${cover}">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
