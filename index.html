<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Ultimate Pro</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #121212;
            --accent: #00d2ff;
            --text: #ffffff;
            --text-dim: #999999;
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* App Shell */
        .app {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            position: relative;
            background: var(--bg);
        }

        /* Header mit Glas-Effekt */
        header {
            padding: calc(var(--safe-top) + 15px) 20px 10px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .search-container {
            display: flex;
            background: #1c1c1e;
            border-radius: 12px;
            padding: 8px 12px;
            align-items: center;
            border: 1px solid #2c2c2e;
        }

        #sIn {
            background: transparent;
            border: none;
            color: #fff;
            flex: 1;
            font-size: 16px;
            padding: 5px;
        }

        .uhr {
            text-align: center;
            font-size: 11px;
            color: var(--accent);
            margin-top: 8px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        /* Content Area (Scrollable) */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px 280px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .hero-section {
            background: linear-gradient(180deg, #1c1c1e 0%, #000 100%);
            border-radius: 28px;
            padding: 25px 15px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid #2c2c2e;
        }

        #mainImg {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 12px 30px rgba(0,0,0,0.7);
            margin-bottom: 15px;
            background: #111;
        }

        #stName { font-size: 22px; font-weight: 800; margin-bottom: 5px; letter-spacing: -0.5px; }
        #hoerer { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; }

        .now-playing-card {
            background: #1c1c1e;
            border-radius: 18px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border-left: 5px solid var(--accent);
        }

        .live-indicator {
            background: #ff3b30;
            color: white;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #curT { font-size: 15px; font-weight: 600; flex: 1; color: #fff; }

        .history-label { font-size: 13px; color: var(--text-dim); font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

        .h-list { display: flex; flex-direction: column; gap: 10px; }
        .h-item {
            background: #1c1c1e;
            padding: 12px 15px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .h-time { color: var(--accent); font-family: monospace; font-weight: bold; font-size: 13px; }
        .h-info { font-size: 14px; line-height: 1.4; }
        .h-info b { display: block; color: #fff; }
        .h-info span { color: var(--text-dim); font-size: 13px; }

        /* Player Bottom Dock */
        .player-dock {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(28, 28, 30, 0.96);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid #333;
            padding: 20px 25px calc(25px + env(safe-area-inset-bottom)) 25px;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .ticker-container {
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
            padding: 6px;
            border-radius: 8px;
        }

        #tickerText {
            white-space: nowrap;
            display: inline-block;
            color: var(--accent);
            font-size: 12px;
            font-weight: 700;
            animation: slideText 15s linear infinite;
        }

        @keyframes slideText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #playBtn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: none;
            background: #ffffff;
            color: #000;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        #playBtn:active { transform: scale(0.9); }
        #playBtn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); }

        .volume-area { flex: 1; }
        #volRange {
            width: 100%;
            accent-color: var(--accent);
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
        }

        .status-msg {
            font-size: 10px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <header>
        <div class="search-container">
            <input type="text" id="sIn" placeholder="Sender Name (z.B. brian-2)" onkeydown="if(event.key==='Enter') startApp()">
            <span onclick="startApp()" style="cursor:pointer; font-size: 22px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="main-content">
        <div class="hero-section">
            <img id="mainImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
            <div id="stName">RADIO PRO</div>
            <div id="hoerer">WÄHLE DEINEN SENDER</div>
        </div>

        <div class="history-label">Aktuell</div>
        <div class="now-playing-card">
            <div class="live-indicator">LIVE</div>
            <div id="curT">Kein Stream ausgewählt</div>
        </div>

        <div class="history-label">Verlauf</div>
        <div id="hList" class="h-list">
            </div>
    </div>

    <div class="player-dock">
        <div class="ticker-container">
            <div id="tickerText">WILLKOMMEN ZUM ULTIMATIVEN RADIO ERLEBNIS +++</div>
        </div>
        <div class="player-controls">
            <button id="playBtn" onclick="togglePlay()">▶</button>
            <div class="volume-area">
                <input type="range" id="volRange" min="0" max="1" step="0.01" value="0.8">
                <div id="statusInfo" class="status-msg">Bereit</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let currentSlug = "";
    let autoUpdate = null;

    function initApp() {
        // Uhrzeit-Update
        setInterval(() => {
            document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);

        // Lautstärke-Update
        document.getElementById('volRange').oninput = (e) => {
            if(audio) audio.volume = e.target.value;
        };
    }

    async function startApp() {
        const val = document.getElementById('sIn').value;
        if(!val) return;
        currentSlug = val.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // Audio bei Suche "anwärmen"
        if(!audio) {
            audio = new Audio();
            audio.crossOrigin = "anonymous";
        }

        document.getElementById('statusInfo').innerText = "Verbindung wird aufgebaut...";
        await refreshStationData();
        
        if(autoUpdate) clearInterval(autoUpdate);
        autoUpdate = setInterval(refreshStationData, 15000);
    }

    function togglePlay() {
        if(!currentSlug) {
            document.getElementById('statusInfo').innerText = "Zuerst Sender suchen!";
            return;
        }

        const btn = document.getElementById('playBtn');
        const info = document.getElementById('statusInfo');

        if(!audio || audio.paused || audio.src === "") {
            info.innerText = "Stream wird gestartet...";
            
            // Neuer Stream-Link mit Zeitstempel gegen Cache-Probleme
            audio.src = `https://stream.laut.fm/${currentSlug}?t=${Date.now()}`;
            audio.volume = document.getElementById('volRange').value;
            
            // Der "Erzwingen"-Befehl
            audio.play().then(() => {
                btn.innerHTML = "⏸";
                btn.classList.add('active');
                info.innerText = "Live On Air";
                info.style.color = "var(--accent)";
            }).catch(e => {
                console.log("Autoplay blockiert");
                info.innerText = "Browser-Sperre! Klick nochmal!";
                info.style.color = "#ff3b30";
                // Sofortiger zweiter Versuch
                setTimeout(() => { if(audio) audio.play(); }, 150);
            });
        } else {
            audio.pause();
            audio.src = ""; // Verbindung kappen
            btn.innerHTML = "▶";
            btn.classList.remove('active');
            info.innerText = "Gestoppt";
            info.style.color = "var(--text-dim)";
        }
    }

    async function refreshStationData() {
        if(!currentSlug) return;
        try {
            const [station, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stName').innerText = station.display_name.toUpperCase();
            document.getElementById('mainImg').src = station.images.station_640x640;
            document.getElementById('hoerer').innerText = listeners + " Hörer online";
            
            const now = songs[0];
            const songTitle = now.artist.name + " - " + now.title;
            document.getElementById('curT').innerText = songTitle;
            
            document.getElementById('tickerText').innerText = 
                `+++ JETZT AUF ${station.display_name.toUpperCase()}: ${songTitle.toUpperCase()} +++ ALBUM: ${(now.album || "Single").toUpperCase()} +++`;

            let hHtml = "";
            songs.slice(1, 12).forEach(s => {
                const time = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                hHtml += `
                    <div class="h-item">
                        <div class="h-time">${time}</div>
                        <div class="h-info"><b>${s.artist.name}</b><span>${s.title}</span></div>
                    </div>`;
            });
            document.getElementById('hList').innerHTML = hHtml;
        } catch(err) {
            document.getElementById('statusInfo').innerText = "Fehler: Sender nicht gefunden";
        }
    }
</script>
</body>
</html>
