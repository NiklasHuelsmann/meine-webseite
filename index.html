<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Pro v124.0 - Logo & Cover</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0d1117; --panel: #161b22; --text: #f0f6fc; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .header { height: 70px; background: #000; border-bottom: 3px solid var(--accent); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
        #clock { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
        .search-area { flex: 1; position: relative; max-width: 450px; }
        #query { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 16px; outline: none; }
        
        #results { position: absolute; top: 55px; width: 100%; background: #fff; border-radius: 10px; color: #000; display: none; z-index: 2000; box-shadow: 0 10px 40px #000; max-height: 300px; overflow-y: auto; }
        .res-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* LAYOUT */
        .main { flex: 1; display: flex; overflow: hidden; }
        .player-side { width: 380px; padding: 20px; display: flex; flex-direction: column; align-items: center; border-right: 1px solid #333; overflow-y: auto; text-align: center; }
        .history-side { flex: 1; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }

        /* IMAGE DISPLAY */
        .cover-box { width: 270px; height: 270px; border: 4px solid var(--accent); border-radius: 40px; background: #000; position: relative; margin-bottom: 15px; overflow: hidden; }
        #mainImg { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s ease; }
        
        #playBtn { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 35px; cursor: pointer; margin-bottom: 10px; }
        .badge { background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }

        .info-box { width: 100%; text-align: left; background: var(--panel); padding: 15px; border-radius: 15px; border: 1px solid #333; }
        #stName { font-size: 1.5rem; font-weight: 900; color: var(--accent); margin: 0; }
        #stBio { font-size: 13px; color: #8b949e; margin: 8px 0; max-height: 60px; overflow: hidden; }

        /* PLAYLIST */
        .song-card { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--panel); border-radius: 15px; margin-bottom: 8px; border: 1px solid #333; }
        .song-card.active { border-color: var(--accent); background: rgba(0,210,255,0.05); }
        .song-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        @media (max-width: 800px) { .main { flex-direction: column; overflow-y: auto; } .player-side { width: 100%; border: none; } }
    </style>
</head>
<body onload="init()">

<header class="header">
    <div id="clock">00:00:00</div>
    <div class="search-area">
        <input type="text" id="query" placeholder="Sender suchen..." oninput="doSearch()" autocomplete="off">
        <div id="results"></div>
    </div>
</header>

<main class="main">
    <section class="player-side">
        <div class="cover-box">
            <img id="mainImg" src="https://api.laut.fm/station/default/images/station_640x640.png">
        </div>
        
        <button id="playBtn" onclick="toggle()" disabled>▶</button>
        <div id="lsn" class="badge">BEREIT</div>

        <div class="info-box">
            <h2 id="stName">STUDIO</h2>
            <div id="stBio">Wähle einen Sender aus der Suche.</div>
            <div style="border-top:1px solid #444; margin-top:10px; padding-top:10px;">
                <small style="color:var(--accent); font-weight:bold; font-size:10px;">AKTUELL:</small>
                <div id="curTitle" style="font-weight:bold; font-size:14px;">-</div>
            </div>
        </div>
    </section>

    <section class="history-side">
        <h3 style="color:var(--accent); margin-top:0;">SENDE-PROTOKOLL</h3>
        <div id="playlist"></div>
    </section>
</main>

<script>
    const audio = new Audio();
    let currentID = "";
    let stationLogo = ""; // Speichert das Sender-Logo als Backup

    function init() {
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
        }, 1000);
    }

    async function doSearch() {
        const q = document.getElementById('query').value;
        const res = document.getElementById('results');
        if(q.length < 2) { res.style.display = 'none'; return; }
        try {
            const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(q)}`);
            const d = await r.json();
            if(d.items) {
                res.innerHTML = d.items.slice(0, 10).map(s => `
                    <div class="res-item" onclick="load('${s.name}')">
                        <img src="${s.images.station_80x80}" width="35">
                        <b>${s.display_name}</b>
                    </div>`).join('');
                res.style.display = 'block';
            }
        } catch(e) {}
    }

    function load(id) {
        currentID = id;
        document.getElementById('results').style.display = 'none';
        document.getElementById('query').value = "";
        audio.src = `https://stream.laut.fm/${id}`;
        audio.play().catch(() => alert("Klicke Play!"));
        document.getElementById('playBtn').disabled = false;
        document.getElementById('playBtn').innerHTML = "⏸";
        refresh();
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(refresh, 10000);
    }

    function toggle() {
        if(audio.paused) { audio.play(); document.getElementById('playBtn').innerHTML = "⏸"; }
        else { audio.pause(); document.getElementById('playBtn').innerHTML = "▶"; }
    }

    async function refresh() {
        if(!currentID) return;
        try {
            const [info, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/listeners`).then(r => r.json())
            ]);

            stationLogo = info.images.station_640x640;
            document.getElementById('stName').innerText = info.display_name;
            document.getElementById('stBio').innerText = info.description || "";
            document.getElementById('lsn').innerText = (listeners || "0") + " HÖRER LIVE";

            let html = "";
            songs.forEach((s, i) => {
                const isNow = i === 0;
                
                // Logik: Nimm Song-Bild, wenn nicht da, nimm Sender-Logo
                const displayImg = s.image_640x640 ? s.image_640x640 : stationLogo;

                if(isNow) {
                    document.getElementById('mainImg').src = displayImg;
                    document.getElementById('curTitle').innerText = s.artist.name + " - " + s.title;
                }

                html += `
                    <div class="song-card ${isNow ? 'active' : ''}">
                        <div style="font-size:11px; color:var(--accent); font-weight:bold; width:45px;">
                            ${s.started_at.split(' ')[1].substring(0,5)}
                        </div>
                        <div style="flex:1;">
                            <b style="font-size:14px; display:block;">${s.artist.name}</b>
                            <span style="font-size:12px; color:#888;">${s.title}</span>
                        </div>
                        <img class="song-img" src="${displayImg}">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
