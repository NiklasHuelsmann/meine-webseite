<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub V27 (Bewerbung Status)</title>
    <style>
        :root { --sidebar-bg: #1a2634; --accent: #00d26a; --bg: #f5f7f9; --text-dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; }
        .fav-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        /* Main Layout */
        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 450px; gap: 20px; padding: 25px; padding-bottom: 110px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 404 / Deaktiviert Screen - Erscheint bei Feierabend Radio solange Bewerbung läuft */
        #errorOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; text-align:center; padding: 20px; }
        .error-code { font-size: 5rem; font-weight: 800; color: #f2f2f2; margin: 0; }
        .btn-retry { margin-top: 20px; padding: 10px 20px; background: var(--sidebar-bg); color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* Listen-Stil */
        .list-container { flex: 1; overflow-y: auto; }
        .list-entry { display: flex; padding: 14px 0; border-bottom: 1px solid #f2f2f2; align-items: center; }
        .list-time { width: 70px; font-weight: 800; color: #666; font-size: 0.9rem; }
        .list-content b { display: block; font-size: 1rem; color: #333; }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: white; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 40px; }
        .player-center { flex: 1; text-align: center; }
        .btn-play { background: var(--accent); color: white; border: none; padding: 12px 45px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);">Radio Hub V27</h2>
    <div id="favList"></div>
</div>

<div class="main-layout">
    <div class="card" id="stationCard">
        <div id="errorOverlay">
            <p class="error-code">404</p>
            <h3 id="errorTitle">Sender offline</h3>
            <p id="errorMsg" style="color:#888;">Dieser Sender ist noch in der Bewerbungsphase oder wurde deaktiviert.</p>
            <button class="btn-retry" onclick="loadStation('test-station-fm')">Hauptsender laden</button>
        </div>

        <div style="display:flex; align-items:center; margin-bottom:20px;">
            <img id="miniLogo" src="" style="width:50px; height:50px; border-radius:5px; margin-right:15px;">
            <h1 id="stationName" style="font-size:1.4rem; margin:0;">Lade...</h1>
        </div>

        <div style="text-align:center;">
            <img id="displayCover" src="" style="width:250px; height:250px; border-radius:12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom:15px;">
            <div style="background:#fcfcfc; padding:15px; border-radius:10px; border:1px solid #eee; text-align:left;">
                <div id="startTime" style="font-weight:bold; color:var(--accent);">--:--</div>
                <b id="liveArtist" style="font-size:1.2rem; display:block;">Interpret</b>
                <span id="liveTitle" style="color:#666;">Titel</span>
            </div>
        </div>

        <div style="margin-top:auto; padding-top:20px; display:flex; justify-content:space-between; font-size:0.9rem; color:#777;">
            <span>👥 Hörer: <b id="listeners" style="color:#000;">0</b></span>
            <span style="color:var(--accent); font-weight:bold;">● ONLINE</span>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:flex-end; gap:15px; margin-bottom:15px;">
            <button id="tabS" onclick="setMode('songs')" style="cursor:pointer; border:none; background:none; font-weight:bold; color:var(--accent);">VERLAUF</button>
            <button id="tabP" onclick="setMode('plan')" style="cursor:pointer; border:none; background:none; font-weight:bold; color:#999;">SENDEPLAN</button>
        </div>
        <div id="dayBar" style="display:none; gap:10px; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:10px;"></div>
        <div id="listView" class="list-container"></div>
    </div>
</div>

<div class="player-bar">
    <div style="width:300px; display:flex; align-items:center;">
        <img id="barCover" src="" style="width:50px; height:50px; border-radius:5px; margin-right:12px;">
        <div style="overflow:hidden;"><b id="barArtist" style="display:block; white-space:nowrap;">Bereit</b></div>
    </div>
    <div class="player-center">
        <button id="pToggle" class="btn-play" onclick="handlePlay()">STARTEN</button>
    </div>
    <div style="width:300px; text-align:right;">
        <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="audio.volume=this.value" style="accent-color:var(--accent);">
    </div>
</div>

<audio id="audio"></audio>

<script>
    let currentSlug = localStorage.getItem('it_hub_last') || "test-station-fm";
    let viewMode = "songs";
    let selectedDay = new Date().toLocaleDateString('de-DE', {weekday: 'long'}).toLowerCase();
    const favs = ["test-station-fm", "simulator4", "brian-radio", "feierabend-radio"];
    const audio = document.getElementById('audio');

    async function update() {
        try {
            // Erst prüfen, ob der Sender überhaupt existiert
            const stationRes = await fetch(`https://api.laut.fm/station/${currentSlug}`);
            
            if (!stationRes.ok) {
                document.getElementById('errorOverlay').style.display = "flex";
                if(currentSlug === "feierabend-radio") {
                    document.getElementById('errorTitle').innerText = "Bewerbung läuft";
                    document.getElementById('errorMsg').innerText = "Feierabend Radio ist noch nicht aktiv. Bitte warte auf die Bestätigungs-E-Mail von laut.fm.";
                } else {
                    document.getElementById('errorTitle').innerText = "Sender nicht gefunden";
                    document.getElementById('errorMsg').innerText = "Dieser Sender existiert nicht oder wurde deaktiviert.";
                }
                return;
            }

            document.getElementById('errorOverlay').style.display = "none";
            
            const [cRes, lRes, scRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}/current_song`),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`),
                fetch(`https://api.laut.fm/station/${currentSlug}/schedule`)
            ]);
            
            const station = await stationRes.json();
            const song = await cRes.json();
            const history = await lRes.json();
            const schedule = await scRes.json();

            document.getElementById('stationName').innerText = station.display_name;
            document.getElementById('miniLogo').src = station.images.station_120x120;
            document.getElementById('displayCover').src = station.images.station_640x640;
            document.getElementById('barCover').src = station.images.station_120x120;
            document.getElementById('listeners').innerText = station.current_listeners;
            document.getElementById('liveArtist').innerText = song.artist.name;
            document.getElementById('liveTitle').innerText = song.title;
            document.getElementById('barArtist').innerText = song.artist.name;
            document.getElementById('startTime').innerText = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

            document.getElementById('tabP').style.display = (schedule.length > 0) ? "block" : "none";
            renderList(viewMode === "songs" ? history : schedule);

        } catch(e) { console.error("API Fehler"); }
    }

    function renderList(data) {
        const view = document.getElementById('listView');
        view.innerHTML = "";
        if(viewMode === "songs") {
            view.innerHTML = data.slice(0, 8).map(i => `
                <div class="list-entry">
                    <div class="list-time">${new Date(i.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div class="list-content"><b>${i.artist.name}</b><span style="color:#888; font-size:0.85rem;">${i.title}</span></div>
                </div>
            `).join('');
        } else {
            // Sendeplan Logik (einfach gehalten)
            const dayData = data.filter(e => e.day === selectedDay);
            view.innerHTML = dayData.map(item => `<div class="list-entry"><div class="list-time">${item.hour}:00</div><div><b>${item.name}</b></div></div>`).join('');
        }
    }

    function loadStation(slug) {
        currentSlug = slug;
        localStorage.setItem('it_hub_last', slug);
        update();
    }

    function handlePlay() {
        if(audio.paused) { audio.src = `https://stream.laut.fm/${currentSlug}`; audio.play(); document.getElementById('pToggle').innerText="STOPP"; }
        else { audio.pause(); document.getElementById('pToggle').innerText="STARTEN"; }
    }

    function setMode(m) { viewMode = m; update(); }

    function renderFavs() {
        document.getElementById('favList').innerHTML = favs.map(f => `
            <div class="fav-item" onclick="loadStation('${f}')">
                <img src="https://api.laut.fm/station/${f}/images/station_120x120" style="width:35px; border-radius:4px;">
                <span>${f}</span>
            </div>
        `).join('');
    }

    window.onload = () => { renderFavs(); update(); };
    setInterval(update, 20000);
</script>
</body>
</html>
