<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.37</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #cbd5e0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #0d111a; margin: 0; height: 100vh; 
            color: var(--text-main); font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        
        /* Die Haupt-App-Hülle */
        .app { 
            width: 100%; max-width: 100%; height: 100vh; 
            background-color: var(--bg-app); display: flex; flex-direction: column; 
            position: relative; transition: all 0.3s ease;
        }

        /* TOP BAR (Uhr & Suche) */
        .top-bar { 
            height: 50px; display: flex; align-items: center; justify-content: flex-end; 
            padding: 0 20px; gap: 20px; flex-shrink: 0; z-index: 100;
        }
        #sysTime { font-size: 14px; font-weight: 800; letter-spacing: 1px; }
        .search-trigger { cursor: pointer; font-size: 20px; transition: transform 0.2s; }
        .search-trigger:hover { transform: scale(1.1); }

        /* Das Layout-Herzstück */
        .main-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* HERO BEREICH (Logo & Player) */
        .hero { 
            padding: 10px 0 20px; text-align: center; flex-shrink: 0; 
            display: flex; flex-direction: column; align-items: center;
        }
        #stNameHeader { font-size: 24px; font-weight: 900; margin: 0 0 15px; text-transform: uppercase; color: var(--accent-main); letter-spacing: 2px; }
        #mainImg { width: 170px; height: 170px; border-radius: 20px; object-fit: cover; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); }
        
        .controls { margin: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #pBtn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 26px; cursor: pointer; color: #1e2538; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0, 250, 217, 0.4); }
        .hoerer-badge { background: rgba(0,250,217,0.1); color: var(--accent-main); padding: 5px 18px; border-radius: 20px; font-size: 12px; font-weight: 800; border: 1px solid var(--accent-main); }

        /* LISTE */
        .list-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .list-header { font-size: 13px; font-weight: 900; color: var(--accent-main); margin: 10px 20px; text-transform: uppercase; opacity: 0.8; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 0 15px; scrollbar-width: none; }
        .scroll-content::-webkit-scrollbar { display: none; }
        
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.02); transition: background 0.2s; }
        .track-entry.current { border-left: 5px solid var(--accent-main); background: rgba(255,255,255,0.08); }
        .status-icon { width: 30px; font-size: 20px; display: flex; justify-content: center; flex-shrink: 0; }
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 14px; font-weight: bold; color: #fff; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track-tit { font-size: 12px; color: var(--text-dim); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .track-meta { font-size: 10px; opacity: 0.4; margin-top: 4px; display: block; }
        .track-cover { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #000; flex-shrink: 0; }

        #btnMore { background: transparent; border: 1px solid var(--accent-main); color: var(--accent-main); padding: 8px 25px; border-radius: 20px; font-size: 11px; font-weight: 800; cursor: pointer; margin: 15px auto; display: none; text-transform: uppercase; }

        /* FOOTER (Webseiten-Stil) */
        .fixed-footer { padding: 15px; background: #111622; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }
        #footerDesc { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .version-tag { font-size: 11px; font-weight: 900; opacity: 0.3; letter-spacing: 4px; }

        /* SUCHE OVERLAY */
        #searchOverlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 350px; height: 50px; background: var(--bg-card); z-index: 1000; display: none; align-items: center; padding: 0 15px; border-radius: 25px; border: 2px solid var(--accent-main); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }

        /* >>> DER WEBSEITEN-LOOK (für Computer) <<< */
        @media (min-width: 850px) {
            .app { width: 95%; max-width: 1100px; height: 85vh; border-radius: 30px; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.9); }
            .main-layout { flex-direction: row; }
            .hero { width: 40%; justify-content: center; border-right: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.1); padding: 40px; }
            .list-container { width: 60%; padding: 20px; }
            #mainImg { width: 280px; height: 280px; }
            #stNameHeader { font-size: 32px; }
            .list-header { font-size: 15px; margin-left: 5px; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer;">✕</button>
    </div>

    <div class="top-bar">
        <div id="sysTime">00:00</div>
        <div class="search-trigger" onclick="toggleSearch()">🔍</div>
    </div>

    <div class="main-layout">
        <div class="hero">
            <h1 id="stNameHeader">RADIO</h1>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
        </div>

        <div class="list-container">
            <div class="list-header">PROGRAMM & VERLAUF</div>
            <div class="scroll-content" id="trackList"></div>
            <button id="btnMore" onclick="toggleMore()">MEHR ANZEIGEN</button>
        </div>
    </div>

    <div class="fixed-footer">
        <div id="footerDesc">Wähle deinen Lieblingssender über die Suche...</div>
        <div class="version-tag">V115.37</div>
    </div>
</div>

<script>
    const au = new Audio(); 
    let currentSlug = ""; 
    let limit = 4;

    function initApp() { 
        setInterval(() => { 
            document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
        }, 1000); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        if(s.style.display === 'flex') document.getElementById('sInput').focus();
    }
    
    function execSearch() { 
        const val = document.getElementById('sInput').value.trim();
        if(val) { startStation(val, true); toggleSearch(); document.getElementById('sInput').value=""; } 
    }

    function toggleMore() {
        limit = (limit === 4) ? 9 : 4;
        document.getElementById('btnMore').innerText = (limit === 4) ? "MEHR ANZEIGEN" : "WENIGER ANZEIGEN";
        updateUI();
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnMore').style.display = 'block';
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { 
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json())
            ]);
            const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/listeners`);
            const hCount = await hRes.text();

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('footerDesc').innerText = s.description || "Live";
            document.getElementById('hoerer').innerText = (hCount.includes("<") ? "0" : hCount) + " HÖRER";

            let html = "";
            l.forEach((song, i) => {
                if(i >= limit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const fullText = (art + " " + tit).toLowerCase();
                let albumImg = song.image_640x640 || song.image_170x170 || s.images.station_640x640;
                
                if(isCurrent) document.getElementById('mainImg').src = albumImg;
                const startTime = new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
                
                // Intelligente Icon-Wahl
                let icon = isCurrent ? "🔊" : "";
                if(song.type === "ads" || fullText.includes("reklame") || fullText.includes("ad-trigger")) {
                    icon = "📢"; art = "WERBUNG";
                } else if(fullText.includes("nachrichten") || fullText.includes("news")) {
                    icon = "📰"; art = "NACHRICHTEN";
                } else if(art.toLowerCase().includes("moderation") || fullText.includes("station ident")) {
                    icon = "🎙️";
                }

                html += `<div class="track-entry ${isCurrent ? 'current' : ''}">
                    <div class="status-icon">${icon}</div>
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                        <span class="track-meta">${startTime} Uhr</span>
                    </div>
                    <img class="track-cover" src="${albumImg}">
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
