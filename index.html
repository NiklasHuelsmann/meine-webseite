<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v34.0 - Instant Start</title>
    <style>
        :root {
            --bg: #000;
            --surface: #121212;
            --accent: #00d2ff;
            --text: #fff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden;
        }
        .app-shell { width: 100%; max-width: 414px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 15px; background: #000; }
        .search-box { 
            display: flex; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; 
        }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; }
        .uhr { text-align: center; font-size: 11px; color: var(--accent); margin-top: 8px; font-weight: bold; letter-spacing: 1px; }

        .main-content { flex: 1; overflow-y: auto; padding: 10px 15px 240px 15px; text-align: center; }
        
        /* Kompakt-Modus für Smartphone */
        .hero { background: var(--surface); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        #mainImg { width: 120px; height: 120px; border-radius: 12px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-bottom: 10px; }
        #stName { font-size: 18px; font-weight: bold; margin-bottom: 2px; }
        #hoerer { font-size: 10px; color: var(--accent); font-weight: bold; text-transform: uppercase; }

        .now-card { 
            background: #1a1a1a; border-radius: 12px; padding: 10px; display: flex; align-items: center; 
            gap: 10px; margin-bottom: 15px; border-left: 3px solid var(--accent);
        }
        .tag { background: var(--accent); color: #000; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 3px; }
        #curT { font-size: 13px; font-weight: 600; text-align: left; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .h-list { display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .h-item { background: #080808; padding: 8px 12px; border-radius: 10px; display: flex; gap: 10px; font-size: 12px; border: 1px solid #111; }
        .h-time { color: var(--accent); font-weight: bold; font-family: monospace; }
        
        /* Player Steuerung */
        .player-bar { 
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 20px 35px 20px; border-top: 1px solid #222; border-radius: 20px 20px 0 0;
        }
        .ticker { overflow: hidden; background: #000; padding: 5px; border-radius: 4px; margin-bottom: 12px; }
        #tickerText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 11px; animation: scroll 12s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .btns { display: flex; align-items: center; gap: 15px; }
        .pBtn { 
            width: 65px; height: 65px; border-radius: 50%; border: none; background: #fff; 
            color: #000; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .pBtn.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .vol { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); }
        #msg { font-size: 9px; color: #777; text-align: center; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body onload="startClock()">

<div class="app-shell">
    <header>
        <div class="search-box">
            <input type="text" id="sIn" placeholder="Sender Name..." onkeydown="if(event.key==='Enter') search()">
            <span onclick="search()" style="cursor:pointer; font-size: 20px;">🔍</span>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="main-content">
        <div class="hero">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div id="stName">RADIO START</div>
            <div id="hoerer">Bereit</div>
        </div>

        <div class="now-card">
            <div class="tag">JETZT</div>
            <div id="curT">Sender suchen...</div>
        </div>

        <div class="h-list" id="hList"></div>
    </div>

    <div class="player-bar">
        <div class="ticker"><div id="tickerText">WILLKOMMEN BEI RADIO ULTIMATE +++</div></div>
        <div class="btns">
            <button id="pBtn" class="pBtn" onclick="playNow()">▶</button>
            <div class="vol">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="msg">SYSTEM BEREIT</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = null;
    let stationSlug = "";
    let updater = null;

    function startClock() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);
        document.getElementById('vRange').oninput = (e) => { if(audio) audio.volume = e.target.value; };
    }

    async function search() {
        const input = document.getElementById('sIn').value;
        if(!input) return;
        stationSlug = input.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        // VOR-AKTIVIERUNG (Audio-Priming)
        if(!audio) {
            audio = new Audio();
            audio.muted = true; // Erstmal stumm, um Browser zu beruhigen
            audio.play().catch(() => {}); 
        }

        document.getElementById('msg').innerText = "Lade Daten...";
        await updateData();
        if(updater) clearInterval(updater);
        updater = setInterval(updateData, 15000);
    }

    function playNow() {
        if(!stationSlug) { document.getElementById('msg').innerText = "Zuerst suchen!"; return; }

        if(!audio || audio.paused || audio.src === "") {
            // SOFORTIGER START OHNE UMWEGE
            if(!audio) audio = new Audio();
            audio.src = `https://stream.laut.fm/${stationSlug}?t=${Date.now()}`;
            audio.crossOrigin = "anonymous";
            audio.volume = document.getElementById('vRange').value;
            audio.muted = false; // Stummschaltung aufheben
            
            audio.play().then(() => {
                document.getElementById('pBtn').innerHTML = "⏸";
                document.getElementById('pBtn').classList.add('active');
                document.getElementById('msg').innerText = "LIVE-TON AKTIV";
            }).catch(() => {
                // Fallback für hartnäckige Browser
                document.getElementById('msg').innerText = "KLICK NOCHMAL (BROWSER-LOCK)";
            });
        } else {
            audio.pause();
            audio.src = ""; // Verbindung kappen
            document.getElementById('pBtn').innerHTML = "▶";
            document.getElementById('pBtn').classList.remove('active');
            document.getElementById('msg').innerText = "STOPP";
        }
    }

    async function updateData() {
        if(!stationSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${stationSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${stationSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${stationSlug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " Hörer aktuell";
            const cur = l[0];
            document.getElementById('curT').innerText = cur.artist.name + " - " + cur.title;
            document.getElementById('tickerText').innerText = `+++ ${s.display_name.toUpperCase()} spielt: ${cur.artist.name.toUpperCase()} - ${cur.title.toUpperCase()} +++`;
            
            let html = "";
            l.slice(1, 8).forEach(song => {
                const t = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${t}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) { document.getElementById('msg').innerText = "Fehler beim Laden"; }
    }
</script>
</body>
</html>
