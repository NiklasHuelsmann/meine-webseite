<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas' Eigener Radio-Player</title>
    <style>
        /* Dein ganz eigenes Farbschema und Design */
        :root { --main-color: #6366f1; --accent: #8b5cf6; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; }

        /* Suchbereich - Eigenes Design */
        .search-area { max-width: 800px; margin: 0 auto 40px; background: var(--card-bg); padding: 10px; border-radius: 100px; display: flex; border: 2px solid #334155; }
        .search-area input { flex: 1; background: transparent; border: none; padding: 10px 20px; color: white; outline: none; }
        .search-area button { background: var(--main-color); color: white; border: none; padding: 10px 25px; border-radius: 100px; cursor: pointer; font-weight: bold; }

        .player-wrapper { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 380px; gap: 30px; }

        /* Linke Seite: Das runde Display-Konzept */
        .display-unit { background: var(--card-bg); border-radius: 40px; padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .my-station-logo { width: 180px; height: 180px; border-radius: 50%; border: 5px solid var(--main-color); margin-bottom: 20px; object-fit: cover; }
        
        /* Dein spezielles "Jetzt läuft" Display */
        .now-playing-box { background: rgba(0,0,0,0.2); border-radius: 30px; padding: 30px; border: 1px dashed var(--accent); margin: 25px 0; }
        .artist-title { font-size: 1.8rem; font-weight: 900; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .song-name { font-size: 1.2rem; display: block; margin-top: 10px; color: #94a3b8; }

        /* Steuerung: Startknopf & Regler */
        .controls { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .play-trigger { width: 90px; height: 90px; border-radius: 50%; background: var(--main-color); border: none; color: white; font-size: 2rem; cursor: pointer; transition: 0.3s; }
        .play-trigger:hover { transform: scale(1.1); background: var(--accent); }
        .vol-slider { width: 250px; accent-color: var(--main-color); height: 8px; border-radius: 5px; cursor: pointer; }

        /* Rechte Seite: Sendeplan & Songs Switch */
        .info-sidebar { background: var(--card-bg); border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #334155; }
        .switch-header { display: flex; background: rgba(0,0,0,0.2); }
        .tab { flex: 1; padding: 15px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-weight: bold; }
        .tab.active { color: white; background: var(--main-color); }

        .list-container { flex: 1; padding: 20px; overflow-y: auto; max-height: 500px; }
        .list-entry { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #334155; align-items: flex-start; }
        .entry-clock { font-family: monospace; color: var(--accent); font-weight: bold; }
        .entry-details b { display: block; font-size: 0.95rem; }
        .entry-details span { font-size: 0.85rem; color: #94a3b8; }

        .listener-info { font-size: 0.8rem; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="search-area">
        <input type="text" id="stationInput" placeholder="Sender suchen...">
        <button onclick="startMyRadio()">Sender laden</button>
    </div>

    <div id="playerMain" class="player-wrapper" style="display:none;">
        <!-- Links: Player & Display -->
        <div class="display-unit">
            <img id="logo" class="my-station-logo" src="">
            <h1 id="title" style="margin:0;">Radiostation</h1>
            <div id="listeners" class="listener-info">Hörer: 0</div>

            <div class="now-playing-box">
                <span id="curArtist" class="artist-title">Interpret</span>
                <span id="curSong" class="song-name">Titel</span>
            </div>

            <div class="controls">
                <button id="pBtn" class="play-trigger" onclick="toggle()">▶</button>
                <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.5" oninput="setV(this.value)">
            </div>
        </div>

        <!-- Rechts: Umschaltbarer Bereich -->
        <div class="info-sidebar">
            <div class="switch-header">
                <button class="tab active" id="btnSongs" onclick="setView('songs')">Letzte Songs</button>
                <button class="tab" id="btnPlan" onclick="setView('plan')">Sendeplan</button>
            </div>
            <div class="list-container" id="list">
                <!-- Hier erscheinen die Infos -->
            </div>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        let slug = "";
        let mode = "songs";
        const audio = document.getElementById('player');

        function setView(m) {
            mode = m;
            document.getElementById('btnSongs').classList.toggle('active', m === 'songs');
            document.getElementById('btnPlan').classList.toggle('active', m === 'plan');
            refreshData();
        }

        async function startMyRadio() {
            slug = document.getElementById('stationInput').value.toLowerCase().trim();
            if(!slug) return;
            document.getElementById('playerMain').style.display = "grid";
            audio.src = `https://stream.laut.fm/${slug}`;
            audio.play();
            document.getElementById('pBtn').innerText = "⏸";
            refreshData();
            setInterval(refreshData, 15000);
        }

        async function refreshData() {
            if(!slug) return;
            try {
                const sRes = await fetch(`https://api.laut.fm/station/${slug}`);
                const sData = await sRes.json();
                document.getElementById('logo').src = sData.images.station_640x640;
                document.getElementById('title').innerText = sData.display_name;
                document.getElementById('listeners').innerText = `Hörer aktuell: ${sData.current_listeners}`;

                const cRes = await fetch(`https://api.laut.fm/station/${slug}/current_song`);
                const cData = await cRes.json();
                document.getElementById('curArtist').innerText = cData.artist.name;
                document.getElementById('curSong').innerText = cData.title;

                const list = document.getElementById('list');
                list.innerHTML = "";

                if(mode === 'songs') {
                    const hRes = await fetch(`https://api.laut.fm/station/${slug}/last_songs`);
                    const hData = await hRes.json();
                    hData.forEach(s => {
                        const time = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        list.innerHTML += `<div class="list-entry"><div class="entry-clock">${time}</div><div class="entry-details"><b>${s.artist.name}</b><span>${s.title}</span></div></div>`;
                    });
                } else {
                    const pRes = await fetch(`https://api.laut.fm/station/${slug}/schedule`);
                    const pData = await pRes.json();
                    pData.forEach(p => {
                        list.innerHTML += `<div class="list-entry"><div class="entry-clock">${p.start_time}</div><div class="entry-details"><b>${p.name}</b><span>Sendung</span></div></div>`;
                    });
                }
            } catch(e) {}
        }

        function toggle() { if(audio.paused) { audio.play(); document.getElementById('pBtn').innerText="⏸"; } else { audio.pause(); document.getElementById('pBtn').innerText="▶"; } }
        function setV(v) { audio.volume = v; }
    </script>
</body>
</html>
