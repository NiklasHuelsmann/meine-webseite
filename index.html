<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v61</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        header { padding: 15px; background: #000; border-bottom: 1px solid #222; }
        .clock { text-align: center; color: var(--accent); font-family: monospace; font-size: 18px; margin-bottom: 10px; }
        .search-box { display: flex; background: #1a1a1c; border-radius: 12px; padding: 5px 15px; border: 2px solid #333; }
        input[type=text] { background: transparent; border: none; color: #fff; flex: 1; height: 45px; font-size: 16px; }
        
        .main { flex: 1; overflow-y: auto; padding: 20px; text-align: center; }
        /* Firefox Mobile Fix: Bild-Container erzwingen */
        #mainImg { width: 180px; height: 180px; border-radius: 25px; object-fit: cover; border: 2px solid #333; margin-bottom: 15px; display: inline-block !important; min-height: 180px; min-width: 180px; background: #111; }
        
        #hoerer { font-size: 12px; color: var(--accent); font-weight: bold; margin-bottom: 20px; }
        .song-box { background: #1a1a1c; border-radius: 15px; padding: 15px; text-align: left; border-left: 5px solid var(--accent); margin-bottom: 20px; }
        .song-time { font-size: 11px; color: var(--accent); font-weight: bold; display: block; margin-bottom: 5px; }
        #curT { font-weight: bold; font-size: 16px; display: block; }
        .h-item { background: #0d0d0d; padding: 12px; border-radius: 10px; display: flex; gap: 15px; margin-bottom: 8px; font-size: 13px; border: 1px solid #1a1a1a; text-align: left; }
        .h-time { color: var(--accent); font-weight: bold; }
        
        .dock { background: #0f0f0f; border-top: 1px solid #333; padding: 20px 25px 40px; border-radius: 25px 25px 0 0; }
        .p-row { display: flex; align-items: center; gap: 20px; }
        #pBtn { width: 70px; height: 70px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 30px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .vol-area { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .vol-label-row { display: flex; justify-content: space-between; align-items: center; }
        .vol-text { font-size: 10px; color: #666; font-weight: bold; text-transform: uppercase; }
        #volPerc { font-size: 12px; color: var(--accent); font-weight: bold; font-family: monospace; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #222; border-radius: 4px; border: 1px solid #333; }
        input[type=range]::-webkit-slider-thumb { height: 20px; width: 20px; border-radius: 50%; background: #fff; cursor: pointer; -webkit-appearance: none; margin-top: -7px; border: 2px solid var(--accent); }
        #status { font-size: 9px; color: #444; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="uhr" class="clock">00:00:00</div>
        <div class="search-box">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') playRadio()">
            <button onclick="playRadio()" style="background:none; border:none; color:var(--accent); font-size:22px; cursor:pointer;">🔍</button>
        </div>
    </header>

    <div class="main">
        <img id="mainImg" src="https://laut.fm/images/station_640x640.png" alt="Radio Logo">
        <h2 id="stName" style="margin:0 0 5px 0;">RADIO PRO</h2>
        <div id="hoerer">BEREIT</div>
        <div class="song-box">
            <span id="stTime" class="song-time">GESTARTET: --:--</span>
            <span id="curT">Sender eingeben...</span>
        </div>
        <div id="hList"></div>
    </div>

    <div class="dock">
        <div class="p-row">
            <button id="pBtn" onclick="toggle()">▶</button>
            <div class="vol-area">
                <div class="vol-label-row">
                    <span class="vol-text">Volume</span>
                    <span id="volPerc">80%</span>
                </div>
                <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
                <div id="status">Standby</div>
            </div>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    let currentSlug = "";
    let dataJob = null;

    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    const volSlider = document.getElementById('vol');
    const volDisplay = document.getElementById('volPerc');
    volSlider.oninput = (e) => { 
        const v = e.target.value;
        au.volume = v; 
        volDisplay.innerText = Math.round(v * 100) + "%";
    };

    function playRadio() {
        const inputVal = document.getElementById('sIn').value;
        if(!inputVal) return;
        currentSlug = inputVal.toLowerCase().trim().replace(/[^a-z0-9-]/g, '');
        
        au.src = "https://stream.laut.fm/" + currentSlug;
        au.play().then(() => {
            document.getElementById('pBtn').innerHTML = "⏸";
            document.getElementById('status').innerText = "LIVE AKTIV";
        }).catch(() => {
            document.getElementById('status').innerText = "BITTE PLAY DRÜCKEN";
        });
        
        updateUI();
        if(dataJob) clearInterval(dataJob);
        dataJob = setInterval(updateUI, 15000);
        document.activeElement.blur();
    }

    function toggle() {
        if(!currentSlug) return;
        if(au.paused) {
            au.src = "https://stream.laut.fm/" + currentSlug + "?t=" + Date.now();
            au.play();
            document.getElementById('pBtn').innerHTML = "⏸";
        } else {
            au.pause();
            au.src = ""; 
            document.getElementById('pBtn').innerHTML = "▶";
        }
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/listeners").then(r => r.text())
            ]);
            
            document.getElementById('stName').innerText = s.display_name;
            
            // Firefox Fix: URL säubern und Zeitstempel anhängen, um Cache zu umgehen
            let rawImg = s.images.station_640x640;
            let secureImg = rawImg.replace('http://', 'https://');
            // Wir fügen einen ?v=... Parameter an, damit Firefox das Bild neu lädt
            document.getElementById('mainImg').src = secureImg + "?v=" + new Date().getTime();
            
            document.getElementById('hoerer').innerText = h + " PERSONEN LIVE";
            const startStr = new Date(l[0].started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('stTime').innerText = "GESTARTET UM " + startStr + " UHR";
            document.getElementById('curT').innerText = l[0].artist.name + " - " + l[0].title;
            
            let html = "";
            l.slice(1, 7).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${time}</span> <span><b>${song.artist.name}</b> - ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) { console.log("Fehler beim Laden der Daten."); }
    }
</script>
</body>
</html>
