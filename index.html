<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Radio Pro v43 - Firefox Fix</title>
    <style>
        :root { --bg: #000; --accent: #00d2ff; --surface: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; height: 100vh; display: flex; justify-content: center;
            overflow: hidden;
        }
        .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; position: relative; }
        
        header { padding: 15px 20px; background: #000; z-index: 100; border-bottom: 1px solid #222; }
        .search-bar { 
            display: flex; background: #1c1c1e; border-radius: 12px; 
            padding: 5px 15px; border: 1px solid #444; align-items: center;
        }
        #sIn { 
            background: transparent; border: none; color: #fff; 
            flex: 1; font-size: 16px; height: 45px; outline: none;
            min-width: 0; /* Verhindert Layout-Bugs in Firefox */
        }
        .search-btn { background: none; border: none; color: var(--accent); font-size: 24px; cursor: pointer; padding: 0 0 0 10px; }
        .uhr { text-align: center; font-size: 11px; color: var(--accent); margin-top: 5px; font-weight: bold; }

        .main { flex: 1; overflow-y: auto; padding: 10px 20px 280px 20px; -webkit-overflow-scrolling: touch; }
        .hero { background: var(--surface); border-radius: 25px; padding: 20px; text-align: center; border: 1px solid #222; margin-bottom: 20px; }
        #mainImg { width: 120px; height: 120px; border-radius: 20px; object-fit: cover; background: #111; }
        #stName { font-size: 20px; font-weight: 800; margin: 10px 0; }
        #hoerer { font-size: 11px; color: var(--accent); font-weight: bold; }

        .now-playing { background: #1c1c1e; border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-left: 5px solid var(--accent); }
        .dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #curT { font-size: 14px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        .h-item { background: #0d0d0d; padding: 12px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 8px; font-size: 13px; border: 1px solid #1a1a1a; }
        .h-time { color: var(--accent); font-weight: bold; min-width: 45px; }

        .dock { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(15,15,15,0.98); backdrop-filter: blur(20px); border-top: 1px solid #333; padding: 15px 20px 40px 20px; border-radius: 25px 25px 0 0; }
        .ticker { overflow: hidden; background: #000; padding: 5px; border-radius: 8px; margin-bottom: 15px; height: 26px; }
        #tText { white-space: nowrap; display: inline-block; color: var(--accent); font-size: 11px; font-weight: bold; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .player { display: flex; align-items: center; gap: 15px; }
        #pBtn { width: 65px; height: 65px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #pBtn.playing { background: var(--accent); }
        .vol-wrap { flex: 1; }
        #vRange { width: 100%; accent-color: var(--accent); }
        #status { font-size: 10px; color: #666; text-align: center; margin-top: 5px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div class="search-bar">
            <input type="text" id="sIn" placeholder="Sender eingeben..." autocomplete="off">
            <button class="search-btn" id="searchBtn">🔍</button>
        </div>
        <div id="uhr" class="uhr">00:00:00</div>
    </header>

    <div class="main">
        <div class="hero">
            <img id="mainImg" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABAQMAAAAl21bKAAAAA1BMVEUAAACnej3aAAAAAXRSTlMAQObYZgAAAApJREFUCNdjYAAAAAIAAeIhvDMAAAAASUVORK5CYII=">
            <div id="stName">RADIO PRO</div>
            <div id="hoerer">BEREIT</div>
        </div>
        <div class="now-playing">
            <div class="dot"></div>
            <div id="curT">Sender suchen & hören</div>
        </div>
        <div id="hList"></div>
    </div>

    <div class="dock">
        <div class="ticker"><div id="tText">+++ RADIO PRO STARTBEREIT +++</div></div>
        <div class="player">
            <button id="pBtn">▶</button>
            <div class="vol-wrap">
                <input type="range" id="vRange" min="0" max="1" step="0.01" value="0.8">
                <div id="status">Bereit</div>
            </div>
        </div>
    </div>
</div>

<script>
    let audio = new Audio();
    let slug = "";
    let dataTimer = null;

    // Uhrzeit
    setInterval(() => { 
        document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); 
    }, 1000);

    // Lautstärke
    document.getElementById('vRange').oninput = (e) => { audio.volume = e.target.value; };

    // Suchfunktion mit Tastatur-Enter Support
    document.getElementById('sIn').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            document.activeElement.blur(); // Tastatur schließen
            searchAndPlay();
        }
    });

    document.getElementById('searchBtn').addEventListener('click', searchAndPlay);
    document.getElementById('pBtn').addEventListener('click', toggle);

    async function searchAndPlay() {
        const input = document.getElementById('sIn').value;
        if(!input) return;
        slug = input.toLowerCase().trim().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        
        document.getElementById('status').innerText = "VERBINDE...";
        
        // Audio Reset für Firefox
        audio.pause();
        audio.src = `https://stream.laut.fm/${slug}?t=${Date.now()}`;
        audio.crossOrigin = "anonymous";
        audio.volume = document.getElementById('vRange').value;

        try {
            await audio.play();
            document.getElementById('pBtn').innerHTML = "⏸";
            document.getElementById('pBtn').classList.add('playing');
            document.getElementById('status').innerText = "LIVE";
        } catch(e) {
            document.getElementById('status').innerText = "BITTE PLAY DRÜCKEN";
        }

        await loadData();
        if(dataTimer) clearInterval(dataTimer);
        dataTimer = setInterval(loadData, 15000);
    }

    function toggle() {
        if(!slug) return;
        const btn = document.getElementById('pBtn');
        const st = document.getElementById('status');

        if(audio.paused || audio.src === "") {
            audio.play().then(() => {
                btn.innerHTML = "⏸";
                btn.classList.add('playing');
                st.innerText = "LIVE";
            });
        } else {
            audio.pause();
            btn.innerHTML = "▶";
            btn.classList.remove('playing');
            st.innerText = "GESTOPPT";
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);
            document.getElementById('stName').innerText = s.display_name.toUpperCase();
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('hoerer').innerText = h + " PERSONEN LIVE";
            const track = l[0].artist.name + " - " + l[0].title;
            document.getElementById('curT').innerText = track;
            document.getElementById('tText').innerText = `+++ ${s.display_name.toUpperCase()}: ${track.toUpperCase()} +++`;
            
            let html = "";
            l.slice(1, 10).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="h-item"><span class="h-time">${time}</span> <span><b>${song.artist.name}</b> ${song.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) { console.log("Fehler beim Laden"); }
    }
</script>
</body>
</html>
