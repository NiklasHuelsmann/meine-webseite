<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laut.fm Radio Search & Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .search-container { margin-bottom: 20px; width: 100%; max-width: 400px; position: relative; }
        input { width: 100%; padding: 12px; border-radius: 25px; border: none; outline: none; font-size: 1em; background: #333; color: white; box-sizing: border-box; }
        #results { position: absolute; background: #222; width: 100%; border-radius: 10px; margin-top: 5px; z-index: 10; max-height: 300px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .result-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .result-item:hover { background: #444; }
        .result-item img { width: 30px; height: 30px; border-radius: 50%; }

        .player-card { background: #1e1e1e; width: 400px; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .header { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 10px; color: #00ccff; }
        #station-logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #ff5500; margin: 10px 0; }
        iframe { border: none; margin-top: 15px; border-radius: 10px; background: white; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Sender suchen (z.B. Rock, Pop, 80er)...">
    <div id="results"></div>
</div>

<div class="player-card" id="player-card">
    <div class="header">
        <span id="clock">00:00:00</span>
        <span id="listeners">● 0 Hörer</span>
    </div>
    
    <img id="station-logo" src="https://api.laut.fm/station/eins/images/station_120x120.png">
    <h2 id="station-name">Wähle einen Sender</h2>
    <p id="current-song">Lade...</p>

    <div id="player-wrapper">
        <p>Suche oben einen Sender, um ihn zu hören!</p>
    </div>

    <div style="margin-top: 15px; font-size: 0.8em; color: #777;">
        🎤 Mikrofon aktiv | Nächste News: <span id="next-news">--:--</span>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const resultsDiv = document.getElementById('results');
    let updateInterval;

    // 1. SUCH-FUNKTION
    searchInput.addEventListener('input', () => {
        const query = searchInput.value;
        if (query.length < 2) { resultsDiv.innerHTML = ''; return; }

        fetch(`https://api.laut.fm/search/stations?query=${query}`)
            .then(res => res.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                data.items.slice(0, 8).forEach(st => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<img src="${st.images.station_80x80}"> <span>${st.display_name}</span>`;
                    div.onclick = () => selectStation(st.name);
                    resultsDiv.appendChild(div);
                });
            });
    });

    // 2. SENDER AUSWÄHLEN & LADEN
    function selectStation(name) {
        resultsDiv.innerHTML = '';
        searchInput.value = '';
        
        // Player iframe neu laden
        document.getElementById('player-wrapper').innerHTML = `
            <iframe src="https://laut.fm/widgets/player/${name}" width="320" height="150" scrolling="no"></iframe>
        `;

        updateStationInfo(name);
        if(updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(() => updateStationInfo(name), 15000);
    }

    // 3. DATEN AKTUALISIEREN (Logo, Hörer, Song)
    function updateStationInfo(name) {
        fetch(`https://api.laut.fm/station/${name}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('station-name').innerText = data.display_name;
                document.getElementById('station-logo').src = data.images.station_120x120;
                document.getElementById('listeners').innerText = `● ${data.current_listeners} Hörer`;
                document.getElementById('current-song').innerText = data.current_song ? 
                    `${data.current_song.artist.name} - ${data.current_song.title}` : "Moderation / News";
                
                const now = new Date();
                document.getElementById('next-news').innerText = (now.getHours() + 1) + ":00 Uhr";
            });
    }

    // Uhrzeit-Tick
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // Start mit einem Standardsender (optional)
    selectStation("eins"); 
</script>

</body>
</html>
