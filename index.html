<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Radio Ultimate v28.1 - Universal Engine</title>
    <style>
        :root { --bg: #000000; --accent: #00d2ff; --card: #121212; --text: #ffffff; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app-shell { width: 100%; max-width: 500px; background: #000; display: flex; flex-direction: column; border-left: 1px solid #222; border-right: 1px solid #222; position: relative; }
        
        header { padding: 15px; background: rgba(0,0,0,0.95); border-bottom: 1px solid #222; z-index: 100; }
        .search-row { display: flex; background: #1a1a1a; border-radius: 12px; padding: 8px 15px; align-items: center; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 16px; width: 100%; }
        .search-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 20px; padding-left: 10px; }
        .uhr-display { text-align: center; font-size: 14px; color: var(--accent); font-family: 'Courier New', monospace; margin-top: 8px; font-weight: bold; }

        .scroll-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 250px; scroll-behavior: smooth; }
        
        .station-display { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #222; }
        #sideLogo { width: 60px; height: 60px; border-radius: 12px; border: 1px solid var(--accent); object-fit: cover; background: #111; }
        
        .main-cover-box { margin-bottom: 25px; text-align: center; }
        #mainImg { width: 100%; aspect-ratio: 1/1; border-radius: 25px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333; background: #111; }
        
        .current-track { text-align: center; margin-bottom: 30px; }
        #curT { font-size: 1.2rem; font-weight: bold; min-height: 1.5em; display: block; }
        .speaker-icon { font-size: 24px; opacity: 0.1; transition: 0.3s; margin-left: 10px; }
        .playing .speaker-icon { opacity: 1; animation: pulse 0.6s infinite alternate; color: var(--accent); }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.3); } }

        /* MULTI-INFO TICKER */
        .player-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(25px); border-top: 1px solid #222; padding: 15px 20px 35px 20px; z-index: 200; }
        .ticker-container { width: 100%; overflow: hidden; margin-bottom: 15px; background: #080808; padding: 12px; border-radius: 10px; white-space: nowrap; border: 1px solid #1a1a1a; }
        #ticker { display: inline-block; color: var(--accent); font-weight: bold; font-size: 13px; min-width: 100%; animation: swingAction 15s ease-in-out infinite; }
        
        @keyframes swingAction {
            0%, 20% { transform: translateX(0); }
            45%, 55% { transform: translateX(calc(-100% + 220px)); }
            80%, 100% { transform: translateX(0); }
        }

        .controls { display: flex; align-items: center; gap: 15px; }
        .play-btn { width: 75px; height: 75px; border-radius: 50%; border: none; background: #ffffff; color: #000; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255,255,255,0.1); transition: 0.2s; flex-shrink: 0; }
        .play-btn:active { transform: scale(0.95); background: var(--accent); }
        
        .vol-wrap { flex: 1; }
        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        
        .history-card { display: flex; align-items: center; gap: 15px; background: #0a0a0a; padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #1a1a1a; }
        .h-time { font-family: monospace; font-size: 13px; color: var(--accent); font-weight: bold; }
        .footer-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 10px; color: #444; font-family: monospace; }
    </style>
</head>
<body onload="initApp()">

<div class="app-shell" id="app">
    <header>
        <div class="search-row">
            <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') sync()">
            <button class="search-btn" onclick="sync()">🔍</button>
        </div>
        <div id="uhr" class="uhr-display">--:--:--</div>
    </header>

    <div class="scroll-content">
        <div class="station-display">
            <img id="sideLogo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="station-info">
                <div id="stName" style="font-weight: bold;">BEREIT</div>
                <div id="hoerer" style="font-size: 11px; color: var(--accent); font-weight: bold;">WAHL ERFORDERLICH</div>
            </div>
        </div>

        <div class="main-cover-box">
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        </div>

        <div class="current-track">
            <div id="curTime" style="font-size: 11px; color:#555; margin-bottom:5px;">AKTUELL</div>
            <div class="song-line">
                <span id="curT">Radio initialisiert...</span>
                <span class="speaker-icon">🔊</span>
            </div>
        </div>

        <div id="hList"></div>
    </div>

    <div class="player-bar">
        <div class="ticker-container">
            <div id="ticker">SENDER BEREIT spielt...</div>
        </div>
        <div class="controls">
            <button id="pBtn" class="play-btn" onclick="togglePlay()">▶</button>
            <div class="vol-wrap">
                <div style="display:flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px;">
                    <span>LAUTSTÄRKE</span><span id="volP">80%</span>
                </div>
                <input type="range" id="vControl" min="0" max="1" step="0.01" value="0.8">
            </div>
        </div>
        <div class="footer-meta">
            <span id="streamUrl">stream.laut.fm</span>
            <span>RADIO ULTIMATE v28.1 (Universal)</span>
        </div>
    </div>
</div>

<script>
    let audioObj = null;
    let slug = "";
    let dataInterval = null;
    
    const btn = document.getElementById('pBtn');
    const vControl = document.getElementById('vControl');
    const volP = document.getElementById('volP');
    const app = document.getElementById('app');

    function initApp() {
        // Echtzeit-Uhr
        setInterval(() => { 
            document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); 
        }, 1000);

        // Lautstärkeregelung
        vControl.oninput = () => { 
            if(audioObj) audioObj.volume = vControl.value;
            volP.innerText = Math.round(vControl.value * 100) + "%"; 
        };
    }

    async function sync() {
        const input = document.getElementById('sIn').value;
        if(!input) return;

        // Slug-Formatierung (Universal)
        slug = input.toLowerCase().trim().replace(/\s+/g, '-');
        
        // Audio-Reset
        if(audioObj) {
            audioObj.pause();
            audioObj = null;
        }
        btn.innerHTML = "▶";
        btn.style.background = "#fff";
        app.classList.remove('playing');

        await loadData();
        
        // Update alle 15 Sekunden
        if(dataInterval) clearInterval(dataInterval);
        dataInterval = setInterval(loadData, 15000);
    }

    function togglePlay() {
        if(!slug) {
            alert("Bitte gib erst einen Sender ein!");
            return;
        }

        if(!audioObj || audioObj.paused) {
            // Cache-Fix durch Zeitstempel + CORS Protection
            audioObj = new Audio(`https://stream.laut.fm/${slug}?t=${Date.now()}`);
            audioObj.crossOrigin = "anonymous";
            audioObj.volume = vControl.value;
            
            const startPromise = audioObj.play();

            if (startPromise !== undefined) {
                startPromise.then(() => {
                    btn.innerHTML = "⏸";
                    btn.style.background = "#00d2ff";
                    app.classList.add('playing');
                }).catch(err => {
                    console.log("Browser-Schutz griff ein.");
                    // Zweiter Versuch erzwingen
                    setTimeout(() => { audioObj.play(); }, 50);
                });
            }
        } else {
            audioObj.pause();
            audioObj = null; 
            btn.innerHTML = "▶";
            btn.style.background = "#fff";
            app.classList.remove('playing');
        }
    }

    async function loadData() {
        if(!slug) return;
        try {
            const res = await fetch(`https://api.laut.fm/station/${slug}`);
            if(!res.ok) throw new Error("Station Offline");
            const data = await res.json();
            
            const songs = await fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json());
            const listen = await fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text());

            const current = songs[0];
            const sName = data.display_name;
            const trackStr = current.artist.name + " - " + current.title;
            const album = current.album ? current.album : "SINGLE";

            // Oberflächen-Updates
            document.getElementById('stName').innerText = sName;
            document.getElementById('mainImg').src = data.images.station_640x640;
            document.getElementById('sideLogo').src = data.images.station_80x80;
            document.getElementById('hoerer').innerText = listen + " HÖRER";
            document.getElementById('curT').innerText = trackStr;
            
            // Ticker: SENDER spielt (klein) | ALBUM | AKTUELL
            document.getElementById('ticker').innerText = 
                `${sName.toUpperCase()} spielt | ALBUM: ${album.toUpperCase()} | AKTUELL: ${trackStr.toUpperCase()}`;

            // Verlauf
            let html = "";
            songs.slice(1, 12).forEach(s => {
                const time = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="history-card"><span class="h-time">${time}</span><div style="font-size:13px;"><b>${s.artist.name}</b><br><small style="color:#666">${s.title}</small></div></div>`;
            });
            document.getElementById('hList').innerHTML = html;
            document.getElementById('streamUrl').innerText = "stream.laut.fm/" + slug;
        } catch(e) {
            document.getElementById('curT').innerText = "Sender konnte nicht geladen werden.";
        }
    }
</script>
</body>
</html>
