<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio APPS</title>
    <style>
        :root { 
            --bg-global: #050505; 
            --bg-app: #1a1d23;    
            --accent: #00d2ff; 
            --highlight: #00f2c3; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background-color: var(--bg-global); 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        .app { 
            width: 100%; 
            max-width: 500px; 
            display: flex; 
            flex-direction: column; 
            background-color: var(--bg-app);
        }
        
        header { padding: 15px 20px; text-align: center; flex-shrink: 0; }
        .uhr { font-family: monospace; font-size: 16px; color: var(--accent); margin-bottom: 5px; }
        
        #stNameDisplay { font-size: 20px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

        .scroll-content { 
            flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; 
            padding: 0 20px 30px; scrollbar-width: none; 
        }
        .scroll-content::-webkit-scrollbar { display: none; }

        .hero-area { display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .img-container { width: 250px; height: 250px; margin-bottom: 20px; }
        #mainImg { width: 100%; height: 100%; border-radius: 25px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #pBtn { 
            width: 75px; height: 75px; border-radius: 50%; border: none; 
            background: var(--highlight); color: #000; font-size: 30px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .section-title { font-size: 22px; font-weight: bold; font-style: italic; margin: 20px 0 15px; display: block; }
        
        /* Song-Liste Styling */
        .song-entry { 
            display: flex; gap: 15px; margin-bottom: 15px; padding: 5px 0;
            align-items: center;
        }
        .now-playing { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        
        .icon-cell { min-width: 30px; display: flex; justify-content: center; font-size: 20px; color: var(--highlight); }
        .time-cell { min-width: 45px; font-size: 13px; color: #777; font-family: monospace; }
        
        .song-info { flex: 1; }
        .artist { font-weight: bold; font-size: 16px; display: block; color: #fff; }
        .title { color: #aaa; font-size: 14px; }

        #moreBtn { 
            background: transparent; border: 1px solid #444; color: #fff; 
            padding: 12px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 14px;
        }

        .dock { padding: 15px 25px 30px; background: #000; border-top: 1px solid #222; }
        .vol-row { display: flex; align-items: center; gap: 15px; }
        input[type=range] { flex: 1; accent-color: var(--highlight); }
        #volPerc { font-family: monospace; width: 40px; text-align: right; color: var(--accent); }
    </style>
</head>
<body>

<div class="app">
    <header>
        <div id="uhr" class="uhr">00:00:00</div>
        <div id="stNameDisplay">BEREIT</div>
    </header>

    <div class="scroll-content">
        <div class="hero-area">
            <div class="img-container">
                <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            </div>
            <button id="pBtn" onclick="toggle()">▶</button>
        </div>

        <span class="section-title">Jetzt läuft</span>
        
        <div id="currentSongArea"></div>

        <div id="songHistory"></div>
        
        <button id="moreBtn" onclick="toggleMore()">Mehr anzeigen</button>
    </div>

    <div class="dock">
        <div class="vol-row">
            <span>🔈</span>
            <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
            <span id="volPerc">80%</span>
        </div>
    </div>
</div>

<script>
    const au = new Audio();
    let currentSlug = "brian-radio"; // Dein Standardsender
    let showAll = false;

    setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString('de-DE'); }, 1000);

    document.getElementById('vol').oninput = (e) => { 
        au.volume = e.target.value; 
        document.getElementById('volPerc').innerText = Math.round(e.target.value * 100) + "%";
    };

    function toggle() {
        if(!au.src) { au.src = "https://stream.laut.fm/" + currentSlug; }
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
        updateUI();
    }

    function toggleMore() {
        showAll = !showAll;
        document.getElementById('moreBtn').innerText = showAll ? "Weniger anzeigen" : "Mehr anzeigen";
        updateUI();
    }

    async function updateUI() {
        try {
            const [s, l] = await Promise.all([
                fetch("https://api.laut.fm/station/" + currentSlug).then(r => r.json()),
                fetch("https://api.laut.fm/station/" + currentSlug + "/last_songs").then(r => r.json())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640.replace('http://', 'https://');

            // 1. Aktueller Song mit Lautsprecher-Icon
            const current = l[0];
            document.getElementById('currentSongArea').innerHTML = `
                <div class="song-entry now-playing">
                    <div class="icon-cell">🔊</div>
                    <div class="song-info">
                        <span class="artist">${current.artist.name}</span>
                        <span class="title">${current.title}</span>
                    </div>
                </div>`;

            // 2. Verlauf mit Uhrzeiten
            let historyHtml = "";
            const limit = showAll ? 10 : 3;
            l.slice(1, limit).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                historyHtml += `
                    <div class="song-entry">
                        <div class="time-cell">${time}</div>
                        <div class="song-info">
                            <span class="artist">${song.artist.name}</span>
                            <span class="title">${song.title}</span>
                        </div>
                    </div>`;
            });
            document.getElementById('songHistory').innerHTML = historyHtml;
        } catch(e) {}
    }

    setInterval(updateUI, 15000);
    updateUI();
</script>
</body>
</html>
