<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player Pro v19.0 - Smart Link</title>
    <style>
        :root { --bg: #050505; --accent: #00d2ff; --panel: #111; --text: #fff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 12px 20px; display: flex; align-items: center; background: #000; border-bottom: 2px solid var(--accent); gap: 15px; }
        .search-box { display: flex; background: #1a1a1a; border-radius: 20px; padding: 6px 15px; border: 1px solid #333; }
        #sIn { background: transparent; border: none; color: white; outline: none; width: 160px; font-size: 14px; }
        
        .station-status-box { margin-left: auto; background: #0a0a0a; border: 1px solid var(--accent); padding: 5px 15px; border-radius: 5px; color: var(--accent); font-family: monospace; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        #uhr { font-family: monospace; color: var(--accent); font-size: 20px; font-weight: bold; padding-left: 15px; border-left: 1px solid #333; }

        .main { flex: 1; display: grid; grid-template-columns: 380px 1fr; overflow: hidden; }
        @media (max-width: 850px) { .main { grid-template-columns: 1fr; overflow-y: auto; } }

        .left { background: var(--panel); padding: 25px; border-right: 1px solid #222; display: flex; flex-direction: column; gap: 15px; }
        #stName { font-size: 28px; font-weight: bold; color: var(--accent); }
        #stDesc { font-size: 14px; color: #bbb; line-height: 1.5; border-top: 1px solid #222; padding-top: 10px; height: 60px; overflow: hidden; }
        #mainImg { width: 100%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; border: 2px solid #222; }
        
        /* DER KASTEN FÜR DEN STREAM-INFO */
        .stream-info-box { background: #000; border: 1px solid #333; padding: 10px; border-radius: 8px; font-size: 11px; color: #888; font-family: monospace; }
        .stream-label { color: var(--accent); font-weight: bold; display: block; margin-bottom: 4px; }

        .play-btn { background: #1db954; color: white; border: none; padding: 20px; border-radius: 40px; font-weight: bold; font-size: 22px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(29, 185, 84, 0.2); }
        .play-btn.playing { background: #ff3333; box-shadow: 0 5px 15px rgba(255, 51, 51, 0.2); }
        
        .vol-container { background: #000; padding: 15px; border-radius: 10px; border: 1px solid #222; }
        .vol-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; color: var(--accent); }
        .vol { width: 100%; cursor: pointer; accent-color: var(--accent); }

        .right { padding: 30px; overflow-y: auto; }
        .current-box { background: rgba(0, 210, 255, 0.05); padding: 25px; border-radius: 15px; border: 1px solid rgba(0, 210, 255, 0.2); margin-bottom: 25px; }
        .history-card { background: #111; padding: 12px 18px; border-radius: 8px; display: flex; align-items: center; border: 1px solid #222; margin-bottom: 10px; }

        footer { height: 80px; background: #000; border-top: 2px solid var(--accent); display: flex; align-items: center; padding: 0 20px; }
    </style>
</head>
<body onload="initApp()">

<header>
    <div class="search-box">
        <input type="text" id="sIn" placeholder="Sendername + ENTER" onkeypress="if(event.key==='Enter') sync(this.value)">
    </div>
    <div id="statusBox" class="station-status-box">SYSTEM BEREIT</div>
    <div id="uhr">00:00:00</div>
</header>

<div class="main">
    <div class="left">
        <div id="stName">RADIO PRO</div>
        <div id="stDesc">Suchen Sie einen Sender...</div>
        <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
        
        <div class="stream-info-box">
            <span class="stream-label">STREAM STATUS:</span>
            <span id="streamUrlDisplay">Warte auf Eingabe</span>
        </div>

        <button id="pBtn" class="play-btn" onclick="togglePlay()">START RADIO</button>
        
        <div class="vol-container">
            <div class="vol-header"><span>LAUTSTÄRKE</span><span id="volP">80%</span></div>
            <input type="range" id="vControl" class="vol" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>

    <div class="right">
        <div class="current-box">
            <div id="curSongTime" style="color:var(--accent); font-weight: bold; font-family: monospace;">--:-- UHR</div>
            <div id="curT" style="font-size: 24px; font-weight: bold; margin-top: 5px;">Bereit</div>
        </div>
        <div id="hList"></div>
    </div>
</div>

<footer>
    <div id="fTrack" style="color:var(--accent); font-weight: bold; flex: 1;">+++ v19.0 UNIFIED CONTROL +++</div>
    <div id="hoerer" style="color:var(--accent); font-weight: bold;">0 HÖRER</div>
</footer>

<audio id="player" crossorigin="anonymous"></audio>

<script>
    const player = document.getElementById('player');
    const vControl = document.getElementById('vControl');
    const volP = document.getElementById('volP');
    const streamDisplay = document.getElementById('streamUrlDisplay');
    const statusBox = document.getElementById('statusBox');
    const btn = document.getElementById('pBtn');
    
    let slug = "";
    let isPlaying = false;
    let dataInterval;

    function initApp() {
        setInterval(() => { document.getElementById('uhr').innerText = new Date().toLocaleTimeString(); }, 1000);
        vControl.oninput = () => {
            player.volume = vControl.value;
            volP.innerText = Math.round(vControl.value * 100) + "%";
        };
    }

    function sync(v) {
        if(!v) return;
        slug = v.toLowerCase().trim().replace(/\s+/g, '-');
        const finalUrl = "https://stream.laut.fm/" + slug;
        
        streamDisplay.innerText = "VERBUNDEN: " + slug.toUpperCase();
        statusBox.innerText = slug.toUpperCase();
        
        if(dataInterval) clearInterval(dataInterval);
        loadData();
        dataInterval = setInterval(loadData, 15000);

        player.src = finalUrl;
        if(isPlaying) player.play();
    }

    function togglePlay() {
        if(!slug) { alert("Bitte erst Sender suchen!"); return; }
        
        if(player.paused) {
            // Beim Starten laden wir den Stream frisch, um Firefox zu "wecken"
            player.src = "https://stream.laut.fm/" + slug + "?t=" + Date.now();
            player.play().then(() => {
                isPlaying = true;
                btn.innerText = "STOPP";
                btn.classList.add('playing');
            }).catch(() => {
                alert("Firefox blockiert! Bitte oben links neben der URL auf das Schalter-Symbol klicken und 'Audio erlauben'.");
            });
        } else {
            player.pause();
            player.src = ""; // Stop-Funktion
            isPlaying = false;
            btn.innerText = "START RADIO";
            btn.classList.remove('playing');
        }
    }

    async function loadData() {
        try {
            const res = await fetch(`https://api.laut.fm/station/${slug}`);
            const data = await res.json();
            const songs = await fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json());
            const listeners = await fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text());

            document.getElementById('stName').innerText = data.display_name;
            document.getElementById('stDesc').innerText = data.description || "";
            document.getElementById('mainImg').src = data.images.station_640x640;
            document.getElementById('hoerer').innerText = listeners + " HÖRER";

            const current = songs[0];
            document.getElementById('curT').innerText = current.artist.name + " - " + current.title;
            document.getElementById('curSongTime').innerText = new Date(current.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + " UHR";
            document.getElementById('fTrack').innerText = "+++ LIVE: " + data.display_name.toUpperCase() + " +++";

            let html = "";
            songs.slice(1, 6).forEach(s => {
                const time = new Date(s.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                html += `<div class="history-card"><b style="color:var(--accent); min-width:60px;">${time}</b><span style="margin-left:15px;">${s.artist.name} - ${s.title}</span></div>`;
            });
            document.getElementById('hList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
