<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App Station</title>
    <style>
        :root {
            --primary: #ff5500;
            --bg: #0f0f12;
            --card: #1a1a1e;
            --accent: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- SUCHE --- */
        .search-section {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .search-box {
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 15px 45px 15px 20px;
            border-radius: 15px;
            border: 1px solid #333;
            background: #25252b;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        #search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255,85,0,0.2); }

        #results-box {
            position: absolute;
            top: 65px; left: 0; right: 0;
            background: #1e1e24;
            border-radius: 15px;
            max-height: 350px;
            overflow-y: auto;
            display: none;
            border: 1px solid #444;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 2000;
        }

        .result-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2d2d35;
            cursor: pointer;
            transition: 0.2s;
        }

        .result-item:hover { background: #2d2d35; }
        .result-item img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        .result-item div { display: flex; flex-direction: column; }
        .result-item span { font-size: 14px; color: var(--text-dim); }

        /* --- PLAYER BEREICH --- */
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .header-info {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        #station-display-name { font-size: 22px; font-weight: 800; margin-bottom: 20px; color: var(--primary); }

        .album-wrapper {
            width: 100%;
            max-width: 300px;
            margin-bottom: 25px;
            position: relative;
        }

        #album-cover {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 25px;
            object-fit: cover;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid #333;
            background: #111;
        }

        #song-title { font-size: 19px; font-weight: bold; margin-bottom: 5px; padding: 0 10px; }
        #artist-name { font-size: 16px; color: var(--text-dim); margin-bottom: 25px; }

        .play-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(255, 85, 0, 0.4);
            margin-bottom: 30px;
            transition: 0.2s;
        }

        .play-button:active { transform: scale(0.9); }

        /* --- INFO BOXEN --- */
        .description-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            font-size: 13px;
            color: #ccc;
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.5;
            box-sizing: border-box;
        }

        .history-section { width: 100%; text-align: left; margin-top: 10px; }
        .history-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 0; border-bottom: 1px solid #2d2d35;
            font-size: 13px;
        }
        .history-item img { width: 35px; height: 35px; border-radius: 6px; }
        .h-time { color: var(--primary); font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Sender suchen (z.B. Top 40, Rock...)" autocomplete="off">
            <div id="results-box"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="header-info">
            <div id="clock">00:00:00</div>
            <div id="listeners">● 0 Hörer</div>
        </div>

        <div id="station-display-name">Wähle einen Sender</div>
        
        <div class="album-wrapper">
            <img id="album-cover" src="" alt="">
        </div>

        <div id="song-title">Bereit</div>
        <div id="artist-name">Suche einen Sender zum Starten</div>

        <button class="play-button" id="master-play">
            <svg id="svg-play" width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            <svg id="svg-stop" width="35" height="35" viewBox="0 0 24 24" fill="white" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="description-card" id="station-desc">
            Hier erscheinen Informationen zum gewählten Sender.
        </div>

        <div class="history-section" id="history-box"></div>
    </div>
</div>

<audio id="player-core" playsinline></audio>

<script>
    const audio = document.getElementById('player-core');
    const playBtn = document.getElementById('master-play');
    const searchInput = document.getElementById('search-input');
    const resultsBox = document.getElementById('results-box');
    
    let currentStation = ""; 

    // DATEN VOM SENDER LADEN
    async function updateStationInfo(name) {
        try {
            const res = await fetch(`https://api.laut.fm/station/${name}`);
            const data = await res.json();

            document.getElementById('station-display-name').innerText = data.display_name;
            document.getElementById('listeners').innerText = `● ${data.current_listeners} Hörer`;
            document.getElementById('station-desc').innerText = data.description || "Keine Beschreibung verfügbar.";
            const fallbackLogo = data.images.station_640x640;

            const songRes = await fetch(`https://api.laut.fm/station/${name}/last_songs`);
            const songs = await songRes.json();

            if(songs && songs.length > 0) {
                document.getElementById('song-title').innerText = songs[0].title;
                document.getElementById('artist-name').innerText = songs[0].artist.name;
                document.getElementById('album-cover').src = songs[0].image_640x640 || fallbackLogo;

                let hHtml = "";
                songs.slice(1, 8).forEach(s => {
                    const time = s.started_at.split(' ')[1].substring(0,5);
                    hHtml += `
                        <div class="history-item">
                            <span class="h-time">${time}</span>
                            <img src="${s.image_120x120 || fallbackLogo}">
                            <div><b>${s.title}</b><br><span style="color:#777">${s.artist.name}</span></div>
                        </div>`;
                });
                document.getElementById('history-box').innerHTML = hHtml;
            }
        } catch(e) { console.error("Datenfehler"); }
    }

    // SENDER WECHSELN & SOFORT SPIELEN
    function selectStation(name) {
        currentStation = name;
        audio.pause();
        audio.src = `https://stream.laut.fm/${name}`; // Sofort Stream-URL setzen
        
        // Optik zurücksetzen
        document.getElementById('svg-play').style.display = "none";
        document.getElementById('svg-stop').style.display = "block";
        
        audio.play().catch(e => console.log("Autoplay-Blockade"));
        
        updateStationInfo(name);
        resultsBox.style.display = "none";
        searchInput.value = "";
    }

    // PLAY / STOP LOGIK
    playBtn.onclick = () => {
        if(!currentStation) return;
        if(audio.paused) {
            audio.play();
            document.getElementById('svg-play').style.display = "none";
            document.getElementById('svg-stop').style.display = "block";
        } else {
            audio.pause();
            document.getElementById('svg-play').style.display = "block";
            document.getElementById('svg-stop').style.display = "none";
        }
    };

    // ECHTZEIT SUCHE
    searchInput.addEventListener('input', async () => {
        const query = searchInput.value.trim();
        if(query.length < 2) { resultsBox.style.display = "none"; return; }

        try {
            const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(query)}`);
            const json = await r.json();
            
            if(json.items && json.items.length > 0) {
                resultsBox.innerHTML = "";
                resultsBox.style.display = "block";
                json.items.slice(0, 15).forEach(s => {
                    const item = document.createElement('div');
                    item.className = "result-item";
                    // mousedown reagiert schneller auf Android/iOS
                    item.onmousedown = (e) => { e.preventDefault(); selectStation(s.name); };
                    item.innerHTML = `
                        <img src="${s.images.station_80x80}">
                        <div>
                            <strong>${s.display_name}</strong>
                            <span>${s.current_listeners} Hörer</span>
                        </div>`;
                    resultsBox.appendChild(item);
                });
            }
        } catch(e) { console.log("Suchfehler"); }
    });

    // Hilfsfunktionen
    searchInput.onblur = () => setTimeout(() => resultsBox.style.display = "none", 300);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(() => { if(currentStation) updateStationInfo(currentStation); }, 30000);
</script>
</body>
</html>
