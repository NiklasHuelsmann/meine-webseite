<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub V30 (Smart Schedule)</title>
    <style>
        :root { --sidebar-bg: #1a2634; --accent: #00d26a; --bg: #f5f7f9; --text-dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; }
        .search-box { display: flex; gap: 8px; margin-bottom: 25px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 5px; border: none; background: #2c3e50; color: white; }
        .search-box button { background: var(--accent); border: none; border-radius: 5px; color: white; padding: 0 10px; cursor: pointer; }
        .fav-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        /* Main Layout */
        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 450px; gap: 20px; padding: 25px; padding-bottom: 110px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 404 Overlay */
        #errorOverlay { position: absolute; top:0; left:0; width:100%; height:100%; background:white; display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        
        /* Liste & Sendeplan */
        .list-container { flex: 1; overflow-y: auto; }
        .list-entry { display: flex; padding: 15px 0; border-bottom: 1px solid #f2f2f2; align-items: flex-start; }
        .list-time { width: 75px; font-weight: 800; color: #444; font-size: 0.95rem; flex-shrink: 0; }
        .list-details { flex: 1; }
        .list-details b { display: block; font-size: 1rem; color: #222; margin-bottom: 3px; }
        .list-details p { margin: 0; font-size: 0.85rem; color: #777; line-height: 1.3; }

        /* Tabs mit Smart-Glow / Gray-out */
        .tab-btn { cursor: pointer; border: none; background: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .tab-btn.disabled { color: #ccc !important; cursor: not-allowed; opacity: 0.5; }
        .day-bar { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; overflow-x: auto; }
        .day-tab { cursor: pointer; font-weight: bold; color: #999; padding: 6px 10px; font-size: 0.8rem; border-radius: 5px; white-space: nowrap; }
        .day-tab.active { color: white; background: var(--sidebar-bg); }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: white; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 40px; }
        .player-center { flex: 1; text-align: center; }
        .btn-play { background: var(--accent); color: white; border: none; padding: 12px 45px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);">Radio Hub V30</h2>
    <div class="search-box">
        <input type="text" id="slugInput" placeholder="Sender suchen...">
        <button onclick="loadStation()">OK</button>
    </div>
    <div id="favList"></div>
</div>

<div class="main-layout">
    <div class="card">
        <div id="errorOverlay">
            <h1 style="font-size: 4rem; color: #eee; margin:0;">404</h1>
            <p style="color: #888;">Sender offline oder nicht gefunden.</p>
        </div>
        <div style="display:flex; align-items:center; margin-bottom:20px;">
            <img id="miniLogo" src="" style="width:50px; height:50px; border-radius:5px; margin-right:15px;">
            <h1 id="stationName" style="font-size:1.4rem; margin:0;">Lade...</h1>
        </div>
        <div style="text-align:center;">
            <img id="displayCover" src="" style="width:250px; height:250px; border-radius:12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom:15px;">
            <div style="background:#fcfcfc; padding:15px; border-radius:10px; border:1px solid #eee; text-align:left;">
                <div id="startTime" style="font-weight:bold; color:var(--accent);">--:--</div>
                <b id="liveArtist" style="font-size:1.2rem; display:block;">Interpret</b>
                <span id="liveTitle" style="color:#666;">Songtitel</span>
            </div>
        </div>
        <div style="margin-top:auto; padding-top:20px; display:flex; justify-content:space-between; font-size:0.9rem;">
            <span>👥 Hörer: <b id="listeners">0</b></span>
            <span style="color:var(--accent); font-weight:bold;">● ONLINE</span>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:flex-end; gap:20px; margin-bottom:15px;">
            <button id="tabS" class="tab-btn" onclick="setMode('songs')" style="color:var(--accent);">VERLAUF</button>
            <button id="tabP" class="tab-btn" onclick="setMode('plan')" style="color:#999;">SENDEPLAN</button>
        </div>
        <div id="dayBar" class="day-bar" style="display:none;"></div>
        <div id="listView" class="list-container"></div>
    </div>
</div>

<div class="player-bar">
    <div style="width:300px; display:flex; align-items:center;">
        <img id="barCover" src="" style="width:50px; height:50px; border-radius:5px; margin-right:12px;">
        <div style="overflow:hidden;"><b id="barArtist" style="display:block; white-space:nowrap;">...</b></div>
    </div>
    <div class="player-center">
        <button id="pToggle" class="btn-play" onclick="handlePlay()">STARTEN</button>
    </div>
    <div style="width:300px; text-align:right;">
        <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="audio.volume=this.value" style="accent-color:var(--accent); width:150px;">
    </div>
</div>

<audio id="audio"></audio>

<script>
    let currentSlug = localStorage.getItem('it_hub_last') || "test-station-fm";
    let viewMode = "songs";
    let selectedDay = new Date().toLocaleDateString('de-DE', {weekday: 'long'}).toLowerCase();
    const favs = ["test-station-fm", "simulator4", "brian-radio", "feierabend-radio"];
    const audio = document.getElementById('audio');

    async function update() {
        try {
            const sRes = await fetch(`https://api.laut.fm/station/${currentSlug}`);
            const errorOverlay = document.getElementById('errorOverlay');
            
            if(!sRes.ok) { errorOverlay.style.display = "flex"; return; }
            errorOverlay.style.display = "none";

            const [cRes, lRes, scRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}/current_song`),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`),
                fetch(`https://api.laut.fm/station/${currentSlug}/schedule`)
            ]);
            
            const station = await sRes.json();
            const song = await cRes.json();
            const history = await lRes.json();
            const schedule = await scRes.json();

            // UI Texte
            document.getElementById('stationName').innerText = station.display_name;
            document.getElementById('miniLogo').src = station.images.station_120x120;
            document.getElementById('displayCover').src = station.images.station_640x640;
            document.getElementById('barCover').src = station.images.station_120x120;
            document.getElementById('listeners').innerText = station.current_listeners;
            document.getElementById('liveArtist').innerText = song.artist ? song.artist.name : "Live";
            document.getElementById('liveTitle').innerText = song.title || "";
            document.getElementById('barArtist').innerText = song.artist ? song.artist.name : station.display_name;
            document.getElementById('startTime').innerText = song.started_at ? new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "--:--";

            // Smart Tab Logic (Grau wenn kein Plan)
            const planBtn = document.getElementById('tabP');
            if(!schedule || schedule.length === 0) {
                planBtn.classList.add('disabled');
                planBtn.onclick = null;
                if(viewMode === "plan") setMode('songs'); // Falls man im Plan war und der Sender keinen hat
            } else {
                planBtn.classList.remove('disabled');
                planBtn.onclick = () => setMode('plan');
            }

            renderList(viewMode === "songs" ? history : schedule);
        } catch(e) {}
    }

    function renderList(data) {
        const view = document.getElementById('listView');
        const dayBar = document.getElementById('dayBar');
        view.innerHTML = "";

        if(viewMode === "songs") {
            dayBar.style.display = "none";
            view.innerHTML = data.slice(0, 10).map(i => `
                <div class="list-entry">
                    <div class="list-time">${new Date(i.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div class="list-details"><b>${i.artist.name}</b><span>${i.title}</span></div>
                </div>
            `).join('');
        } else {
            dayBar.style.display = "flex";
            const days = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
            dayBar.innerHTML = days.map(d => `<div class="day-tab ${selectedDay === d.toLowerCase() ? 'active' : ''}" onclick="changeDay('${d.toLowerCase()}')">${d}</div>`).join('');
            
            const dayData = data.filter(e => e.day === selectedDay).sort((a,b) => a.hour - b.hour);
            if(dayData.length > 0) {
                view.innerHTML = dayData.map(item => `
                    <div class="list-entry">
                        <div class="list-time">${item.hour.toString().padStart(2, '0')}:00</div>
                        <div class="list-details">
                            <b>${item.name}</b>
                            <p>${item.description || 'Keine Beschreibung vorhanden'}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                view.innerHTML = "<p style='padding:20px; color:#999; text-align:center;'>Kein Sendeplan für diesen Tag verfügbar.</p>";
            }
        }
    }

    function changeDay(day) { selectedDay = day; update(); }
    
    function setMode(m) { 
        viewMode = m; 
        document.getElementById('tabS').style.color = (m==='songs'?'var(--accent)':'#999'); 
        document.getElementById('tabP').style.color = (m==='plan'?'var(--accent)':'#999'); 
        update(); 
    }

    function loadStation(slug) {
        currentSlug = slug || document.getElementById('slugInput').value.toLowerCase().trim();
        localStorage.setItem('it_hub_last', currentSlug);
        update();
    }

    function handlePlay() {
        if(audio.paused) { audio.src = `https://stream.laut.fm/${currentSlug}`; audio.play(); document.getElementById('pToggle').innerText="STOPP"; }
        else { audio.pause(); document.getElementById('pToggle').innerText="STARTEN"; }
    }

    function renderFavs() {
        document.getElementById('favList').innerHTML = favs.map(f => `
            <div class="fav-item" onclick="loadStation('${f}')">
                <img src="https://api.laut.fm/station/${f}/images/station_120x120" style="width:35px; border-radius:4px;">
                <span>${f}</span>
            </div>
        `).join('');
    }

    window.onload = () => { renderFavs(); update(); };
    setInterval(update, 20000);
</script>
</body>
</html>
