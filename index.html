<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App Official Blue v90.7</title>
    <style>
        :root { 
            /* Exakte laut.fm App-Farben aus deinen Bildern */
            --bg-app: #1e2538;        /* Das tiefe Dunkelblau im Hintergrund */
            --bg-card: #283044;       /* Das hellere Blau der Boxen */
            --accent-main: #00fad9;   /* Das typische laut.fm Türkis/Grünblau */
            
            /* Dynamische Statusfarben */
            --status-pink: #ff00ff;
            --status-yellow: #ffb300; 
            --status-blue: #00aaff;
            
            --text-main: #ffffff;
            --text-dim: #949fb1;
        }
        
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-app); position: relative; display: flex; flex-direction: column; }
        
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #sysTime { color: #fff; font-size: 18px; font-weight: 600; }
        .search-trigger { font-size: 22px; color: var(--accent-main); cursor: pointer; }
        
        #searchBox { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); z-index: 2000; align-items: center; padding: 0 15px; }
        #sIn { flex: 1; height: 40px; background: #1e2538; border: 1px solid var(--accent-main); border-radius: 20px; color: #fff; padding: 0 15px; outline: none; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .hero { padding: 10px 20px; text-align: center; }
        #stNameDisplay { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        #mainImg { width: 100%; border-radius: 12px; aspect-ratio: 1/1; object-fit: cover; box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 20px 0 10px; }
        #pBtn { width: 70px; height: 70px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1e2538; }

        .volume-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 40px 30px; }
        #volSlider { flex: 1; accent-color: var(--accent-main); height: 4px; cursor: pointer; }

        /* Die markierte Box aus deinen Bildern */
        #nowPlayingBox { 
            background: var(--bg-card); 
            border-radius: 12px; padding: 20px; margin: 0 15px 15px; 
            transition: all 0.4s ease;
        }
        .label { font-style: italic; font-size: 26px; font-weight: bold; margin-bottom: 15px; display: block; color: #fff; }
        .track-info { display: flex; align-items: flex-start; gap: 15px; }
        #speakerIcon { font-size: 22px; color: var(--accent-main); }
        .artist { font-size: 20px; font-weight: 700; display: block; }
        .title { font-size: 16px; color: #ced4da; display: block; margin-top: 3px; }

        /* History Liste */
        .box-static { background: transparent; padding: 0 15px; margin-bottom: 20px; }
        .list-item { display: flex; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 15px; }
        .l-time { width: 60px; color: var(--text-dim); font-weight: 500; }
        .l-art { color: #fff; font-weight: 600; }
        .l-tit { color: var(--text-dim); }
        #moreBtn { color: var(--accent-main); text-align: center; padding: 15px; cursor: pointer; font-weight: bold; font-size: 15px; text-decoration: none; }

        /* Footer Bereich wie im Screenshot 1000006195.png */
        .footer-info { padding: 25px 20px; background: rgba(0,0,0,0.15); border-radius: 20px 20px 0 0; }
        .footer-main { font-style: italic; font-size: 24px; font-weight: 800; line-height: 1.1; margin-bottom: 15px; }
        .loc-row { display: flex; align-items: center; gap: 10px; color: var(--text-dim); margin-bottom: 15px; }
        .loc-icon { color: var(--accent-main); font-size: 20px; }
        #stDesc { font-size: 14px; line-height: 1.6; color: #b0b8c4; }
        .hoerer-badge { background: rgba(0, 250, 217, 0.1); color: var(--accent-main); padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <div id="searchBox">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') startSearch()">
        <button onclick="closeSearch()" style="background:none; border:none; color:white; font-size:20px; margin-left:10px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameDisplay">Radio</span>
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div class="controls">
                <button style="background:none; border:none; color:var(--accent-main); font-size:24px;" onclick="shareStation()">🔗</button>
                <button id="pBtn" onclick="toggle()">▶</button>
                <div style="width:24px"></div>
            </div>
            <div class="volume-container">
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="changeVol(this.value)">
            </div>
        </div>

        <div id="nowPlayingBox">
            <span class="label">Jetzt läuft</span>
            <div class="track-info">
                <span id="speakerIcon">🔊</span>
                <div>
                    <span id="curArt" class="artist">WÄHLE SENDER</span>
                    <span id="curTit" class="title">...</span>
                </div>
            </div>
            <div id="historyList" style="margin-top:15px;"></div>
            <div style="text-align:center; margin-top:10px;">
                <div id="moreBtn" onclick="toggleHistory()">mehr Songs anzeigen</div>
            </div>
        </div>

        <div class="footer-info">
            <div id="footerSlogan" class="footer-main">Dein Tag, Dein Kumpel, Dein Sound.</div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="loc-row">
                    <span class="loc-icon">📍</span>
                    <span id="stLoc">...</span>
                </div>
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
            <div id="stDesc"></div>
        </div>
    </div>
</div>

<script>
    const au = new Audio(); au.volume = 0.8; 
    let slug = ""; let histFull = false; let uiInterval;

    function updateClock() { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }); }
    setInterval(updateClock, 1000); updateClock();
    
    function changeVol(val) { au.volume = val; }
    function openSearch() { document.getElementById('sIn').value = ""; document.getElementById('searchBox').style.display = 'flex'; document.getElementById('sIn').focus(); }
    function closeSearch() { document.getElementById('searchBox').style.display = 'none'; }

    async function startSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        slug = val.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + slug;
        au.play(); document.getElementById('pBtn').innerHTML = "⏸"; 
        closeSearch(); updateUI(); 
        if(uiInterval) clearInterval(uiInterval);
        uiInterval = setInterval(updateUI, 8000);
    }

    function toggle() {
        if(!slug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleHistory() { histFull = !histFull; updateUI(); }

    async function updateUI() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stLoc').innerText = s.city || "Radio";
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('footerSlogan').innerText = s.page_title || "Dein Tag, Dein Sound.";

            const cur = l[0]; 
            let boxBg = "var(--bg-card)";
            let accent = "var(--accent-main)";
            let art = cur.artist.name;
            let tit = cur.title;
            const check = (art + " " + tit).toLowerCase();

            // Deine gewünschten Status-Farben
            if(tit.includes("START_AD_BREAK") || cur.type === "gold") {
                boxBg = "rgba(255, 179, 0, 0.15)"; accent = "var(--status-yellow)";
                art = "WERBUNG"; tit = "Gleich geht's weiter...";
            } else if(check.includes("news")) {
                boxBg = "rgba(0, 170, 255, 0.15)"; accent = "var(--status-blue)";
                art = "NACHRICHTEN";
            } else if(check.includes("moderation") || check.includes("talk")) {
                boxBg = "rgba(255, 0, 255, 0.15)"; accent = "var(--status-pink)";
                art = s.display_name + " MODERATION";
            }

            const box = document.getElementById('nowPlayingBox');
            box.style.background = boxBg;
            document.getElementById('curArt').innerText = art;
            document.getElementById('curArt').style.color = accent;
            document.getElementById('speakerIcon').style.color = accent;
            document.getElementById('curTit').innerText = tit;

            let hHtml = ""; const limit = histFull ? 10 : 3;
            l.slice(1, limit + 1).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                hHtml += `<div class="list-item"><span class="l-time">${time}</span><div><span class="l-art">${song.artist.name}</span><br><span class="l-tit">${song.title}</span></div></div>`;
            });
            document.getElementById('historyList').innerHTML = hHtml;
            document.getElementById('moreBtn').innerText = histFull ? "weniger anzeigen" : "mehr Songs anzeigen";
        } catch(e) {}
    }

    async function shareStation() { if(slug) navigator.share({ url: `https://laut.fm/${slug}` }); }
</script>
</body>
</html>
