<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niklas IT - Radio Hub V22 (Smart Schedule)</title>
    <style>
        :root { --sidebar-bg: #1a2634; --accent: #00d26a; --bg: #f5f7f9; --text-dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; padding: 20px; display: flex; flex-direction: column; }
        .fav-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        .main-layout { flex: 1; display: grid; grid-template-columns: 1fr 450px; gap: 20px; padding: 25px; padding-bottom: 110px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; position: relative; }

        .toggle-container { display: flex; justify-content: flex-end; gap: 5px; margin-bottom: 15px; min-height: 40px; }
        .btn-toggle { background: #eee; border: 1px solid #ddd; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: bold; display: inline-block; }
        .btn-toggle.active { background: #ccc; border-color: #bbb; }
        /* Sendeplan Button standardmäßig versteckt */
        #btnPlan { display: none; }

        .day-bar { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; overflow-x: auto; }
        .day-tab { cursor: pointer; font-weight: bold; color: #888; padding: 5px 10px; white-space: nowrap; }
        .day-tab.active { color: #000; border-bottom: 2px solid #000; }

        .list-container { flex: 1; overflow-y: auto; }
        .list-entry { display: flex; padding: 15px 0; border-bottom: 1px solid #f2f2f2; }
        .list-time { width: 70px; font-weight: bold; color: #666; }
        .list-content b { display: block; font-size: 1.05rem; margin-bottom: 3px; }
        .list-content span { color: #777; font-size: 0.9rem; }

        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 95px; background: white; border-top: 1px solid #ddd; display: flex; align-items: center; padding: 0 40px; }
        .btn-play { background: var(--accent); color: white; border: none; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent);">Radio Hub V22</h2>
    <div id="favList"></div>
</div>

<div class="main-layout">
    <div class="card">
        <div id="headerInfo">
            <img id="miniLogo" src="" style="width:50px; height:50px; border-radius:5px; vertical-align:middle; margin-right:15px;">
            <h1 id="stationName" style="display:inline; font-size:1.5rem; margin:0;">Lade...</h1>
        </div>
        <div style="text-align: center; margin-top: 30px;">
            <img id="displayCover" src="" style="width:240px; height:240px; border-radius:12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
            <div id="nowPlayingBox" style="margin-top: 20px; text-align: left; background: #f9f9f9; padding: 20px; border-radius: 10px;">
                <div id="startTime" style="font-weight: bold; margin-bottom: 5px;">--:--</div>
                <b id="liveArtist" style="font-size: 1.2rem; display: block;">Lade Artist...</b>
                <span id="liveTitle" style="color: #666;">Lade Song...</span>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="toggle-container">
            <button id="btnSongs" class="btn-toggle active" onclick="setMode('songs')">Letzte Songs</button>
            <button id="btnPlan" class="btn-toggle" onclick="setMode('plan')">Sendeplan</button>
        </div>
        <div id="dayBar" class="day-bar" style="display: none;"></div>
        <div id="listView" class="list-container"></div>
    </div>
</div>

<div class="player-bar">
    <button id="pToggle" class="btn-play" onclick="handlePlay()">Sender starten</button>
</div>

<audio id="radioAudio"></audio>

<script>
    let currentSlug = localStorage.getItem('it_hub_last_v22') || "simulator4";
    let viewMode = "songs";
    let selectedDay = new Date().toLocaleDateString('de-DE', {weekday: 'long'}).toLowerCase();
    const DAYS = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
    const favs = ["brian-radio", "simulator4", "niklasheulsmann", "feierabend-radio"];

    async function update() {
        try {
            const [cRes, sRes, lRes, scRes] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}/current_song`),
                fetch(`https://api.laut.fm/station/${currentSlug}`),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`),
                fetch(`https://api.laut.fm/station/${currentSlug}/schedule`)
            ]);
            
            const song = await cRes.json();
            const station = await sRes.json();
            const history = await lRes.json();
            const schedule = await scRes.json();

            // Sichtbarkeit des Sendeplan-Buttons prüfen
            const btnPlan = document.getElementById('btnPlan');
            if (schedule && schedule.length > 0) {
                btnPlan.style.display = "inline-block";
            } else {
                btnPlan.style.display = "none";
                if(viewMode === "plan") setMode('songs'); // Falls man im Plan war und er verschwindet
            }

            document.getElementById('stationName').innerText = station.display_name;
            document.getElementById('miniLogo').src = station.images.station_120x120;
            document.getElementById('displayCover').src = station.images.station_640x640;
            document.getElementById('liveArtist').innerText = song.artist ? song.artist.name : station.display_name;
            document.getElementById('liveTitle').innerText = song.title || "Live";
            document.getElementById('startTime').innerText = song.started_at ? new Date(song.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "--:--";

            renderContent(viewMode === "songs" ? history : schedule);
        } catch(e) { console.log("Fehler beim Laden"); }
    }

    function renderContent(data) {
        const view = document.getElementById('listView');
        const dayBar = document.getElementById('dayBar');
        view.innerHTML = "";

        if(viewMode === "songs") {
            dayBar.style.display = "none";
            view.innerHTML = data.slice(0, 8).map(i => `
                <div class="list-entry">
                    <div class="list-time">${new Date(i.started_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    <div class="list-content"><b>${i.artist.name}</b><span>${i.title}</span></div>
                </div>
            `).join('');
        } else {
            dayBar.style.display = "flex";
            dayBar.innerHTML = DAYS.map(d => `
                <div class="day-tab ${selectedDay === d.toLowerCase() ? 'active' : ''}" onclick="changeDay('${d.toLowerCase()}')">${d}</div>
            `).join('');

            const dayData = data.filter(e => e.day === selectedDay);
            if(dayData.length === 0) {
                view.innerHTML = "<p style='padding:20px; color:#999;'>Keine Sendungen für diesen Tag eingetragen.</p>";
            } else {
                view.innerHTML = dayData.sort((a,b) => a.hour - b.hour).map(item => `
                    <div class="list-entry">
                        <div class="list-time">${item.hour.toString().padStart(2, '0')}:00</div>
                        <div class="list-content"><b>${item.name}</b><span>${item.description || ''}</span></div>
                    </div>
                `).join('');
            }
        }
    }

    function setMode(mode) {
        viewMode = mode;
        document.getElementById('btnSongs').classList.toggle('active', mode === 'songs');
        document.getElementById('btnPlan').classList.toggle('active', mode === 'plan');
        update();
    }

    function changeDay(day) { selectedDay = day; update(); }

    function handlePlay() {
        const audio = document.getElementById('radioAudio');
        if(audio.paused) { 
            audio.src = `https://stream.laut.fm/${currentSlug}`; audio.play(); 
            document.getElementById('pToggle').innerText="Stoppen";
        } else { 
            audio.pause(); document.getElementById('pToggle').innerText="Starten";
        }
    }

    function renderFavs() {
        document.getElementById('favList').innerHTML = favs.map(f => `
            <div class="fav-item" onclick="currentSlug='${f}'; localStorage.setItem('it_hub_last_v22', '${f}'); update();">
                <img src="https://api.laut.fm/station/${f}/images/station_120x120" style="width:40px; border-radius:4px;">
                <span>${f}</span>
            </div>
        `).join('');
    }

    window.onload = () => { renderFavs(); update(); };
    setInterval(update, 20000);
</script>
</body>
</html>
