<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App Official Automatik v90.8</title>
    <style>
        :root { 
            --bg-app: #1e2538; 
            --bg-card: #283044;
            --accent-main: #00fad9; 
            --status-yellow: #ffb300; 
            --status-pink: #ff00ff;
            --status-blue: #00aaff;
            --text-main: #ffffff;
            --text-dim: #949fb1;
        }
        
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-app); position: relative; display: flex; flex-direction: column; }
        
        /* Top Navigation */
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; }
        #sysTime { color: #fff; font-size: 18px; font-weight: bold; }
        .search-trigger { font-size: 24px; color: var(--accent-main); cursor: pointer; }
        
        #searchBox { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); z-index: 2000; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--accent-main); }
        #sIn { flex: 1; height: 40px; background: #1e2538; border: none; border-radius: 8px; color: #fff; padding: 0 15px; outline: none; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* Header / Bild */
        .hero { padding: 10px 20px; text-align: center; }
        #stNameDisplay { font-size: 18px; font-weight: bold; margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        #mainImg { width: 100%; border-radius: 15px; aspect-ratio: 1/1; object-fit: cover; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 20px 0 10px; }
        #pBtn { width: 75px; height: 75px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1e2538; transition: 0.2s; }
        #pBtn:active { transform: scale(0.9); }

        .volume-container { display: flex; align-items: center; justify-content: center; padding: 0 40px 25px; }
        #volSlider { flex: 1; accent-color: var(--accent-main); height: 4px; cursor: pointer; }

        /* Die Haupt-Box */
        #nowPlayingBox { 
            background: var(--bg-card); 
            border-radius: 16px; padding: 20px; margin: 0 15px 15px; 
            transition: background 0.6s ease;
        }
        .label { font-style: italic; font-size: 26px; font-weight: bold; margin-bottom: 15px; display: block; }
        .track-info { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 20px; }
        .artist { font-size: 20px; font-weight: bold; display: block; }
        .title { font-size: 16px; color: #b0b8c4; display: block; margin-top: 4px; }

        /* History */
        .list-item { display: flex; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.06); font-size: 14px; }
        .l-time { width: 55px; color: var(--text-dim); }
        .l-art { color: #fff; font-weight: bold; }
        #moreBtn { color: var(--accent-main); text-align: center; padding: 15px 0 0; cursor: pointer; font-weight: bold; font-size: 14px; display: block; }

        /* Footer mit offiziellem Standort-Logo */
        .footer-info { padding: 20px; background: rgba(0,0,0,0.2); }
        .footer-main { font-style: italic; font-size: 24px; font-weight: 900; line-height: 1.1; margin-bottom: 15px; }
        .loc-row { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-weight: 500; }
        
        /* Das Stadt-Logo (Pin) wie in der App */
        .loc-icon { 
            width: 18px; height: 18px; 
            background-color: var(--accent-main); 
            mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/></svg>") no-repeat center;
            -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z'/></svg>") no-repeat center;
        }

        .hoerer-badge { background: rgba(0, 250, 217, 0.15); color: var(--accent-main); padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <div id="searchBox">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') startSearch()">
        <button onclick="closeSearch()" style="background:none; border:none; color:white; font-size:20px; margin-left:10px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameDisplay">Radio</span>
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div class="controls">
                <button style="background:none; border:none; color:var(--accent-main); font-size:24px;" onclick="shareStation()">🔗</button>
                <button id="pBtn" onclick="toggle()">▶</button>
                <div style="width:24px"></div>
            </div>
            <div class="volume-container">
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="changeVol(this.value)">
            </div>
        </div>

        <div id="nowPlayingBox">
            <span class="label">Jetzt läuft</span>
            <div class="track-info">
                <span id="speakerIcon" style="font-size:22px;">🔊</span>
                <div>
                    <span id="curArt" class="artist">BEREIT</span>
                    <span id="curTit" class="title">Wähle einen Sender</span>
                </div>
            </div>
            <div id="historyList"></div>
            <div id="moreBtn" onclick="toggleHistory()">mehr Songs anzeigen</div>
        </div>

        <div class="footer-info">
            <div id="footerSlogan" class="footer-main">Dein Tag, Dein Sound.</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div class="loc-row">
                    <div class="loc-icon"></div>
                    <span id="stLoc">...</span>
                </div>
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
            <div id="stDesc" style="font-size:14px; line-height:1.5; color:var(--text-dim);"></div>
        </div>
    </div>
</div>

<script>
    const au = new Audio(); au.volume = 0.8; 
    let slug = ""; let histFull = false; let uiInterval;

    function updateClock() { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }); }
    setInterval(updateClock, 1000); updateClock();
    
    function changeVol(val) { au.volume = val; }
    function openSearch() { document.getElementById('sIn').value = ""; document.getElementById('searchBox').style.display = 'flex'; document.getElementById('sIn').focus(); }
    function closeSearch() { document.getElementById('searchBox').style.display = 'none'; }

    async function startSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        slug = val.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + slug;
        au.play(); document.getElementById('pBtn').innerHTML = "⏸"; 
        closeSearch(); updateUI(); 
        if(uiInterval) clearInterval(uiInterval);
        uiInterval = setInterval(updateUI, 8000); // Alle 8 Sekunden Auto-Check
    }

    function toggle() {
        if(!slug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleHistory() { histFull = !histFull; updateUI(); }

    async function updateUI() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stLoc').innerText = s.city || "Radio-Station";
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('footerSlogan').innerText = s.page_title || "Dein Tag, Dein Sound.";

            const cur = l[0]; 
            let boxBg = "var(--bg-card)";
            let accent = "var(--accent-main)";
            let art = cur.artist.name;
            let tit = cur.title;

            // --- AUTOMATISCHE ERKENNUNG ---
            const check = (art + " " + tit).toLowerCase();
            
            if(tit.includes("START_AD_BREAK") || cur.type === "gold" || cur.type === "advertisement") {
                boxBg = "rgba(255, 179, 0, 0.2)"; // Automatik-Gelb
                accent = "var(--status-yellow)";
                art = "REKLAME / WERBUNG";
                tit = "Gleich geht es weiter...";
            } else if(check.includes("news") || check.includes("nachrichten")) {
                boxBg = "rgba(0, 170, 255, 0.2)"; // Automatik-Blau
                accent = "var(--status-blue)";
                art = "NACHRICHTEN";
            } else if(check.includes("moderation") || check.includes("talk")) {
                boxBg = "rgba(255, 0, 255, 0.2)"; // Automatik-Pink
                accent = "var(--status-pink)";
                art = s.display_name + " MODERATION";
            }

            const box = document.getElementById('nowPlayingBox');
            box.style.background = boxBg;
            document.getElementById('curArt').innerText = art;
            document.getElementById('curArt').style.color = accent;
            document.getElementById('speakerIcon').style.color = accent;
            document.getElementById('curTit').innerText = tit;

            let hHtml = ""; const limit = histFull ? 10 : 3;
            l.slice(1, limit + 1).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                hHtml += `<div class="list-item"><span class="l-time">${time}</span><div><span class="l-art">${song.artist.name}</span><br>${song.title}</div></div>`;
            });
            document.getElementById('historyList').innerHTML = hHtml;
            document.getElementById('moreBtn').innerText = histFull ? "weniger anzeigen" : "mehr Songs anzeigen";
        } catch(e) { console.log(e); }
    }

    async function shareStation() { if(slug) navigator.share({ url: `https://laut.fm/${slug}` }); }
</script>
</body>
</html>
