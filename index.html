<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Ultimate v115.43 - Universal</title>
    <style>
        :root { 
            --bg-body: #0d111a;
            --bg-app: #1e2538; 
            --bg-card: #283044;
            --bg-item: rgba(255,255,255,0.06);
            --accent: #00fad9; 
            --text: #ffffff; 
            --text-muted: #cbd5e0;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background-color: var(--bg-body); 
            margin: 0; 
            height: 100vh; 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            height: 100vh;
            background-color: var(--bg-app);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        /* HEADER */
        .header {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(0,0,0,0.4);
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
        }
        .time { font-weight: 800; font-size: 15px; color: var(--accent); font-variant-numeric: tabular-nums; }
        .logo-text { font-weight: 900; letter-spacing: 3px; font-size: 16px; text-transform: uppercase; }
        .search-btn { cursor: pointer; font-size: 22px; transition: 0.2s; }
        .search-btn:hover { color: var(--accent); transform: scale(1.1); }

        /* MAIN CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column; /* Mobile first */
            overflow: hidden;
        }

        /* LEFT SIDE: PLAYER (HERO) */
        .player-side {
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), transparent);
        }
        #stationTitle { font-size: 24px; font-weight: 900; margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; min-height: 1.2em; }
        .cover-wrapper { position: relative; margin-bottom: 25px; }
        #mainCover { 
            width: 220px; height: 220px; 
            border-radius: 24px; 
            object-fit: cover; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 2px solid rgba(255,255,255,0.1);
            background-color: #000;
            transition: all 0.5s ease-in-out;
        }
        
        .controls-row { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #playBtn { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--accent); border: none; font-size: 30px; 
            cursor: pointer; color: #1e2538; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 25px rgba(0, 250, 217, 0.3);
            transition: all 0.2s;
        }
        #playBtn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(0, 250, 217, 0.5); }
        #playBtn:active { transform: scale(0.95); }
        #playBtn:disabled { opacity: 0.3; cursor: default; filter: grayscale(1); }

        .listener-badge { 
            background: rgba(0,250,217,0.12); color: var(--accent); 
            padding: 6px 18px; border-radius: 20px; font-size: 11px; font-weight: 900; 
            border: 1px solid rgba(0,250,217,0.4);
            display: none; /* Hidden until search */
        }

        /* RIGHT SIDE: LIST */
        .list-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: rgba(0,0,0,0.1);
        }
        .list-header { font-size: 11px; font-weight: 900; color: var(--accent); padding: 15px 20px 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 20px;
            scrollbar-width: none; /* Firefox */
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        .song-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: var(--bg-item);
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.02);
            transition: 0.3s;
        }
        .song-card.playing { border-color: var(--accent); background: rgba(0,250,217,0.08); }
        .song-icon { width: 30px; font-size: 20px; text-align: center; flex-shrink: 0; }
        .song-info { flex: 1; overflow: hidden; }
        .song-artist { font-size: 14px; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .song-title { font-size: 12px; color: var(--text-muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .song-art-mini { width: 52px; height: 52px; border-radius: 10px; object-fit: cover; background: #000; flex-shrink: 0; }

        #loadMoreBtn {
            margin: 10px 15px 20px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--accent);
            color: var(--accent);
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        /* SEARCH OVERLAY */
        .search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 65px;
            background: var(--bg-card); display: none; align-items: center;
            padding: 0 20px; z-index: 100; border-bottom: 2px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #searchField { flex: 1; background: transparent; border: none; color: #fff; font-size: 18px; outline: none; font-weight: bold; }
        .search-actions { display: flex; gap: 15px; align-items: center; }

        /* FOOTER */
        .footer {
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        #stationDesc { font-size: 11px; color: var(--text-muted); line-height: 1.4; max-width: 700px; margin: 0 auto; }
        .v-tag { font-size: 10px; opacity: 0.2; letter-spacing: 3px; margin-top: 8px; font-weight: bold; }

        /* PC / TABLET LANDSCAPE */
        @media (min-width: 850px) {
            .main-content { flex-direction: row; }
            .player-side { width: 42%; justify-content: center; border-right: 1px solid rgba(255,255,255,0.07); padding: 40px; }
            .list-side { width: 58%; }
            #mainCover { width: 320px; height: 320px; }
            #stationTitle { font-size: 32px; }
            .list-header { font-size: 13px; padding-top: 25px; }
        }
    </style>
</head>
<body onload="startup()">

<div class="app-container">
    <div class="search-overlay" id="searchUI">
        <input type="text" id="searchField" placeholder="Sendernamen eingeben (z.B. niklas-fm)...">
        <div class="search-actions">
            <button onclick="executeSearch()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer;">START</button>
            <button onclick="closeSearch()" style="background:none; border:none; color:#fff; font-size:22px; cursor:pointer;">✕</button>
        </div>
    </div>

    <header class="header">
        <div class="time" id="clockDisplay">00:00</div>
        <div class="logo-text">Radio Ultimate</div>
        <div class="search-btn" onclick="openSearch()">🔍</div>
    </header>

    <main class="main-content">
        <section class="player-side">
            <h1 id="stationTitle">BEREIT</h1>
            <div class="cover-wrapper">
                <img id="mainCover" src="https://api.laut.fm/station/default/images/station_640x640.png">
            </div>
            <div class="controls-row">
                <button id="playBtn" onclick="handlePlayClick()" disabled>▶</button>
                <div class="listener-badge" id="listenersUI">0 HÖRER</div>
            </div>
        </section>

        <section class="list-side">
            <h2 class="list-header">Programm & Verlauf</h2>
            <div id="emptyNote" style="text-align:center; padding:40px 20px; opacity:0.4; font-size:14px;">
                Kein Sender aktiv.<br>Bitte nutze die Suche oben rechts.
            </div>
            <div class="scroll-area" id="songList">
                </div>
            <button id="loadMoreBtn" onclick="toggleSongLimit()">Mehr anzeigen</button>
        </section>
    </main>

    <footer class="footer">
        <div id="stationDesc">Warte auf Eingabe...</div>
        <div class="v-tag">V115.43 • CROSS-PLATFORM</div>
    </footer>
</div>

<script>
    const stream = new Audio();
    let currentStation = "";
    let songLimit = 4;
    let refreshTask = null;

    // Start-Funktion
    function startup() {
        tick();
        setInterval(tick, 1000);
        
        // Enter-Taste in der Suche unterstützen
        document.getElementById('searchField').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') executeSearch();
        });
    }

    function tick() {
        const now = new Date();
        document.getElementById('clockDisplay').innerText = now.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    }

    // Suche-Logik
    function openSearch() {
        document.getElementById('searchUI').style.display = 'flex';
        document.getElementById('searchField').focus();
    }

    function closeSearch() {
        document.getElementById('searchUI').style.display = 'none';
    }

    function executeSearch() {
        const input = document.getElementById('searchField').value.trim();
        if(input) {
            currentStation = input.toLowerCase().replace(/[^a-z0-9-]/g, '');
            initStation();
            closeSearch();
            document.getElementById('searchField').value = "";
        }
    }

    // Radio-Logik
    async function initStation() {
        // UI entsperren
        document.getElementById('emptyNote').style.display = 'none';
        document.getElementById('playBtn').disabled = false;
        document.getElementById('listenersUI').style.display = 'block';
        document.getElementById('loadMoreBtn').style.display = 'block';

        // Stream setzen
        stream.src = `https://stream.laut.fm/${currentStation}`;
        stream.play().catch(e => console.log("Autoplay blockiert, warte auf User"));
        document.getElementById('playBtn').innerHTML = "⏸";

        // Daten holen
        updateAllData();
        if(refreshTask) clearInterval(refreshTask);
        refreshTask = setInterval(updateAllData, 8000);
    }

    function handlePlayClick() {
        if(!currentStation) return;
        if(stream.paused) {
            stream.play();
            document.getElementById('playBtn').innerHTML = "⏸";
        } else {
            stream.pause();
            document.getElementById('playBtn').innerHTML = "▶";
        }
    }

    function toggleSongLimit() {
        songLimit = (songLimit === 4) ? 12 : 4;
        document.getElementById('loadMoreBtn').innerText = (songLimit === 4) ? "Mehr anzeigen" : "Weniger anzeigen";
        updateAllData();
    }

    async function updateAllData() {
        if(!currentStation) return;
        
        try {
            // API Abfragen
            const [stData, history] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentStation}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentStation}/last_songs`).then(r => r.json())
            ]);
            
            const listenerCount = await fetch(`https://api.laut.fm/station/${currentStation}/listeners`).then(r => r.text());

            // Header & Footer
            document.getElementById('stationTitle').innerText = stData.display_name;
            document.getElementById('stationDesc').innerText = stData.description || "Keine Beschreibung verfügbar.";
            document.getElementById('listenersUI').innerText = (listenerCount.includes("<") ? "0" : listenerCount) + " HÖRER";

            let listHtml = "";
            
            history.forEach((song, i) => {
                if(i >= songLimit) return;
                
                const isNow = (i === 0);
                let artistName = song.artist.name;
                let songTitle = song.title;
                const fullString = (artistName + " " + songTitle).toLowerCase();
                
                // Album-Cover Prio
                const finalCover = song.image_640x640 || song.image_170x170 || stData.images.station_640x640;
                
                if(isNow) {
                    document.getElementById('mainCover').src = finalCover;
                }

                // INHALTS-ERKENNUNG (Icons)
                let icon = isNow ? "🔊" : "";
                if(song.type === "ads" || fullString.includes("reklame") || fullString.includes("werbung")) {
                    icon = "📢"; artistName = "WERBUNG";
                } else if(fullString.includes("nachrichten") || fullString.includes("news")) {
                    icon = "📰"; artistName = "NACHRICHTEN";
                } else if(artistName.toLowerCase().includes("moderation") || fullString.includes("ident")) {
                    icon = "🎙️";
                }

                listHtml += `
                    <div class="song-card ${isNow ? 'playing' : ''}">
                        <div class="song-icon">${icon}</div>
                        <div class="song-info">
                            <span class="song-artist">${artistName}</span>
                            <span class="song-title">${songTitle}</span>
                        </div>
                        <img class="song-art-mini" src="${finalCover}">
                    </div>
                `;
            });
            
            document.getElementById('songList').innerHTML = listHtml;

        } catch (error) {
            console.error("API Fehler:", error);
        }
    }
</script>
</body>
</html>
