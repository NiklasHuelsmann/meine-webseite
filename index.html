<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Niklas Radio - Modern Design</title>
    <style>
        :root { --primary: #1db954; --bg: #f0f2f5; --card: #ffffff; --text: #202124; --gray: #5f6368; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }

        .player-card { width: 100%; max-width: 500px; background: var(--card); border-radius: 28px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding-bottom: 20px; }

        /* Header & Logo */
        .header { padding: 25px; text-align: center; border-bottom: 1px solid #f1f3f4; }
        .station-logo { width: 120px; height: 120px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .station-name { font-size: 1.6rem; font-weight: 700; display: block; margin-bottom: 8px; }
        
        .live-info { background: #e8f0fe; color: #1967d2; padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .dot { height: 8px; width: 8px; background: #d93025; border-radius: 50%; }

        /* Navigation Buttons (Sendeplan / Letzte Songs) */
        .nav-container { display: flex; justify-content: center; gap: 10px; padding: 15px; }
        .nav-btn { background: #f1f3f4; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; color: var(--gray); transition: 0.2s; }
        .nav-btn.active { background: #202124; color: white; }

        /* Zentrale Anzeige: Jetzt läuft */
        .now-playing-box { text-align: center; padding: 20px; background: #fafafa; margin: 0 20px 20px 20px; border-radius: 20px; border: 1px solid #eee; }
        .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); font-weight: 700; display: block; margin-bottom: 10px; }
        .current-time { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; display: block; }
        .track-info b { font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .track-info span { color: var(--gray); font-size: 1rem; }

        /* Inhalts-Listen (Abgerundet) */
        .scroll-list { padding: 0 20px; max-height: 300px; overflow-y: auto; }
        .list-entry { background: #fff; border-radius: 16px; padding: 12px 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 15px; border: 1px solid #f1f3f4; }
        .entry-time { font-size: 0.85rem; font-weight: 700; color: #bdc1c6; min-width: 45px; }
        .entry-details b { font-size: 0.95rem; display: block; }
        .entry-details span { font-size: 0.85rem; color: var(--gray); }

        /* Player Footer */
        .player-footer { text-align: center; padding: 10px 40px; }
        .play-trigger { background: var(--primary); color: white; border: none; width: 70px; height: 70px; border-radius: 50%; font-size: 1.8rem; cursor: pointer; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3); }
        .volume-bar { width: 100%; accent-color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>

    <div class="player-card">
        <div class="header">
            <img id="logo" class="station-logo" src="https://api.laut.fm/station/radio_bochum/images/station_640x640">
            <span class="station-name" id="name">Sender Laden...</span>
            <div class="live-info">
                <div class="dot"></div> Hörer: <span id="count">0</span>
            </div>
        </div>

        <!-- Umschalter für die Liste -->
        <div class="nav-container">
            <button class="nav-btn active" onclick="switchTab('plan', this)">Sendeplan</button>
            <button class="nav-btn" onclick="switchTab('history', this)">Letzte Songs</button>
        </div>

        <!-- In der Mitte: Jetzt läuft -->
        <div class="now-playing-box">
            <span class="label">Jetzt läuft</span>
            <span class="current-time" id="cTime">00:00</span>
            <div class="track-info">
                <b id="cArtist">Interpret</b>
                <span id="cTitle">Titel</span>
            </div>
        </div>

        <!-- Die Listen (Sendeplan oder History) -->
        <div class="scroll-list" id="contentList"></div>

        <div class="player-footer">
            <button class="play-trigger" id="btn" onclick="playPause()">▶</button>
            <input type="range" class="volume-bar" min="0" max="1" step="0.01" value="0.5" oninput="changeV(this.value)">
            <p style="font-size: 12px; color: #999;">Gleich: <span id="nextShow">...</span></p>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        // Setze hier deinen Sendernamen ein (kleingeschrieben)
        let stationSlug = "radio_bochum"; 
        const audio = document.getElementById('player');
        let currentTab = 'plan';

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
        }

        async function updateUI() {
            try {
                // Sender Info
                const r1 = await fetch(`https://api.laut.fm/station/${stationSlug}`);
                const d1 = await r1.json();
                document.getElementById('name').innerText = d1.display_name;
                document.getElementById('count').innerText = d1.current_listeners || 0;
                document.getElementById('logo').src = d1.images.station_640x640;

                // Aktueller Song (Mitte)
                const r2 = await fetch(`https://api.laut.fm/station/${stationSlug}/current_song`);
                const d2 = await r2.json();
                const start = new Date(d2.started_at);
                document.getElementById('cTime').innerText = start.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                document.getElementById('cArtist').innerText = d2.artist.name;
                document.getElementById('cTitle').innerText = d2.title;

                const list = document.getElementById('contentList');
                list.innerHTML = "";

                if(currentTab === 'plan') {
                    // Sendeplan laden
                    const rp = await fetch(`https://api.laut.fm/station/${stationSlug}/schedule`);
                    const dp = await rp.json();
                    dp.forEach(s => {
                        list.innerHTML += `<div class="list-entry">
                            <div class="entry-time">${s.start_time}</div>
                            <div class="entry-details"><b>${s.name}</b><span>Playlist</span></div>
                        </div>`;
                    });
                } else {
                    // History laden
                    const rh = await fetch(`https://api.laut.fm/station/${stationSlug}/last_songs`);
                    const dh = await rh.json();
                    dh.forEach(s => {
                        const t = new Date(s.started_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        list.innerHTML += `<div class="list-entry">
                            <div class="entry-time">${t}</div>
                            <div class="entry-details"><b>${s.artist.name}</b><span>${s.title}</span></div>
                        </div>`;
                    });
                }
            } catch(e) {}
        }

        function playPause() {
            if(audio.paused) { 
                audio.src = `https://stream.laut.fm/${stationSlug}`;
                audio.play(); 
                document.getElementById('btn').innerText = "⏸"; 
            } else { 
                audio.pause(); 
                document.getElementById('btn').innerText = "▶"; 
            }
        }

        function changeV(v) { audio.volume = v; }

        // Initialisierung
        updateUI();
        setInterval(updateUI, 20000);
    </script>
</body>
</html>
