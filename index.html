<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Player - Niklas Design</title>
    <style>
        :root { --primary: #1db954; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .search-area { background: #fff; padding: 10px 20px; border-radius: 30px; display: flex; gap: 10px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-area input { border: none; outline: none; width: 160px; }
        .search-area button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        #player-ui { display: none; width: 100%; max-width: 750px; text-align: center; }

        /* Sendername oben mittig */
        .station-header { font-size: 2rem; font-weight: 800; margin-bottom: 10px; color: var(--text); display: block; text-transform: uppercase; }

        /* Hörer-Box (Verhindert "undefined") */
        .listener-box { background: #fff; padding: 8px 18px; border-radius: 12px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .live-dot { height: 10px; width: 10px; background: #f44336; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .main-card { background: #fff; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; }

        /* Logo zentral */
        .main-logo { width: 240px; height: 240px; border-radius: 20px; object-fit: cover; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Info-Bereich unten */
        .now-playing-zone { width: 100%; text-align: left; border-top: 2px solid #f0f0f0; padding-top: 20px; display: flex; gap: 15px; }
        .time-tag { color: var(--primary); font-weight: bold; font-size: 1.1rem; }
        .song-info b { display: block; font-size: 1.3rem; color: #000; margin-bottom: 3px; }
        .song-info span { color: #777; font-size: 1.1rem; }

        .btn-play { background: var(--primary); color: white; border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 1.6rem; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
        .btn-play:hover { transform: scale(1.1); }

        .history-area { margin-top: 30px; width: 100%; text-align: left; background: rgba(255,255,255,0.5); padding: 20px; border-radius: 20px; }
        .h-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .h-time { font-weight: bold; color: #999; }
    </style>
</head>
<body>

    <div class="search-area">
        <input type="text" id="stationInput" placeholder="Sendername..." onkeypress="if(event.key === 'Enter') startPlayer()">
        <button onclick="startPlayer()">START</button>
    </div>

    <div id="player-ui">
        <!-- 1. Sendername oben mittig -->
        <span class="station-header" id="displayName">RADIO</span>

        <!-- 2. Hörer-Information -->
        <div class="listener-box">
            <div class="live-dot"></div>
            <span>Hörer: </span><span id="listenerCount">0</span>
        </div>

        <div class="main-card">
            <!-- 3. Logo in der Mitte -->
            <img id="stationLogo" class="main-logo" src="" alt="Logo">
            
            <!-- 4. Aktuelle Info unten drunter -->
            <div class="now-playing-zone">
                <div class="time-tag" id="curTime">--:--</div>
                <div class="song-info">
                    <b id="curArtist">Interpret</b>
                    <span id="curTitle">Titel</span>
                </div>
            </div>

            <button class="btn-play" id="pBtn" onclick="togglePlay()">▶</button>
        </div>

        <div class="history-area">
            <strong style="color:#888; text-transform: uppercase; font-size: 0.9rem;">Zuletzt gelaufen</strong>
            <div id="historyList"></div>
        </div>
    </div>

    <audio id="radioStream"></audio>

    <script>
        let currentSlug = "";
        let isPlaying = false;

        async function startPlayer() {
            const input = document.getElementById('stationInput').value.trim().toLowerCase();
            if(!input) return;
            currentSlug = input;

            document.getElementById('player-ui').style.display = 'block';
            document.getElementById('radioStream').src = `https://stream.laut.fm/${currentSlug}`;
            
            updateUI();
            setInterval(updateUI, 15000);

            document.getElementById('radioStream').play();
            isPlaying = true;
            document.getElementById('pBtn').innerText = "⏸";
        }

        function togglePlay() {
            const audio = document.getElementById('radioStream');
            if(isPlaying) { audio.pause(); document.getElementById('pBtn').innerText = "▶"; }
            else { audio.play(); document.getElementById('pBtn').innerText = "⏸"; }
            isPlaying = !isPlaying;
        }

        // Hilfsfunktion gegen "undefined" und "[object Object]"
        function formatText(val) {
            if (!val) return "---";
            if (typeof val === 'object') return val.name || "Unbekannt";
            return String(val);
        }

        async function updateUI() {
            try {
                // Station-Daten
                const sRes = await fetch(`https://api.laut.fm/station/${currentSlug}`);
                const sData = await sRes.json();
                document.getElementById('displayName').innerText = sData.display_name || currentSlug;
                // Fix für Hörerzahl: Falls die API noch nichts schickt, zeige 0
                document.getElementById('listenerCount').innerText = sData.current_listeners !== undefined ? sData.current_listeners : 0;
                document.getElementById('stationLogo').src = sData.images.station_640x640;

                // Song-Daten
                const cRes = await fetch(`https://api.laut.fm/station/${currentSlug}/current_song`);
                const cData = await cRes.json();
                const d = new Date();
                document.getElementById('curTime').innerText = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
                document.getElementById('curArtist').innerText = formatText(cData.artist);
                document.getElementById('curTitle').innerText = formatText(cData.title);

                // Verlauf
                const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`);
                const hData = await hRes.json();
                const list = document.getElementById('historyList');
                list.innerHTML = "";
                hData.slice(1, 5).forEach(s => {
                    const st = new Date(s.started_at);
                    list.innerHTML += `
                        <div class="h-item">
                            <span class="h-time">${st.getHours()}:${st.getMinutes().toString().padStart(2, '0')}</span>
                            <div><strong>${formatText(s.artist)}</strong> - ${formatText(s.title)}</div>
                        </div>`;
                });
            } catch (e) { console.error("Update-Fehler"); }
        }
    </script>
</body>
</html>
