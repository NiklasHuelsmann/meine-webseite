<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Radio Ultimate v115.33</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #cbd5e0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: #0d111a; margin: 0; height: 100vh; 
            color: var(--text-main); font-family: -apple-system, system-ui, sans-serif; 
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        
        .app { 
            width: 100%; max-width: 1000px; height: 100vh; 
            background-color: var(--bg-app); display: flex; flex-direction: column; 
            position: relative;
        }

        .main-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

        /* HEADER */
        .header-fixed { flex-shrink: 0; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        .top-nav { height: 45px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        #sysTime { font-size: 15px; font-weight: 800; }
        
        /* HERO BEREICH (Logo & Name) */
        .hero { padding: 20px 0; text-align: center; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #stNameHeader { font-size: 26px; font-weight: 900; margin: 0 0 15px; text-transform: uppercase; letter-spacing: 2px; width: 100%; }
        #mainImg { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.15); }
        
        .controls { margin: 20px 0; display: flex; justify-content: center; width: 100%; }
        #pBtn { width: 65px; height: 65px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 28px; cursor: pointer; color: #1e2538; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0, 250, 217, 0.4); }

        /* LISTE */
        .list-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .list-header { font-size: 14px; font-weight: 900; color: var(--accent-main); margin: 15px 15px 10px; text-transform: uppercase; text-align: center; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 0 12px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .scroll-content::-webkit-scrollbar { display: none; }
        
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 15px; margin-bottom: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.03); }
        .track-entry.current { border-left: 6px solid var(--accent-main); background: rgba(255,255,255,0.12); }
        .track-details { flex: 1; overflow: hidden; text-align: left; }
        .track-art { font-size: 14px; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .track-tit { font-size: 12px; color: var(--text-dim); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-cover { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #000; }

        /* FOOTER */
        .fixed-footer { flex-shrink: 0; padding: 15px; background: #111622; border-top: 2px solid rgba(255,255,255,0.05); text-align: center; }
        .hoerer-badge { background: var(--accent-main); color: #1e2538; padding: 6px 20px; border-radius: 15px; font-size: 13px; font-weight: 900; display: inline-block; margin-bottom: 10px; }
        #footerDesc { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.3; }
        .version-tag { font-size: 12px; font-weight: 900; letter-spacing: 2px; opacity: 0.5; }

        /* SUCHE */
        #searchOverlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; height: 48px; background: var(--bg-card); z-index: 1000; display: none; align-items: center; padding: 0 15px; border-radius: 24px; border: 2px solid var(--accent-main); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }

        /* COMPUTER LOOK FIX */
        @media (min-width: 800px) {
            .app { width: 90%; height: 85vh; border-radius: 25px; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
            .main-layout { flex-direction: row; }
            .hero { width: 45%; border-right: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); padding: 40px; }
            .list-container { width: 55%; }
            #mainImg { width: 280px; height: 280px; }
            #stNameHeader { font-size: 34px; margin-bottom: 25px; }
            .list-header { text-align: left; margin-left: 20px; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button>
    </div>

    <div class="header-fixed">
        <div class="top-nav">
            <div id="sysTime">00:00</div>
            <div style="cursor:pointer; font-size: 22px;" onclick="toggleSearch()">🔍</div>
        </div>
    </div>

    <div class="main-layout">
        <div class="hero">
            <h1 id="stNameHeader">RADIO PLAYER</h1>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <button id="pBtn" onclick="togglePlay()">▶</button>
            </div>
        </div>

        <div class="list-container">
            <div class="list-header">JETZT LÄUFT & VERLAUF</div>
            <div class="scroll-content" id="trackList"></div>
            <div style="text-align:center; padding: 15px;">
                <button id="btnMore" style="display:none; background:none; border:2px solid var(--accent-main); color:var(--accent-main); padding:8px 25px; border-radius:20px; font-weight:800; cursor:pointer;" onclick="toggleMore()">9 SONGS ANZEIGEN</button>
            </div>
        </div>
    </div>

    <div class="fixed-footer">
        <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        <div id="footerDesc">Bereit zum Starten...</div>
        <div class="version-tag">V115.33</div>
    </div>
</div>

<script>
    const au = new Audio(); 
    let currentSlug = ""; 
    let limit = 4;

    function initApp() { 
        setInterval(() => { 
            document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); 
        }, 1000); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex';
        if(s.style.display === 'flex') document.getElementById('sInput').focus();
    }
    
    function execSearch() { 
        const val = document.getElementById('sInput').value.trim();
        if(val) { startStation(val, true); toggleSearch(); document.getElementById('sInput').value=""; } 
    }

    function toggleMore() {
        limit = (limit === 4) ? 9 : 4;
        document.getElementById('btnMore').innerText = (limit === 4) ? "9 SONGS ANZEIGEN" : "WENIGER ANZEIGEN";
        updateUI();
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnMore').style.display = 'inline-block';
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { 
        if(!currentSlug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json())
            ]);
            const hRes = await fetch(`https://api.laut.fm/station/${currentSlug}/listeners`);
            const hCount = await hRes.text();

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('footerDesc').innerText = s.description || "Live auf laut.fm";
            document.getElementById('hoerer').innerText = (hCount.includes("<") ? "0" : hCount) + " HÖRER";

            let html = "";
            l.forEach((song, i) => {
                if(i >= limit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const fullText = (art + " " + tit).toLowerCase();
                let albumImg = song.image_640x640 || song.image_170x170 || s.images.station_640x640;
                
                if(isCurrent) document.getElementById('mainImg').src = albumImg;
                const startTime = new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
                let icon = isCurrent ? `🔊` : "";
                
                if(fullText.includes("start_ad_break") || fullText.includes("ad-trigger") || fullText.includes("reklame") || song.type === "ads") {
                    icon = `📢`; art = "WERBUNG";
                } else if(fullText.includes("nachrichten") || fullText.includes("news")) {
                    icon = `📰`; art = "NEWS";
                } else if(art.toLowerCase() === "moderation") {
                    icon = `🎙️`; art = "MODERATION";
                }

                html += `<div class="track-entry ${isCurrent ? 'current' : ''}">
                    <div style="font-size:20px; width:30px; text-align:center;">${icon}</div>
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                        <div style="font-size:10px; font-weight:800; opacity:0.6; margin-top:4px;">${startTime}</div>
                    </div>
                    <img class="track-cover" src="${albumImg}">
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
</script>
</body>
</html>
