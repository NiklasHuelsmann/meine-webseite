<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Ultimate v115.75 - Search Master</title>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #007aff; --white: #ffffff; --text-dim: #8b949e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 1600px; height: 100vh; display: flex; flex-direction: column; background: var(--panel); }
        
        /* HEADER MIT FUNKTIONIERENDER SUCHE */
        .nav { height: 70px; display: flex; align-items: center; padding: 0 20px; background: #000; border-bottom: 2px solid var(--accent); gap: 15px; position: relative; }
        
        .search-container { position: relative; flex: 1; max-width: 500px; display: flex; align-items: center; }
        
        #query { 
            width: 100%; background: #ffffff; border: none; border-radius: 8px; 
            padding: 12px 45px 12px 15px; color: #000; outline: none; font-size: 16px; 
        }

        /* Die Such-Lupe im Feld */
        .search-icon { 
            position: absolute; right: 15px; color: #666; cursor: pointer; font-size: 20px; 
            background: none; border: none; padding: 0;
        }

        /* DAS ERGEBNIS-FENSTER (WICHTIG!) */
        #results { 
            position: absolute; top: 55px; left: 0; width: 100%; background: #ffffff; 
            border-radius: 8px; display: none; z-index: 10000; color: #333; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); max-height: 400px; overflow-y: auto; 
        }

        .res-item { 
            padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; 
            display: flex; align-items: center; gap: 12px; transition: 0.2s;
        }
        .res-item:hover { background: #f0f7ff; color: var(--accent); }
        .res-item img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; border: 1px solid #ddd; }

        .main { flex: 1; display: flex; overflow: hidden; }
        .player-side { width: 420px; padding: 30px; display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.05); }
        
        .krenn-frame { width: 300px; height: 300px; border: 4px solid var(--accent); border-radius: 45px; padding: 6px; background: #000; position: relative; margin-bottom: 20px; }
        #mainCover { width: 100%; height: 100%; border-radius: 36px; object-fit: cover; }
        #statusOverlay { position: absolute; inset: 6px; background: rgba(0,122,255,0.4); border-radius: 36px; display: none; align-items: center; justify-content: center; font-size: 100px; backdrop-filter: blur(4px); color: white; }

        #playIcon { width: 75px; height: 75px; border-radius: 50%; background: var(--accent); border: none; font-size: 32px; color: white; cursor: pointer; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,122,255,0.4); }
        
        .list-side { flex: 1; overflow-y: auto; padding: 25px; }
        .song-card { display: flex; align-items: center; gap: 15px; padding: 15px; background: #1c2128; border-radius: 18px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .song-card.active { border: 1px solid var(--accent); background: rgba(0,122,255,0.05); }

        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .player-side { width: 100%; border-right: none; padding: 15px; border-bottom: 1px solid var(--accent); }
            .krenn-frame { width: 180px; height: 180px; }
        }
    </style>
</head>
<body onload="init()">

<div class="app">
    <header class="nav">
        <div style="font-weight:900; color:var(--accent); font-size:20px;">RADIO</div>
        <div class="search-container">
            <input type="text" id="query" placeholder="Sender suchen..." autocomplete="off">
            <button class="search-icon" onclick="triggerSearch()">🔍</button>
            <div id="results"></div>
        </div>
        <div id="clock" style="font-weight:bold; opacity:0.6;">00:00</div>
    </header>

    <main class="main">
        <section class="player-side">
            <div class="krenn-frame">
                <img id="mainCover" src="https://api.laut.fm/station/default/images/station_640x640.png">
                <div id="statusOverlay"></div>
            </div>
            <button id="playIcon" onclick="toggleAudio()" disabled>▶</button>
            <h2 id="stationTitle" style="margin:0 0 10px 0; text-align: center;">WÄHLE SENDER</h2>
            <div id="listenerCount" style="color:var(--accent); font-weight:bold; background:rgba(0,122,255,0.1); padding:5px 15px; border-radius:20px;">READY</div>
        </section>

        <section class="list-side" id="playlist">
            <div style="text-align:center; opacity:0.3; margin-top:100px;">GIB EINEN NAMEN EIN UND KLICKE AUF DAS ERGEBNIS</div>
        </section>
    </main>
</div>

<script>
    const stream = new Audio();
    let currentID = "";
    const input = document.getElementById('query');
    const resBox = document.getElementById('results');

    function init() {
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000);
        
        // Suche beim Tippen (Live)
        input.addEventListener('input', () => triggerSearch());

        // Enter-Taste abfangen
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const first = resBox.querySelector('.res-item');
                if (first) first.click();
            }
        });

        // Schließen wenn man woanders hinklickt
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) resBox.style.display = 'none';
        });
    }

    async function triggerSearch() {
        const s = input.value.trim();
        if(s.length < 2) { resBox.style.display = 'none'; return; }
        
        try {
            const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(s)}`).then(res => res.json());
            if(r.items && r.items.length > 0) {
                resBox.innerHTML = r.items.slice(0,8).map(st => `
                    <div class="res-item" onclick="startStream('${st.name}')">
                        <img src="${st.images.station_80x80}">
                        <b>${st.display_name}</b>
                    </div>`).join('');
                resBox.style.display = 'block';
            } else {
                resBox.style.display = 'none';
            }
        } catch(e) { console.error("Suche fehlgeschlagen"); }
    }

    async function startStream(id) {
        currentID = id;
        resBox.style.display = 'none';
        input.value = "";
        document.getElementById('playIcon').disabled = false;
        stream.src = `https://stream.laut.fm/${currentID}`;
        stream.play().catch(() => { alert("Bitte Play drücken!"); });
        document.getElementById('playIcon').innerHTML = "⏸";
        loadData();
        if(window.iv) clearInterval(window.iv);
        window.iv = setInterval(loadData, 10000);
    }

    function toggleAudio() {
        if(stream.paused) { stream.play(); document.getElementById('playIcon').innerHTML = "⏸"; }
        else { stream.pause(); document.getElementById('playIcon').innerHTML = "▶"; }
    }

    async function loadData() {
        if(!currentID) return;
        try {
            const [st, songs, listeners] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentID}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentID}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stationTitle').innerText = st.display_name;
            document.getElementById('listenerCount').innerText = (listeners.includes('<') ? '0' : listeners) + " HÖRER LIVE";

            const overlay = document.getElementById('statusOverlay');
            overlay.style.display = "none";

            let html = '<div style="font-size:11px; color:var(--accent); font-weight:800; margin-bottom:15px; letter-spacing:1px;">STUDIO PLAYLIST</div>';
            
            songs.forEach((song, i) => {
                const isNow = i === 0;
                const cover = song.image_640x640 || st.images.station_640x640;
                let art = song.artist.name, tit = song.title, icon = "";
                const check = (art + tit).toLowerCase();

                if(check.includes("nachrichten") || check.includes("news")) {
                    icon = "📰"; if(isNow) { overlay.innerHTML = "📰"; overlay.style.display = "flex"; }
                } else if(check.includes("moderation") || check.includes("ident")) {
                    icon = "🎙️"; if(isNow) { overlay.innerHTML = "🎙️"; overlay.style.display = "flex"; }
                }

                if(isNow) document.getElementById('mainCover').src = cover;

                html += `
                    <div class="song-card ${isNow ? 'active' : ''}">
                        <div style="width:45px; font-size:11px; color:var(--accent); font-weight:bold;">${song.started_at.split(' ')[1].substring(0,5)}</div>
                        <div style="font-size:22px; width:35px; text-align:center;">${icon}</div>
                        <div style="flex:1; overflow:hidden;">
                            <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${art}</div>
                            <div style="font-size:13px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${tit}</div>
                        </div>
                        <img src="${cover}" style="width:42px; height:42px; border-radius:8px;">
                    </div>`;
            });
            document.getElementById('playlist').innerHTML = html;
        } catch (e) { }
    }
</script>
</body>
</html>
