<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App FINAL v89.6</title>
    <style>
        :root { 
            --bg-outer: #05070a; 
            --bg-app: #0c0e14;   
            --bg-card: #161a24;
            --accent-green: #00e699;
            --accent-pink: #ff00ff;
            --accent-yellow: #ffd700;
            --accent-blue: #00d9ff;
            --text-main: #ffffff;
            --text-dim: #717b8a;
        }

        body { 
            background-color: var(--bg-outer); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            color: var(--text-main);
            font-family: sans-serif;
        }

        .app { 
            width: 100%; 
            max-width: 480px; 
            height: 100%;
            background-color: var(--bg-app); 
            position: relative; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Top Bar */
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        #sysTime { color: #fff; font-size: 18px; font-weight: bold; }
        .search-trigger { font-size: 22px; color: var(--accent-green); cursor: pointer; }

        #searchBox { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: var(--bg-card); z-index: 2000; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--accent-green); }
        #sIn { flex: 1; height: 40px; background: #232a37; border: none; border-radius: 8px; color: #fff; padding: 0 10px; outline: none; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* Hero: Name ÜBER Bild */
        .hero { padding: 10px 20px 20px; text-align: center; }
        #stNameDisplay { font-size: 22px; font-weight: bold; margin-bottom: 15px; color: #fff; display: block; text-transform: uppercase; }
        #mainImg { width: 100%; border-radius: 15px; aspect-ratio: 1/1; object-fit: cover; }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 20px 0; }
        #pBtn { width: 70px; height: 70px; border-radius: 50%; background: var(--accent-green); border: none; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-side { background: none; border: none; color: var(--accent-green); font-size: 24px; cursor: pointer; }

        /* Boxen Design */
        .box { background: var(--bg-card); border-radius: 12px; padding: 15px; margin: 0 15px 15px; }
        .label { color: var(--text-dim); font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .track-info { display: flex; align-items: flex-start; gap: 12px; }
        .speaker { color: var(--accent-green); font-size: 20px; }
        .artist { font-size: 18px; font-weight: bold; display: block; }
        .title { font-size: 15px; opacity: 0.8; display: block; }

        .list-item { display: flex; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        .l-time { width: 50px; color: var(--text-dim); }
        .l-art { color: var(--accent-green); font-weight: 600; }
        
        #moreBtn { color: var(--accent-green); text-align: center; padding: 10px; cursor: pointer; font-weight: bold; font-size: 13px; text-transform: uppercase; }

        .footer-info { padding: 10px 20px 60px; }
        #stLoc { color: var(--accent-green); font-weight: bold; margin-bottom: 5px; }
        #stDesc { font-size: 14px; line-height: 1.5; opacity: 0.7; margin-bottom: 15px; }
        .hoerer-badge { background: rgba(0,230,153,0.1); color: var(--accent-green); padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="search-trigger" onclick="openSearch()">🔍</div>
    </div>

    <div id="searchBox">
        <input type="text" id="sIn" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') startSearch()">
        <button onclick="closeSearch()" style="background:none; border:none; color:white; margin-left:10px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <span id="stNameDisplay">RADIO</span>
            <img id="mainImg" src="https://laut.fm/images/station_640x640.png">
            <div class="controls">
                <button class="btn-side" onclick="shareStation()">🔗</button>
                <button id="pBtn" onclick="toggle()">▶</button>
                <div style="width:30px"></div>
            </div>
        </div>

        <div class="box">
            <span class="label">Jetzt läuft</span>
            <div class="track-info">
                <span class="speaker">🔊</span>
                <div>
                    <span id="curArt" class="artist">BEREIT</span>
                    <span id="curTit" class="title">Wähle einen Sender</span>
                </div>
            </div>
        </div>

        <div class="box">
            <span class="label">Zuletzt gelaufen</span>
            <div id="historyList"></div>
            <div id="moreBtn" onclick="toggleHistory()">Mehr anzeigen</div>
        </div>

        <div class="box">
            <span class="label">Programm</span>
            <div id="nextProg" style="font-size: 13px; opacity: 0.6;">Lade Sendeplan...</div>
        </div>

        <div class="footer-info">
            <div id="stLoc">📍 STANDORT</div>
            <div id="stDesc"></div>
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
    </div>
</div>

<script>
    const au = new Audio(); au.volume = 0.8;
    let slug = "";
    let histFull = false;

    function updateClock() { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }); }
    setInterval(updateClock, 1000); updateClock();

    function openSearch() { document.getElementById('searchBox').style.display = 'flex'; document.getElementById('sIn').focus(); }
    function closeSearch() { document.getElementById('searchBox').style.display = 'none'; }

    async function startSearch() {
        const val = document.getElementById('sIn').value.trim();
        if(!val) return;
        slug = val.toLowerCase().replace(/[^a-z0-9-]/g, '');
        au.src = "https://stream.laut.fm/" + slug;
        au.play(); document.getElementById('pBtn').innerHTML = "⏸";
        closeSearch(); updateUI();
        setInterval(updateUI, 10000);
    }

    function toggle() {
        if(!slug) return;
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleHistory() { histFull = !histFull; updateUI(); }

    async function updateUI() {
        if(!slug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${slug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameDisplay').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stLoc').innerText = "📍 " + (s.city || "RADIO-STATION");
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('nextProg').innerText = s.page_title || "Aktuelles Programm läuft...";

            const cur = l[0];
            let color = "var(--accent-green)";
            if(cur.type === "gold") color = "var(--accent-yellow)";
            if(cur.type === "news") color = "var(--accent-blue)";
            
            if(cur.type === "moderation" || cur.type === "pink") {
                color = "var(--accent-pink)";
                document.getElementById('curArt').innerText = s.display_name + " - MODERATION";
            } else {
                document.getElementById('curArt').innerText = cur.artist.name;
            }
            
            document.getElementById('curArt').style.color = color;
            document.getElementById('curTit').innerText = cur.title;

            let histHtml = "";
            const limit = histFull ? 10 : 3;
            l.slice(1, limit + 1).forEach(song => {
                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                histHtml += `<div class="list-item"><span class="l-time">${time}</span><div><span class="l-art">${song.artist.name}</span><br>${song.title}</div></div>`;
            });
            document.getElementById('historyList').innerHTML = histHtml;
            document.getElementById('moreBtn').innerText = histFull ? "Weniger" : "Mehr anzeigen";
        } catch(e) {}
    }

    async function shareStation() {
        if(!slug) return;
        if (navigator.share) navigator.share({ url: `https://laut.fm/${slug}` });
    }
</script>
</body>
</html>
