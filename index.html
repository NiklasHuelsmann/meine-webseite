<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Pro v115.02 - Final Master</title>
    <style>
        :root { 
            --bg-app: #1e2538; --bg-card: #283044; --accent-main: #00fad9; 
            --text-main: #ffffff; --text-dim: #949fb1;
            --status-yellow: rgba(255, 204, 0, 0.15); 
            --status-blue: rgba(0, 123, 255, 0.15); 
            --status-red: rgba(255, 59, 59, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: sans-serif; overflow: hidden; }
        
        .app { width: 100%; max-width: 800px; height: 100vh; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        
        /* Header */
        .top-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; flex-shrink: 0; }
        #sysTime { font-size: 14px; font-weight: bold; }
        .icon-btn-large { font-size: 24px; color: var(--accent-main); cursor: pointer; }
        
        /* Suche */
        #searchOverlay { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 90%; height: 50px; background: var(--bg-card); z-index: 100; align-items: center; padding: 0 15px; border-radius: 25px; border: 2px solid var(--accent-main); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #sInput { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }

        /* Content scrollbar */
        .main-content { flex: 1; overflow-y: auto; scrollbar-width: none; padding-bottom: 20px; }
        .main-content::-webkit-scrollbar { display: none; }
        
        .hero { padding: 10px 0; text-align: center; }
        #stNameHeader { font-size: clamp(20px, 6vw, 30px); font-weight: 900; color: #fff; text-transform: uppercase; margin: 0; }
        #stPageTitle { font-size: 12px; color: var(--accent-main); margin-bottom: 10px; display: block; font-weight: bold; }
        #mainImg { width: 50%; max-width: 220px; aspect-ratio: 1/1; border-radius: 20px; object-fit: cover; background: #333; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin: 15px 0; }
        #pBtn { width: 65px; height: 65px; border-radius: 50%; background: var(--accent-main); border: none; font-size: 28px; color: #1e2538; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 250, 217, 0.3); }
        
        /* Song Liste Bereich */
        .status-indicator { font-size: 11px; font-weight: bold; color: var(--accent-main); text-align: left; margin: 0 15px 5px; text-transform: uppercase; letter-spacing: 1px; }
        #nowPlayingBox { margin: 0 12px; padding: 5px; border-radius: 15px; background: var(--bg-card); }
        
        .track-entry { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; margin-bottom: 5px; background: rgba(0,0,0,0.2); transition: background 0.3s; }
        .pure-icon { font-size: 24px; width: 40px; text-align: center; flex-shrink: 0; }
        .track-cover { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
        
        .track-details { flex: 1; overflow: hidden; }
        .track-art { font-size: 14px; font-weight: bold; color: #fff; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-tit { font-size: 12px; color: #bbb; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .speaker-anim { color: var(--accent-main); font-size: 18px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .more-songs-area { text-align: center; padding: 10px 0; }
        #btnToggleList { background: rgba(255,255,255,0.05); border: 1px solid var(--accent-main); color: var(--accent-main); padding: 6px 15px; border-radius: 20px; font-size: 11px; cursor: pointer; display: none; }

        /* Footer - Sicher vor Home-Buttons */
        .fixed-footer { 
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); 
            background: #151a29; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            flex-shrink: 0; 
        }
        .footer-row { display: flex; justify-content: center; margin-bottom: 10px; }
        .hoerer-badge { background: var(--accent-main); color: #1e2538; padding: 6px 18px; border-radius: 10px; font-size: 18px; font-weight: 900; }
        
        #footerDesc { 
            font-size: 12px; line-height: 1.4; text-align: center; color: #ddd; 
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px;
            max-height: 60px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.05);
        }

        .version-tag { text-align: center; font-size: 9px; color: var(--text-dim); margin-top: 8px; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body onload="initApp()">
<div class="app">
    <div class="top-nav">
        <div id="sysTime">00:00</div>
        <div class="icon-btn-large" onclick="toggleSearch()">🔍</div>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff; font-size: 18px;">✕</button>
    </div>

    <div class="main-content">
        <div class="hero">
            <h1 id="stNameHeader">RADIO PLAYER</h1>
            <span id="stPageTitle">Suche einen Sender</span>
            <img id="mainImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
            <div class="controls">
                <div style="font-size: 22px; color: var(--accent-main); cursor:pointer" onclick="share()">🔗</div>
                <button id="pBtn" onclick="togglePlay()">▶</button>
                <div style="width:22px"></div>
            </div>
        </div>

        <div class="status-indicator" id="liveStatusText">WAS JETZT LÄUFT:</div>
        <div id="nowPlayingBox">
            <div id="trackList" style="text-align:center; padding: 20px; opacity:0.5;">Bitte Sender suchen 🔍</div>
        </div>

        <div class="more-songs-area">
            <button id="btnToggleList" onclick="toggleListSize()">MEHR SONGS ANZEIGEN</button>
        </div>
    </div>

    <div class="fixed-footer">
        <div class="footer-row">
            <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
        </div>
        <div id="footerDesc">Kein Sender gewählt.</div>
        <div class="version-tag">App Version v115.02 • Final Build</div>
    </div>
</div>

<script>
    const au = new Audio(); 
    let currentSlug = ""; 
    let showFullList = false;

    function initApp() { 
        setInterval(() => { document.getElementById('sysTime').innerText = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}); }, 1000); 
    }

    function toggleListSize() { 
        showFullList = !showFullList; 
        document.getElementById('btnToggleList').innerText = showFullList ? "WENIGER ANZEIGEN" : "MEHR SONGS ANZEIGEN";
        updateUI(); 
    }

    function toggleSearch() { 
        const s = document.getElementById('searchOverlay'); 
        s.style.display = (s.style.display === 'flex') ? 'none' : 'flex'; 
        if(s.style.display==='flex') { document.getElementById('sInput').value = ""; document.getElementById('sInput').focus(); }
    }
    
    function execSearch() { 
        const input = document.getElementById('sInput'); 
        if(input.value.trim()) { startStation(input.value.trim(), true); input.value = ""; toggleSearch(); } 
    }
    
    async function startStation(slug, play) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(play) { au.play().catch(()=>{}); document.getElementById('pBtn').innerHTML = "⏸"; }
        document.getElementById('btnToggleList').style.display = 'inline-block';
        updateUI();
        if(window.uiInterval) clearInterval(window.uiInterval);
        window.uiInterval = setInterval(updateUI, 8000);
    }

    function togglePlay() { 
        if(!currentSlug) { toggleSearch(); return; }
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; } 
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; } 
    }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/listeners/${currentSlug}`).then(r => r.text())
            ]);

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('stPageTitle').innerText = s.page_title || "";
            document.getElementById('footerDesc').innerText = s.description || "Keine Beschreibung verfügbar.";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('mainImg').src = s.images.station_640x640;

            let html = "";
            const listLimit = showFullList ? 9 : 3;

            l.forEach((song, i) => {
                if(i >= listLimit) return;
                const isCurrent = (i === 0);
                let art = song.artist.name;
                let tit = song.title;
                const check = (art + " " + tit).toLowerCase();
                
                let imageToDisplay = song.image_640x640 || (song.artist && song.artist.image) || s.images.station_120x120;
                let mediaElement = `<img class="track-cover" src="${imageToDisplay}">`;
                let rowStyle = "";

                // Icons ohne Box/Rand & mit Farbschimmer
                if(check.includes("reklame") || check.includes("werbung") || song.type === "gold" || tit.includes("ad_break")) {
                    mediaElement = `<div class="pure-icon">📢</div>`;
                    if(isCurrent) { art = "REKLAME"; tit = "Werbung läuft..."; rowStyle = `background-color: var(--status-blue)`; }
                } else if(check.includes("news") || check.includes("nachrichten")) {
                    mediaElement = `<div class="pure-icon">📰</div>`;
                    if(isCurrent) { art = "NACHRICHTEN"; tit = "Aktuelle Meldungen"; rowStyle = `background-color: var(--status-yellow)`; }
                } else if(check.includes("moderation") || check.includes("talk") || check.includes("live") || check.includes("beratung") || check.includes("spricht")) {
                    mediaElement = `<div class="pure-icon">🎙️</div>`;
                    if(isCurrent) { art = "MODERATION"; tit = "Live Sprecher"; rowStyle = `background-color: var(--status-red)`; }
                }

                html += `<div class="track-entry" style="${rowStyle}">
                    ${mediaElement}
                    <div class="track-details">
                        <span class="track-art">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                    <div class="track-status">
                        <div class="track-time">${isCurrent ? 'JETZT' : new Date(song.started_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</div>
                        ${isCurrent ? '<div class="speaker-anim">🔊</div>' : ''}
                    </div>
                </div>`;
            });
            document.getElementById('trackList').innerHTML = html;
        } catch(e) {}
    }
    function share() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
