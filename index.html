<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Radio Live Hub</title>
    <style>
        :root { --bg: #f4f6f9; --accent: #00a67c; } /* laut.fm grün */
        body { font-family: sans-serif; background: var(--bg); padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: white; padding: 12px; border-radius: 8px; border: 1px solid #ddd; position: relative; }
        .head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .logo { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .info { font-size: 0.85rem; color: #555; margin-bottom: 10px; }
        /* Der Knopf wie auf laut.fm */
        .btn { 
            background: var(--accent); color: white; border: none; 
            padding: 6px 15px; border-radius: 4px; cursor: pointer; 
            font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; gap: 6px;
        }
        .btn:hover { background: #008f6a; }
    </style>
</head>
<body>

<div class="grid" id="container"></div>
<audio id="player"></audio>

<script>
    let stations = JSON.parse(localStorage.getItem('my_stations')) || ['niklas-fm'];
    const player = document.getElementById('player');

    function render() {
        const cont = document.getElementById('container');
        cont.innerHTML = '';
        stations.forEach(slug => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div class="head">
                    <img id="logo-${slug}" class="logo" src="https://api.laut.fm/favicon.ico">
                    <div>
                        <div style="font-weight:bold">${slug.toUpperCase()}</div>
                        <div style="font-size:0.75rem">Hörer: <span id="list-${slug}">0</span></div>
                    </div>
                </div>
                <div class="info">
                    <div id="art-${slug}" style="font-weight:bold; color:black">Lade...</div>
                    <div id="tit-${slug}">Verbinde...</div>
                </div>
                <button class="btn" onclick="toggle('${slug}')" id="btn-${slug}">
                    <span id="icon-${slug}">▶</span> Sender starten
                </button>
            `;
            cont.appendChild(div);
            update(slug);
        });
    }

    async function update(slug) {
        // API Aufrufe für Bilder, Hörer und Songs
        fetch(`https://api.laut.fm/station/${slug}`)
            .then(r => r.json())
            .then(d => {
                const img = document.getElementById(`logo-${slug}`);
                if(img && d.images) img.src = d.images.station_120x120;
            });
            
        fetch(`https://api.laut.fm/station/${slug}/listeners`).then(r => r.text()).then(t => document.getElementById(`list-${slug}`).innerText = t);
        fetch(`https://api.laut.fm/station/${slug}/current_song`).then(r => r.json()).then(s => {
            document.getElementById(`art-${slug}`).innerText = s.artist?.name || "-";
            document.getElementById(`tit-${slug}`).innerText = s.title || "-";
        });
    }

    function toggle(slug) {
        const icon = document.getElementById(`icon-${slug}`);
        const btn = document.getElementById(`btn-${slug}`);
        
        if (player.src.includes(slug) && !player.paused) {
            player.pause();
            icon.innerText = "▶";
            btn.innerHTML = `<span id="icon-${slug}">▶</span> Sender starten`;
        } else {
            player.src = `https://stream.laut.fm/${slug}`;
            player.play();
            icon.innerText = "⏹";
            btn.innerHTML = `<span id="icon-${slug}">⏹</span> Sender stoppen`;
        }
    }

    render();
    setInterval(() => stations.forEach(update), 15000);
</script>
</body>
</html>
