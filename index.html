<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio Player Full-Auto v91.5</title>
    <style>
        :root { 
            --bg-app: #1e2538; 
            --accent-green: #00fad9; 
            --status-yellow: #ffb300; 
            --status-blue: #00aaff;
            --status-pink: #ff00ff;
            --text-main: #ffffff;
            --text-dim: #949fb1;
            --line: rgba(255,255,255,0.1);
        }
        
        body { background-color: #0d111a; margin: 0; display: flex; justify-content: center; height: 100vh; color: var(--text-main); font-family: -apple-system, sans-serif; overflow: hidden; }
        .app { width: 100%; max-width: 480px; height: 100%; background-color: var(--bg-app); display: flex; flex-direction: column; position: relative; }
        
        .top-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
        #stNameHeader { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .scroll-area { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .hero { padding: 0; text-align: center; position: relative; }
        #mainImg { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-bottom: 2px solid var(--accent-green); background: #161a24; }
        
        .main-controls { display: flex; align-items: center; justify-content: center; gap: 40px; margin-top: -30px; position: relative; z-index: 10; }
        .btn-round { width: 65px; height: 65px; border-radius: 50%; background: var(--accent-green); border: none; font-size: 28px; color: #1e2538; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .icon-side { background: none; border: none; color: var(--accent-green); font-size: 22px; cursor: pointer; }

        /* Dynamische Sektion für Werbung/News */
        #nowBox { padding: 25px 20px; border-top: 1px solid var(--line); transition: background 0.5s ease; }
        .section-title { font-style: italic; font-size: 24px; font-weight: 900; margin-bottom: 15px; display: block; }

        .track-entry { display: flex; align-items: center; gap: 15px; padding: 14px 0; border-bottom: 1px solid var(--line); }
        .track-time { width: 45px; font-size: 13px; color: var(--text-dim); }
        .track-details { flex: 1; }
        .track-art { font-size: 17px; font-weight: bold; display: block; color: #fff; }
        .track-tit { font-size: 14px; color: var(--text-dim); display: block; margin-top: 2px; }
        #speakerIcon { color: var(--accent-green); font-size: 18px; width: 45px; text-align: center; }

        .footer-area { padding: 20px; background: rgba(0,0,0,0.2); }
        .loc-box { display: flex; align-items: center; gap: 8px; color: var(--accent-green); font-weight: bold; margin-bottom: 15px; }
        .vol-box { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        #volSlider { flex: 1; accent-color: var(--accent-green); height: 4px; cursor: pointer; }
        .hoerer-badge { background: rgba(0,250,217,0.1); color: var(--accent-green); padding: 5px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; margin-top: 10px; }

        #searchOverlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 50px; background: #161a24; z-index: 100; align-items: center; padding: 0 15px; }
        #sInput { flex: 1; height: 35px; background: #1e2538; border: 1px solid var(--accent-green); border-radius: 4px; color: #fff; padding: 0 10px; outline: none; }
    </style>
</head>
<body onload="initApp()">

<div class="app">
    <div class="top-nav">
        <span id="stNameHeader">RADIO PLAYER</span>
        <span onclick="toggleSearch()" style="cursor:pointer; color:var(--accent-green); font-size:20px;">🔍</span>
    </div>

    <div id="searchOverlay">
        <input type="text" id="sInput" placeholder="Sender suchen..." onkeydown="if(event.key==='Enter') execSearch()">
        <button onclick="toggleSearch()" style="background:none; border:none; color:#fff; margin-left:10px;">✕</button>
    </div>

    <div class="scroll-area">
        <div class="hero">
            <img id="mainImg" src="">
            <div class="main-controls">
                <button class="icon-side" onclick="shareStation()">🔗</button>
                <button id="pBtn" class="btn-round" onclick="togglePlay()">▶</button>
                <div style="width:24px"></div>
            </div>
        </div>

        <div id="nowBox" class="content-section">
            <span class="section-title">Jetzt läuft</span>
            <div id="trackList"></div>
            <div id="moreBtn" style="color:var(--accent-green); text-align:center; padding:15px; font-weight:bold; cursor:pointer;" onclick="toggleHistory()">mehr Songs anzeigen</div>
        </div>

        <div class="footer-area">
            <span id="footerSlogan" class="section-title" style="font-size:22px;">...</span>
            <div class="loc-row" style="display:flex; justify-content:space-between; align-items:center;">
                <div class="loc-box"><span>📍</span><span id="stLoc">...</span></div>
                <div id="hoerer" class="hoerer-badge">0 HÖRER</div>
            </div>
            <p id="stDesc" style="font-size:14px; color:var(--text-dim); line-height:1.5; margin-top:10px;"></p>

            <div class="vol-box">
                <span style="font-size:10px; font-weight:bold; color:var(--accent-green)">VOL</span>
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="changeVol(this.value)">
                <span>🔊</span>
            </div>
        </div>
    </div>
</div>

<script>
    // DEIN SENDER HIER EINTRAGEN
    const DEFAULT_STATION = "gold-oldies"; 

    const au = new Audio(); au.volume = 0.8; 
    let currentSlug = ""; let histFull = false; let uiInterval;

    function initApp() { startStation(DEFAULT_STATION, false); }
    function changeVol(val) { au.volume = val; }
    function toggleSearch() { 
        const el = document.getElementById('searchOverlay');
        el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        if(el.style.display === 'flex') document.getElementById('sInput').focus();
    }
    function execSearch() {
        const val = document.getElementById('sInput').value.trim();
        if(val) { startStation(val, true); toggleSearch(); }
    }

    async function startStation(slug, autoPlay) {
        currentSlug = slug.toLowerCase().replace(/[^a-z0-9-]/g, ''); 
        au.src = "https://stream.laut.fm/" + currentSlug;
        if(autoPlay) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        updateUI(); 
        if(uiInterval) clearInterval(uiInterval);
        uiInterval = setInterval(updateUI, 8000); // Check alle 8 Sek
    }

    function togglePlay() {
        if(au.paused) { au.play(); document.getElementById('pBtn').innerHTML = "⏸"; }
        else { au.pause(); document.getElementById('pBtn').innerHTML = "▶"; }
    }

    function toggleHistory() { histFull = !histFull; updateUI(); }

    async function updateUI() {
        if(!currentSlug) return;
        try {
            const [s, l, h] = await Promise.all([
                fetch(`https://api.laut.fm/station/${currentSlug}`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/last_songs`).then(r => r.json()),
                fetch(`https://api.laut.fm/station/${currentSlug}/listeners`).then(r => r.text())
            ]);

            document.getElementById('stNameHeader').innerText = s.display_name;
            document.getElementById('mainImg').src = s.images.station_640x640;
            document.getElementById('stLoc').innerText = s.city || "Radio";
            document.getElementById('stDesc').innerText = s.description || "";
            document.getElementById('hoerer').innerText = h + " HÖRER";
            document.getElementById('footerSlogan').innerText = s.page_title || "Dein Sound.";

            let listHtml = "";
            let currentBoxColor = "transparent";
            let accentColor = "var(--accent-green)";

            l.forEach((song, i) => {
                if(!histFull && i > 3) return;
                const isCurrent = i === 0;
                let art = song.artist.name;
                let tit = song.title;
                const checkString = (art + " " + tit).toLowerCase();

                // --- LOGIK FÜR WERBUNG / NEWS / MODERATION ---
                if(isCurrent) {
                    if(tit.includes("START_AD_BREAK") || song.type === "gold") {
                        currentBoxColor = "rgba(255, 179, 0, 0.2)"; 
                        accentColor = "var(--status-yellow)";
                        art = "REKLAME / WERBUNG"; tit = "Gleich geht's weiter...";
                    } else if(checkString.includes("news") || checkString.includes("nachrichten")) {
                        currentBoxColor = "rgba(0, 170, 255, 0.2)";
                        accentColor = "var(--status-blue)";
                        art = "NACHRICHTEN";
                    } else if(checkString.includes("moderation") || checkString.includes("talk")) {
                        currentBoxColor = "rgba(255, 0, 255, 0.2)";
                        accentColor = "var(--status-pink)";
                        art = s.display_name + " MODERATION";
                    }
                }

                const time = new Date(song.started_at).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                listHtml += `
                <div class="track-entry">
                    ${isCurrent ? `<div id="speakerIcon" style="color:${accentColor}">🔊</div>` : `<div class="track-time">${time}</div>`}
                    <div class="track-details">
                        <span class="track-art" style="${isCurrent ? 'color:'+accentColor : ''}">${art}</span>
                        <span class="track-tit">${tit}</span>
                    </div>
                </div>`;
            });

            document.getElementById('nowBox').style.backgroundColor = currentBoxColor;
            document.getElementById('trackList').innerHTML = listHtml;
        } catch(e) {}
    }

    async function shareStation() { if(currentSlug) navigator.share({ url: `https://laut.fm/${currentSlug}` }); }
</script>
</body>
</html>
