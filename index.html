<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Radio App Station v3.8.0 PRO</title>
    <style>
        :root { --primary: #ffaa00; --bg: #0a0a0c; --card: #16161a; --accent: #00e5ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 480px; background: var(--card); display: flex; flex-direction: column; position: relative; border: 1px solid #222; }
        
        /* Suche */
        .header-search { padding: 25px 20px; background: #000; position: sticky; top: 0; z-index: 9999; }
        #search-input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 18px; outline: none; }
        #results-box { position: absolute; top: 85px; left: 20px; right: 20px; background: #222; border-radius: 12px; max-height: 300px; overflow-y: auto; display: none; border: 1px solid var(--primary); z-index: 10000; }
        .result-item { padding: 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; cursor: pointer; }
        .result-item img { width: 40px; height: 40px; border-radius: 6px; }

        /* Player Bereich */
        .content { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .meta-row { width: 100%; display: flex; justify-content: space-between; font-family: monospace; color: var(--accent); font-size: 12px; margin-bottom: 15px; }
        
        #station-name { font-size: 26px; font-weight: bold; margin-bottom: 10px; }
        #station-location { font-size: 14px; color: var(--primary); margin-bottom: 20px; font-weight: bold; }
        
        #main-cover { width: 100%; max-width: 280px; aspect-ratio: 1/1; border-radius: 25px; object-fit: cover; box-shadow: 0 15px 40px #000; margin-bottom: 20px; border: 1px solid #333; }
        
        #song-title { font-size: 18px; font-weight: bold; color: #00ffaa; margin-bottom: 5px; }
        #artist-name { font-size: 16px; color: #aaa; margin-bottom: 25px; }

        .play-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(255, 170, 0, 0.4); }

        /* Info & Playlist */
        .station-bio { width: 100%; background: rgba(255,255,255,0.04); border-radius: 12px; padding: 15px; font-size: 13px; text-align: left; margin-top: 25px; color: #ccc; line-height: 1.4; }
        .playlist { width: 100%; text-align: left; margin-top: 20px; }
        .playlist-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #222; font-size: 12px; }
        .playlist-item img { width: 35px; height: 35px; border-radius: 5px; }

        .footer { padding: 15px; text-align: center; font-size: 10px; color: #444; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-search">
        <input type="text" id="search-input" placeholder="Sender suchen..." autocomplete="off">
        <div id="results-box"></div>
    </div>

    <div class="content">
        <div class="meta-row">
            <div id="clock">00:00:00</div>
            <div id="listeners">● 0 HÖRER</div>
        </div>

        <div id="station-name">Ready</div>
        <div id="station-location">Wähle eine Station</div>
        
        <img id="main-cover" src="" alt="">
        <div id="song-title">Kein Stream aktiv</div>
        <div id="artist-name">Suche einen Sender</div>

        <button class="play-btn" id="playBtn">
            <svg id="p-icon" width="35" height="35" viewBox="0 0 24 24" fill="black"><path d="M8 5v14l11-7z"/></svg>
            <svg id="s-icon" width="35" height="35" viewBox="0 0 24 24" fill="black" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>

        <div class="station-bio" id="bio">Details zum Sender erscheinen hier.</div>
        <div class="playlist" id="history-box"></div>
    </div>
    <div class="footer">VERSION 3.8.0 PREMIUM STATION</div>
</div>

<audio id="audio-engine" playsinline></audio>

<script>
    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('playBtn');
    const input = document.getElementById('search-input');
    const resBox = document.getElementById('results-box');
    let activeS = "";

    async function updateApp(name) {
        try {
            const r = await fetch(`https://api.laut.fm/station/${name}`);
            const data = await r.json();

            // Anzeige von Name, Hörer und Standort (Bochum Witten etc.)
            document.getElementById('station-name').innerText = data.display_name;
            document.getElementById('station-location').innerText = data.city || "Online Station";
            document.getElementById('listeners').innerText = `● ${data.current_listeners || 0} HÖRER`;
            document.getElementById('bio').innerText = data.description || "";
            const logo = data.images.station_640x640;

            // Aktuelle Musik & Playlist
            const rs = await fetch(`https://api.laut.fm/station/${name}/last_songs`);
            const songs = await rs.json();
            if(songs.length > 0) {
                document.getElementById('song-title').innerText = songs[0].title;
                document.getElementById('artist-name').innerText = songs[0].artist.name;
                document.getElementById('main-cover').src = songs[0].image_640x640 || logo;
                
                let h = "";
                songs.slice(1, 6).forEach(s => {
                    h += `<div class="playlist-item"><img src="${s.image_120x120 || logo}"> <span><b>${s.title}</b><br>${s.artist.name}</span></div>`;
                });
                document.getElementById('history-box').innerHTML = h;
            }
        } catch(e) { console.log("Fehler"); }
    }

    function start(name) {
        activeS = name;
        audio.pause();
        // Nutzt die offizielle Livestream-URL Struktur von laut.fm
        audio.src = `https://stream.laut.fm/${name}`; 
        audio.play().catch(() => {});
        
        document.getElementById('p-icon').style.display = "none";
        document.getElementById('s-icon').style.display = "block";
        
        updateApp(name);
        resBox.style.display = "none";
        input.value = "";
    }

    playBtn.onclick = () => {
        if(!activeS) return;
        if(audio.paused) {
            audio.play();
            document.getElementById('p-icon').style.display = "none";
            document.getElementById('s-icon').style.display = "block";
        } else {
            audio.pause();
            document.getElementById('p-icon').style.display = "block";
            document.getElementById('s-icon').style.display = "none";
        }
    };

    input.oninput = async () => {
        const v = input.value.trim();
        if(v.length < 1) { resBox.style.display = "none"; return; }
        const r = await fetch(`https://api.laut.fm/search/stations?query=${encodeURIComponent(v)}`);
        const d = await r.json();
        if(d.items) {
            resBox.innerHTML = "";
            resBox.style.display = "block";
            d.items.slice(0, 10).forEach(s => {
                const item = document.createElement('div');
                item.className = "result-item";
                item.onmousedown = (e) => { e.preventDefault(); start(s.name); };
                item.innerHTML = `<img src="${s.images.station_80x80}"> <div><b>${s.display_name}</b><br><small>${s.current_listeners || 0} Hörer</small></div>`;
                resBox.appendChild(item);
            });
        }
    };

    input.onblur = () => setTimeout(() => resBox.style.display = "none", 300);
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    setInterval(() => { if(activeS) updateApp(activeS); }, 30000);
</script>
</body>
</html>
